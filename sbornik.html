ертву Иисуса Христа, \nСилой Духа Святого всегда пой слова:"}, {"id": 336, "title": "Господь есть мой Пастырь, не буду тужить,", "text": "Господь есть мой Пастырь, не буду тужить, \nНа пажитях злачных меня Он пасёт.\nДаёт насыщенье моей Он душе \nИ водит к потокам живительных вод.\n\nДолиной ли смерти придётся идти,\nНе буду нуждаться: Ты всюду со мной. \nТвой жезл и Твой посох - отрада в пути, \nУсталому сердцу даруют покой.\n\nТак благость и милость, мой Боже святой, \nИдут со мной всюду в скитаньях земных. \nХрани меня в мире могучей рукой,\nПока не прибуду в Обитель святых."}, {"id": 337, "title": "Не унывай в пути своём, в надежде ободрись,", "text": "Не унывай в пути своём, в надежде ободрись,\nВ минуту жизненных скорбей к Иисусу ты склонись. \nСкажи Ему: «И жизнь мою, и мысли знаешь Ты \nК Тебе иду, Тебя прошу, - Помощник только Ты!»\n\nТы видишь скорбь и вздох души, как я томлюсь в глуши; \nИ сердце ноет от тоски, и слёзы так близки.\nУслышь меня, услышь меня, о, я молю Тебя;\nВ моих страданьях за Тебя, мой Бог, утешь меня.\n\nЯ вспоминаю о семье, о детках дорогих,\nО них взываю я в мольбе, а также за других.\nТы не покинь, Ты не покинь, о Боже, не покинь \nМалюток милых, матерей, дай встречу всем скорей.\n\nКоль я виновен пред Тобой, в грехе Ты обличи,\nНо жить хочу я лишь с Тобой, смиренью научи.\nПрости меня, молю Тебя, и силы дай Ты мне,\nВ объятья Ты возьми меня, мой Бог, иду к Тебе."}, {"id": 338, "title": "Когда бушует жизнь, огнём меня крестя,", "text": "Когда бушует жизнь, огнём меня крестя, \nОдно всегда твержу себе на память: \n«Зачем мне унывать - имею я Христа, \nКто может у меня Его отнять?»\n\nРазлука и война, волненья по местам \nИ мор, и глад - грядущее тревожно.\nНе страшна мне судьба, имею я Христа, \nЧто может у меня Его отнять?\n\nА если иногда уносят поезда \nДрузей моих в далёкую разлуку,\nЗачем мне унывать - имею я Христа,\nЧто может у меня Его отнять?\n\nЯ знаю, узок путь и тесны те врата,\nЧто нас ведут от смерти к вечной жизни, \nНо мне ли унывать - имею я Христа,\nЧто может у меня Его отнять!"}, {"id": 339, "title": "Если в буднях жизни дух твой удручён,", "text": "Если в буднях жизни дух твой удручён,\nТучами унынья путь твой омрачен,\nВспомни, сколько милости Господь явил, \nУдивляться будешь, что Он совершил.\n\n    Милости Господни вспоминай (считай), \n    Все их до единой (в сердце) повторяй. \n    Вспомни, как Он щедро наделил. \n    Удивляться будешь, что Он совершил.\n\nБремя ли заботы на тебе лежит,\nТяжкое ли горе душу тяготит, - \nМилости как вспомнишь, вознесёшь главу, \nСбросишь все сомненья, воспоёшь хвалу.\n\nВидишь ли богатых благами земли,\nПомни: в небесах богатства все твои!\nВсякую нужду восполнит Сам Господь, \nЗолота дороже то, что Он даёт.\n\nОбодрись же духом, на Христа взирай;\nСилою Его все скорби побеждай.\nВ памяти все милости Его храни \nИ найдёшь отраду на земном пути."}, {"id": 340, "title": "Своими путями усмотрит Господь;", "text": "Своими путями усмотрит Господь;\nНе нашим мышленьем, не нашим решеньем, \nСвоим изволеньем усмотрит Господь.\n\n    Тебе вверяюсь я, Ты властвуй надо мной, \n    Пока введёшь меня, Господь, в Свой покой.\n\nСвоею любовью усмотрит Господь;\nНе нашей работой, не нашей заботой,\nСвоею щедротой усмотрит Господь.\n\nИ знаем мы верно: усмотрит Господь.\nОн снял наше бремя; не в наш час и время,\nНо в Свой час и время, усмотрит Господь.\n\nНе падай же духом, усмотрит Господь,\nЧто рек Он - то сильно, не будет бессильно,\nНо явит обильно всю верность Его."}, {"id": 341, "title": "Обетованья всегда пребудут, Кровь Иисуса их подтверждает.", "text": "Обетованья всегда пребудут, Кровь Иисуса их подтверждает.\nХотя б погасла надежда в жизни, - что обещал Бог, то даст.\n\n    Что обещал Бог, то Он исполнит,\n    Хотя бы в жизни погибло всё,\n    Хотя бы звёзды погасли в небе, - \n    Обетованья все стоят!\n\nИ в час страданья, когда темнеет, слабеют силы, унынье в сердце, \nНе дам сомненью смущать мне душу, - что обещал Бог, то даст.\n\nПусть искушенья кругом бушуют, но сила Крови даёт победу.\nИ радостно я пою в надежде: что обещал Бог, то даст.\n\nКогда воскреснут все дети Божьи, и ангелы нас на небе встретят, \nМы там получим венцы победы, - что обещал Бог, то даст."}, {"id": 342, "title": "День после ночи, свет после тьмы, тень после зноя, блеск после мглы,", "text": "День после ночи, свет после тьмы, тень после зноя, блеск после мглы, \nЖизнь после смерти, песнь после слёз,-вот что дарует верным Христос!\n\nРадость за горем, луч за дождем, сбор после жатвы, пир за трудом, \nМир за борьбою, явь после грёз, - вот что дарует верным Христос!\n\nПосле скитанья - милость Отца, после страданья - слава венца, \nСладость покоя - после угроз, - вот что дарует верным Христос!"}, {"id": 343, "title": "Часто в жизни моей дни печали бывают,", "text": "Часто в жизни моей дни печали бывают,\nИ никто из людей мне не в силах помочь.\n\n    Только Ты, Иисус (только Ты, Иисус),\n    Только Ты Избавитель (только Ты),\n    Только Ты помощь мне (только Ты помощь мне) \n    И опора в борьбе (Иисус).\n\nМного раз говорил, что грешить уж не буду;\nЯ прошу: помоги в этой скорби Ты мне.\n\nИ уверен я в том: Ты молитву услышал,\nИ сердечный ответ получу от Тебя.\n\nИ омытый святой Твоей Кровью пречистой, \nОсвященный Тобой, Твоим Духом Святым,\nВновь пойду за Тобой по дороге тернистой \nДо конца своих дней, чтоб войти в Твой покой."}, {"id": 344, "title": "Не унывай, борись с судьбою, - твердил мне солнца яркий луч.", "text": "Не унывай, борись с судьбою, - твердил мне солнца яркий луч. \nНе унывай, Господь с тобою, - мне пела пташка из-за туч.\n\n    Не говори (не говори), что нет спасенья,\n    Что ты в печалях изнемог (не говори).\n    Чем ночь темней (чем ночь темней), тем ярче звёзды, \n    Чем глубже скорбь, тем ближе Бог.\n\nНе унывай, вперёд, смелее, - мне повторял, струясь, поток.\nНе унывай, будь веселее, - пел распустившийся цветок.\n\nНе унывай, - мне утро мая вещало свежестью своей,\nИ вся природа, воскресая, будила жизнь в душе моей.\n\nИ я с тех пор благословляю и солнца луч, и светлый май,\nИ говор струй, и пташек пенье, твердивших мне «не унывай!»."}, {"id": 345, "title": "Пусть на пороге неведомых дней сердце не дрогнет твоё,", "text": "Пусть на пороге неведомых дней сердце не дрогнет твоё,\nЕсли сгущаются тучи сильней, - ты не страшись ничего.\n\nЗнай, по тропинке с тобою идёт Тот, Кто весь мир победил;\nВерь, что чрез скорбь Он тебя проведёт. Верь - и Он даст тебе сил.\n\nПусть на пороге неведомых дней черпает силу душа,\nСилу, которую дал нам ручей тот, что течёт со креста."}, {"id": 346, "title": "Лодка по волнам во тьме плывёт, море пенится, шумит;", "text": "Лодка по волнам во тьме плывёт, море пенится, шумит; \nСтрах за сердце каждого берёт, а Учитель мирно спит.\n- Встань, защити, гибель нас ждёт, чёлн захлестнёт волной! \nВетру буйному Он запретил, и тогда настал покой.\n\n- Маловеры, - упрекнул Он их. Не хватало ль им чего? \nСтолько видели чудес больших и не верили в Него.\nВо всякой скорби верьте в Меня, Я не покину вас;\nЕсли силы вражьи вас стеснят, Я смирю их в тот же час.\n\nВ море бурном мы во тьме плывём в одиноком челноке, \nВсюду видим только страх и гнёт. Знай: Господь невдалеке. \nВерь и надейся, буря пройдёт, помощь придёт с небес.\nВ пристань тихую Он приведёт, наш Господь - Творец чудес."}, {"id": 347, "title": "Не ужасайся, не страшись, Бог сохранит тебя.", "text": "Не ужасайся, не страшись, Бог сохранит тебя.\nПод сень Его всегда стремись, Бог сохранит тебя.\n\n    Бог сохранит тебя рукой Своей среди скорбей, \n    Рукой Своей среди скорбей Бог сохранит тебя.\n\nПостигнет ли невзгоды час, Бог сохранит тебя. \nУслышишь бури грозный глас, Бог сохранит тебя.\n\nДолиной смерти путь пойдёт, Бог сохранит тебя.\nК желанной цели доведёт, Бог сохранит тебя."}, {"id": 348, "title": "Мой Бог, Тебя люблю, Ты знаешь, всегда хочу служить Тебе,", "text": "Мой Бог, Тебя люблю, Ты знаешь, всегда хочу служить Тебе,\nНо слаб я и к Тебе с мольбою взываю: помоги в борьбе.\n\n    Ты моя надежда, Ты моя отрада,\n    Ты Господь - Спаситель, Ты, да, только Ты!\n    Ты моя надежда, Ты моя отрада,\n    Ты Господь - Спаситель, только Ты!\n\nКогда мне скажут: «Кому веришь?» О, дай сказать, что лишь Христу, \nМеня нашёл Он в этом мире, в душе заполнил пустоту.\n\nКогда захочешь испытать меня, то дай мне сил благодарить \nЗа все: за скорби и за радость, Твое величье восхвалить."}, {"id": 349, "title": "Быть лицом к лицу с Иисусом, видеть свет Его очей -", "text": "Быть лицом к лицу с Иисусом, видеть свет Его очей -\nВот к чему душой стремлюсь я, что дороже жизни всей.\n\nВерой видим мы Иисуса, как сквозь тусклое стекло,\nА в великий день грядущий, как Он есть, узрим Его.\n\nОн все тайное откроет, Он все беды устранит,\nОн исправит всё кривое, он всех верных наградит.\n\nБыть лицом к лицу - блаженство! Л теперь так чудно знать, \nЧто ведёт нас к совершенству Тот, Кто дал нам благодать.\n\nЯ лицом к лицу увижу в небе Господа Христа,\nЯ хочу к Нему быть ближе, прославлять Его всегда."}, {"id": 350, "title": "Ничего не бойся! Я всегда с тобой!", "text": "Ничего не бойся! Я всегда с тобой!\nНа пути тернистом есть светильник Мой,\nЧерез тучи льётся мощный свет его;\nЯ с тобой и в мире не оставлю одного.\n\n    Нет, я не один! Нет, нет, никогда\n    Бог мой меня не оставит! Нет, не останусь один!\n\nЛилии завянут, солнца лик зайдёт,\nПеснь моя от сердца всё ж не отойдёт;\nОн мне радость ночью и в средине дня,\nВ мире одиноким не оставит Он меня.\n\nЕсли путь мой тёмен, враг идёт с грозой,\nВсё же слышу ясно: «Я, дитя, с тобой!»\nЛик Его на небе буду видеть я,\nБуду петь там вечно: «Не оставил Он меня!»"}, {"id": 351, "title": "Зачем страдать, мой друг, зачем грустить порой", "text": "Зачем страдать, мой друг, зачем грустить порой \nВедь радость нам дана Самим Христом!\nМы дети Божии, мы всех счастливее,\nМы всех счастливее на всей земле!\n\nВесной цветущею, душою, полной сил,\nХоть труден путь земной, прославь Творца, \nВедь обещал же Он, что не покинет нас,\nЧто не покинет нас Он никогда.\n\nБудь бодрым в жизни сей, иди смелей вперёд \nНавстречу будущей заре весны!\nПой песнь хваления за кровь пролитую,\nЗа кровь пролитую пой песнь Ему!\n\nДыши всей грудью ты, сражаясь с бурями, \nПоддержит нас всегда наш Друг Христос.\nОн, не щадя Себя, любовью смерть попрал, \nЛюбовью смерть попрал, нам счастье дал.\n\nСветло и радостно мы смотрим в будущность, \nЛишь там найдёт покой твоя душа.\nЗабудешь прошлое, войдёшь в небесный край, \nВойдёшь в небесный край, тот чудный край."}, {"id": 352, "title": "Из небесного кристалла был сосуд в саду Царя,", "text": "Из небесного кристалла был сосуд в саду Царя,\nВлага жизни в нём сверкала ярче граней янтаря.\n\n    Мы Твои сосуды, Боже! Духом правды и любви \n    Нас наполни, нас наполни, в нас живи (2 раза).\n\nВраг пришёл, рукой коварной дорогой сосуд разбил,\nКапли влаги лучезарной по полям греха разлил.\n\nЦарь был горько опечален, Сына Своего послал,\nИз осколков и развалин Он опять сосуд собрал.\n\nПолн любви, сосуд узорный Кровью Он Своей омыл; \nСнова влагой животворной до краёв его налил.\n\nИз сосуда дорогого реки жизни потекли,\nИ услышал Божье Слово житель страждущей земли.\n\nНо тот враг не спит, не дремлет. Посмотрите: вот опять \nКамень он с земли подъемлет, чтоб сосуд разбить, попрать.\n\nБерегись, душа живая и спасённая Христом!\nНи мгновенья не теряя, скройся под Его щитом."}, {"id": 353, "title": "В горнем ущелье укройся, ты, изнурённый трудом.", "text": "В горнем ущелье укройся, ты, изнурённый трудом. \nКровью Христовой омойся, ты, истомленный грехом. \nДушу теснит искуситель, зов твой услышит Спаситель, \nОн всемогущий Хранитель! О, ты, истомлённый грехом\n\nВерной защитой Он будет, бремя твоё понесёт;\nОн никогда не забудет, слёзы с очей Сам отрёт.\nВидит твои Он скитанья, все удалит воздыханья,\nПлач прекратит и стенанья, все слёзы с очей Сам отрёт."}, {"id": 354, "title": "Ты сердце новое, Господь, мне подарил, любовию мне раны излечил;", "text": "Ты сердце новое, Господь, мне подарил, любовию мне раны излечил; \nТебя я буду вечно прославлять и на Тебя с надеждою взирать.\n\n    С надеждой, с надеждой, с надеждой на Тебя! (2 раза)\n\nКак хорошо, что сеть на свете Ты! К Тебе стремясь, летят мои мечты. \nТебе хочу я сердце открывать, Тебе лишь свои тайны доверять.\n\nПусть нелегко мне за Тобой идти, и терны, а не розы на пути,\nНо всё равно я за Тобой пойду, пока здесь путь земной не совершу."}, {"id": 355, "title": "Прекрасный гимн нам Аввакум оставил,", "text": "Прекрасный гимн нам Аввакум оставил,\nИ в нем звучат чудесные слова.\nО, если бы всегда я Бога славил,\nХотя б не так успешно шли дела.\n\n    И если бы маслина изменила,\n    А нива больше пищи не дала. \n    Господь, Ты моя радость, моя сила, \n    Моё веселие и песнь моя.\n\nНе расцвела смоковница, и что же?\nНе стало виноградного плода?\nС Тобою унывать не буду, Боже,\nИ буду славить я за всё Тебя.\n\nВ день бедствия я должен быть спокоен, \nХотя бы всё исчезло у меня,\nЧтоб я своей судьбою был доволен \nИ в тишине ночной, и в ясном свете дня."}, {"id": 356, "title": "Мой Бог - скала, сокрыт в Нём я, покров во время бури.", "text": "Мой Бог - скала, сокрыт в Нём я, покров во время бури.\nВ покой Свой ввёл Господь меня; покров во время бури.\n\n    Иисус-мой источник в земле сухой, в земле сухой, в земле сухой; \n    Иисус - мой источник в земле сухой, покров во время бури.\n\nИ если враг меня страшит, меня Спаситель защитит.\nВстают ли горы предо мной: «Не бойся! - слышу, - Я с тобой!»\n\nМой Бог Отец - покров святой, покров во время бури.\nЯ жажду жить одним Тобой; покров во время бури."}, {"id": 357, "title": "Сижу один я, думой полн, как будто я в ладье средь волн,", "text": "Сижу один я, думой полн, как будто я в ладье средь волн, \nА буря все грозней ревёт, ладью мою волною бьет.\n\nИ ужас мне кругом грозит, не в силах волн я отразить,\nНо знаю я, что есть Один, Кто над стихией Властелин.\n\nИ слышу голос я святой: «Не бойся! Я всегда с тобой».\nИ снова мир в душе моей сменил тревогу прежних дней.\n\nО, Иисус - Друг всех людей, похвал и славы не искал,\nОн жил, трудился для людей и жизнь Свою за нас отдал."}, {"id": 358, "title": "О Господь, веди мой чёлн посреди житейских волн!", "text": "О Господь, веди мой чёлн посреди житейских волн!\nБуря грозная пред мной, скалы скрыты под водой.\nЯ молюсь, доверья полн. О Господь, веди мой чёлн!\n\nКак детей родная мать, можешь море Ты унять,\nВетер слушает Твой зов, успокоиться готов.\nПовелитель бурных волн, о Господь, веди мой чёлн!\n\nНе всегда мне быть в челне: пристань близится ко мне. \nСлыша грозный волн прибой, ко Христу спешу с мольбой. \nЯ испуган, я смущён. О Господь, веди мой челн!"}, {"id": 359, "title": "Пашешь - паши с надеждою, сеешь - с любовью сей,", "text": "Пашешь - паши с надеждою, сеешь - с любовью сей,\nС Божьей любовью нежною, а не земной своей.\n\n    Каждый свой шаг и слово с волей Иисуса сверь,\n    В жизни Он наша основа, в будущем, да и теперь. (2 раза)\n\nПросишь - проси лишь с верою, не усомнись в мольбе.\nМеришь - такой же мерою кто-то отмерит тебе.\n\nДелаешь - делай искренно, как ни тяжёл твой гнёт;\nВремя рекою быстрою к вечности нас несёт."}, {"id": 360, "title": "Бог - скала моя, защитит меня от любой беды или суеты.", "text": "Бог - скала моя, защитит меня от любой беды или суеты.\nБог- моя любовь и не нужно слов для меня других, чтобы верить в них. \nГде бы ни был я и куда б ни шёл, знаю, что Иисус меня нашёл.\nНе покинет Он теперь меня. Всё так хорошо и на душе светло,\nБог дарует мне Своё тепло; и теперь мы с Ним навек друзья.\n\nБог - судьба моя, Он ведёт меня, приготовил Он мне на небе дом. \nБог - мои слова и мои уста, мысли лишь о Нём, Господе моём.\nГде бы ни был я и куда б ни шёл, знаю, счастье я уже нашёл,\nИ зачем искать другого мне. Иисус Господь дал мне жизнь и мир, Буду принят я на небесный пир. Духом Он Своим живёт во мне.\n\nБог - скала моя, укрепит меня в жизненном пути, буду с Ним идти. \nБог - мои глаза в этом мире зла, Он поможет мне в море и в огне. \nГде бы ни был я и куда б ни шёл, помню, как Иисус ко мне пришёл, \nОн открыл на мир мои глаза. Мне не дарит счастья этот мир,\nВедь я в нём транзитный пассажир, Иисус - мой путь на небеса."}, {"id": 361, "title": "Буду жить под защитой Твоих крыл, буду жить в мире Божией любви.", "text": "Буду жить под защитой Твоих крыл, буду жить в мире Божией любви.\nНочь настанет, но я не убоюсь, когда я под защитой Твоих крыл.\n\n    Под защитой, под защитой, под защитой Твоих крыл.\n\nЯ спасён под защитой Твоих крыл, мой покой под охраною Твоей. \nПусть летят стрелы я не убоюсь, когда я под защитой Твоих крыл.\n\nХочешь жить под защитой Его крыл, хочешь жить под охраною Его? \nВстань скорее и к Господу иди - будешь ты под защитой Его крыл."}, {"id": 362, "title": "Верность Твоя велика, о мой Боже!", "text": "Верность Твоя велика, о мой Боже!\nМудрость и милость Ты дивно явил.\nТы неизменен, от века Ты тот же,\nПоли состраданья и Отчей любви.\n\n    Верность великую! Верность великую \n    Утро за утром являет Господь!\n    Всё, что мне нужно для жизни даёт Он. \n    Верность великая, Господь, Твоя!\n\nЛето и зиму, посевы и жатву,\nСолнце и звёзды, погоду и дождь, - \nТы учредил; нам слова их понятны:\nВсем управляешь Ты, вес нам даёшь.\n\nМир постоянный, грехов отпущенье,\nДивную помощь в различных скорбях, \nСтойкость в борьбе и надежду спасенья - \nВечно дарует нам верность Твоя."}, {"id": 363, "title": "Возвожу мои очи к горам. Бог - надежда моя и защита.", "text": "Возвожу мои очи к горам. Бог - надежда моя и защита.\nЕго небо - божественный храм; благодать Его всюду излита.\n\nОн есть сень моя с правой руки, удалит Он и страх, и тревогу. \nДаже звёзды, Его маяки, мне укажут к жилищу дорогу.\n\nНе воздремлет Хранящий меня, и мои не колеблются ноги,\nВ чистоте своё сердце храня, упованье моё только в Боге.\n\nВозвожу мои очи к горам. Бог - надежда моя и защита.\nЕго небо - божественный храм; благодать Его всюду излита."}, {"id": 364, "title": "Сердце моё, как берег, мир, как морской прибой,", "text": "Сердце моё, как берег, мир, как морской прибой, \nРушит гранит моей веры яростною волной.\nМиру очень не нравится, что в житейской борьбе \nВсе же Спаситель славится, все же влечет к Себе.\n\nГолос любви Христовой рокотом глушит он, \nСмолкнет на время и снова мечется, возбужден; \nРыкая, наступает, всюду глумясь и виня,\nБьет, и волна любая много сильней меня.\n\nИ, но всему похоже, немощь я сознаю.\nВ чём же секрет заложен, что как скала стою? \nПротив такого прибоя сила есть у меня \nВ Божьем Слове: «Не бойся, ибо с тобою Я!»"}, {"id": 365, "title": "Возьми меня отныне и впереди", "text": "Возьми меня отныне и впереди\nПо жизненной долине, Господь, веди!\nНе мог бы я тропою Твоей идти,\nНо, если Ты со мною, я твёрд в пути.\n\nДаруй Ты сердцу радость во всех скорбях,\nДай чувствовать мне сладость в Твоих словах; \nСвятую веры твёрдость в меня вдохни\nИ духа злую гордость Ты изгони.\n\nКогда же в смертном теле надежды нет, \nНаправь меня Ты к цели чрез тьму и свет. \nВозьми меня отныне и впереди\nПо жизненной долине, Господь, веди!"}, {"id": 366, "title": "И вновь я согрешил, Господь мой, пред Тобою,", "text": "И вновь я согрешил, Господь мой, пред Тобою,\nВиновен, весь в грехах, утративший покой.\nТы видишь жизнь мою, ведь я греха не скрою;\nИ слышу голос Твой: «Приди, Я грех омою!»\n\n    Когда же я достигну высот Твоих святых,\n    Чтоб боль Твою понять и тяжесть тех страданий? \n    Когда ж я научусь любить Тебя сильнее \n    И волю исполнять Твоих Святых Писаний?\n\nТы дал одежду мне светлее света солнца,\nНа пир меня позвал и Сына даровал.\nНо что мне говорить, ведь я греха не скрою?\nИ вновь я запятнал лицо 1реха смолою.\n\nПрошу Тебя: «Прости! Мне грех так душу мучит,\nТы видишь, вся в слезах, как кается она».\nПрошу: омой меня, как Слово Твоё учит,\nЧтоб мне войти на пир в одежде без пятна!"}, {"id": 367, "title": "Прости за время, что прожито, за дни бесплодные прости;", "text": "Прости за время, что прожито, за дни бесплодные прости;\nЗа всё, что помню, что забыто, прости как грешника, прости\n\n    Прости меня (прости меня).\n    Со мною будь (со мною будь), не оставляй меня!\n\nПрости, что часто огорчаю Тебя, Господь, в моём пути,\nЧто часто так ослабеваю и не могу вперёд идти.\n\nПрости, что часто мало веры и устаю в земной борьбе,\nНо у Тебя любви без меры, и потому иду к Тебе!\n\nХочу Тебе отдать, о Боже, всю жизнь мою, мои мечты,\nЯ знаю, Ты во всём поможешь! Моя надежда - только Ты!"}, {"id": 368, "title": "Господь мой Иисус, пришёл к Тебе с мольбою", "text": "Господь мой Иисус, пришёл к Тебе с мольбою \nНе так, как в первый раз с окаменевшею душой;\nВ безумстве я просил: «Оставь меня в покое!»\nНо вот я пред Тобой с поникшей головой.\n\nПод тяжестью креста, позора и страданья\nТы для меня Голгофский путь готов был вновь пройти.\nТебя я распинал, но слёзы раскаянья\nМой взор застлали и прошу Тебя: «Прости!»\n\nДругого, кроме слёз, ответа не имею\nНа тихий Твой призыв, как среди бури чайки крик. \nПрошу: «Прими меня!» - но взгляд поднять не смею \nНа Твой прекрасный, светлый и манящий лик.\n\nГорячею мольбой к Тебе, Господь, взываю.\nПрошу: «Не уходи! Я сознаю, что был не прав».\nИ лишь к Тебе свой взор с надеждой устремляю,\nЧто Ты меня простишь, Своим дитём назвав."}, {"id": 369, "title": "Прости, Господь, за мысли злые, прости и за слова пустые,", "text": "Прости, Господь, за мысли злые, прости и за слова пустые,\nПрости за ропот и за злость, и дай Ты в сердце мне любовь.\n\nВедь Кровь Твоя святая пролилась, обетование исполнилось.\nНу, почему в который раз Тебя я распинаю?\n\nМне нужно крест свой взять и вдаль идти, как часто силы нет его нести, \nТерпеть, страдать, молиться, ждать и никогда не унывать.\n\nДай жизнь душе моей, великий Бог, чтоб сердце стало мягким, чистым. \nОмой, очисти мои мысли, впусти меня Ты в Свой чертог."}, {"id": 370, "title": "Я жажду, Господи, прощенья от всех греховных дел моих,", "text": "Я жажду, Господи, прощенья от всех греховных дел моих,\nЧто мало ближнего любил я и мало думал о других,\nЧто часто шёл своей дорогой без вышней цели пред собой.\nЯ жажду, Господи, прощенья! Ты все грехи мои омой!\n\nЯ жажду, Боже, избавленья от царства злобных мрачных сил. \nО, дай, Господь, мне силы свыше, чтоб я греховность победил \nТы Духом света, Духом правды слепые очи мне открой,\nЧтобы в пути я не сбивался, Христа имея пред собой."}, {"id": 371, "title": "Дай святость мне, Боже, дай кротость, Твой страх,", "text": "Дай святость мне, Боже, дай кротость, Твой страх, \nДай твердость в страданьях, дай плач о грехах!\n\nУмножь в Христа веру и чувства к Нему;\nДай радость в молитве, в служенье Ему!\n\nДай мне благодарным Тебе быть всегда,\nДай веровать в Слово и в славу креста.\n\nС ним в горе, страданьях дай сил, чтобы я, \nСмирясь в испытаньях, прославил Тебя.\n\nДай чистое сердце и дух правый мне,\nОтбросив плотское, стремиться к Тебе!\n\nБыть к Царству готовым, мир, святость стяжать, \nЧтоб жизнью, делами Тебе подражать."}, {"id": 372, "title": "Прости меня, Боже, прости, я молю,", "text": "Прости меня, Боже, прости, я молю,\nПрости, что так поздно к Тебе прихожу, \nПрости, что я раньше Тебя не познал,\nИ друга иного тогда я избрал.\n\nПрости, что мой разум с Тобой воевал, \nПрости, что Тебя я страдать заставлял, \nПрости, что я скорби Тебе причинял,\nЧто вновь на кресте я Тебя распинал.\n\nНо Ты пробудил меня к жизни иной \nИ сердца коснулся Своею рукой,\nГлаза мне открыл Ты на пройденный путь, \nВ неверье, в грехах мне не дал утонуть.\n\nИ вот я в молитве стою пред Тобой.\nВеди меня, Боже, Своею рукой!\nЯ всю свою жизнь посвящаю Тебе,\nТы только не дай мне погибнуть в борьбе.\n\nИ я обещаю Тебя прославлять,\nИ словом, и делом Тебя восхвалять,\nЧтоб люди увидели свет Твой во мне \nИ, светом влекомые, шли все к Тебе"}, {"id": 373, "title": "Из размякшей земли легче вырвать бурьян,", "text": "Из размякшей земли легче вырвать бурьян,\nИз смиренной души легче вырвать плохое. \nРазмягчи мою душу и вырви изъян,\nСделай мягким, податливым поле сухое.\n\nРазмягчи, ороси благодатным дождём \nИ вложи Ты в него Своё семя живое, \nОхраняй от врагов его ночью и днём, \nОтгоняй От него вороньё полевое.\n\nЗнаю, Боже, чтоб почву души размягчить, \nНужен плуг и нужны борона и лопата; \nЗнаю, сердце моё будет кровоточить\nТак же, как и Твоё на Голгофе когда-то.\n\nИз размякшей земли легче вырвать бурьян, \nИз смиренной души легче вырвать плохое. \nНа взрыхлённых Тобою сердцах христиан \nПусть плоды принесёт Твоё семя живое."}, {"id": 374, "title": "Я прихожу к Тебе в грехах, Спаситель.", "text": "Я прихожу к Тебе в грехах, Спаситель.\nЯ много сделал зла за жизнь свою,\nПути не знал я Твоего, Спаситель,\nВ грехах, во тьме бродил, прости, молю.\n\n    Услышь, Господь, мою молитву ныне, \n    Прости, прости грехи, омой меня.\n    Я сознаю греха и зла пучину,\n    О,смилуйся в любви, прими раба.\n\nХоть не достоин возносить молитву,\nНо ради смерти и святой Крови \nПрости вину, омой греха пучину,\nЯ жажду мира, святости, любви.\n\nНе отклони моей молитвы, Боже,\nЯ верю в силу Сына Твоего,\nЯ верю в Кровь пролитую и Слово,\nЧто Ты простишь меня ради Него."}, {"id": 375, "title": "Зачем так мучаешь себя, сказав: «Когда же Он придёт?»", "text": "Зачем так мучаешь себя, сказав: «Когда же Он придёт?»\nВедь Он всегда, везде с тобой, в святую Церковь свет Свой льёт.\n\n    О, приходи же, наш Иисус! Омой сердца,потом уж пусть, \n    Пусть даже мир падёт к ногам, я сердце лишь Тебе отдам.\n\nЯ не желаю быть, кем был, когда в пороках своих жил,\nЯ согрешал, не понимал; и только Ты мне руку дал.\n\nО, как давно жду той поры, когда со мною будешь Ты \nНавек в том городе святом, где мой приют и вечный дом."}, {"id": 376, "title": "Господь, одно хочу лишь я, хотя мой путь земной тернист:", "text": "Господь, одно хочу лишь я, хотя мой путь земной тернист:\nВеди меня среди огня, чтоб я был чист, чтоб я был чист!\n\n    Омой меня внутри и вне и, если нужно, плавь в огне,\n    Чтоб в сердце грех, на самом дне, был удалён совсем во мне (2 раза).\n\nНе делать зла стараюсь я, от грешных помыслов бегу, -\nКак не стремлюсь быть чистым я, всё ж чистым быть я не могу.\n\nПошлёшь ли в жизни счастье мне, богатство, славу иль успех,\nНо сердце чистое во мне дороже всех, дороже всех."}, {"id": 377, "title": "Я не хочу полуправды, я не хочу полуцели,", "text": "Я не хочу полуправды, я не хочу полуцели,\nЯ не хочу, чтобы струны в сердце напрасно звенели.\n\nЯ не хочу полуверы, жалких, слепых рассуждений,\nЯ не хочу трепетаний, в сердце бесцельных стремлений.\n\nЕсли отдаться - навеки, если любить - так всецело,\nТак, чтобы пламенем жарким сердце победно горело.\n\nЯ не хочу полужизни робкой, бесцветной, бездушной,\nЯ не хочу полусмерти жалкой, бесплодной, ненужной.\n\nПусть же в горниле страданий грешное «я» умирает, \nПламенем в сердце свободном новая жизнь воскресает.\n\nЯ не хочу полуправды, я не хочу полуцели,\nПусть порываются струны, лишь бы недаром звенели!"}, {"id": 378, "title": "Чудное озеро Геннисаретское с чистой кристальной водой,", "text": "Чудное озеро Геннисаретское с чистой кристальной водой,\nТы отражало Христа Назаретского, весь Его образ живой.\n\nНыне он Духом Своим поселяется в наших счастливых сердцах, \nЧто же неясно Он в нас отражается, как отражался в водах?\n\nИли лежит на пас плесень сомнения, или теснит суета?\nИли от бурного жизни волнения плохо в нас видно Христа?\n\nБудем как озеро Геннисаретское, с чистой и светлой душой,\nИ отразится Христа Назаретского в нас Его облик живой."}, {"id": 379, "title": "Очи святые, очи Христа, очи Господни полны огня.", "text": "Очи святые, очи Христа, очи Господни полны огня.\nНа боль людскую с грустью глядят, вечной любовью они горят.\n\nВот они видят Иерусалим, город, который избран был Им, - \nЖгучие слёзы ради людей льются струёю с Его очей.\n\nПеред служанкой в тот час скорбей отрёкся Пётр от Друга людей. \nВзор Иисуса его застал, и в раскаянье Пётр зарыдал.\n\nОчи Иисуса - тайн для них нет. Всё они видят, ведь они - свет. \nКаждый шаг жизни ведом Ему, Богу доверься лишь одному."}, {"id": 380, "title": "Господь, мой Спаситель, Тебя я молю,", "text": "Господь, мой Спаситель, Тебя я молю,\nСвоей омой Кровию душу мою.\nМне чистое сердце пошли от Тебя \nИ снега белее соделай меня.\n\n    Снега белей, да, снега белей;\n    Омой меня, стану я снега белей.\n\nГосподь, мой Спаситель, внемли Ты мольбе, \nИ Сам освяти меня в жертву Себе.\nВсецело Тебе отдаю я себя.\nАх, снега белее соделай меня!\n\nИ с верою я принимаю Твой дар;\nОчищено сердце любовью Твоей.\nЯ знаю, молитве Спаситель мой внял \nИ сделал нечистое снега белей."}, {"id": 381, "title": "Красота Иисуса, светись во мне!", "text": "Красота Иисуса, светись во мне!\nЧистота и любовь, проявись вполне!\nДух любви и огня (и огня), оживи и меня (и меня),\nЧтобы образ Иисуса сиял во мне!\n\nПусть увидят во мне красоту Христа,\nВсю Его чистоту и любовь всегда;\nО Дух Божий, приди (о, приди)! Всё во мне измени (измени), \nПусть увидят во мне красоту Христа.\n\nДух Святой, Утешитель, живи во мне,\nБлагодать и обитель Твоя во мне,\nЧтоб я плод приносил (приносил), и Тебя я любил (я любил), \nИ вечерю со мною Ты разделил.\n\nПусть душа с торжеством гимн хвалы поёт,\nСлавя имя Христа, Им одним живёт,\nЧтобы Имя Христа (да, Христа) прославляли уста (все уста), \nЧтобы пела душа гимн хвалы всегда."}, {"id": 382, "title": "Кто бы дал мне слёзы раскаянья - плакал бы я день и ночь.", "text": "Кто бы дал мне слёзы раскаянья - плакал бы я день и ночь.\nКто бы дал мне в сердце утешенье - все сомненья б улетели прочь.\n\nЛьются слёзы у царя Давида, разве мало серебра?\nНо я плачу, потому что вижу - Дух Святой уходит от меня.\n\nКто бы дал мне слёзы, как Мария плакала у ног Христа,\nИ, слезами раны омывая, для души отраду там нашла.\n\nКто бы дал мне слёзы раскаянья, что лились из глаз Петра! \nТяжкую вину его омыли, грех и горе отречения.\n\nПосмотри на слёзы Иисуса, что лились из глаз тогда \nЗа спасенье Иерусалима и за грех ожесточения.\n\nБоже, дай мне слёзы таковые, чтобы был услышан я,\nЧтобы я не плакал за дверями, где слеза уж больше не нужна."}, {"id": 383, "title": "Отчизна моя в небесах, к ней стремится и рвётся душа (в небеса):", "text": "Отчизна моя в небесах, к ней стремится и рвётся душа (в небеса): \nТам святые в бессмертных лучах, там струится живая река (в небесах).\n\n    В небесах (в небесах), в небесах (в небесах),\n    Отчизна моя в небесах (в небесах)!\n    В небесах (в небесах), в небесах, в небесах \n    Отчизна моя в небесах!\n\nГосподь меня ждёт в небесах, Он готовит Обитель Свою (в небесах); \nОтдых мирный на злачных лугах в Его светлом, блаженном раю (в небесах).\n\nУж скоро мне быть в небесах, скоро кончится путь мой земной (в небесах); \nТам мне встретятся в райских вратах те, что верою жили святой (на земле)."}, {"id": 384, "title": "Меня влекут заоблачные дали, меня влекут лишь только небеса,", "text": "Меня влекут заоблачные дали, меня влекут лишь только небеса, \nТам нет ни слёз, ни горя, ни печали, тот дивный край - Родина моя!\n\nМеня влечёт то чувство неземное, всё больше наполняя с каждым днём, \nИ это есть ничто, друзья, иное, как Иисуса дивная любовь!\n\nМеня влечёт одно, друзья, желанье: войти туда, где ангелы ноют, \nГде чистота, кристальное сиянье, страдальцам в небе дивный есть приют.\n\nМеня влечёт, и там, за облаками, я отдохну от жизни суетной,\nИ песнь хваленья новыми устами я воспою на Родине святой!"}, {"id": 385, "title": "Вдали от тьмы земных сует есть край, где Божий свет", "text": "Вдали от тьмы земных сует есть край, где Божий свет \nСияет в радостных лучах, где блещет всё в цветах.\n\n    В тот край (в тот край),в тот край (в тот край) \n    Стремлюсь всем сердцем я;\n    Нет больше счастья (счастья) для меня:\n    Быть в вечном Царстве дня.\n\nТам вечная любовь царит и верных веселит;\nТам жизни вечная весна Христом озарена.\n\nТам туч на своде неба нет, там буря не грозит,\nЗабыто зло житейских бед, не льёт слеза с ланит."}, {"id": 386, "title": "Поднимаю взоры к небесам: ах, какая радость ждёт нас там!", "text": "Поднимаю взоры к небесам: ах, какая радость ждёт нас там! \nВ радостном общенье, в трепетном волненье \nСо Христом мы встретимся, а там...\n\nЖдет награда - светлые дворцы, пальмовые ветви и венцы. \nПосле слёз и горя на стеклянном море\nПеснь поют победы первенцы.\n\nНас ко древу жизни поведут, арфы золотые нам дадут.\nАрфы не стареют, струны не ржавеют,\nЗвуки неземные издают.\n\nТам страна нетленной красоты, никогда не вянут там цветы, \nТам настолько чудно, что представить трудно, -\nВсюду там сиянье красоты.\n\nРадость скоротечна в мире сём, горе и ненастье ждут потом. \nРадость бесконечна там пребудет вечно,\nЕсли мы в союзе со Христом."}, {"id": 387, "title": "Скоро я увижу, озарённый светом,", "text": "Скоро я увижу, озарённый светом,\nУтро новой жизни - мой небесный Дом.\nО, какое счастье я в Христе имею \nВ небе мне Обитель приготовил Он!\n\n    В вышине небес, где живёт Творец,\n    Имею я дом и буду жить в нём, в вышине небес.\n\nИ иду туда я через тьму густую,\nИ бывает часто сердцу тяжело,\nНо любовь Иисуса нежно греет душу,\nХоть печалей много, но с Христом светло.\n\nМного скорби в жизни на пути встречаю,\nНо я знаю, что я скоро отдохну.\nСколько здесь скитаний, в мире угнетенном.\nСам Господь отрёт последнюю слезу.\n\nИ тебя, о друг мой, хочет Бог избавить \nОт греховной ночи и в Свой Дом ввести.\nСкоро Он вернётся, чтобы всех спасённых \nОт земных страданий в Небо привести."}, {"id": 388, "title": "Не надо нам счастья земного, не вечно оно будет длиться.", "text": "Не надо нам счастья земного, не вечно оно будет длиться. \nДуша, преклоняясь пред Богом, желает Ему молиться. \nПорой тяжело бывает, но где бы я в жизни не был,\nДуша моя твёрдо знает: стремиться ей нужно в небо!\n\n    Небо - оно не случайно! Небо - глубокая тайна,\n    Но Библии свет перед нами нам открывает её:\n    За облаками, за облаками есть вечное бытие.\n\nКогда я уверовал в Бога, на Божий призыв отозвался,\nТо от притяженья земного не сразу, но оторвался.\nНе космос нам нужен, а небо, где слабых не обижают,\nГде не умирают без хлеба, где вечность и мир обитают!\n\nДуша в мире зла не пригрелась, земля ей не стала домом, \nХотя для нес вес имелось и было в достатке готово.\nПеред грехом склоняться бессмертной душе нелепо. \nДуша моя ввысь стремится, нужны ей свобода и небо!"}, {"id": 389, "title": "Вечная радость дана нам Христом. Там за небесной рекою наш Дом!", "text": "Вечная радость дана нам Христом. Там за небесной рекою наш Дом! \nВот бы прожить нам всю жизнь и потом вместе достигнуть покоя!\n\n    Знаю у что будут, наверно, не раз молнии, гром и тревоги подчас. \n    Вечная радость - подарок для нас, к вечности наша дорога.\n\nВ мире природа так чудно цветёт, и, славя Бога, всё небо поёт. \nЗнаю, Спаситель давно меня ждёт там, где ни разу я не бы"}, {"id": 390, "title": "Синее небо - Отчизна моя! Синее небо, как люблю я тебя!", "text": "Синее небо - Отчизна моя! Синее небо, как люблю я тебя!\nК тебе я иду, к тебе я спешу. Синее небо - Отчизна моя!\n\nСинее небо - нет тучки нигде. Синее небо, тебя вижу во сне,\nК тебе я иду, к тебе я спешу. Синее небо - Отчизна моя!\n\nСинее небо - подножье Креста! Синее небо - Христа красота!\nК тебе я иду, к тебе я спешу. Синее небо - Отчизна моя!\n\nСинее небо, как тебя мне достичь? Синее небо! О, как мне там быть? \nЗнаю, буду я там оправдан Христом. Синее небо - Отцовский мой Дом!\n\nЦерковь Невеста, небо-твой Дом! Будь же готова ты к встрече с Христом! \nО, не опоздай, Христа ты встречай, чистое сердце Иисусу отдай!"}, {"id": 391, "title": "Есть в небе прекрасная Божья страна,", "text": "Есть в небе прекрасная Божья страна,\nВсех Божиих чад ожидает она.\nВперёд устремляюсь с надеждой в груди,\nЯ верю, я верю, что Ты впереди.\n\nТо город прекрасный, дорогу туда \nНикто без Христа не найдёт никогда.\nЯ слышу Твой голос: «За Мною иди».\nЯ верю, я верю, что Ты впереди.\n\nК той Родине славной всем сердцем стремлюсь, \nК Тебе я в молитве своей возношусь.\nО Пастырь мой добрый, меня Ты веди.\nЯ верю, я верю, что Ты впереди.\n\nЖивущим здесь в мире положен удел,\nЗемному скитанию их есть предел.\nОт зла в этом мире меня Ты храни,\nЯ верю, я верю, что Ты впереди."}, {"id": 392, "title": "Люблю тебя, Край родной, Край желанный!", "text": "Люблю тебя, Край родной, Край желанный! \nЛюблю тебя, беспредельно люблю!\nСтрана святой чистоты первозданной, \nСтремлюсь к тебе и желаньем горю \nПереселиться туда, где Спаситель \nДаёт покой утомлённым сердцам. (2 раза)\n\nЛюблю тебя, Божий город чудесный, \nНерукотворной, святой красоты!\nЛюблю созвучие хоров небесных,\nВ тебе все мысли мои и мечты.\nТам в славе Сам Иисус обитает -\nМой верный Друг и надежда моя! (2 раза)\n\nЛюблю тот Край, о котором вещает \nСвятая Книга божественных слов.\nУ врат жемчужных Спаситель встречает \nВсех, кто прославил Господню любовь.\nТуда стремлюсь и Христа Иисуса\nХочу прославить достойной хвалой. (2 раза)"}, {"id": 393, "title": "О небо, голубое небо! Люблю я наблюдать твою красу,", "text": "О небо, голубое небо! Люблю я наблюдать твою красу,\nКогда в час ранний пред рассветом кропишь на землю ты свою росу.\n\n    О небо, дорогое небо, как много скрыто в синеве твоей!\n    За ней всё вечно и всё ново, там всё сокровище души моей.\n\nЛюблю я утреннее небо, светлеющее пред рассветом дня,\nКогда, мрак ночи разгоняя, восходит солнце, полное огня.\n\nКак часто взор мой привлекаешь своею беспредельной высотой \nИ тихо мне напоминаешь своё начало - день второй,\n\n    Когда Творец, мир созидая, сияньем Лика разгоняя мрак, \n    Великой силой обладая, сказал: «Да будет свет!» И стало так.\n\nС тех пор зовут тебя все Небом, Сам Бог тебе такое имя дал,\nЛуну и звёзды дал в объятья и множеством созвездий увенчал.\n\nКогда же ночью очень тёмной лазурных красок не видать в тебе, \nТо звездочки, мерцая ровно, на миг не замолкают о тебе"}, {"id": 394, "title": "В небесах моя Отчизна, где не будет больше слёз.", "text": "В небесах моя Отчизна, где не будет больше слёз.\nПриготовил там обитель для меня уж Сам Христос.\n\n    В небе, в небе скоро буду л, дома, там, где ждут друзья! \n    Буду там, где мой Иисус, туда лишь я стремлюсь!\n\nТам есть место для покоя от нужды и суеты;\nТам любовь Христа святая всех в одно соединит.\n\nО Отчизна дорогая, странник жаждет о тебе,\nИ, шаги всё ускоряя, он спешит к родной стране!"}, {"id": 395, "title": "Небесный Край родной! В тебе желаю быть;", "text": "Небесный Край родной! В тебе желаю быть;\nНа гору, в Дом святой, душа моя летит.\n\n    О, вечный мир! (О, вечный мир!)\n    Здесь каждый миг (здесь каждый миг) \n    Стремлюсь к тебе лишь я! Отчизна ты моя!\n\nЖелаю быть я там с Отцом, па высоте,\nГде славный Божий храм сияет в красоте.\n\nУж скоро я приду в небесный вечный Край \nИ счастье там найду, души бессмертье, рай."}, {"id": 396, "title": "Может быть потому, что недолго мне жить на земле,", "text": "Может быть потому, что недолго мне жить на земле, \nМожет быть потому, что хочу я быть ближе к Тебе,\nЯ смотрю на бескрайние синие дали \nИ простор необъятной страны.\n\n    О небо, небо синее, мечты прекрасные,\n    К тебе стремлюсь я, Край безоблачный.\n    Я вижу город золотой, Христа в нём вижу я, \n    Поэтому смотрю я в синь твою.\n\nМожет быть потому, что недолго мне жить на земле, \nМожет быть потому, что хочу я быть ближе к Тебе, \nНебо, ты нас зовешь в край прекрасный и славный, \nЯ стремлюсь лишь в просторы твои.\n\nМой Господь, помоги мне дорогу земную пройти \nИ в небесной Отчизне покой от невзгод обрести.\nДа прославлю Тебя, мой Господь Искупитель,\nЗа любовь, за святую Обитель."}, {"id": 397, "title": "Там далеко (там далеко), за облаками (за облаками),", "text": "Там далеко (там далеко), за облаками (за облаками),\nВстретит меня Иисус.\nНежно обнимет (нежно обнимет) Своими руками (Своими руками), \nС Ним я навеки сольюсь.\n\n    А пока живу я в мире странником (странником)\n    И с тоской смотрю на небеса (на небеса).\n    С небом связаны мои желания (желания),\n    С небом связана моя судьба.\n\nМне распахнут (мне распахнут) райские двери (райские двери), \nРадостно скажут: «Входи!»\nВес это будет (вес это будет), твердо я верю (твердо я верю),\nНо это лишь впереди.\n\nТам навсегда (там навсегда) скорби забуду (скорби забуду),\nВ небе лишь радость царит;\nТам с Иисусом (там с Иисусом) вечно я буду (вечно я буду)\nВ сладком общении жить."}, {"id": 398, "title": "Вечность святых видится мне, Дом мой небесный в родной стороне.", "text": "Вечность святых видится мне, Дом мой небесный в родной стороне. \nНочью и днём вижу, как наяву, город святых, а над ним синеву.\n\n    Там, только там небо чисто от гроз,\n    Там, только там в небе тесно от звёзд.\n    Там звуки арф и повсюду цветы,\n    Там жизни всей моей мечты.\n\nСтранник я здесь, трудно в пути, но уж немного осталось идти \nЦепью земных бесконечных дорог, где даже сны в ожиданье тревог.\n\nК небу дойти - вот цель моя! О Боже мой, умоляю Тебя:\nБлудного сына к Себе Ты прими, лаской Отцовской меня обними."}, {"id": 399, "title": "Пройдут года и постепенно всё унесут в руках своих,", "text": "Пройдут года и постепенно всё унесут в руках своих,\nА там, вдали, в красе нетленной стоит святой, святой Иерусалим.\n\n    К тебе спешу душой, хочу, хочу домой \n    И быть всегда с тобой, Иерусалим!\n    Забуду всю печаль, земли ничуть не жаль,\n    Уйду в святую даль, Иерусалим.\n\nВокруг него сады белеют, поёт там славный херувим.\nИ все прекрасные аллеи ведут в святой, святой Иерусалим.\n\nХристос там Царь, Первосвященник, озарено всё перед Ним.\nТам сыт голодный, волен пленник. Уйду в святой, святой Иерусалим."}, {"id": 400, "title": "Край чудесный нас ждёт там на небе, где окончится труд и печаль!", "text": "Край чудесный нас ждёт там на небе, где окончится труд и печаль! \nОт скорбей я стремлюсь к той Отчизне, где есть вечная радость и мир.\n\n    Край чудесный! Край чудесный!\n    Сердце радостно рвётся к тебе.\n    Край чудесный! Край чудесный!\n    Там ведь ждёт нас Спаситель к Себе.\n\nКрай чудесный, где ангелов пенье раздаётся, как шум многих вод. \nСлаву Агнцу возносят святые: «Аллилуйя!» - они вес поют.\n\nКрай чудесный, где в свете небесном, будем видеть мы славу Творца; \nВ тени пальм и в долинах чудесных, там я буду счастлив без конца.\n\nВ край чудесный мы скоро прибудем и увидим Того, Кто нам мил; \nТам утихнет скорбящее сердце, ведь там вечная радость и мир."}, {"id": 401, "title": "Издали нам сияет страна, в неё верою всякий войдёт;", "text": "Издали нам сияет страна, в неё верою всякий войдёт;\nСам Спаситель ведёт в небеса Свой искупленный верный народ.\n\n    Вскоре Он (вскоре Он) нас введёт (нас введёт)\n    В вожделенный тот Край наш родной (Край наш родной). \n    Вскоре Он (вскоре Он) нас введёт (нас введёт)\n    В вожделенный тот Край наш родной.\n\nТам, во славе небес, далеко от забот и печалей земли,\nВсе поют, восхваляя Его, с чувством радостной, чистой любви.\n\nТам бесчисленный сонм тех святых, что от Духа объяты огнём, \nВоспевают Христову любовь, преклонясь пред Его алтарём."}, {"id": 402, "title": "Я иду, простирая руки, и глотаю слезы порой,", "text": "Я иду, простирая руки, и глотаю слезы порой,\nКаждый день я томлюсь в разлуке: в небесах Искупитель Благой. \nДля меня ничего не надо на земле, где злоба и кровь,\nНи больших городов, ни блага; не найду на земле любовь.\n\n    О родное синее небо, ты давно зовёшь меня с собою вдаль. \n    Слёзы горькие взор застилают, я смахну их и скрою печаль.\n\nКак хочу я попасть на небо, от земных скорбей улететь,\nЧтобы встретить Христа Иисуса и хвалебную песню спеть.\nНо всему своё время бывает, будет время - уйду от скорбей,\nА пока я, других утешая, буду петь для спасенья людей.\n\nЯ пою для тех, кто не знает, что на небе есть край родной,\nЧтоб узнали они и стремились, где Спаситель есть твой и мой. \nДля меня ничего не надо на земле, где злоба и кровь,\nНи больших городов, ни блага; не найду на земле любовь."}, {"id": 403, "title": "Там, в вышине бесконечной, между планет город стоит, город вечный.", "text": "Там, в вышине бесконечной, между планет город стоит, город вечный. \nКак я хочу там отдохнуть и дышать, дышать, дышать,\nИ с восторгом наслаждаться, прославлять Христа, прославлять.\n\nВсё предо мною прекрасно кажется мне, чувство моё не угасло. \nГород родной неповторим, он живёт, растёт, цветёт.\nГород чудный, город славный красотой к себе влечёт.\n\nЗдесь постоянно усталый, душу мою томит житейское море, \nТолько одно - мне со Христом вперёд, вперёд, вперёд,\nОн в небесную Отчизну непременно доведёт!"}, {"id": 404, "title": "Я знаю край без солнечного света, где дивный свет от Божьего лица", "text": "Я знаю край без солнечного света, где дивный свет от Божьего лица \nСияет там, сияет без конца, и там вовек не увядает лето.\n\nЯ знаю край, где вечно много хлеба, где нет нужды, нет жалкого раба, \nИ не дымит фабричная труба, прозрачно там лазоревое небо.\n\nЯ знаю край, где волки и ягненок, и лев, и барс пасутся вместе там, \nПасутся там по нивам и лугам, и водит их там маленький ребёнок.\n\nЯ знаю край, увы, так мало знаю! О том совсем не знаю ничего, \nЧто Бог готовит любящим Его, — не видел глаз и ухо не слыхало!\n\nЯ знаю край, где вечною любовыо, одной семьёй живёт парод святой, \nГде брат на брага не идёт войной, святой земли не обагряют кровью.\n\n0, дивный Край! Ах, если б на мгновенье хотя б во сне его мне увидать! \nРекою там струится благодать и пред престолом льются песнопенья."}, {"id": 405, "title": "Небеса ожидают меня, радость ждёт неземная меня -", "text": "Небеса ожидают меня, радость ждёт неземная меня -\nБудет встреча с Иисусом Христом, Святым Духом, Небесным Отцом.\n\n    И венец, конечно, венец! Тот, что мне приготовил Отец! \n    И венец, конечно, венец! Тот, что мне приготовил Отец! \n    Аллилуйя! (8 раз)\n\nГород ждёт неземной красоты: всюду ангелы, всюду цветы,\nЛица милых, родных и друзей, и Спаситель стоит у дверей.\n\nБудет встреча с Иоанном, Петром. И святых без числа, целый сонм, \nПодойдут и обнимут меня, радость будет моя без конца!"}, {"id": 406, "title": "Слышал я о стране, светлой той стороне, Слово Божье о ней говорит.", "text": "Слышал я о стране, светлой той стороне, Слово Божье о ней говорит. \nОт забот всех вдали, там не будет тоски, всё новое Бог сотворит.\n\n    До небесной страны, светлой той стороны \n    Голос бури земной не дойдёт.\n    Украшен тот Град, ждёт он всех Божьих чад,\n    Солнце там никогда не зайдёт.\n\nДрево жизни цветёт, плод целебный несёт, и живая река там бежит, \nГолос арфы звучит, песнь хвалы не молчит; всё новое Бог сотворит.\n\nОдесную Отца нам обитель дана, бесконечная радость царит.\nТам весна не пройдёт, плач туда не войдёт, всё новое Бог сотворит!"}, {"id": 407, "title": "Небеса, небеса небес! Я стремлюсь туда - в край святых чудес,", "text": "Небеса, небеса небес! Я стремлюсь туда - в край святых чудес,\nВ тот лазурный край; для души моей \nЯ нашёл тебя на пути скорбей. Восхожу тропой в небеса.\n\nОблака, облака скорбей иногда плывут над душой моей.\nОблака плывут, по мой Бог со мной,\nОн даёт душе и в скорбях покой, - и сияют вновь небеса!\n\nОкеан, океан любви счастье мне принёс в жертвенной Крови. \nБоль души моей Он один поймёт,\nИ в часы скорбей Он ко мне придёт. Мой Христос - любви океан.\n\nГосподи, помоги душой каждый жизни час пребывать с Тобой. \nСреди бурь земных сохрани меня,\nЧтоб, окончив путь, мне узреть Тебя и воспеть хвалу в небесах."}, {"id": 408, "title": "Что же грустишь ты, о друг дорогой, смотришь уныло на путь свой земной?", "text": "Что же грустишь ты, о друг дорогой, смотришь уныло на путь свой земной? \nНо ты взгляни: там, за далью земной, синее небо блестит красотой!\n\n    Синее небо - мечта моя и твоя!\n    Синее небо! Стремлюсь я туда, лишь туда,\n    В синее небо, где всегда чистота,\n    Где царит лишь любовь, где Отчизна моя и твоя!\n\nТам наш Спаситель во славе Отца, Он ожидает тебя и меня!\nТак ободрись же, мой друг дорогой, в небе найдёшь ты желанный покой!\n\nБремя Он снимет, все слёзы утрёт и в небо примет Свой верный народ. \nЧистые сердцем там узрят Творца, вечно пребудут во славе Отца."}, {"id": 409, "title": "Есть ясный лучший мир иной, где слёз никто не льёт,", "text": "Есть ясный лучший мир иной, где слёз никто не льёт,\nТам радость вечная царит, хор ангелов поёт.\n\n    Сердце жаждет освобожденья,\n    Туда стремятся все помышленья.\n    Сердце рвётся в Край блаженства,\n    Чтоб узреть там лик Христа!\n\nДень радости там без конца живущим в мире том,\nТам тьмы не будет никогда, он озарён Христом.\n\nВ чертог небес лишь тот войдёт, кого Господь простил, \nКого Он спас и оправдал, и Кровию омыл."}, {"id": 410, "title": "Мы идём, идём в страну, где скорби нет,", "text": "Мы идём, идём в страну, где скорби нет,\nГде сияет вечно, вечно Божий свет;\nДрево жизни там, растут плоды всегда,\nЗла, тревог, вражды не будет никогда!\n\n    Поспеши к Иисусу (Друг, приди скорей к Иисусу), \n    Он тебя спасёт (Он тебя введёт в тот Край),\n    И твою Он душу (Вечную твою Он душу)\n    В рай с Собой введёт (Приведёт в Свой рай)!\n\nВ той стране мы встретим всех своих друзей,\nЧто страдали здесь средь горестных скорбей,\nВ золотых венцах Христу они поют\nИ в блаженстве неба вечно там живут.\n\nТоржеству спасённых там предела нет,\nПажити живые, неба Божий свет...\nВ любви бесконечной жизнь там без конца,\nВ Духе, под охраной Сына и Отца."}, {"id": 411, "title": "Вот путники к родине славной идут, где нет ни ненастья, ни гроз,", "text": "Вот путники к родине славной идут, где нет ни ненастья, ни гроз, \nГде пажити мира любовью цветут, где светит, как солнце, Христос.\n\n    Там нет тьмы (там нет тьмы), нет гроз (там нет гроз), \n    Там нет тьмы (там нет тьмы), нет гроз (там нет гроз), \n    Но, как солнце, там светит Христос!\n    Но, как солнце, там светит Христос!\n\nТам нет ни страданий, ни бурных страстей, ни смерти дыханья, ни бед; \nТам нет ни насилья, ни злобных людей, там счастье и радость, и свет.\n\nВот слышится клич, что страна уж близка, друзья ожидают вдали, \nИ песня там льётся, как Божья река, навстречу пришельцам земли.\n\nСобранью искупленных Кровью Христа открыты источники благ, \nИ вечная радость, любовь, чистота сияет в их светлых очах.\n\nЧисло всех спасенных и их имена записаны в книге святой;\nИх Бог принимает, а Божья страна дарует им вечный покой."}, {"id": 412, "title": "Есть на небе город, чудный город света,", "text": "Есть на небе город, чудный город света,\nТам нужды, болезни и печали нету;\nТам живут святые, там играют гусли,\nВоздавая славу Господу Иисусу.\n\n    Болезни там нет, не гаснет там свет, Иерусалим. \n    Там вечно живут, там песни поют, Иерусалим.\n    Ты город живых, ты город святых, Иерусалим.\n    К тебе я стремлюсь, с тобою сольюсь, Иерусалим.\n\nЗолотом украшен город тот прекрасный,\nЛишь в тебе, Иерусалим, вечно буду счастлив.\nЖизнь мою преобрази здесь в земной долине,\nЧтоб душе покой найти в Иерусалиме.\n\nБратья мои, сёстры, там мы будем вместе \nВоспевать Иисусу радостные песни,\nТак давайте ж на земле будем славить Бога,\nЧтоб светлее стала нам в небеса дорога.\n\n    Болезни там нет, не гаснет там свет, Иерусалим. \n    Там вечно живут, там песни поют, Иерусалим.\n    Ты город живых, ты город святых, Иерусалим.\n    К тебе я стремлюсь, с тобою сольюсь, Иерусалим.\n    Иерусалим, Иерусалим, ты город живых! \n    Иерусалим, Иерусалим, ты город святых! \n    Иерусалим, Иерусалим, к тебе я стремлюсь! \n    Иерусалим, Иерусалим, с Тобой я сольюсь!"}, {"id": 413, "title": "Где нет угроз, не мучит страх, превыше звёзд на небесах,", "text": "Где нет угроз, не мучит страх, превыше звёзд на небесах,\nЖеланный дом и мир красот в Краю родном спасённых ждёт.\n\n    О, вечный Дом, где радость и свет!\n    О, вечный день, где вечера нет!\n    Господь зовёт, и мы идём, любовь ведёт нас в вечный дом! \n    (В небесный дом!)\n\nТам неземной ликует хор, течёт река живой воды,\nТам чистотой сияет взор, награда ждёт за все труды!\n\nУгасший день взойдёт светлей, наполнит Бог хвалой уста,\nСвоих родных, своих друзей мы встретим там у ног Христа!"}, {"id": 414, "title": "Иерусалим прекрасный! В уборе чистоты,", "text": "Иерусалим прекрасный! В уборе чистоты,\nОблит зарею ясной, велик и дивен ты!\nТы молоком и мёдом обильно наделён,\nЛикующим народом ты громко оглашён.\n\nТы труд Царя Сиона, ты полн дворцов одних,\nТвоя земля мощёна из слитков золотых.\nБедняк, тобой принятый, оденется пышней,\nЧем самый и богатый, и славный из царей.\n\nО город, где не знают ни кладбищ, ни гробов,\nГде пышно расцветают сады живых цветов!\nТо город жизни вечной без бури и тревог,\nВ тебе приют сердечный для нас готовит Бог.\n\nИерусалим свободный, где слёз не льют рабы,\nГде нет вражды холодной, ни бедных жертв борьбы! \nВ твоих стенах напрасно не льётся братьев кровь:\nВ тебе царит всевластно Спасителя любовь.\n\nО, вечный город мира! Нет краше стен твоих:\nИх грани из сапфира, из камней дорогих;\nОни огнём сияют от Божиих очей\nИ ярко отражают восторг Его детей."}, {"id": 415, "title": "Есть Край, есть Край, Отчизна есть другая, где нашему пути конец;", "text": "Есть Край, есть Край, Отчизна есть другая, где нашему пути конец; \nСтрана небесная, святая, где каждому возложит Бог венец.\n\n    Мы будем там, мы будем рядом, рядом \n    И склоним головы Христу на труд\n    Он небо нам подарит даром, даром!\n    Там кончится земной наш путь.\n\nКрай необычный, без тревог и горя, не будет слёз там никогда; \nПусть мир бушует, словно море - достигнем цели и войдём туда.\n\nНет красоты, как в том Краю небесном, та красота - Иисус Христос! \nОн приготовил верным место и к светлым небесам святых вознёс.\n\nНас будут ждать у врат святой Отчизны, там будет встреча со Христом, \nОттуда наш начаток жизни, в небесном вечном Царстве отдохнём."}, {"id": 416, "title": "В небесах дом родной и Отчизна моя,", "text": "В небесах дом родной и Отчизна моя,\nЯ стремлюсь всей душой в те святые края.\nТам Спаситель Христос, ожидая меня, \nПриготовил мне место, любя.\n\nВ той стране нет скорбей, нет печалей земных, \nТам мы будем все жить и увидим святых,\nТех, кто раньше ушёл отдыхать в чудный край, \nКто, страдая, обрёл вечный рай.\n\nО Господь дорогой, жажду вечно я жить\nВ небесах, где покой, и Тебе лишь служить.\nТы веди Сам меня в чудный город святой,\nГде царит вечный мир и покой."}, {"id": 417, "title": "Небо - чудный Край, святой. Небо - там мой дом родной.", "text": "Небо - чудный Край, святой. Небо - там мой дом родной. \nНебо - туда стремлюсь душой, лишь в небе я найду покой.\n\nЕсли труден будет путь, Боже, дай сил не уснуть \nНа пути в небесный Край. О Боже, Ты мне помогай.\n\nЯ во всех делах хочу, Боже, славить мощь Твою;\nТы мне небо подарил, а чем его я заслужил?\n\nНебо - чудный Край, святой, там Господь, Спаситель мой; \nОн к Себе меня влечет, дух мой радостно пост."}, {"id": 418, "title": "Я новое небо и землю увижу, по слову Творца,", "text": "Я новое небо и землю увижу, по слову Творца,\nИ славу от Бога приемлю, - я буду счастлив без конца!\n\n    Там поют (там поют) с торжеством (с торжеством), \n    Ожидают меня пред Христом (пред Христом);\n    Там мой крест (там мой крест) будет снят (будет спят), \n    И мне скажут: «Ты Богом принят!»\n\nУвижу я город в Отчизне: там всё в украшенье венца,\nТам славное дерево жизни, - я буду счастлив без конца!\n\nДвенадцать там врат из жемчужин, там светит свет Божья лица; \nСвет солнца там будет не нужен, - я буду счастлив без конца!\n\nТам в стенах святого чертога сольются спасённых сердца\nВ хваленье восторженном Бога, - я буду счастлив без конца!"}, {"id": 419, "title": "Я как птица пойман был сетями, но освобождён Христа рукой;", "text": "Я как птица пойман был сетями, но освобождён Христа рукой;\nИ теперь меня лишь небо манит, небо, где живёт Спаситель мой.\n\n    В небесах живёт моя надежда, там моя любовь, там всё моё, \n    На земле ничто меня не держит,разве только время, что дано. \n    И взлетит мой дух, как белый голубь, в нежные объятья синевы, \n    Вознося к небесному престолу песнь благодаренья и хвалы.\n\nГолубые дали мне открылись, полные больших и ярких звёзд.\nИ теперь про эту Божью милость просто невозможно петь без слёз.\n\nВижу я в своём закате алом будущность прекрасную свою; \nПретерпеть немного мне осталось, и я песнь победную спою.\n\nЯ гляжу на зорьку золотую - тусклый рядом с ней цветущий май. \nЕсли я о чём-то и тоскую - это о тебе, небесный Край."}, {"id": 420, "title": "Синее небо меня так манит, знаю, что там мой Спаситель Христос.", "text": "Синее небо меня так манит, знаю, что там мой Спаситель Христос. \nВсё в этом мире бесследно канет, в небе не будет скорби и слёз.\n\n    О, это небо! Как ты прекрасно!\n    Ты отраженье Божьей любви!\n    Где бы взять крылья, чтобы подняться \n    И пребывать у Христовой груди (навсегда)?!\n\nСоздано небо Божьей рукою, месяц и звёзды, наша земля...\nЯ восхищаюсь всей красотою, прелестью неба, прелестью дня.\n\nНебо, влечёшь ты к себе страдальца, который в узах, в стенах один. \nТы как бы молвишь: «Друг, не печалься, будешь ты Богом дальше храним».\n\nНебо, влеки же меня в Обитель, чтобы, скитаясь на этой земле,\nЯ всегда помнил: там мой Спаситель, Он меня примет скоро к Себе."}, {"id": 421, "title": "Меня так манят голубые небеса, ведь так прекрасна, дивна их краса,", "text": "Меня так манят голубые небеса, ведь так прекрасна, дивна их краса, \nНо я хочу за облака, туда, чтоб быть с Иисусом в небе навсегда.\n\nМне со грехом бороться всё трудней, и тьма греха сгущается сильней, \nБывает непосилен груз забот, душа моя слабеет, устает.\n\nНо лишь с Христом мы можем победить, и Он один нас может ободри ть, \nОн нам поможет в мире светом быть, всегда надеясь, верить, и любить.\n\nЯ Бога славить радостно хочу за то, что душу даром спас мою,\nИ нас зовет в чертог любви, добра: скорей домой, к Иисусу, навсегда!"}, {"id": 422, "title": "Псалом 422", "text": "Небо, голубое небо, восхищаюсь я тобой,\nНикогда в тебе я не был, а теперь стремлюсь душой. \nВсей душой стремлюсь туда я, в Боге я найду покой, \nТам я воспою, ликуя: Бог мне дал венец такой.\n\n    О небо, небо, ты венец моей мечты,\n    К тебе я возношусь от суеты.\n    Творцу хвалу пою, хвалу слагаю я:\n    Он создал небо для меня.\n\nНебо, небо голубое, Ты меня влечёшь собой,\nИ так часто я с мольбою вновь склоняюсь пред тобой. \nВсей душой стремлюсь туда я, в Боге я найду покой, \nТам я воспою, ликуя: Бог мне дал венец такой.\n\nНебо, голубое небо, бесконечно, вечно ты,\nИ к тебе с твоей красою вновь парят мои мечты.\nВсей душой стремлюсь туда я, в Боге я найду покой, \nТам я воспою, ликуя: Бог мне дал венец такой."}, {"id": 423, "title": "Я хочу не богатства, не казны серебра,", "text": "Я хочу не богатства, не казны серебра,\nА небесного Царства и спасенья добра.\nВ книге вечной спасенных, о, скажи, Боже мой,\nНа страницах зажжённых я записан Тобой?\n\n    О, скажи, Бог мой, Сам, я записан ли там,\n    В книге вечного Царства? Я записан ли там?\n    В книге вечного Царства? Я записан ли там?\n\nВо мне много пороков, как песку у морей,\nНо всех рек и потоков Кровь Иисуса сильней.\nСлово правды, нам данной, озаряет нас всех:\n«Грех, как пурпур багряный, убелю Я, как снег».\n\nГород дивный, прекрасный, где в дворцах вечный свет, \nГде, любовью согласный, мир весь в белом одет;\nГде душ яды не травят, зло безвестно сердцам,\nИ где ангелы славят, - я записан ли там?"}, {"id": 424, "title": "Христу Иисусу песнь поют уста.", "text": "Христу Иисусу песнь поют уста.\nКак сладостно хвалить Иисуса пеньем!\nМы будем петь когда-нибудь не так - \nНамного лучше и благословенней.\nНа небеса к Спасителю придём \nИ музыку небесную услышим.\nКаким он будет первый наш псалом?\nКто ноты и слова к нему напишет?\n\nЯ верю, что мелодия небес \nПокажется знакомой нам и близкой.\nМы будем петь, как умер и воскрес \nСпаситель наш, пред Ним склоняясь низко. \nСольёмся воедино мы в хвале,\nПеснь новую Иисусу воспевая.\nИ тот, кто не умел петь на земле,\nНа небе будет петь неумолкая.\n\nТакого хора не слыхал никто,\nПоющего легко и вдохновенно.\nХвалебных песен радостный поток,\nКак море, разольется по вселенной.\nИ, выспыхнув ярче, каждая звезда:\n«Какая песнь!» - прошепчет с удивленьем! \nИ смолкнут хоры ангелов тогда,\nУслышав наше неземное пенье.\n\nХристу Иисусу песнь поют уста.\nКак сладостно хвалить Иисуса пеньем!\nМы будем петь когда-нибудь не так - \nНамного лучше и благословенней.\nМы будем петь, мы будем ликовать \nНи час, ни день, ни год, ни век - вовеки! \nГосподь подарит музыку, слова \nСпасённому Иисусом человеку!"}, {"id": 425, "title": "О великий Творец, кто я сеть пред Тобой,", "text": "О великий Творец, кто я сеть пред Тобой,\nЧто Ты помнишь меня всякий час?\nНет минуты одной, чтоб забыл Ты меня,\nЧтоб покинул меня хоть бы раз.\n\nЕсли трудно в пути, враг готов победить,\nЕсли сил нет бороться со тьмой,\nЗнаю я - Ты всегда и везде впереди,\nСам поддержишь всесильной рукой.\n\nСколько раз мне грозила опасность в пути, \nДух мой слабый совсем изнывал,\nНо Ты мне помогал, чтобы дальше идти,\nВсе препятствия Сам устранял.\n\nЕсли вера во мне начинает слабеть,\nИ я падаю духом в борьбе,\nИ тогда Ты духовно не дашь умереть, \nПоспешишь Ты на помощь ко мне.\n\nЧем могу я воздать благодарность Тебе?\nЧем могу за любовь заплатить\nИ за то, что Ты помнишь всегда обо мне \nИ желаешь меня сохранить?\n\nНет тех жертв, чтобы мог принести для Тебя, \nНе найти мне их в мире греха,\nЛишь могу всей душой посвятить я себя \nИ быть верным Тебе до конца.\n\nО, прими же, Творец, дар ничтожный \nТы мой, Чтобы вечно я славил Тебя,\nПусть уста наполняются дивной хвалой, - \nВсё за то, что Ты помнишь меня"}, {"id": 426, "title": "Жизнь моя сокрыта лишь в Тебе, и на всём моём пути земном", "text": "Жизнь моя сокрыта лишь в Тебе, и на всём моём пути земном\nЯ нуждаюсь, мой Господь, в Тебе утром, ночью, вечером и днём.\n\n    Ты мой дух любовию согрей (Ты согрей),\n    Разум и сознанье освяти!\n    Помоги войти мне в рая дверь (рая дверь),\n    За Тобою данный крест нести!\n\nЧасто нету сил вперёд идти, дух и тело часто устаёт;\nПомоги на жизненном пути, забывая скорбь, идти вперёд.\n\nПусть тяжёлым кажется мне путь, но всегда лишь \nТы меня веди, Чтоб не смог я на пути уснуть, мимо Ханаанских врат пройти."}, {"id": 427, "title": "Много падал я на пути. О, куда же мне дальше идти,", "text": "Много падал я на пути. О, куда же мне дальше идти,\nКогда цель ещё так далека, а мне сердце сжимает тоска?\n\nПочему же мой путь так тяжёл, по нему мне так трудно идти? \nПотому что я думал, что шёл и тогда, как стоял на пути.\n\nМного падал я на пути, много горя я видел и слёз,\nНо хочу утешенье найти в том, что видел всё это Христос.\n\nНе скрывая от светлых очей Иисуса ошибок своих,\nНа коленях бессонных ночей я нашёл избавленье от них.\n\nИ теперь верю я всей душой, что прощён и на верном пути.\nДай же силы, мой Царь и мой Бог, мне на нём своё счастье найти."}, {"id": 428, "title": "Страшно бушует житейское море,", "text": "Страшно бушует житейское море, \nСильные волны качают ладью.\nВ ужасе смертном, в отчаянном горе: \n«Боже, мой Боже!» - к Тебе вопию.\n\nСжалься над мною, спаси и помилуй!\nС первых дней жизни я страшно борюсь. \nБольше бороться уж мне не под силу: \n«Боже, мой Боже!» - Тебе я молюсь.\n\nК пристани тихой Твоих повелений \nПуть мой направь и меня успокой.\nИ из пучины житейских волнений \nК берегу выведи, Боже благой!"}, {"id": 429, "title": "Среди тревог, волненья и ненастья,", "text": "Среди тревог, волненья и ненастья,\nСреди тоски, унынья и забот \nНе вижу пред собой я в мире счастья,\nНо всё ж иду, друзья мои, вперёд.\n\nХоть слёзы часто очи застилают,\nНикто с советом добрым не идёт, \nНаоборот, насмешкам подвергают,\nНо я стремлюсь, друзья мои, вперёд.\n\nХоть иногда совсем ослабеваю,\nЛюбовь моя становится как лёд,\nНо вновь её я верой возгреваю \nИ всё ж иду, друзья мои, вперёд.\n\nБорюсь с врагом, слабеют мои силы,\nНо вдаль смотрю - блестит там небосвод. \nИ я решил сражаться до могилы,\nИ всё идти, друзья мои, вперёд.\n\nНе пропадут труды мои, усилья - \nГосподь меня до цели доведёт.\nОн повелит - развяжут мои крылья,\nЯ не пойду, а полечу вперёд!"}, {"id": 430, "title": "Что ждёт меня, не знаю, Господь мой это скрыл,", "text": "Что ждёт меня, не знаю, Господь мой это скрыл,\nНо твёрдо уповаю: мне путь Он проложил,\nИзбыток жизни, благ и сил в любви Своей открыл.(2 раза)\n\n    Куда зовёт Господь мой, дитя Его спешит.\n    «Он знает путь, Он знает!» - доверчиво твердит.\n\nВокруг меня затменье, с трудом иду вперёд,\nНо в Боге просветленье, Он Сам меня ведёт\nИ часто на плечах несёт в час бури и невзгод.(2 раза)\n\nСредь бед и испытанья пусть плоть моя молчит,\nА голос средь молчанья яснее пусть твердит:\n«Ты - Мой! Твой путь в руке Моей; не бойся смутных дней!»(2 раза)\n\nИ так иду, не зная, и не стремлюсь я знать,\nЧто будет, лишь желаю путь Господу предать.\nС Ним сладко и во тьме шагать, жить без Него - блуждать.(2 раза)"}, {"id": 431, "title": "Ах, Земля, чужая сторона, чуть обжитый уголок вселенной,", "text": "Ах, Земля, чужая сторона, чуть обжитый уголок вселенной,\nО другом Отечестве узнав, мы идём к нему без сожаленья!\n\n    Скоро скажем мы тебе: «Прощай!» - \n    И свершится вмиг переселенье.\n    Ах, Земля, наш временный причал,\n    Чуть обжитый уголок вселенной!\n\nТы, Земля, обиды не таи, не суди придирчиво и строго: \nНынешние жители твои завтра, может быть, увидят Бога!\n\nА пока что в хрупкости цветка и в тревожном ожиданье почек, \nЗнаешь, как приятно узнавать Божией любви знакомый почерк!\n\nНо растут грехи, как сорняки, и порою даже в птичьих песнях \nСлышно столько горестной тоски о нетленной красоте небесной"}, {"id": 432, "title": "В печали и скорби идёшь ты долиной тернистой земной,", "text": "В печали и скорби идёшь ты долиной тернистой земной,\nИ слёзы рекой часто льёшь ты, идя к небесам в Дом родной.\n\n    Зачем унывать и томиться? Зачем же так тяжко вздыхать? \n    Сильнее нам нужно молиться, ответа с терпением ждать.\n\nТы слёз не стыдись, коль бывают они иногда на глазах,\nИх многие не понимают в своих зачерствелых сердцах.\n\nПоплачешь - и легче вдруг станет, как камень с груди упадёт.\nО, верь, скоро час тот настанет, и слёзы Спаситель отрёт.\n\nОтдай всё Христу на служенье и крест свой неси до конца, \nНаправь к небесам всё стремленье, и с верой войдёшь в Дом Отца."}, {"id": 433, "title": "Пред Тобою, Отче, в мольбе стою, удали из сердца всю боль мою,", "text": "Пред Тобою, Отче, в мольбе стою, удали из сердца всю боль мою, \nЗла, неверья стены кругом встают, жить по правде истинной не дают.\n\n    Помоги мне, Господи, помоги, без Тебя не справлюсь я на пути. \n    Через испытания все пройти, помоги мне, Господи, помоги.\n\nНе хочу иметь с миром ничего, но хочу я, Господи, одного:\nЧтобы Ты всегда был моей звездой и руководил мной весь путь земной.\n\nЗнаю, что осталось немного мне по тропинке узкой идти к Стране, \nГде увижу город я неземной, там на веки вечные буду Твой."}, {"id": 434, "title": "Я иду по тернистому жизни пути,", "text": "Я иду по тернистому жизни пути,\nА сомненья внушают мне страх.\nСколько силы мне нужно еще впереди,\nЧтоб предстать пред Отцом в небесах!\n\n    Со Христом я дойду, всё равно я дойду, \n    Чтоб предстать пред Отцом в небесах. \n    Сколько силы мне нужно ещё впереди, \n    Чтоб предстать пред Отцом в небесах! \n    (В небесах!)\n\nВсё равно я дойду к тем просторам родным \nС песней славы в усталой груди.\nВсё равно, всё равно встану я перед Ним, -\nИ не будет ночей впереди.\n\nВсё равно я дойду, хоть порой тяжело,\nПуть печали, нужды и потерь.\nТам иначе - тепло, там иначе - светло,\nУж недолго осталось терпеть."}, {"id": 435, "title": "На сердце у меня так тягостно и больно,", "text": "На сердце у меня так тягостно и больно,\nШипами острыми усеян жизни путь.\nВокруг все веселы, счастливы и довольны,\nА мне хотелось бы немножко отдохнуть.\n\nО Господи, как трудно жить мне в этом мире, \nНести тяжёлый крест, возложенный Тобой.\nНо дай мне силы, чтобы я без укоризны \nТерпел, без ропота, не падая душой.\n\nВ тот миг же смолкнут грозной бури злые волны, \nКогда Ты скажешь им: «Довольно, перестань!» \nВзгляни, уж кладези души страданья полны,\nИ слёзы горя уже льются через край.\n\nНе плачь, душа моя, что скорби окружают,\nТебе нет счастья в этом мире на земле.\nВсё счастье там царит, где мирно отдыхают \nСвятые, кончившие путь свой на земле."}, {"id": 436, "title": "Ты не бойся преткновений на пути,", "text": "Ты не бойся преткновений на пути,\nВ край далёкий со страданием идти,\nНо запомни и познай только одно,\nЧто страдать нам в этом мире суждено.\n\n    Сердце страждет и тоскует, Боже мой (Боже мой)! \n    Преткновенья давят душу, и порой (и порой)\n    Я страдаю и не в силах крест нести (крест нести).\n    О Спаситель, дай мне силы на пути (на пути)!\n\nПусть никто лишь твоей веры не смутит,\nВерой должен ты грехи все победить.\nИисуса Кровь могуча и сильна,\nБлагодать Его душе твоей дана.\n\nТы не бойся преткновений на пути,\nКак устанешь - буду Я тебя нести.\nЯ назвал тебя по имени, ты Мой!\nПриведу тебя в Обитель, где покой.\n\nУж недолго и немного нам идти,\nСкоро, скоро, не замедлю Я прийти.\nТолько слушай, говорю тебе: «Молись!\nНа Голгофский крест взирая, ты крепись».\n\nТы не бойся преткновений на пути,\nПомогу тебе тяжёлый крест нести.\nСам Христос тебя омоет и простит \nИ любовью твоё сердце озарит."}, {"id": 437, "title": "Дорога трудная, порой тернистая, слеза невольная затмила даль,", "text": "Дорога трудная, порой тернистая, слеза невольная затмила даль, \nНо вот заря взошла, и вера чистая прогнала прочь тоску и всю печаль.\n\nПознал я Господа, и все сомнения рукою мощного Он устранил, \nГрехи все прежние предал забвению и Кровью чистою Он их омыл.\n\nСлова друзей порой звучат изменчиво, мирские радости несут лишь тьму. \nЯ, как дитя, иду за Ним доверчиво и путь свой полностью вручил Ему.\n\nНа сердце стало так светло и радостно, идти за Ним вперед мне так легко. \nДуша наполнена надеждой сладостной, и цель заветная недалеко."}, {"id": 438, "title": "Мой Спаситель Иисус призвал меня,", "text": "Мой Спаситель Иисус призвал меня,\nИ на зов к Нему идти решился я.\nПо тернистому пути мне приходится идти, \nМного надо побеждать мне на пути.\n\nМир земной клеймит позором здесь меня,\nИ всегда он ненавидит за Христа,\nНо Христа любовь сильна, укрепляет Он меня, \nНикогда не забывает Он меня.\n\nМой Спаситель Иисус призвал меня,\nОт греха к Нему идти решился я.\nЗнаю: встречу на пути терний острые шипы \nИ, как мученик Стефан, удар камней.\n\nМой Спаситель по земле здесь проходил,\nИ всегда Он окружающих любил.\nМой Спаситель, и меня приготовь, чтоб я всегда \nМог прощать, любить, страдая за Тебя.\n\nКогда кончится земной тернистый путь,\nИ тогда Ты дашь от бурь мне отдохнуть,\nГде не будет скорбных дней, где отрёшь слезу с  \nСвоей любящей пронзённою рукой."}, {"id": 439, "title": "Дорогое обещанье Бог нам, странникам, даёт:", "text": "Дорогое обещанье Бог нам, странникам, даёт:\n«По дороге испытанья поведу тебя вперёд»!\n\n    Поведу Я (поведу Я), поведу Я (поведу Я),\n    Поведу тебя вперёд (поведу тебя вперёд).\n    По дороге (по дороге испытанья)\n    Испытанья (по дороге испытанья),\n    Поведу тебя вперёд (поведу тебя вперёд)!\n\nВ час, когда в огне терзанья сердце друга не найдёт, \nПусть звучит то обещанье: «Поведу тебя вперёд!»\n\nЕсли сердца упованье горечь жизни разобьёт,\nСлушай с верой обещанье: «Поведу тебя вперёд!»\n\nЕсли ночи тень спадает, и кончины час грядёт,\nСлушай, Кормчий твой взывает: «Поведу тебя вперёд!»"}, {"id": 440, "title": "Мой путь, как других, не украшен цветами,", "text": "Мой путь, как других, не украшен цветами, \nДушистые розы на нём не растут.\nМой путь весь усыпан одними шипами, \nТерновника иглы на нём лишь растут.\n\nИду я, изранены ноги жестоко,\nИ трудным мне кажется путь впереди,\nНо голос тот чудный в душе без упрёка \nУверенно шепчет: «Не бойся, иди».\n\nТот голос мне в душу Спаситель вселяет \nИ силы даёт для борьбы со грехом, \nНебесное Царство мне дать обещает, \nЛюбовь и блаженство вовек со Христом.\n\nИ путь этот кажется мне нетяжёлым,\nИ радость вселяется в сердце полней,\nВедь я приближаюсь к блаженным высотам, \nГде вечная радость и свет вечных дней.\n\nВот голос тот с неба меня приглашает: \n«Усталый, измученный путник земли, \nНаграда святая тебя ожидает,\nВ небесную славу скорей ты войди»."}, {"id": 441, "title": "Птички Божьи, домой собирайтесь - вам к отлёту настала пора,", "text": "Птички Божьи, домой собирайтесь - вам к отлёту настала пора,\nНад равниной земной возвышайтесь и стремитесь домой, в небеса.\n\n    Нам домой (3 раза), в небеса, ведь там Родина наша, друзья. \n    Над равниной земной возвышайтесь и стремитесь домой, в небеса.\n\nБратья, сёстры, домой собирайтесь - нам к отлёту настала пора. \nСуету из сердец удаляйте, чтобы легче лететь в небеса.\n\nБратья, сёстры, от зла удаляйтесь -к совершенству прийти нам пора. \nВыше знамя любви поднимайте, ведь любовь нас ведёт в небеса.\n\nБратья, сёстры, одежды готовьте, очищайте все пятна греха,\nСвоё сердце от зла удаляйте, чтобы чистым лететь в небеса.\n\nЗдесь ведь только борьба и тревога, но бороться нам всё же дано, \nСила наша сокрыта лишь в Боге, в небесах Он нас ждёт уж давно."}, {"id": 442, "title": "Гляжу я на небо, звёзды горят вдали,", "text": "Гляжу я на небо, звёзды горят вдали,\nЛуч их сияет, даль озаряют они.\nИ я, как пылинка в мире прекрасных звёзд, \nВижу тропинку, где шёл Сам Христос.\n\nГляжу я тревожно, сердце стучит в груди, \nКаждому можно этой тропой идти.\nУстлана скорбью - хода другого нет. \nГоспода раны оставили след.\n\nТропинка, тропинка, где-то начало есть. \nПервым Спаситель нёс на Голгофу крест; \nТяжесть сгибала - всё же Он шёл вперёд \nВо что бы ни стало спасти Свой народ.\n\nПлевали и били - больно от мерзких слов. \nТело пронзили, тихо стекала кровь.\nКак тяжко томился, сколько страдал за нас! \nВечно погибших от гибели спас!\n\nИ я, как соринка в мире прекрасных звёзд, \nВижу тропинку, много пролитых слёз. \nПойду я и знаю - терны, не будет роз.\nИдти я хотел бы, где шёл Сам Христос."}, {"id": 443, "title": "С такой любовию, как мать, с таким доверием, как дети,", "text": "С такой любовию, как мать, с таким доверием, как дети,\nТы помоги мне принимать все то, чем путь мой Ты отметил.\nБез «почему» и без «зачем», не прекословя и не споря,\nКак я дышу и пью, и ем, так дай мне принимать и горе.\n\nВ надежде, что когда-нибудь откроешь всё, что скрыто тайной, \nИ что пройденный мною путь мне ранил ноги неслучайно.\nЧто каждый камень на пути и каждый шип, и каждый узел \nМне помогал к Тебе идти, не расширял мой путь, а узил.\n\nЧто нужды все мои подряд Ты восполнял с большим стараньем, \nНе Ты ж ведь в том был виноват, что я нуждался в наказанье. \nПозволь мне жить и умирать на сей земле, под небом этим,\nС такой любовию, как мать, с таким доверием, как дети."}, {"id": 444, "title": "Господь, дай ветер мне попутный, чтоб легче шла", "text": "Господь, дай ветер мне попутный, чтоб легче шла \nМоя ладья (моя ладья), чтоб легче шла моя ладья,\n\nЧтоб в ней, как в храмине уютной, быстрей к Сиону \nМчался я (мчался я), быстрей к Сиону мчался я.\n\nКак для детей Твоих приятно не видеть на пути \nПреград (преград), не видеть на пути преград.\n\nНа крыльях силы благодатной нестись в заветный \nМир отрад (мир отрад), нестись в заветный мир отрад.\n\nНо помню я Твой голос дивный: «Вас скорбь и муки\nВ мире ждут (в мире ждут), вас скорбь и муки в мире ждут».\n\nДа, в мире ветер есть противный для тех, кто в Господе \nЖивут (да, живут), для тех, кто в Господе живут.\n\nПусть в жизни ветер дует встречный, я силы вражьей \nНе боюсь (не боюсь), я силы вражьей не боюсь.\n\nПребудь в ладье со мной, Предвечный, и я с стихией \nПоборюсь (поборюсь), и я с стихией поборюсь.\n\nС Тобою против всех течений я проложу\nК Сиону путь (к Сиону путь), я проложу к Сиону путь.\n\nИ смолкнут все ветры учений, чтоб дать мне время \nОтдохнуть (отдохнуть), чтоб дать мне время отдохнуть.\n\nХочу не тиши полусонной, хочу ветра с борьбой \nВстречать (встречать), хочу ветра с борьбой встречать.\n\nЧтоб силой Бога непреклонно свой путь победою \nВенчать (венчать), свой путь победою венчать"}, {"id": 445, "title": "Ты знаешь путь, хоть я его не знаю, - сознанье это мне даёт покой;", "text": "Ты знаешь путь, хоть я его не знаю, - сознанье это мне даёт покой; \nК чему тревожиться мне и страшиться и день, и ночь, всегда томясь душой?\n\nТы знаешь путь, Ты также знаешь время, Твой план давно уж для меня готов. \nИ славлю я, Господь, Тебя сердечно за милости, заботы и любовь.\n\nТы знаешь всё: откуда ветры дуют, и бурю жизни укрощаешь Ты! \nПусть неизвестно мне, куда иду я, но я спокоен — путь мой знаешь Ты."}, {"id": 446, "title": "Вышел я на новую дорогу, предо мной тернистый путь лежит,", "text": "Вышел я на новую дорогу, предо мной тернистый путь лежит,\nА вдали, к небесному чертогу, огонёк живительный горит.\n\nЗа стеной, как волны у прибоя, что-то страшно стонет и ревет!\nЭто он, не знающий покоя, грешный мир меня к себе зовёт.\n\nНикогда назад уж не вернусь я, хоть и труден путь мой, и далёк. \nНикаких препятствий не страшусь я, впереди лишь был бы огонёк.\n\nОгонёк, живительный и чудный! Будь моим невидимым вождём, \nПомоги пройти дорогой трудной, помоги войти мне в Отчий дом.\n\nРасточил я всё своё именье и таков, как есть, иду к Отцу.\nНо я верю, верю без сомненья - примет Он заблудшую овцу."}, {"id": 447, "title": "Когда мы со Христом в свете Слова идём, -", "text": "Когда мы со Христом в свете Слова идём, - \nЧто за славу Он даст нам найти!\nПовинуясь во всём, все пребудем мы в Нём,\nКто послушно с Ним хочет идти.\n\n    Слушайся, верь, нет другого пути \n    Обрести нам спасенье, лишь в Иисусе Христе.\n\nЕсли тень ниспадёт или туча взойдёт,\nОн с улыбкой поможет пройти;\nНе пребудет ни страх, ни слеза на очах,\nНужно лишь в послушанье идти.\n\nЕсли бремя несём иль страдаем в борьбе,\nВоздаянье не медлит прийти;\nКоль утраты нам жаль, встретим горесть, печаль, \nБлагодать мы в них сможем найти.\n\nЧтоб всю радость познать, нужно всё нам отдать \nИ себя на алтарь принести;\nБог блаженство дарит только тем, кто спешит \nВерным быть и послушно идти.\n\nИ в общенье с Христом к Нему в ноги падём,\nИ в союзе с Ним будем идти;\nКуда скажет - пойдём, что допустит - снесём:\nНе страшись, но послушно иди!"}, {"id": 448, "title": "За Христом пойду я, Боже милосердный!", "text": "За Христом пойду я, Боже милосердный!\nКто мне сил дарует оказаться верным?\nВ страхе и бессилье лишь Тебе молюсь я: \nПомоги идти мне по следам Иисуса!\n\nЗа Христом пойду я! Чувствую влеченье \nКрест и скорбь земную принимать в смиренье. \nСила Божья Слова разорвала узы,\nИ пойти готов я по следам Иисуса.\n\nЗа Христом пойду я бодро и свободно,\nДух мой укрепляет дар любви Господней.\nСмело отвергаю ветхой жизни вкусы,\nС радостью шагаю по следам Иисуса.\n\nЗа Христом пойду я, Он мой Искупитель \nИ от всех недугов верный Исцелитель.\nСмерть Его дала мне жизнь, теперь стремлюсь я \nВ край давно желанный по следам Иисуса.\n\nЗа Христом пойду я к Родине прекрасной,\nХоть кругом бушует ураган ужасный. \nБлагодатью Божьей каждый день креплюсь я.\nОн идти поможет по следам Иисуса."}, {"id": 449, "title": "Как хорошо, что со мною Спаситель,", "text": "Как хорошо, что со мною Спаситель,\nВечный Творец, Он так любит меня!\nВ жизни моей Он мой Друг и Хранитель, \nВсюду со мной, среди ночи и дня.\n\nГде б ни прошла моей жизни дорога, \nБуду я жить для Иисуса Христа;\nМне не страшна никакая тревога,\nВерю Ему, в Нём любви полнота.\n\nПуть наш суров, устаем временами, \nДвижемся мы по житейским волнам. \nСкоро придёт наш Спаситель за нами, \nБудет конец нашим бедам, скорбям."}, {"id": 450, "title": "Если скорбь и печаль у тебя на душе,", "text": "Если скорбь и печаль у тебя на душе,\nЕсли жизненный путь утомляет,\nИ твой дух изнемог от житейской борьбы,\nИ молитвы огонь угасает.\n\n    Помни
