ышу шепот губ, вес повторяешь ты в жаркой мольбе своей имя моё.\n\nЧто бы делал я, если бы не было в испытаниях рядом тебя?\nМама, ты меня к Богу направила и в Церковь Божию меня привела.\n\nНа лице твоём, с детства знакомом мне, жизнь оставила горя следы. \nЧасто так своим непослушанием ранил, не думая, - плакала ты.\n\nСедина уже на висках твоих. Знаю, милая, - всё это я.\nНо прошу тебя, мама, прости меня, что причинял тебе горе, прости.\n\nПусть воздаст Господь всем нашим матерям по молитвам их за всех детей, \nЧтобы в вечности мамы увидели всех сыновей своих и дочерей."}, {"id": 883, "title": "Мамочка моя, милая моя! Сколько в ней любви и ласки нежной!", "text": "Мамочка моя, милая моя! Сколько в ней любви и ласки нежной!\nВ имени твоём, самом дорогом, столько теплоты, любви безбрежной.\n\nТы в тревожну ночь прогоняла сон, не смыкая глаз над колыбелью. \nПеснь твоя тиха, ласкова, нежна, мне звучала соловьиной трелью.\n\nСколько ты тревог испытала, боль, за меня переносила горести. \nЧтобы вновь я шёл Божией тропой, ты давала силы мне и бодрости.\n\nПервые шаги радости полны, - и светились мне глаза лучисто.\nВ мире лучше нет, чем сияет свет от очей твоих, родная, чистых.\n\nМамочка моя, ты прости меня, ты прости меня за все страдания. \nПусть тебе всегда будет честь, хвала, ты прекрасней в мире всех созданий."}, {"id": 884, "title": "Семью Спаситель сотворил, её Он миром наделил;", "text": "Семью Спаситель сотворил, её Он миром наделил;\nТеперь желает чрез неё прославить имя Он Своё.\n\n    Семья, семья (семья, семья), семья моя (семья моя),\n    Отец и мать (отец и мать), и сыновья (и дочери),\n    Бог спросит всё (Бог спросит всё), что сделал я (что сделал я), \n    Чтоб с Ним была семья моя.\n\nВ семье священником - отец, так повелел ему Творец,\nА, мать, любовию своей ты всю свою семью согрей.\n\nО дети, вы краса семьи, опора жизненной ладьи,\nПусть ваши детские уста прославят Господа Христа."}, {"id": 885, "title": "Тихо сгущаются тени. Светит в окошко луна.", "text": "Тихо сгущаются тени. Светит в окошко луна.\nМама стоит у постели, молится Богу она.\nЯ знаю, почему у детей сладкие сны,\nПотому что о них молятся мамы.\n\nЕсли беда постучится, кто же ещё, как не ты,\nСтанет Иисусу молиться, чтобы все беды прошли?! \nЯ знаю, почему так легко мне всегда,\nПотому что о мне молится мама.\n\nВремя летит незаметно, в каждом исчезнувшем дне, \nЗнаю, что ты, как и прежде, Богу молилась о мне.\nЯ знаю, почему так легко мне всегда,\nПотому что о мне молится мама.\n\nИнеем белым покрылась, мама, твоя голова,\nЯ от тебя научился к Богу в молитве взывать.\nЯ знаю, почему стал моим Иисус,\nПотому что о мне мама молилась."}, {"id": 886, "title": "В синее небо птенцы взлетят, крылья окрепнут у них,", "text": "В синее небо птенцы взлетят, крылья окрепнут у них,\nИ над землёй долго так кружат - детство закончилось их. \nГнёздышко наше уютное, милое детство, прощай...\nВ жизни, как что-то приятное, чаще его вспоминай.\n\nДетство прошло, как стрела, как звук, больше его не вернёшь.\nВ детстве мечтаешь ты взрослым стать, вырастешь - всё поймёшь. \nМилые детские радости, детские слёзы и смех,\nДетская вера и опыты ценны теперь для всех.\n\nВ жизни со мною останется, как научила нас мать:\nВ трудных вопросах нам сладостно к Богу в молитвах взывать. \nБоже, даруй же нам мудрости жизнь свою так здесь прожить, \nЧтобы с Тобою быть в вечности, звёздный венец получить.\n\nМилые детские радости, детские слёзы и смех,\nДетская вера и опыты ценны теперь для всех.\n\nГнёздышко наше уютное, милое детство, прощай...\nВ жизни, как что-то приятное, чаще его вспоминай."}, {"id": 887, "title": "Мама - это имя мне мило, полно оно ласки, любви.", "text": "Мама - это имя мне мило, полно оно ласки, любви.\nМама на руках нас носила и нас охраняла в любви.\n\nМама, сколько ты пережила! Мама, сколько горя снесла! \nНас ты берегла и хранила, мама, дорогая моя.\n\nКто нас в неудачах утешит? Кто нас безвозмездно простит\nКто нас ободрит и излечит, в горе и нужде защитит?\n\nПоздно, поздно будет у гроба плакать и терзаться душой. \nДети! Ваша кратка дорога, скоро придёт гостья с косой.\n\nСей, друг, но учти: жать придётся то, что насадила рука. \nЧти мать, и тогда улыбнётся счастьем жизнь земная твоя."}, {"id": 888, "title": "Пустеет в доме христианина, взрослеют дочери, сыновья.", "text": "Пустеет в доме христианина, взрослеют дочери, сыновья.\nА так недавно, как рой пчелиный, росла здесь дружная детвора.\n\nНад колыбелью склонялась мама, благословляя наш тихий сон. \nНе раз рассветы она встречала за своей стиркой и за шитьём.\n\nЛетело время, росли заботы. Ей часто виделось по ночам,\nЧто дети выросли, и вся работа теперь уж делится пополам.\n\nНо самой светлой мечтой, заветной для неё было - нам передать \nСвою надежду, большую веру и в руки Бога нас всех отдать.\n\nПустеет в доме христианина, уходят дочери, сыновья.\nЖелает мама им жить счастливо и просит помнить её всегда.\n\nИ будет тихо и непривычно в когда-то шумной, большой семье... \nИ только мама молиться будет за сыновей своих, дочерей."}, {"id": 889, "title": "Хоть ещё и мал я, но уже не раз", "text": "Хоть ещё и мал я, но уже не раз\nСамый лучший в мире слышал я рассказ, \nСлышал я о яслях под сияньем звёзд,\nГде лежал прекрасный маленький Христос. \nТо, что рассказала мамочка моя \nО Христе Младенце, буду помнить я.\n\nЯ от мамы слышал много-много раз\nО Христе распятом страшный тот рассказ, \nО венце терновом, о Его кресте,\nИ что есть спасенье только во Христе.\nТо, что рассказала мамочка моя \nО Христе распятом, помнить буду я.\n\nХоть я мал, но всё же слышал много раз \nО Христе воскресшем радостный рассказ. \nНикогда уж больше не умрёт Христос,\nОн Своей победой жизнь и мир принёс.\nТо, что рассказала мамочка моя\nО Христе воскресшем, твёрдо знаю я."}, {"id": 890, "title": "Дел худых не делай, зла не говори:", "text": "Дел худых не делай, зла не говори:\nДети мы Христовы, на Него смотри.\n\n    Добр Иисус и кроток, свят и без вины; \n    Быть, как Он, святыми, дети, мы должны.\n\nДух недобрый ходит возле нас всегда;\nИскусить нас хочет с жаждою вреда.\n\nДуха зла не слушай, муки не страшись,\nЗлу сопротивляйся и к добру стремись."}, {"id": 891, "title": "Большого призвания нет у меня,", "text": "Большого призвания нет у меня, \nСпособностей мало и сила мала.\nНо в малом стараюсь быть верным слугой, \nЧтоб Он всегда рад и доволен был мной.\n\n    Мой уголок, мой маленький мир,\n    В нём верно служу, как Спаситель учил.\n\nХоть я в уголке незаметно живу,\nСпасителю радостно в нём я служу.\nИ в малом стараюсь быть верным слугой, \nЧтоб Он всегда рад и доволен был мной.\n\nКогда же Учитель мой из уголка \nВведёт меня в Царствие Бога Отца,\nИ станет мне ясно тогда до конца,\nЧто лучшим был мой уголок для меня."}, {"id": 892, "title": "Мы зёрнышки живые в прекрасном колоске.", "text": "Мы зёрнышки живые в прекрасном колоске.\nМы зёрна золотые на Божьем стебельке.\nОн нас оберегает, заботится о всём,\nЧтоб крепче и богаче мы были с каждым днём.\n\nМы зреем, хорошеем, настанет скоро час,\nКогда Христос Спаситель к Себе возьмёт всех нас \nКакое это время счастливое для всех,\nВедь царствовать жестоко не будет больше грех!"}, {"id": 893, "title": "Вновь звучит благая весть, и светлеют лица", "text": "Вновь звучит благая весть, и светлеют лица \nХорошо нам с вами здесь радостью делиться.\n\nДля того рождён Христос, чтобы в мире этом \nМеньше было горя, слёз, больше было света.\n\nОн родился, чтоб обнять нас любовью вечной, \nПуть на небо указать к жизни бесконечной.\n\nИ поэтому звучит радостное слово,\nИ скорбящим мир дарит Рождество Христово."}, {"id": 894, "title": "Если трудно, если грустно, спать обида не даёт,", "text": "Если трудно, если грустно, спать обида не даёт, \nОбратись, друг, к Иисусу, Он всегда тебя поймёт.\n\n    Кто в беде пас утешает? Иисус, Иисус!\n    Кто грехи паши прощает? Иисус, Иисус!\n    Кто пас любит и спасает? Иисус, Иисус!\n    Кто всегда нам помогает? Иисус, Иисус!\n\nЗа тебя в венце терновом на кресте страдал Христос. \nОбратись к Нему ты снова, и утешит Он от слёз.\n\nВ наше сердце Он стучится, посылает благодать. \nБудем верить и молиться, в песнях Бога прославлять."}, {"id": 895, "title": "Бог посылает всё для нас - я так счастлив!", "text": "Бог посылает всё для нас - я так счастлив!\nЛуч солнца, дождик в нужный час - я так счастлив!\nЛюблю я травку и цветы, деревья, кустики, сады,\nНа них прекрасные плоды. Я так счастлив!\n\nДобры родители мои - я так счастлив!\nО мне заботятся они - я так счастлив!\nС любовью пищу подают, одежду новую дают,\nВ постельку ласково кладут. Я так счастлив!\n\nГосподь наш милостив ко мне - я так счастлив!\nНа небе дом готовит мне - я так счастлив!\nТам всё прекрасней и милей, там встречу близких и друзей \nБог даст по милости Своей. Я так счастлив!"}, {"id": 896, "title": "Бог любит малых воробьев, от гибели храня;", "text": "Бог любит малых воробьев, от гибели храня;\nИ если пташек любит Бог, Он любит и меня.\n\n    Да, любит Он! Да, любит Он! Я знаю, любит Он! \n    Он любит маленьких детей; Он любит и меня.\n\nБог любит лилию в полях у тихого ручья;\nИ, если любит Он цветы, Он любит и меня.\n\nБог сотворил цветы и птиц, их светом осеня;\nОн не забудет и детей, Он любит и меня."}, {"id": 897, "title": "Детский хор поёт об Иисусе Христе,", "text": "Детский хор поёт об Иисусе Христе,\nЧто воскрес Господь, возвещаем мы всем!\nПраздник Пасхи у нас, праздник вечной весны, \nПодарил нам этот день, Спаситель, Ты.\n\n    Подарил (нам подарил), подарил (нам подарил), \n    Подарил нам этот день, Спаситель, Ты.\n\nТолько раз в году этот праздник у нас,\nИ наш детский хор поздравляет всех вас.\nПраздник Пасхи у нас, праздник вечной весны, \nПодарил нам этот день, Спаситель, Ты.\n\nЗнаем мы, что Ты, наш Христос, пострадал \nИ страданьями нам спасение дал.\nПраздник Пасхи у нас, праздник вечной весны, \nПодарил нам этот день, Спаситель, Ты."}, {"id": 898, "title": "Создал Господь меня, тебя, поля, луга цветы,", "text": "Создал Господь меня, тебя, поля, луга цветы,\nКуда ни глянь, кругом видны Господние следы. (2 раза)\n\n    Пусть непрестанно льётся песнь к небесному чертогу. \n    Мы песнь хваления поём не человеку - Богу!\n\nТворенье - дело рук Творца! И небо над гобой,\nИ пенье птиц, и шум ручья - во всём Господь благой. (2 раза)\n\nСклонись пред Ним в смиренье, друг, за жизнь благодари. \nКуда ни глянь, во всём видны следы Его любви! (2 раза)"}, {"id": 899, "title": "Люди всей земли с детства знать должны, Кто их имена знает наизусть.", "text": "Люди всей земли с детства знать должны, Кто их имена знает наизусть. \nКто их возлюбил, кровь Свою пролил. Имя Ему Иисус!\n\n    Иисус, Ты мой лучший Друг. «Иисус!» - пойте все вокруг. \n    Иисус, Ты судьба моя. Иисус, я люблю Тебя.\n\nИисус Христос дорог для меня, и Его любовь ощущаю я.\nВ каждом новом дне, в солнышка лучах Божья любовь велика.\n\nЛюди всей земли, помните Творца, Сына Своего Он не пожалел, \nЧтобы чрез Христа каждый мог спастись. О, великий мудрый Бог!"}, {"id": 900, "title": "Солнце в оконце, и на душе светло,", "text": "Солнце в оконце, и на душе светло, \nПотому что в сердце Иисус пришёл.\n\n    Иисус, Ты - солнце для меня,\n    И теперь пою я «аллилуйя!»\n\nДождик в оконце, но на душе светло, \nПотому что солнце в мою жизнь пришло.\n\nВечер в оконце, но на душе светло, \nПотому что солнце в мою жизнь пришло."}, {"id": 901, "title": "Много лет назад Бог послал Свою любовь для нас,", "text": "Много лет назад Бог послал Свою любовь для нас,\nКогда Сын Его в этот мир пришёл и нас с тобою спас.\n\n    В сердце моё, Иисус, войди, дай мне свет Твоей любви.\n    Дети на земле, попросите все Иисуса к вам войти.\n\nБыли мы грешны, огорчался Ты, Иисус наш Друг,\nНо простишь нам вновь и в сердца войдёшь, коль на Твой откроем стук.\n\nУмер Он за нас и от зла всех спас, но воскрес Христос.\nХочет дать покой, мир небесный Свой, Он блаженство нам принёс."}, {"id": 902, "title": "В далёком Вифлееме, не в комнатах дворца,", "text": "В далёком Вифлееме, не в комнатах дворца,\nНо в яслях нам родился Спаситель от Отца.\nХор ангелов чудесных воспел на небесах:\n«Хвала рожденному Младенцу!»\n\n    Родился Спаситель, Мессия, Божий Сын, \n    Сошёл к нам на землю небесный Властелин. \n    Родился Спаситель, Мессия, Божий Сын, \n    Хвала Ему вовек, аллилуйя!\n\n«Да будет слава Богу и мир всем на земле, \nБлаговоленье в людях!» - звучало в вышине,\nИ пастухи слыхали той ночью на полях,\nИ Бога прославляли в своих сердцах.\n\nИисус сошёл на землю, чтоб грешников спасти, \nДать радость, счастье людям, помочь покой найти. \nМы любим Иисуса, рождённого Христа,\nВсегда пускай звучит Ему хвала."}, {"id": 903, "title": "Лежат предо мною дороги, пути, зовут и влекут, и манят,", "text": "Лежат предо мною дороги, пути, зовут и влекут, и манят,\nНо как же тот путь отыскать, как найти, что к счастью направит меня? \nГде эта тропинка, что к счастью ведёт, что учит добру и хранит,\nК неправде и злу никогда не свернёт, а станет дорогой любви?\n\nА в жизни так много широких дорог, легко по которым идти,\nНо к счастью одна лишь тропинка ведёт, и как ту тропинку найти? \nХристос ту тропинку поможет найти, что учит добру и хранит,\nК неправде и злу никогда не свернёт, а станет дорогой любви."}, {"id": 904, "title": "Я хочу прославить Господа Христа", "text": "Я хочу прославить Господа Христа \nЗа Его любовь к нам, за Его дела.\n\n    Только с Иисусом не страшна беда, \n    Только с Иисусом счастлив я всегда.\n\nОн всегда со мною рядышком идёт, \nКрепкою рукою Он меня ведёт.\n\nВзрослые и дети, любит вас Христос, \nЛюдям всем на свете счастье Он принёс."}, {"id": 905, "title": "Тихо спят сады, луга и рощи, тихо спят поля и родники,", "text": "Тихо спят сады, луга и рощи, тихо спят поля и родники,\nОн родился светлой звёздной ночью, в час, когда земные сны легки. \nВ час, когда в преддверии рассвета мир огромный безмятежно спит, \nИ в полях угомонился ветер, и ручей усталый не журчит.\n\n    Он лежал в обыкновенных яслях, пахла полем жёлтая трава. \n    Что же в мире может быть прекрасней этой ночи Рождества?\n\nИ хотя с тех пор прошло немало долгих и тяжёлых зим и лет,\nРождество - спасения начало, мы храним в душе твой звёздный свет."}, {"id": 906, "title": "Руки правды, сердце чистоты, жар молитвы - юных дней цветы.", "text": "Руки правды, сердце чистоты, жар молитвы - юных дней цветы.\n\n    Счастье детям, счастье детям Он .желает дать (3 раза). \n    Божью волю у Божью волю будем исполнять (3 раза).\n\nПомощь, радость в мир мы понесём и с любовью за Христом пойдём.\n\nБудем ближних, как себя, любить, честно, верно в этом мире жить.\n\nБудем помнить с наших юных лет: Бог нас любит, сохранит средь бед."}, {"id": 907, "title": "Я смотрю на небес высоту и на чудную их красоту;", "text": "Я смотрю на небес высоту и на чудную их красоту;\nВижу, как пробуждается мир, и как будто в природе пир.\n\n    Ныне радостный день торжества, и природа ликует вся. \n    Пусть несётся хвала до небес, наш Спаситель из мёртвых воскрес!\n\nСолнце тоже играет в лучах, звонко птицы поют в небесах.\nВсё ликует и славит Творца, пусть и наши ликуют сердца.\n\nВместе с семьями нашими мы тоже Богу хвалу вознесём.\nПусть несётся из радостных уст песня славы Тебе, Иисус."}, {"id": 908, "title": "Хочет Иисус, чтоб Ему я служил, как солнца луч,", "text": "Хочет Иисус, чтоб Ему я служил, как солнца луч,\nЧтоб в этом сумраке жизни мой свет сиял из туч.\n\n    Хочу для Иисуса всюду сиять, как луч солнца, \n    Хочу для Иисуса светлым лучом быть всегда.\n\nХочет Иисус, чтоб всегда я трудился для Него, \nПением, словом и делом прославил я Его.\n\nХочет Иисус, чтобы сердце хранил я от греха. \nПусть же звучит наша песня, Спасителю хвала!"}, {"id": 909, "title": "Мама, мама дорогая, расскажи мне о Христе,", "text": "Мама, мама дорогая, расскажи мне о Христе,\nКак, любовию сияя, Он распят был на кресте. \nНасмехались, издевались над Его святым челом.\nИ за что так надругались злые люди над Христом?\n\nРасскажи ты мне сегодня, как воскрес Он в ранний час, \nКак любовь Его, Господня, озарила счастьем нас. \nРасскажи, ведь Он хороший, всех дороже и родней; \nЗнать о Нём хочу всё больше, это очень нужно мне."}, {"id": 910, "title": "Христос воскрес! Живой Спаситель! Пусть радость льётся до небес!", "text": "Христос воскрес! Живой Спаситель! Пусть радость льётся до небес! \nРазрушил смерть и мрак Мессия! Да, Он был мёртв, но Он воскрес!\n\nИ это чудо воскресенья всем людям показало вновь \nПобеду Божьего спасенья и неземную к нам любовь.\n\nХристос воскрес! Живой Мессия! Распятый за людей воскрес - \nИ опустела вмиг могила. Христос воистину воскрес!"}, {"id": 911, "title": "Мы все сегодня вместе собрались,", "text": "Мы все сегодня вместе собрались,\nЧтобы прославить Бога Творца.\n\n    Мы - дети Божьи! Мы - христиане \n    Пусть льётся Богу честь и хвала.\n\nЧистые сердцем Бога лишь узрят,\nЧистые сердцем славят Христа.\n\nВечная слава, честь, поклоненье \nСпасшему нас от тьмы и греха."}, {"id": 912, "title": "Не устанем петь мы о любви Твоей,", "text": "Не устанем петь мы о любви Твоей,\n    Нет на свете песни чище и нежней.\n    Мы в простом её напеве слышим каждый раз: \n    Любит, любит неизменно наш Спаситель нас.\n\nОн в хлеву рождён был ночью, ночью Рождества,\nНа соломе Он лежал в яслях для скота.\nОн с разбойниками рядом умер на кресте - \nБог спасенье всем дарит во Христе.\n\nА когда Мария утром к гробу подошла,\nТо отвален камень был - Тела не нашла.\nИ услышала она, о горе позабыв:\n«Среди мертвых не ищи ты Того, Кто жив!»"}, {"id": 913, "title": "Страдают в мире люди, в сердцах темно и пусто,", "text": "Страдают в мире люди, в сердцах темно и пусто, \nА мы Иисуса любим, нам хорошо с Иисусом.\nВ собранье с малых лет мы и милостью хранимы, \nОт всех от нас за это Спасителю спасибо!\n\nЗа то, что утешает, когда бывает грустно,\nЕго любовь большая, спасибо Иисусу!\nЗа добрых папу с мамой, за тёплый день уютный, \nЗа этот день прекрасный - спасибо Иисусу!\n\nНас ожидает вечность, когда окончим путь свой, \nИ радостная встреча с любимым Иисусом.\nВ стране родной, небесной настроим арфы, гусли \nИ запоём все вместе: «Осанна Иисусу!»"}, {"id": 914, "title": "Тропинка наша светлая, от школьного порога", "text": "Тропинка наша светлая, от школьного порога\nВеди в страну заветную, счастливой стань дорогой.\n\n    Наставники, родители, единою семьёю\n    До цели доведите нас (2 раза) тропинкою родною.\n\nТропиночка росистая, от детского порога\nОткрой нам тайны истины про вечность и про Бога.\n\nТак часто выбирают здесь широкую дорогу,\nНо лишь одна тропинка есть к небесному чертогу."}, {"id": 915, "title": "Все на свете счастья ищут, всех оно к себе манит,", "text": "Все на свете счастья ищут, всех оно к себе манит,\nНо один лишь путь есть к счастью, в Иисусе он сокрыт.\n\n    Тем, кто верит Слову Бога, отыскать его легко.\n    Счастье только тем даётся, кто не ищет своего (2 раза).\n\nЕсли мы любовь и радость будем всем вокруг дарить,\nТо найдём дорогу к счастью, будем с Богом вечно жить."}, {"id": 916, "title": "Учит нас Господь творить добрые дела,", "text": "Учит нас Господь творить добрые дела,\nУчит всех людей любить и хранит от зла.\n\n    Будем мы добро творить, как Христос творил, \n    Будем с Ним на небе жить и Ему служить.\n\nВидим мы с тобой, наш друг, сколько зла вокруг. \nСделай каплю доброты - будешь счастлив ты.\n\nСолнце, небо и вода - Божья доброта!\nПтицы, звери, ты и я - вот любовь Христа!"}, {"id": 917, "title": "Самуил был посвящён и при храме с детства жил.", "text": "Самуил был посвящён и при храме с детства жил.\nВ церкви мы хотим, как он, Господу служить.\n\n    Годы детства никогда не проходят без следа.\n    Вот поэтому, друзья, Иисусу скажем «да!»\n\nЦерковь любим мы свою и хотим быть, как Давид:\nНе смутил его в бою Голиафа вид.\n\nКто вступил с Христом в союз - жизни вечной смысл нашёл. \nМы хотим, чтоб Иисус с детства с нами шёл."}, {"id": 918, "title": "Горят в ночи гирлянды звёзд, их свет лучист и ярок.", "text": "Горят в ночи гирлянды звёзд, их свет лучист и ярок.\nНе Дед Мороз, а Сам Христос несёт тебе подарок,\nНадежду людям Он несёт, вселяя веру снова,\nЧто будет мирным новый год от Рождества Христова.\n\n    Аллилуйя! Аллилуйя! Аллилуйя!\n\nПусть в бездну скатится вражда огромным снежным комом, \nИ Вифлеемская звезда взойдёт над каждым домом. \nВстречают люди Рождество! Господь в дорогу вышел,\nШаги незримые Его, ликуя, сердце слышит.\n\nТы хочешь встречи со Христом? Ему навстречу выйди. \nГосподь заходит в каждый дом - кто верит, тот увидит. \nСкорей в глаза Христу взгляни, откликнись на сердечность, \nЕму ты душу распахни, а Он подарит вечность."}, {"id": 919, "title": "Мы вес в радостном волненье Богу славу вознесём,", "text": "Мы вес в радостном волненье Богу славу вознесём, \nБлагодарным песнопеньем мы Иисусу воспоём;\nК небу руки поднимаем и за всё благодарим,\nМы Творца благословляем, наполняемся мы Им.\n\n    Наш Иисус, наш Иисус, мы любим Тебя,\n    Наш Иисус, наш Иисус, сердцами горя.\n    Наш Иисус, наш Иисус, заветы храпим \n    И с Тобой, наш Иисус, мы всё победим!\n\nВсё живое прославляет Духа, Сына и Отца.\nДух любовью наполняет исстрадавшие сердца.\nЭта весть о пробужденье над вселенной пусть летит, \nОб Иисусе и спасенье всё живое говорит.\n\nИ сейчас мы, Твои дети, песню звонкую поём.\nОна мчится по планете и вольётся в Отчий Дом. \nПусть услышат эту песню и земля, и небеса,\nПусть сольются в прославленье все живые голоса"}, {"id": 920, "title": "Мы руки возлагаем на брата своего;", "text": "Мы руки возлагаем на брата своего;\nМы Бога умоляем: «Благослови его».\n\nНе в рукоположенье вся сила Божьих слуг,\nВ Твоём благословенье, что укрепляет дух.\n\nПриди, как гость незримый, Сам руки возложи;\nВ работе, им творимой, избыток сил вложи.\n\nПошли ему в служенье отраду и успех,\nЧтоб кротостью, смиреньем примером был для всех.\n\nМы возлагаем бремя и труд наш на него;\nНа будущее время Ты укрепи его.\n\nИ мы хотим совместно то бремя с ним нести;\nДай нам исполнить честно наш долг в земном пути.\n\nВсем младшим дай смиренье и старшим - кроткий нрав, \nА всем - любовь и рвенье исполнить Твой устав."}, {"id": 921, "title": "Спаситель, обещал я служить Тебе все дни,", "text": "Спаситель, обещал я служить Тебе все дни,\nА Ты в моих скитаньях меня от зла храни.\nПойду я в битву смело, когда со мною Ты,\nНе уклонюсь от дела, не устрашусь вражды.\n\nПребудь всегда со мною, дай сил мне побеждать\nИ все соблазны мира с Тобою отражать.\nВся жизнь моя сокрыта, Господь мой, лишь в Тебе, \nТы будь моей защитой, влеки меня к Себе.\n\nСпаситель, дал Ты Слово, та весть нам дорога:\nГде Я в грядущей славе, там будет Мой слуга!\nТебе служить хочу я, не покладая рук.\nМне силу дай святую, Владыка мой и Друг."}, {"id": 922, "title": "Вас, славные служители Христовы,", "text": "Вас, славные служители Христовы,\nПриносим мы в молитвах в этот час,\nПусть вознесётся наш свободный глас к Тому, \nКто силен сбросить все оковы.\n\nХриста вы возвеличили собою,\nО Нём вы возвещали, не стыдясь,\nИ, до изнеможения трудясь,\nПодняли Его знамя над собою.\n\nИ вот за то, что знамя вы подняли,\nЧтоб истина Христова ожила\nИ грешников к Голгофе привела,\nВы узы и гонения приняли.\n\nО, славные Христовы знаменосцы!\nДля ваших душ не может быть преград. \nГосподь услышит голос Своих чад,\nХотя ведут вас в тюрьмы, на допросы.\n\nМы здесь в свободном, радостном общенье,\nА вы - одни, без братьев и сестёр.\nНад нами - неба голубой шатёр,\nА вас сжимают каменные стены.\n\nДела любви всегда стоят пред нами,\nВы учите, как в истине стоять!\nМы вам стремимся в этом подражать,\nКак вы всегда Христу лишь подражали."}, {"id": 923, "title": "Господь, вот мы избрали служителей Твоих;", "text": "Господь, вот мы избрали служителей Твоих; \nТебя мы умоляли, Ты указал нам их.\n\nБлагослови служенье избранников Твоих,\nДай им Твоё терпенье, успех в трудах святых.\n\nИх сделай образцами для Церкви всей Твоей, \nЧтоб словом и делами служили для людей.\n\nВ минуты огорчений их Духом подкрепляй\nИ даром откровений обильно наделяй."}, {"id": 924, "title": "Гаснет ли пламя в борьбе испытаний.", "text": "Гаснет ли пламя в борьбе испытаний. \nТруден ли станет тернистый твой путь, \nВыше и выше держи своё знамя,\nСтойким всегда ты за истину будь.\n\nВстретишь ли ненависть сердца жестокого, \nБудет ли зависть следить за тобой,\nБог не оставит тебя одинокого,\nЕсли к Нему ты прибегнешь с мольбой.\n\nЕсли ты будешь доволен судьбою,\nСчастье польётся широкой рекой,\nВсё же молись, дверь закрыв за собою,\nБог неизменно пребудет с тобой.\n\nЕсли ты силен, молись за остывших, \nВспомни, когда ты счастлив, о других: \nБлизких, далёких, о Боге забывших - \nВстань на колени, молись и о них!\n\nСила молитвы несёт утешенье,\nСила молитвы - победы залог;\nЕсли к Нему вознесёшь ты моленье,\nВерь, что на помощь придёт к тебе Бог!"}, {"id": 925, "title": "Мы руки возлагали единою душой;", "text": "Мы руки возлагали единою душой;\nТебя мы умоляли, и внял Ты нам, Благой.\nТеперь мы умоляем, чтобы служитель Твой, \nСкорбями несмущаем, исполнил долг святой.\n\nЕму дай наставленье, чтоб мог он наставлять,\nИ укрепи в служенье, чтоб мог он подкреплять. \nВеди его Ты властно, чтоб он руководил;\nУчи его всечасно, чтоб верно он учил.\n\nВ минуты утомленья его Ты ободряй,\nСреди борьбы, лишенья поддержку посылай. \nЛюбовию небесной всех в церкви нас спаяй; \nСкрепи нас дружбой тесной и впредь не оставляй."}, {"id": 926, "title": "Верным истине святой будь, служитель Божий!", "text": "Верным истине святой будь, служитель Божий!\nНе колеблясь, в вере стой и борись ты с ложью.\n\n    Будь, как верный Даниил, ты всегда готов \n    Исповедать Бога сил посреди врагов.\n\nНе страшись же ничего, веруй и мужайся,\nИ за Бога своего с радостью сражайся.\n\nВсё, чем мир здесь дорожит, так пред Богом бедно, \nНо великое творит Дух любви победной.\n\nСлово Бога возвести перед миром смело:\nПо Его иди пути, делай Божье дело."}, {"id": 927, "title": "Жатвы много созревает, Боже, Сам жнецов пошли;", "text": "Жатвы много созревает, Боже, Сам жнецов пошли;\nВсем, кто труд Твой совершает, силу свыше ниспошли.\n\nНыне, Боже, пред Тобою здесь в смирении стоит\nТвой служитель посвящённый; пусть огонь Твой в нём горит.\n\nПусть несёт он свет Твой людям, не страшится ничего,\nДух Святой пусть в нём пребудет. Боже, Сам веди его!"}, {"id": 928, "title": "Иисус - в нашем сердце! Нам, молодым,", "text": "Иисус - в нашем сердце! Нам, молодым,\nНет лучше той доли, чем быть вместе с Ним! \nИисус - в нашем сердце! Мы с Ним живём,\nОн нам скала и опора во всём.\n\n    Он в нашем сердце, Он лишь один \n    Дивный Учитель, мы счастливы с Ним! \n    Омыты мы Кровью Его дорогой,\n    Иисус - в нашем сердце, Спаситель благой.\n\nИисус - в нашем сердце! Радость лишь в Нём! \nИисус - в нашем сердце победа над злом! \nРадость мирская не даст ничего,\nЛишь в Иисусе имеем мы всё.\n\nИисус - в нашем сердце! Он ждёт тебя,\nДаёт тебе счастье лишь Он навсегда!\nПрими Его в сердце, следуй за Ним,\nТебе предлагает Он дивный свой мир."}, {"id": 929, "title": "В утро юности прекрасной, жизни радостный расцвет,", "text": "В утро юности прекрасной, жизни радостный расцвет,\nМы спешим на призыв властный, исполнять Христа завет.\n\n    Для труда (для труда) на Божьей ниве \n    Мы готовы (мы готовы) всё отдать (всё отдать).\n    О,не будем (о, не будем) же ленивы!\n    Краток день - не будем спать!\n\nЛюбим имя Иисуса и живём лишь только с Ним.\nМы о милости Христовой людям грешным возвестим.\n\nПосвятим же Иисусу ранних дней своих весну,\nПосвятим Ему и зрелость, осень жизни, седину."}, {"id": 930, "title": "Вот приходит снова чудная пора", "text": "Вот приходит снова чудная пора \nНеба голубого, солнца и тепла.\nИсчезают тучи, ночь уходит вдаль,\nИ выходит солнце растопить печаль.\n\nНа душе так вольно, дышится легко,\nСердце всем довольно, и исчезло зло,\nИ поры прекрасней нет здесь, на земле, \nЧтобы славить Бога всей душою мне.\n\nБудем славить Бога, чтобы не жалеть,\nКогда станем стары и начнём болеть,\nЧтобы, вспомнив юность, вспомнив эти дни, \nНаслаждаться сердцем в старости могли."}, {"id": 931, "title": "Юные силы, молодость раннюю Богу, друзья, посвятим.", "text": "Юные силы, молодость раннюю Богу, друзья, посвятим.\nВ мире насилия, в мире страдания мы укрепляемся Им.\n\nЮность, сильна ты, грех победившая, если по Слову живёшь. \nПесни хвалебные, гимны сложившая, ты о Христе весть несёшь.\n\nПусть на земле ты в уничижении, гонят тебя за Христа, - \nНе умолкай, неси весть о спасении, только всегда будь чиста!\n\nС песней горячею, с песней хвалебною будем идти мы вперёд. \nСердцем воспойте вы песню победную - пусть её слышит народ!"}, {"id": 932, "title": "Юность светлая - весна ранняя, мы её Творцу принесём.", "text": "Юность светлая - весна ранняя, мы её Творцу принесём. \nМолодые мы в золотые дни лишь для Господа живём!\n\nТьма неверия окружает нас, туча чёрная впереди;\nМы Христа огни в эти злые дни расставляем на пути.\n\nХоть и труден путь, и тернистый он, со Христом его мы пройдём. \nМолодые мы в золотые дни лишь для Господа живём.\n\nО, не бойся, друг, не смущайся, брат, проходя свой жизненный путь! \nВпереди тебя твой Христос прошёл и тебя идти зовёт.\n\nТак спеши же, друг, посвятить Христу утро юности, жизни дни,\nИ Он даст тебе золотой венец, будешь царствовать ты с Ним."}, {"id": 933, "title": "«Мир Мой оставляю вам», - так сказал Спаситель", "text": "«Мир Мой оставляю вам», - так сказал Спаситель \nПеред тем, как перейти в вечную Обитель.\n«И да не смущается сердце ваше никогда,\nДа не устрашается», - Он ученикам сказал.\n\nИ как возлюбил Меня Мой Отец небесный, \nВозлюбил Я вас, друзья, навсегда мы вместе.\nЕсли любите Меня, Мой завет храните\nИ, как самого себя, ближнего любите.\n\nТак учил Своих друзей, так Он им открылся,\nИ по милости Своей Он за них молился:\n«Отче, освяти их всех истиной Твоей\nИ всегда от зла храни всех Моих друзей».\n\n«Мир Мой оставляю вам, - так сказал Спаситель, - \nВсё, чему учил Я вас, в сердце сохраните».\nЭтот мир тебе и мне Иисус оставил,\nИ теперь тот Божий мир пребывает с нами."}, {"id": 934, "title": "Юность, ты прекрасна, жизни дар бесценный,", "text": "Юность, ты прекрасна, жизни дар бесценный,\nТы как свет небесный в молодых сердцах;\nНо зачем так скоро вянет лик прелестный,\nБлеск очей погаснет, седина - в висках.\n\nВсё бы мог отдать я, чтобы ты осталась \nВо мне безраздельно до конца цвести.\nЮность - это счастье дней моих тревожных,\nЧто промчались в бурях на земном пути.\n\nКто бы мог вернуть мне прелесть дней прожитых, \nЖар любви заветной, бодрость обрести?\nБыстро так уходят годы золотые,\nИ так беспощадно хочешь ты уйти.\n\nНе грусти, о брат мой, есть надежда в Боге:\nПод рукою Божьей молодеть всегда.\nВедь недаром руки те пронзённы были,\nЧтоб вернуть нам юность жизни навсегда."}, {"id": 935, "title": "Творцу благому он воспевал, он воспевал, он воспевал,", "text": "Творцу благому он воспевал, он воспевал, он воспевал,\nНа арфе стройно Ему играл и пел сердечно он, и славил;\nОн пел про Бога, про сильного, Ему нет в мире подобного,\nОн пел о Боге: Бог есть любовь, и Он вовеки Тот же будет.\n\nДавидом звался Божий певец, Божий певец, Божий певец,\nПод звуки арфы он воспевал любовь Господню неземную.\nТеперь поёт он в святой Стране, а я - скиталец здесь на земле,\nНо вместе славим любовь Творца, что нам явил Христос Спаситель.\n\nМы славим Бога, а как же ты? А как же ты? А как же ты?\nПоёшь ли Богу средь суеты от сердца песню вечной славы?\nКоль нету арфы - воспой псалом! Коль петь не можешь- молись о том, \nЧтоб каждый житель земли познал, что Иисус есть наш Спаситель!\n\nХристу на небе звучит хвала, звучит хвала, звучит хвала!\nИ счастлив я, что Он спас меня от вечной гибели и мрака!\nКогда ж предстанем перед Творцом, то вместе стройно мы воспоём, \nНа небе вечно мы будем петь, что Иисус есть наш Спаситель!"}, {"id": 936, "title": "Услышь мольбу и вздох души моей,", "text": "Услышь мольбу и вздох души моей,\nХочу Тебя, мой Бог, любить ещё сильней,\nХочу любить огнём мольбы святой,\nВсем сердцем и умом, и всей своей душой.\n\n    И знаю, будут там, где нет теней, где вечный Бога храм, \n    Спасённые Христом Его любить сильней.\n    И знаю, будут там, где нет теней, где вечный Бога храм, \n    Спасённые Христом Его любить сильней.\n\nНапрасно в тьме сует я мир искал,\nЛишь Твой любви завет мне счастье в жизни дал.\nУвижу ль иногда грозу скорбей - \nХочу я и тогда любить ещё сильней.\n\nПрервётся ль жизнь моя для вечных дней,\nХочу и в небе я любить ещё сильней.\nПока здесь, на земле, плывёт ладья,\nМечта моя, Христос, сильней любить Тебя!"}, {"id": 937, "title": "Изобильная виноградная Лоза, Ты спасение моё,", "text": "Изобильная виноградная Лоза, Ты спасение моё, \nУтешение моё и прохлада.\nИ нектар любви Твоей мою душу до корней пропитал.\nЯ теплом Твоим согрет, мне другого счастья нет и не надо.\n\nИзобильная виноградная Лоза, я в истоме засыхал,\nНо погибнуть мне не дал Виноградарь.\nВ Нём покой и полнота, и любовь Его чиста как слеза.\nЯ теплом Твоим согрет, мне другого счастья нет и не надо.\n\nИзобильная виноградная Лоза, быть одною из ветвей \nМне по милости Твоей как награда.\nПомоги Ты мне цвести, помоги плоды Тебе принести.\nЯ теплом Твоим согрет, мне другого счастья нет и не надо."}, {"id": 938, "title": "Иисус Господь, Властелин небес, сердце моё видишь с высоты.", "text": "Иисус Господь, Властелин небес, сердце моё видишь с высоты. \nДолгие года мучался я зря, от греха избавь и суеты.\n\nВ этой жизни я в темноте блуждал и устал искать душе покой.\nО, прости, Иисус, грешного меня, от греха избавь и будь со мной.\n\nЗа Голгофский крест и за смерть Твою в песне я хочу Тебя хвалить. \nСохрани меня от лукавою, чтобы в вечности с Тобой пребыть."}, {"id": 939, "title": "Какое счастье, если ты, противоставши суете,", "text": "Какое счастье, если ты, противоставши суете,\nСвои желанья и мечты сосредоточишь во Христе,\nИ юность, как цветов букет, Спасителю преподнесёшь,\nС Ним вечный заключив завет, оставишь мир, оставишь ложь.\n\nКакое счастье, если ты, всмотревшись пристально вокруг, \nУвидишь мрачным и пустым греховный мир средь зла и вьюг, \nПоймешь ты тайну красоты в святой сердечной чистоте,\nСвои желанья и мечты сосредоточишь во Христе.\n\nКакое счастье, если ты подругой сделаешь своей \nМолитву с пламенем святым и откровенностью речей,\nИ с ней пойдёшь дорогой в жизнь, согласье дав Христу в пути, \nТогда и по горам крутым поможет Он тебе идти."}, {"id": 940, "title": "Уплывают поспешно в неведомый край", "text": "Уплывают поспешно в неведомый край \nНаши светлые юные годы,\nУнося наши грёзы в далёкую даль,\nУнося наши беды, невзгоды.\n\nИ печалью туманятся наши глаза:\nСкоро старость придёт неизбежно;\nА из сердца горячая льётся слеза\nИ в волнах жизни тонет безбрежных.\n\nАх, ты, юность, летишь ты подобно реке,\nЧто стремится к бездонному морю,\nК морю вечному, видному там, вдалеке, \nМчишь ты воды свои так упорно.\n\nУнеси и упрячь на глубокое дно \nВсе стремленья мои и надежды,\nКоль им сбыться в моей жизни не суждено;\nЯ останусь спокоен, как прежде.\n\nК вожделенным, прекрасным, святым берегам \nПоплыву по течению жизни.\nТам меня ожидает Спаситель мой Сам \nВ приготовленной светлой Отчизне.\n\nТам конец всем скитаньям, не будет границ, \nТам несбывшихся нет намерений,\nТам чертог нестареющих юнош, девиц,\nИ покорно там будет нам время."}, {"id": 941, "title": "Рано я ищу Иисуса, больше вижу с каждым днём;", "text": "Рано я ищу Иисуса, больше вижу с каждым днём; \nНавсегда хочу пойти я вслед за Ним Его путём.\n\n    Любит Он меня! Он любит! Знаю, любит Он меня: \n    Он ведь умер за меня; знаю, любит Он меня!\n\nЯ пойду, куда велит Он; хоть я юн, дано мне знать,\nКак идти Его тропою, Его волю исполнять.\n\nОн стоит в дверях спасенья, сбросить иго просит Он;\nЯ к Нему стучаться буду, отворит Он - я спасён."}, {"id": 942, "title": "Твои небеса и Твоя земля, и что наполняет её.", "text": "Твои небеса и Твоя земля, и что наполняет её.\nТы видишь пути и знаешь дела, всеведенье чудно Твоё!\n\n    Иду ли я, отдыхаю ли, Ты окружаешь меня,\n    И все пути мои известны лишь Тебе.\n\nИ тайны души видишь Ты всегда, желания знаешь мои.\nНичто от Тебя не сокрыто, мой Бог, я всюду под взором Твоим!\n\nЗа всё остаюсь благодарен Тебе, мой жизненный путь огради!\nС Тобою хочу я идти, мой Господь, меня в вечный Край приведи."}, {"id": 943, "title": "Как я устал в суете дней, как я устал ходить во тьме,", "text": "Как я устал в суете дней, как я устал ходить во тьме,\nГде света нет и кругом пустота. Говорят: «Это истинный свет». \nНо вижу я, что солнца в нём нет, а кругом пустота и вечная тьма.\n\n    Но Иисус, мой Господь, осветил мой путь,\n    И теперь я иду к Нему и с пути не сверну!\n    О Иисус, благодарен Тебе, Господь,\n    За любовь и заботу Твою, Ты мне жизнь подарил!\n\nПред Тобой я склоняюсь, Отец мой, и прощенья прошу у Тебя: \n«Ты прости меня! Я хочу жить с Тобою, Господь мой,\nИ хочу возлюбить мир так, как Ты возлюбил»."}, {"id": 944, "title": "Я большего счастья не знаю и большей мечты не таю -", "text": "Я большего счастья не знаю и большей мечты не таю -\nЛишь только с Христом я встречаю прекрасную в небе зарю.\n\n    Мне жизнь со Христом - наслажденье!\n    Я счастье в Иисусе нашёл \n    И с Богом нашёл примиренье,\n    И славную вечность обрёл!\n\nНадежду мою окрыляет Спаситель в скитанье земном.\nЯ большего счастья не знаю, чем жить с Иисусом Христом.\n\nВсе дни, что провёл я в неверье, неслись вихрем за облака,\nА Он в книгу жизни на небе внёс имя моё на века.\n\n«И ты никогда сиротою не будешь! - Он мне обещал, - \nЯ каждый миг буду с тобою, чтоб дух твой во Мне процветал!»"}, {"id": 945, "title": "Быстрыми, полётными часами юность быстрокрылая летит,", "text": "Быстрыми, полётными часами юность быстрокрылая летит,\nМы её для Господа отдали, жизнью нашей Он руководит.\n\n    Пусть мчатся годы вереницей вдаль, мы ближе к вечности идём. \n    За крайней жизненной границей в небесный Дом войдём!\n\nКончатся земные испытанья, землю мы оставим навсегда. \nВспоминать мы будем дни скитанья, дни благословенного труда.\n\nКончится несказанная мука, боль души, сердечная тоска.\nС грешным миром близится разлука; наша цель ясна и высока.\n\nНебо нам желанная отрада! Небо - нашей жизни всей мечта,\nЗа святые подвиги награда, счастья неземного красота!"}, {"id": 946, "title": "Величит душа моя Бога! Он - Царь и Владыка миров.", "text": "Величит душа моя Бога! Он - Царь и Владыка миров.\nКогда на душе тревога, спешу под Его покров.\n\n    Он правдой меня осеняет, даёт мне под крыльями тень, \n    От опасных путей охраняет и душу мот сберегает \n    По милости каждый день.\n\nЕму «Аллилуйя! Осанна!» Он полон небесных щедрот,\nЯ в Нём нахожу непрестанно отраду в минуты невзгод.\n\nИ я каждый день направляю молитвы в небесную синь \nИ громко Его прославляю сердечной хвалою. Аминь!"}, {"id": 947, "title": "Одним желанием горю, живу одной мечтой:", "text": "Одним желанием горю, живу одной мечтой:\nНести спасения зарю в поток людской.\nХолодный ветер на пути пророчит мне беду.\nИ нелегко подчас идти, но я иду.\n\n    Гори, прекрасная звезда, дорогу освещай,\n    Любовь Спасителя Христа всем людям возвещай.\n\nВокруг темно. Осенний мрак вселяет в сердце страх, \nНо я иду, и свет добра держу в руках.\nСквозь зной палящий, холода спешу на каждый зов.\nА впереди идёт звезда - Христа любовь."}, {"id": 948, "title": "Священный огонь, разгораясь над миром,", "text": "Священный огонь, разгораясь над миром, \nРассеял греховную, спящую тьму.\nВстаёт молодежь, обращается к Богу \nИ дружно возносит хваленье Ему.\n\nВ Европе, Америке, в Африке жаркой \nПроснулась от мрака греха молодёжь;\nИ Слово Господнее светочем ярким \nРазбило в их душах коварство и ложь.\n\nВ лесах дикари обращаются к Богу,\nИ хиппи, оставив бессмысленный путь, \nСегодня иную находят дорогу,\nЖелая у Божиих ног отдохнуть.\n\nВот старец больной, сединой убелённый, \nЧто факел зажжённый пронёс сквозь года, \nОбветренный в бурях, познавший гоненье,\nВ бессилье упал у подножья креста.\n\nНо ту г подошли к нему новые люди,\nВ них сила и молодость была видна,\nИ факел горящий в их крепкие руки \nСтарик передал, на покой уходя.\n\nЧасы отбивают последнее время,\nПоследний призыв над землёю звучит:\n«О грешник несчастный, оставь своё бремя, \nНе жди, когда голос любви замолчит»."}, {"id": 949, "title": "Пусть любовь моя к Богу возрастает!", "text": "Пусть любовь моя к Богу возрастает!\nВера в Бога сил навеки процветает.\nМолодое сердце пусть поёт, ликуя,\nТворцу сил небесных песню «Аллилуйя!»\n\n    Аллилуйя, аллилуйя!\n    Творцу сил небесных песню «Аллилуйя!»\n\nСердце слабое Дух Твой укрепляет.\nЕсли с нами Ты, кто против нас восстанет? \nЕсли с нами Бог, кто нам путь закроет?\nК счастью, славе, миру Иисус проводит."}, {"id": 950, "title": "Лучшие дни нашей жизни, свежие силы весны молодой", "text": "Лучшие дни нашей жизни, свежие силы весны молодой \nМы посвятим Иисусу в дар для Него дорогой!\nЧто может быть нам приятней, как Иисусу служить,\nЖизни простор необъятный, сердце Христу подарить?\n\nСлышишь, как Он призывает? Час посвященья для нас настал! \nБольше мы медлить не можем: Он ведь нам жизнь даровал! \nБратья, поднимем же знамя с именем чудным Христа!\nПусть загорается пламя жертвенной Крови Христа.\n\nСмело во имя Иисуса, братья, вперёд на борьбу с грехом! \nТысячи гибнут в пороках - с вестью благой к ним пойдём. \nПусть нас постигнут гоненья, смерть за Христа не страшна!\nС радостным пеньем хваленья мы одолеем врага."}, {"id": 951, "title": "Пока огонь любви чудесной горит в груди волной живой,", "text": "Пока огонь любви чудесной горит в груди волной живой, \nМы силы юные совместно употребим на труд святой.\n\n    Юность прекрасная, молодость ясная!\n    Сил, здоровья не жален (для людей),\n    К Богу духом пламеней (всё сильней).\n\nПока сильны стремленья к небу и много сил, здоровья в нас, \nДрузья, распределим умело для славы Божьей всякий час!\n\nВедь даже старцы вспоминают с улыбкой светлой на устах \nПорывы юности святые, о всех друзьях и о трудах.\n\nСвоих забот у нас немного, не будем предаваться им,\nНе для себя, а для другого мы свои силы отдадим."}, {"id": 952, "title": "Я искал Тебя, Боже, в сиянии звёзд, в полыхании ранней зари,", "text": "Я искал Тебя, Боже, в сиянии звёзд, в полыхании ранней зари,\nВ щебетании птиц, в белизне облаков, в виноградной лозе у реки. \nО мой Бог, как найти Тебя? Как испить мне всю благость Твою? \nДай мне крылья любви, чтоб пронзать облака \nИ с Тобою быть вечно в раю.\n\nА когда я устал и возлёг у ручья, тихо имя Твоё я призвал.\nЛёгкий ветер коснулся лица моего, о Господь, - это Ты, я узнал.\nО мой Бог, Ты нашёл меня среди тысяч и тысяч людей.\nТы дал крылья любви, чтоб пронзать облака -\nИ я вечно в ладони Твоей."}, {"id": 953, "title": "Пребудь со мной, уж меркнет луч дневной,", "text": "Пребудь со мной, уж меркнет луч дневной, \nГустеет мрак, Господь, пребудь со мной. \nКогда лишусь опоры я земной,\nО Бог всесильный, Ты пребудь со мной.\n\nТак жизни день короткий утечёт,\nПомеркнет всё земное и пройдёт,\nВсе песни счастья - только звук пустой, \nДруг неизменный, о, пребудь со мной.\n\nНе царским обликом ко мне приди,\nНо с состраданьем нежным и в любви,\nИ исцеление неси с Собой,\nКак солнца луч, так и пребудь со мной.\n\nВ Тебе нуждаюсь каждый час, мой Бог,\nЧтоб враг души посеять зло не смог.\nИ в светлый час, и облачной порой, \nРуководя, храня, пребудь со мной.\n\nКто страшен мне, коль Ты, Господь, вблизи? \nСкорбь не теснит, не знаю я тоски.\nГде смерти жало? Ад, где ужас твой? \nБессильно всё, когда Господь со мной.\n\nВ предсмертный час на крест Свой укажи, З\nвездою утренней средь тьмы гори. \nСветлеет небо новою зарёй,\nВ жизни и смерти Сам пребудь со мной."}, {"id": 954, "title": "Благослови меня, Господь, прошу, благослови,", "text": "Благослови меня, Господь, прошу, благослови,\nДушою нищей я иду к Тебе искать любви;\nСклоняю низко пред Тобой повинную главу,\nМолю: прими меня домой, в небесную Страну.\n\n    Без Бога не можем мы жить, без Бога не можем любить, \n    Без Бога мертва вся земля, без Бога мертвы ты и я.\n\nТы знаешь Сам, как горд я был, как многим я владел,\nКак о Тебе я позабыл, и как я оскудел.\nТеперь прошу лишь об одном: «Возьми меня слугой,\nХочу я в доме быть родном, где радость и покой»."}, {"id": 955, "title": "Огонь не гасится огнём - пожары тушатся водою.", "text": "Огонь не гасится огнём - пожары тушатся водою.\n«За зло не воздавайте злом», - сказал Спаситель нам с тобою. \nЛюби друзей, люби врагов, - кто любит так, тот любит Бога.\nЯ, к сожаленью, не таков: пороков в сердце очень много.\n\nБесплодным дерево растёт, обильной шелестя листвою.\n«Вы принесите в жизни плод», - сказал Спаситель нам с тобою. \nВедь вера мёртвая, без дел, не приведёт к чертогам рая.\nКак мало сделать я успел, минуты, дни, года теряя.\n\nВраг неотступен, словно тень, подогреваемый злобою.\n«Друзья, молитесь каждый день», - сказал Спаситель нам с тобою. \nМолитвы сила велика! Вы научитесь так молиться,\nЧтоб, прорезая облака, она к Отцу могла стремиться."}, {"id": 956, "title": "Будь всегда со мной: в отдыхе, труде, в радости, беде.", "text": "Будь всегда со мной: в отдыхе, труде, в радости, беде.\nЖить, любить, страдать у Тебя учусь, добрый мой Иисус. \nКаждый миг я стремлюсь постигать Твоих заветов ценность, \nКаждый миг остаюсь я Твоей частицей неизменно.\n\nДай Ты мне постичь мудрости Твоей, святости Твоей;\nИ науку ту нежно пронесу я в душе своей.\nНаучи Ты меня Своему терпенью и смиренью,\nРазорви надо мной злую сеть коварства и сомненья.\n\nПуть любой пройду с именем Твоим, не остановлюсь.\nИ на небесах встречи жду с Тобой, добрый мой Иисус.\nИ Твой свет светит мне, освещая путь в ночи глубокой;\nИ всегда Ты во мне, милый Друг мой, близкий и далёкий."}, {"id": 957, "title": "В целом мире нет прекрасней, в целом мире не найдёшь,", "text": "В целом мире нет прекрасней, в целом мире не найдёшь, \nНет милее и прекрасней, чем Христова молодёжь.\n\n    За Христом идём мы смело, слушаем Его мы зов. \n    На Его благое дело каждый будет пусть готов.\n\nСилы юные, цветите, славьте день Его и ночь.\nЗа Христом пойдём в Отчизну, наша славная молодёжь!\n\nВ целом мире нет прекрасней, в целом мире не найдёшь, \nНет милее и прекрасней, чем Христова молодёжь."}, {"id": 958, "title": "Я познал много бед, не обут, не одет,", "text": "Я познал много бед, не обут, не одет,\nИногда голодал я подряд много лет.\nНи друзей, ни подруг, только пьяный досуг,\nИ ночлежки сырой тишина до утра.\nМолча брёл я по лужам, никому был не нужен, \nТри монеты в кармане тоскливо звенят;\nИ никто в этом мире не протянет руки мне, \nСлова доброго я не слыхал никогда!\n\nНо однажды ко мне подошёл человек,\nМолча за руку взял и взглянул мне в глаза.\nОн мне мягко сказал: «Знаю горе твоё!\nЯ открою тебе, как пройти в мир иной!»\nИ меня, как родного, он согрел Божьим Словом, \nПосвятил в тайну знаний о жизни святой.\nУходя, улыбнулся, старый мир пошатнулся,\nИ в сознанье моём промелькнул яркий луч.\n\nЯ теперь стал другим, я Иисусом храним,\nМой Спаситель со мной и Его благодать.\nЯ свободен, я нов, и вчерашних оков\nНа меня не одеть никому никогда!\nЭто Божие Слово слышу снова и снова,\nИ во мне «Аллилуйя!» Иисусу звучит,\nВедь дано мне прощенье, от греха искупленье. \nСлава Богу за то, что я Им не забыт! (2 раза)"}, {"id": 959, "title": "Я пою под гитару о том, что расстался со всяким грехом;", "text": "Я пою под гитару о том, что расстался со всяким грехом;\nПрославляю Христову любовь, Кто пролил на кресте Свою кровь.\n\n    Звонче, звонче, гитара, звучи, о могучем Христе не молчи! \n    Звонче, звонче, гитара, играй, Иисуса Христа прославляй!\n\nОн великою жертвой Своей спас меня от греховных путей;\nОн лишь смог меня к счастью вернуть и наставить на праведный путь.\n\nОн мне сердце моё возродил, к новой жизни меня пробудил;\nИ душа переполнена Им, познакомить желает всех с Ним.\n\nО, как счастлив я, зная о том, что на небе я встречусь с Христом \nИ войду в Его дом золотой, получу в нём желанный покой!"}, {"id": 960, "title": "В дни радости и счастья, в дни скорби и ненастья спешу к Тебе;", "text": "В дни радости и счастья, в дни скорби и ненастья спешу к Тебе;\nК Тебе, мой Искупитель, моей души Спаситель, иду в мольбе.\nТы знаешь все тревоги, мои пути, дороги лишь в Тебе;\nСреди земных скитаний, борьбы и испытаний \nСпешу, спешу, Господь, к Тебе!\n\n    К Тебе, Иисус! К Тебе, лучший Друг!\n    Спешу я к Тебе, стремлюсь я к Тебе всей душой!\n    Меня Ты поймёшь и слёзы отрёшь!\n    Спешу я к Тебе и хочу быть лишь только с Тобой!\n\nНе знаю, что я встречу здесь в жизни скоротечной, но счастлив я,\nЧто Ты со мной, Спаситель, ведёшь меня в Обитель в небеса.\nТам в радости блаженной у ног Творца Вселенной найду покой. \nНет больше утешенья среди земного тленья -\nСклониться, Боже, пред Тобой!"}, {"id": 961, "title": "Привет вам, Христово цветущее племя,", "text": "Привет вам, Христово цветущее племя, \nРождённое в бурях великой судьбой,\nВас грозно встречает последнее время, \nЗовёт на последний, решительный бой!\n\nСтеною стальною полки боевые \nНеверье ведёт к нам на лютую брань, \nСомкните ж теснее ряды молодые,\nВ решительной битве никто не отстань!\n\nТрубите победу! Священное пламя\nПусть ярче горит над руинами зла! \nНесите вперёд христианское знамя \nЛюбви бескорыстной, Христова добра!\n\nСегодня сердца молодые пусть будут \nВ биенье одном на груди у Христа,\nА завтра, быть может, кого и поднимут \nТолпой разъярённой на древо креста!\n\nВперёд, не робея, на смену идите \nУсталым борцам! Не страшитесь креста, \nРастите, цветите, плоды приносите, \nПрекрасное в мире наследье Христа!"}, {"id": 962, "title": "Истомилась душа по Богу, испытала и муку, и гнёт,", "text": "Истомилась душа по Богу, испытала и муку, и гнёт,\nИ на сердце тоску, и тревогу от житейских сует и забот. \nИстомилась душа по Богу, хочет искренно верить, любить,\nИ как лань устремиться к потоку, чтобы жажду свою утолить.\n\n    Ты дал ей надежду, Ты веру дал, её Ты твореньем Своим назвал, \n    Ты к ней в безграничной Своей любви протягивал руки Свои. \n    Но что она ищет, зачем живёт, в грехах погибая, чего-то ждёт?\n    А Ты её видишь, и с высоты ей даришь спасенье лишь Ты.\n\nИстомилась душа по Богу, рвётся ввысь к голубым небесам,\nК золотому, святому чертогу, где курится любви фимиам,\nГде среди торжества и хваленья дням предвечным не будет конца, \nГде под звуки небесного пенья в небе ангелы славят Творца."}, {"id": 963, "title": "Тихо в комнату я войду, чтобы всё рассказать Тому,", "text": "Тихо в комнату я войду, чтобы всё рассказать Тому,\nКто меня поймёт и в тот час поможет мне.\nПусть не знает никто, о чём буду я говорить с Отцом \nНебесным моим, близким и родным.\n\n    Я прошу Тебя, мой Господь, Ты меня сохрани.\n    Ты возьми меня, мой Иисус, в руки Свои.\n    Пред Тобою склоняюсь, мой Бог, Ты от боли избавь,\n    И на правильный жизни путь меня Ты направь.\n\nТы один можешь мне помочь и не скажешь уйти мне прочь, \nИ такой, как есть, к Тебе прихожу, Господь.\nТы прощаешь и мир даёшь, всегда рядом со мной идёшь: \nЛюбовью Своей меня Ты обогрей."}, {"id": 964, "title": "Иисус, Тебе хочу служить и каждый миг в Тебе пребыть!", "text": "Иисус, Тебе хочу служить и каждый миг в Тебе пребыть!\nВедь всей душой желаю я, чтоб жизнь с Тобой прошла моя.\n\n    В скорбях меня Ты утешай, от зла и бед оберегай \n    И дай мне силы, чтобы я мог славить каждый миг Тебя.\n\nЖивую веру, Боже, дай, смиренно жить мне помогай,\nЧтоб за Тобою след во след я шёл, храня святой завет."}, {"id": 965, "title": "Не в тумане, не в тумане и не в миражах,", "text": "Не в тумане, не в тумане и не в миражах,\nНе сквозь тусклое стекло и не в пустых мечтах, \nХочу видеть Тебя ясно, о Спаситель мой,\nХочу слышать Твой прекрасный голос неземной.\n\n    Дороже Тебя нет па целом свете,\n    Создатель миров, Владыка вечный.\n    Всё Твоё па земле и в небесах.\n    Там город родной меня ожидает,\n    Спаситель святой всех нас приглашает \n    В ту страну, где не будет больше слёз.\n\nЭто радость, это радость, радость без конца,\nЭто счастье, это счастье, чтоб познать Тебя.\nЭто милость, это милость, данная Тобой,\nО Спаситель мой любимый, вечно быть с Тобой.\n\nХочу славить, вечно славить, славить без конца. \nХочу быть с Тобою рядом всюду и всегда.\nТы, Спаситель мой любимый, за меня страдал. \nТы, Спаситель мой любимый, жизнь Свою отдал."}, {"id": 966, "title": "Каждый день настойчиво и звучно", "text": "Каждый день настойчиво и звучно \nМы в молитве просим Бога: «Дай,\nДай нам хлеб на каждый день насущный, \nБез любви Своей не оставляй».\n\n    Просим мы, как маленькие дети,\n    С верою стоим перед Творцом,\n    И с надеждой светлою воздеты \n    Наши руки пред Его лицом.\n\nИ идут к нам щедрости от Бога,\nИ мы гимн за то Ему поём,\nНо порою видно, что немного \nМы в ответ Своей любви даём.\n\nВедь любовь сдвигает даже горы,\nЧерез шторм проводит корабли;\nЧьё же мы прогнали в жизни горе?\nГде, кому мы в жизни помогли?"}, {"id": 967, "title": "В душе я слышу голос пресвятой:", "text": "В душе я слышу голос пресвятой:\nТворец вселенной говорит со мной.\nОн мне дарит мечту о дивном дне,\nКогда я окажусь в Его стране.\n\n    Доверься Мне, войду в твою беду,\n    В долине плача Я тебя найду.\n    Ты верь и жди, и явью станут сны \n    В Моей стране блаженства и весны.\n\nПрошли года, но до сих пор со мной \nТот голос Божий дивный и святой.\nПорой его грехом я приглушал,\nНо он всегда, всегда во мне звучал.\n\nБыть может, день желанный тот далёк,\nНо верю я, что после всех тревог, \nОкончив путь земной, я буду с Ним,\nС незримым ныне Господом моим."}, {"id": 968, "title": "В дикой пустыне воды нет и жизни, лишь раскалённый песок;", "text": "В дикой пустыне воды нет и жизни, лишь раскалённый песок;\nИз рабства Египта в блаженное Царство Божий народ идёт. \nВидели очи дела святые, что Господь сотворил;\nСлавили Бога, Бога живого, Бог чудеса творил.\n\nОткрылось небо, и падала манна на раскалённый песок;\nНо среди манны я слёзы увидел - плакал великий Бог:\n«Дети Мои, Мои дорогие, Я вас Своими назвал,\nИз рабства Египта в блаженное Царство Я вас одних позвал.\n\nЗачем же роптать вам, зачем же не верить в любовь Мою и благодать? \nЧермное море сегодня свидетель: Я вас пришёл спасать.\nМёртвые скалы по воле Бога будут вам воду давать.\nВерьте Мне, дети, не бойтесь пустыни, Я буду вас охранять».\n\nВремя умчится быстрой стрелою, трудный окончится путь.\n«Беды пустыни, боль и тревоги, - скажет Иисус, - забудь!\nДети Мои, Мои дорогие, небо открыто для вас!»\nПрощайте, люди, прощай, пустыня, Бог забирает нас."}, {"id": 969, "title": "Как хорошо, что есть у нас Господь,", "text": "Как хорошо, что есть у нас Господь,\nОн силы зла все смог перебороть;\nКак хорошо, что мы Его семья,\nМой брат, сестра, и вместе с вами я.\nКак хорошо, что я уже не тот,\nЧто раньше жил среди одних невзгод,\nКак хорошо, что я могу прийти \nК Тебе, мой Бог, и прошептать: «Прости!»\n\n    Ты к Нему преклонись, ты Ему помолись, \n    Oн ответит, пе заставит ждать.\n    Если сердце болит, On его исцелит,\n    Свою жизнь тебе Он хочет отдать \n    (И скорбь твою забрать).\n\nКак хорошо, что знаю я Тебя,\nЗаслуга в этом только не моя;\nКак хорошо, Ты Сам ко мне пришёл,\nНе я Тебя, но Ты меня нашёл!\nКак хорошо, я больше не один,\nСо мной Господь, мой добрый Господин!\nКак хорошо, что Он хранит меня.\nМой Боже, слышишь: «Я люблю Тебя!»"}, {"id": 970, "title": "О Христос, я Тебя молю: не оставь меня в трудный час,", "text": "О Христос, я Тебя молю: не оставь меня в трудный час,\nТы же знаешь, что я люблю глубину Твоих вечных фраз. \nПосылаешь Ты дождь и снег, на полях Ты взращаешь хлеб,\nИ, конечно, Ты любишь всех, даже тех, кто духовно слеп.\n\n    Ты - на раны святой бальзам, Ты и в буре, и Ты в тиши, \n    Чтоб войти в Твой небесный храм, надо верить от всей души. \n    И я верю, что Ты мой Бог, Ты с души снял тяжёлый груз, \n    Отдаю Тебе каждый вздох, своё сердце Тебе, Иисус!\n\nТы взыскал меня и нашёл, перекинул чрез бездну мост, - \nИ я смело вперёд пошёл, чтоб увидеть алмазы звёзд.\nИ когда я уйду с земли, чтоб предстать пред Своим Отцом,\nНе отвергни меня, прими в Свой небесный и вечный Дом."}, {"id": 971, "title": "У дикого гуся могучие крылья,", "text": "У дикого гуся могучие крылья,\nВ далёком полете широк их размах. \nНемного старанья, немного усилья - \nИ он высоко-высоко в облаках.\n\nУ ласточки крылья, у голубя тоже...\nА я, человек, не умею летать,\nНо крылья молитвы Ты дал мне, мой Боже, \nОни меня могут над миром поднять.\n\nКогда человек начинает молиться,\nУ птиц перелётных растерянный вид;\nВедь птицам приходится посторониться, \nДорогу молитвам людей уступить.\n\nЯ много богаче, счастливее птицы,\nНа крыльях молитвы лечу высоко.\nТе светлые крылья не знают границы, \nНесут мою душу неслышно, легко.\n\nБесшумные крылья, могучие крылья \nМой дух поднимают над грешной землёй.\nНемного старанья, немного усилья -\nВ полёте молитвы для сердца покой."}, {"id": 972, "title": "Пред Тобою я склоняюсь головой своею,", "text": "Пред Тобою я склоняюсь головой своею,\nЯ взываю, я молю: услышь меня, Господь.\nО, сокрой меня от бед Ты любящей рукою:\nЯ устал, измучен, одинок.\n\n    На земном пути тысячи дорог,\n    Но найти свой путь нелегко, нелегко.\n    Если путь Христа в жизни выбрал ты - \n    В светлый, чудный край он приведёт.\n\nПред престолом благодати я склонюсь в моленье, \nСердцем буду говорить с Тобой наедине.\nТолько Ты один поймёшь сердечные мученья \nИ пошлёшь покой моей душе."}, {"id": 973, "title": "Приходи, Иисус, ко мне. Приходи и в ночной тишине,", "text": "Приходи, Иисус, ко мне. Приходи и в ночной тишине,\nПриходи, когда в сердце грусть,\nПриходи, когда я страшусь, приходи, когда я молюсь.\n\nИ когда Ты придёшь ко мне, станет добрым всё на земле;\nИ страдания горькую чашу я\nС радостью приму за Тебя, потому что со мною Ты.\n\nВ этом мире, суровой тьме, очень нужен, Иисус, Ты мне.\nДай же силы, Создатель, так прожить,\nЧтоб обители вечной мне достичь, чтобы быть навсегда с Тобой."}, {"id": 974, "title": "Я хотел бы молиться, как молится ночью сосна,", "text": "Я хотел бы молиться, как молится ночью сосна, \nУстремившись верхушкою ввысь,\nВся смиренья и благоговенья полна.\nБог сказал мне: «Смотри и учись».\n\n    Смотри и учись, Я примеры святые даю!\n\nИ хотел бы я славить, как славит безмолвно звезда,\nЧьи лучи, как елей, разлились,\nВ прославленье своём постоянно светла и чиста.\nБог сказал мне: «Смотри и учись».\n\nИ хотел бы я плакать, как плачут порой небеса,\nЧто весенним дождем пролились;\nЭта влага чиста, как поутру на розах роса.\nБог сказал мне: «Смотри и учись».\n\nЯ хотел бы склониться пред Ним, как колосья в полях,\nЧто зерном золотым налились;\nВ них чем больше зерна, тем всё ниже склоняются в прах. \nБог сказал мне: «Смотри и учись».\n\nЯ хотел бы страдать, как страдают снопы на току,\nЧто под взмахом цепов улеглись,\nЧтоб потом в жерновах превратиться тем зёрнам в муку. \nБог сказал мне: «Смотри и учись».\n\nЯ хотел бы воскреснуть, навек со Спасителем быть, - \nБог сказал мне: «Покрепче держись\nИ уроков Моих бесконечную светлую нить\nПринимай, и смотри, и учись!»"}, {"id": 975, "title": "№975", "text": "№975\n\nТолько Ты охраняешь меня тёмной ночью, в течение дня,\nТолько Ты окрыляешь мечты, к небесам их влечёшь только Ты.\n\nТы мне песни даришь и стихи, каменистые тропы и мхи.\nКак я счастлив, с Тобой говоря, когда утром алеет заря.\n\n    Только Ты, только Ты видишь душу мою с высоты.\n    Только Ты, только Ты, только Ты Мой единственный, преданный Друг.\n\nКогда звёзд загорается рой, Ты опять неизменно со мной;\nКогда Ты посылаешь росу, я к Тебе своё сердце несу.\n\nНету в жизни минуты одной, когда б не был Ты нежен со мной \nВ моей жизненной трудной борьбе, - чем за это воздам я Тебе?"}, {"id": 976, "title": "Боже, нивы побелели и стоят.", "text": "Боже, нивы побелели и стоят.\nКто же встанет и пойдёт тс нивы жать?\nНад полем тишина...\nКто-то погибает в этом мире бед,\nЧто же, что ты будешь делать, человек?\nНо ты всё стоишь в стороне, живя для себя, и молчишь.\n\n    Только не молчи, слышишь, не молчи,\n    Людям расскажи, правду расскажи,\n    Как Он умирал, за тебя страдал,\n    За твои грехи жизнь Свою отдал.\n    И пускай в ответ - ненавистный смех,\n    Ты иди за Ним и неси свой крест,\n    Божьи нивы ждут твоего труда,\n    Кто возьмёт свой крест и пойдёт в поля?\n    Вот я! Ты пошли меня.\n\nКто-то терпит боль пред миром за тебя,\nТы же только хочешь сохранить себя.\nУдобнее в тени...\nБоже, помоги, чтоб вышли мы в поля.\nБоже, помоги, чтоб жизнь прожить не зря,\nИ святое Слово Твоё пускай соберёт твой народ."}, {"id": 977, "title": "Мой Господь, в этот час я склоняюсь в мольбе,", "text": "Мой Господь, в этот час я склоняюсь в мольбе,\nИ все нужды свои приношу я Тебе;\nВ жизни бурь и тревог Ты укроешь меня,\nПуть весь знаешь, мой Бог, он не скрыт от Тебя!\n\n    Ты, Господь, моя любовь, моя, щит мой и скала, \n    Ведь Ты моя защита и опора!\n    Ты, Господь, моя любовь, моя, в Тебе укроюсь я, \n    Ведь Ты моя защита и опора!\n\nНе страшна мне с Тобой даже смертная тень,\nОбрету я покой в небе в солнечный день.\nЗнаю, слёзы мои Ты с любовью отрёшь,\nВсе ошибки пути Ты простишь и поймёшь.\n\nА пока на земле буду петь я в скорбях,\nОт души восхвалять, ожидая Тебя.\nЗнаю, скоро придёшь, скоро встречу Тебя,\nСвою Церковь возьмёшь от страданий и зла."}, {"id": 978, "title": "Перед нами пролегла светлая дорога жизни.", "text": "Перед нами пролегла светлая дорога жизни.\nНам открыл её Христос, и ведёт она к Отчизне,\nПосылает нам свои радости, порой - тревоги.\nВыбор в жизни лишь один: с Богом жить нам иль без Бога.\n\n    Молодость, юность - прекрасные дни,\n    Пусть будут только для Бога они.\n    Чтоб небесцельно нам жизнь прожить,\n    Нужно её лишь Христу посвятить.\n    Молодость, юность ты Богу отдай,\n    С Ним по дороге смелее ступай,\n    С Ним будет радостной вечно душа,\n    Если ты жизнь посвятишь для Христа.\n\nБыстро наша жизнь летит и так быстро увядает.\nЖизни огонёк горит, дни проходят - угасает,\nПо оставить добрый след нам завещано от Бога,\nРадость в мир нести и свет, хоть трудна порой дорога."}, {"id": 979, "title": "О, благодать! Спасён Тобой, я был мёртв и стал живой.", "text": "О, благодать! Спасён Тобой, я был мёртв и стал живой. \nО, благодать! В душе рассвет, я был слепой и вижу свет. \nСперва внушила сердцу страх, затем дала покой,\nЯ скорбь души излил в слезах, Твой мир течёт рекой.\n\nПрошёл немало я скорбей, невзгод и чёрных дней,\nНо ты всегда была со мной, ведёшь меня домой.\nСловам Господним верю я, моя вся крепость в них,\nОн верный щит, Он часть моя во всех путях моих.\n\nКогда же плоть моя умрёт, придёт борьбе конец,\nМеня в небесном доме ждёт и радость, и венец.\nПройдут десятки тысяч лет, забудем смерти тень,\nА Богу так же будем петь, как в самый первый день"}, {"id": 980, "title": "Молодёжь вас поздравляет с новым годом в эту ночь,", "text": "Молодёжь вас поздравляет с новым годом в эту ночь,\nСил в пути земном желает, чтобы всё вам превозмочь. (2 раза)\n\nВсе благие начинанья да поможет Бог свершить!\nВы примите пожеланье: в мире этом светом быть! (2 раза)\n\nЦерковь Божия, родная, мы тобою дорожим!\nБлагодарность выражая, мы вам песню посвятим. (2 раза)\n\nВам спасибо за заботу, за любовь и доброту,\nВы через свою работу привели нас ко Христу. (2 раза)\n\nВскоре наш Господь вернётся, вручит вам венец святой,\nИ мы вместе вознесёмся в Град священный золотой. (2 раза)"}, {"id": 981, "title": "Есть ли цель в жизни у нас, молодых? Если есть, то какая, скажите?", "text": "Есть ли цель в жизни у нас, молодых? Если есть, то какая, скажите? \nЦель всех стремлений - Обитель святых, её обрести вы стремитесь.\n\n    Наше стремленье - Бога познать как личного близкого Друга. \n    Цель - познавать, Его познавать, лучшего Друга избрать.\n\nЦель нашей жизни: Иисусу служить,людям всем возвестить путь спасенья, \nВсем рассказать о том, как Христос, любя нас, свершил искупленье.\n\nЖизнь лишь однажды даётся тебе, посвяти же её на служенье.\nОн даст победу в житейской борьбе, в награду даруя спасенье.\n\nТак поспеши же Иисуса познать, сердцем всем на Него уповая. \nЦель нашей жизни всей - Бога избрать, войти вместе с Ним в двери рая."}, {"id": 982, "title": "Юность - весна наших дней для жизни твоей и моей,", "text": "Юность - весна наших дней для жизни твоей и моей,\nНо быстро проходит она, как будто по небу луна.\nВедь вся наша жизнь словно пар; и дни улетают вдаль,\nНам можно их лишь вспомянуть, но больше уж их не вернуть.\n\nВспомни о том, как ты жил, чем Богу ты в жизни служил,\nИ что ты Ему, друг, принёс, идя здесь долиною слёз.\nБыть может, напрасно прожил и временем не дорожил,\nИ Богу хвалы не вознёс, хоть в жизни встречал много роз!\n\nО молодёжь, ты сильна, ведь ты победила врага!\nИисусу Христу послужи, заблудших к Нему приведи!\nВо всём Он поможет тебе, успешна ты будешь везде,\nНо лишь на Христа ты взирай и лишь на Него уповай.\n\nЦерковь Свою возлюбя, Христос отдал в жертву Себя,\nЧтоб в небо её взять с Собой и дать ей желанный покой. \nПрославь же Иисуса Христа в свои молодые лета,\nТрудись для Него, молодёжь, венец золотой обретёшь!"}, {"id": 983, "title": "Господь, я славлю Тебя за всё, что сделал Ты,", "text": "Господь, я славлю Тебя за всё, что сделал Ты,\nЧто крестной смертью Своей спасаешь от беды.\nЯ за Тобою пойду, куда б Ты ни позвал меня.\nЯ славлю Тебя и лишь Тебя люблю.\n\n    Пусть Твой огонь сожжёт всё, что Тебе мешает. \n    Пусть Дух Святой дождём прольётся в жизнь мою. \n    Я славлю Тебя, Тебе всю жизнь я посвящаю!\n    Ты мой Господь, Иисус!\n\nИ буду славить Тебя всем сердцем я своим.\nО том, что Ты совершил, я расскажу другим.\nВсем моим сердцем молюсь Тебе, Господь, в тиши.\nМой Бог, я славлю Тебя, Творец моей души.\n\nГосподь, скала Ты моя, Тобою я спасён;\nЛюбовь безмерна Твоя, мир ею озарён.\nЯ за Тобою пойду, куда б Ты ни позвал меня.\nЯ славлю Тебя и лишь Тебя люблю."}, {"id": 984, "title": "Шествуем к небу дорогой тернистой. Господи помощи руку подай.", "text": "Шествуем к небу дорогой тернистой. Господи помощи руку подай.\nУзок мой путь и порой каменистый.\nО Иисус, Ты меня не оставь!\nТы научи меня, Боже всесильный,\nСкорби и слёзы Тебе лишь нести,\nВерю, придёт день, когда я услышу:\n«О верный сын, в новый город войди!»\n\n    Дорогу в небо открыл Ты, Боже,\n    Для тех, кто вверил себя Христу.\n    Как я хочу с Тобой быть тоже,\n    Всего себя, Господь, Тебе даю.\n\nРадостью сердце моё наполняешь,\nИ боли плоти моей не слышны.\nДухом Святым Ты мой дух посещаешь.\nО мой Господь, меня в Дом Твой введи! \nКак пилигрим на пути я встречаю \nМного преград и неверных путей,\nНо ждёт меня в небе, твёрдо я знаю,\nМой лучший Друг, с Ним не будет скорбей."}, {"id": 985, "title": "Воспойте для Господа песню славы! (3 раза)", "text": "Воспойте для Господа песню славы! (3 раза)\n\n    Воспойте Ему! Воспойте Ему!\n\nЗа все чудеса Его прославляйте! (3 раза)\n\nВедь милость Его вовеки пребудет. (3 раза)\n\nЗа то, что Он нас крестил Святым Духом. (3 раза)\n\n    Воспойте Ему! Воспойте Ему!\n    Воспойте Ему во славу Его!"}, {"id": 986, "title": "Если ждёт тебя дорога в неизвестный край,", "text": "Если ждёт тебя дорога в неизвестный край,\nНа прощанье у порога думы не гадай,\nСлово доброе послушай и совет прими:\nВ этом мире гибнут души - ты свою храни (2 раза).\n\nЕсли ждёт тебя дорога в неизвестный край, \nСпутником себе тревогу ты не выбирай,\nС ней душе одна забота и тоска в пути,\nВ звёздном небе будто кто-то потушил огни (2 раза).\n\nЕсли ждёт тебя дорога в неизвестный край,\nНе суди упавших строго, лучше поднимай;\nМожет, скоро, став бессильным, где-то упадёшь, \nОслабеют сердца крылья, веру надорвёшь (2 раза).\n\nЖизнь кипит вокруг как море, бьёт тебя волной,\nИ в своём огромном горе, ты для всех чужой; \nПомощь есть для всех у Бога, ты к Нему взывай, \nЕсли ждёт тебя дорога в неизвестный край (2 раза)."}, {"id": 987, "title": "Тебя мы провожаем, ты будешь далеко,", "text": "Тебя мы провожаем, ты будешь далеко,\nТебе там будет, знаем, порою нелегко.\n\nО нас в пределах дальних ты будешь вспоминать,\nИ в помыслах печальных ты будешь тосковать.\n\nТогда в скорбях незримых приди к Творцу в мольбе \nО нас, друзьях любимых, а также о себе.\n\nМолись о процветанье той церкви, где ты был,\nИ где в единстве с нами ты Господу служил.\n\nМы за тебя, как прежде, молиться будем впредь, \nЧтоб, радуясь надежде, общенье нам иметь.\n\nТогда союз молитвы нас в жизни укрепит\nДля тяжких дел, для битвы, и труд наш утвердит."}, {"id": 988, "title": "Мир вам! Настал общения час.", "text": "Мир вам! Настал общения час.\nМир вам! И мы приветствуем вас.\nМир вам! Пусть будет слышен смех детей,\nМир вам и больше радостных дней!\nМир вам! Сердца пусть будут добрей.\nМир вам! Вы не судите людей.\nМир вам и вашим близким, и друзьям!\nМир, братья, сёстры, вам!\n\n    Мир вам, братья у сёстры!\n    «Мир вам!» - так же просто вы говорите всем друзьям. \n    Мир вам! Мир с любовью, счастья и здоровья!\n    Мир, братья, сёстры, вам!\n\nМир вам! И пусть Господь вас хранит.\nМир вам! Пусть крепче дом ваш стоит.\nМир вам! Пусть крепнет вера каждый час.\nМир вам! Пусть враг отступит от вас.\n«Мир вам!» - мы говорим в этот час.\nМир вам! Пусть не покинет он вас.\nМир вам! Конца не будет вашим дням.\nМир, братья, сёстры, вам!"}, {"id": 989, "title": "Прекрасен и дорог общенья круг, нам так хорошо, когда рядом друг.", "text": "Прекрасен и дорог общенья круг, нам так хорошо, когда рядом друг. \nГосподь в этот миг посетил всех нас, но вновь наступил прощанья час.\n\n    Но радости вечной не отнять,\n    И хоть расстаёмся мы опять:\n    На небе не будет прощаний, слёз,\n    Нас всех съединит Иисус Христос.\n\nЗемная разлука приносит, жаль, для наших сердец лишь одну печаль, \nЛишь в небе исчезнет разлуки след, нас всех озарит там вечный свет.\n\nЖивая надежда не гаснет пусть, в земных расставаньях развеет грусть. \n«До встречи!» друг другу мы говорим, ведь в славе небес мы будем с Ним!\n\nНа небе мы вечно будем с Ним, Он слёзы отрёт, даст покой святым. \nПусть Бог сохранит нас до этих дней, чтоб к вечности нам идти бодрей."}, {"id": 990, "title": "Расставаясь, не будем печальны, расставаясь, не будем грустить,", "text": "Расставаясь, не будем печальны, расставаясь, не будем грустить, \nМы еще повстречаемся с вами, будем Бога об этом просить.\n\nМы в общении с вами забыли все печали, что есть на земле.\nКак хотелось, чтоб вместе мы были не часы, а тысячи лег.\n\nВсе дороги пусть будут открыты, пусть открытыми будут сердца.\nНикогда пусть не будут забыты на земле всех друзей адреса.\n\nМы ещё повстречаемся с вами, день тот будет бесспорно велик. \nПусть исполнится наше желанье, будем Бога об этом просить."}, {"id": 991, "title": "Вот и опять прощание, снова вокзал и дороги...", "text": "Вот и опять прощание, снова вокзал и дороги...\nПоследнее пожелание, краткое слово: «С Богом!»\n\n    С Богом в дорогу дальнюю, с Богом на труд и страдания. \n    Видно далёкое зарево. С Богом, друзья, до свидания!\n\nСкоро ль придётся встретиться в жизненном море скитаний?\nА горизонт уж светится. С Богом, друзья, до свидания!\n\nЖизнь наша скоротечная, в небо - одно лишь желание.\nНа смену придёт жизнь вечная, скажем: «Земля, до свидания!»"}, {"id": 992, "title": "Господь нам встречу подарил и даровал Своё общенье,", "text": "Господь нам встречу подарил и даровал Своё общенье,\nВ Себе нас всех объединил не на года, не на мгновенья, \nПромчатся дни, пройдут года, и в волосах мелькнут сединки, \nНо будем вместе мы всегда, сердцами вместе мы всегда,\nТеперь мы с Господом едины!\n\nКакую радость Ты нам дал, какое совершил Ты чудо,\nЧто вместе всех нас Ты собрал, чужих, разбросанных повсюду.\nРазлук не будет никогда и станут радостнее встречи, \nИ будем вместе мы всегда, сердцами вместе мы всегда,\nКак в этот теплый тихий вечер.\n\nХвала, хвала Тебе, Господь, хвала Тебе не умолкает!\nИ Твой искупленный народ Тебя в молитвах прославляет.\nТы Утешителя нам дал, вошёл в сердца святой любовью, \nВ Тебе едины мы всегда, с Тобою вместе мы всегда, \nСроднённые Твоею Кровью!"}, {"id": 993, "title": "Тает день как воск от свечки, а мы вам споём о вечном.", "text": "Тает день как воск от свечки, а мы вам споём о вечном.\nСлава Господу, что вместе нас собрал.\nСлава, слава, слава Богу, что не бросил нас в дороге,\nВ трудный миг нам руку помощи подал.\n\nСвоей чистою слезою, как спасительной водою,\nОт греховной жизни нас спасал не раз.\nЧтоб мы были мира солью, нас омыл святою Кровью,\nЧрез Евангелие к служенью нас призвал.\n\nИ пока ещё мы дышим, дай нам, Боже, силы свыше\nСвоих близких и любимых привезти,\nЧтобы в вечности однажды мог друг друга встретить каждый,\nИ Твою защиу, Боже, обрести."}, {"id": 994, "title": "Здесь на земле мы только странники, среди скорбей наш путь идёт,", "text": "Здесь на земле мы только странники, среди скорбей наш путь идёт, \nПорою ноги от усталости болят, но в небе Родина нас ждёт!\n\n    Там (там, там) в небесах ангелы поют.\n    В синих небесах Родина нас ждёт!\n\nГорьки разлуки, расставания, но в небе боль души уйдёт, \nУвидимся у ног Спасителя Христа, там в небе Родина нас ждёт!\n\nБлагую весть несите всем сердцам, что нас Отец к Себе зовёт,\nЧто велика любовь Спасителя Христа, и в небе Родина нас ждёт!"}, {"id": 995, "title": "Мы окончили собранье и домой идём.", "text": "Мы окончили собранье и домой идём.\nВсё, о чём вещало Слово, для себя возьмём.\n\n    Мирно, кротко и спокойно мы домой пойдём, \n    Сохраним Его уроки и плод принесём. (2 раза)\n\nБудем вместе собираться для общенья с Ним,\nЧтоб услышать Слово правды, ведь Его мы чтим.\n\nДает Бог жизни, мы сойдёмся на собранье вновь \nВ будни или в воскресенье чтить Его любовь."}, {"id": 996, "title": "Возьми меня, Господь, с Собою, куда бы путь мой ни лежал.", "text": "Возьми меня, Господь, с Собою, куда бы путь мой ни лежал.\nЯ жить хочу одним Тобою, ведь Ты один за нас страдал.\n\n    С Тобою в путь я отправляюсь, Ты освещаешь мне его,\n    С весёлым сердцем я подвизаюсь, и пе боюсь я ничего. (2 раза)\n\nПускай ничто не затуманит мой взор духовный никогда.\nВ день искушенья пусть Он манит меня, как яркая звезда.\n\nВблизи Христа жизнь совершенна, она вся счастием полна,\nПолна небесного блаженства, ей юность вечная дана."}, {"id": 997, "title": "Господь, останься Ты со мной среди греховной суеты,", "text": "Господь, останься Ты со мной среди греховной суеты,\nЛишь у Тебя душе покой, отрада для меня лишь Ты.\n\nВо мне пороков всех не счесть, Ты избавленье совершил,\nУ ног Твоих хочу обресть бальзам целебный для души.\n\nХочу всем сердцем, всей душой принадлежать Тебе, Бог мой, \nВ моём Ты сердце Сам живи живым источником любви.\n\nСреди гонений и скорбей храни меня в руке Своей,\nХочу быть верным до конца, чтоб быть в обителях Отца."}, {"id": 998, "title": "Боже мой, молю Тебя, Ты услышь с небес меня,", "text": "Боже мой, молю Тебя, Ты услышь с небес меня,\nОбрати ко мне Свой лик, Ты ведь милостью велик.\n\n    С миром нас Ты распусти (распусти),\n    Как идти нам, укажи (укажи),\n    Чтобы в мире сём земном (сём земном)\n    Не дружили мы с грехом (мы с грехом).\n\nБлагодать Твоей любви в наше сердце Сам вложи,\nДай нам Твой святой покой, ведь народ мы, Боже, Твой.\n\nМы молитву вознесли, Ты услышь нас от земли.\nВерим мы, настанет час: Ты возьмёшь к Себе всех нас."}, {"id": 999, "title": "Как кратки всё ж прекрасные мгновенья", "text": "Как кратки всё ж прекрасные мгновенья\nВоскресного покоя на земле!\nВ земной юдоли день сей - утешенье, \nГрядущей славы весть несёт он мне.\n\nО Боже, пусть Твой Дух мной управляет, \nВеди меня по правому пути;\nДай твёрдость мне, когда враг угрожает,\nК блаженной цели, Боже, дай дойти."}, {"id": 1000, "title": "Благодать Христа Иисуса, вечная любовь Отца", "text": "Благодать Христа Иисуса, вечная любовь Отца \nИ залог Святого Духа да исполнят нам сердца.\n\nСчастье - быть соединённым нам друг с другом во Христе, \nКротким и душой смиренным, жить для Бога в простоте.\n\nИ тогда в союзе будем мы друг с другом и Христом - \nБольшей радости и счастья в этом мире не найдём! (Аминь)"}];
var SECTIONS = [["Перед началом собрания", 1, 18], ["Хвала и благодарение", 19, 74], ["Величие Бога", 75, 101], ["О Слове Божьем", 102, 111], ["Молитвенные", 112, 185], ["Божья любовь", 186, 208], ["Радость спасения", 209, 231], ["Союз со Христом", 232, 300], ["Вера", 301, 316], ["Упование и надежда", 317, 365], ["О чистоте сердца", 366, 382], ["Небесные обители", 383, 424], ["Путь в небеса", 425, 484], ["Утешение", 485, 510], ["На погребение", 511, 519], ["О Церкви", 520, 533], ["Единство общения", 534, 539], ["Отношение к людям", 540, 553], ["Призыв к труду", 554, 569], ["Евангельская весть", 570, 586], ["Призыв к покаянию", 587, 660], ["Дорожите временем", 661, 687], ["Рождество Христово", 688, 723], ["Воскресение Христово", 724, 748], ["О Духе Святом", 749, 763], ["На крещение", 764, 767], ["На хлебопреломление", 768, 780], ["Страдание и смерть Христа", 781, 822], ["Праздник Жатвы", 823, 839], ["Второе пришествие Христа", 840, 853], ["На бракосочетание", 854, 875], ["О семье", 876, 888], ["Для детей", 889, 919], ["На рукоположение", 920, 927], ["Молодёжные", 928, 985], ["Встречи и расставания", 986, 994], ["При заключении собрания", 995, 1000]];
var currentMode = 'all';
var currentList = DATA;
var currentHymn = null;
var lastQuery = '';
var favorites = [];
try { favorites = JSON.parse(localStorage.getItem('fav') || '[]'); } catch(e) {}

function render(items) {
    var list = document.getElementById('list');
    list.innerHTML = '';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('list').style.display = 'block';
    if (!items.length) { list.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">Ничего не найдено</div>'; return; }
    for (var i = 0; i < items.length; i++) {
        var h = items[i];
        var div = document.createElement('div');
        div.className = 'item';
        var title = h.title;
        if (lastQuery) { var re = new RegExp('(' + lastQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); title = title.replace(re, '<span class="highlight">$1</span>'); }
        div.innerHTML = '<div class="num">' + h.id + '</div>' + title;
        div.onclick = (function(hymn) { return function() { showLyrics(hymn); }; })(h);
        list.appendChild(div);
    }
}

function showLyrics(h) {
    currentHymn = h;
    document.getElementById('list').style.display = 'none';
    var d = document.getElementById('detail');
    d.style.display = 'block';
    var text = h.text.replace(/\n/g, '<br>');
    if (lastQuery) { var re = new RegExp('(' + lastQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); text = text.replace(re, '<span class="highlight">$1</span>'); }
    d.innerHTML = '<h3>' + h.id + '. ' + h.title + '</h3><p>' + text + '</p>';
    document.getElementById('bottomBar').style.display = 'flex';
    window.scrollTo(0, 0);
}

function search() {
    var q = document.getElementById('q').value.toLowerCase().trim();
    lastQuery = q;
    var pool = currentMode === 'section' ? currentList : DATA;
    if (!q) { render(pool); return; }
    var results = pool.filter(function(h) { return h.id.toString() === q || h.title.toLowerCase().indexOf(q) !== -1 || h.text.toLowerCase().indexOf(q) !== -1; });
    render(results);
}

function showAll() {
    currentMode = 'all'; currentList = DATA;
    setActive('btnAll'); document.getElementById('q').value = ''; lastQuery = '';
    render(DATA);
}

function showTOC() {
    currentMode = 'toc';
    setActive('btnTOC');
    var list = document.getElementById('list');
    list.innerHTML = '';
    for (var i = 0; i < SECTIONS.length; i++) {
        var s = SECTIONS[i];
        var div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = '<b>' + (i+1) + '.</b> ' + s[0] + ' — ' + s[1] + '-' + s[2];
        div.onclick = (function(sec) { return function() { showSection(sec); }; })(s);
        list.appendChild(div);
    }
    document.getElementById('detail').style.display = 'none';
    document.getElementById('bottomBar').style.display = 'none';
}

function showSection(sec) {
    currentMode = 'section'; currentList = DATA.filter(function(h) { return h.id >= sec[1] && h.id <= sec[2]; });
    setActive('btnTOC'); document.getElementById('q').value = ''; lastQuery = '';
    render(currentList);
}

function showFavorites() {
    currentMode = 'favorites';
    var favList = DATA.filter(function(h) { return favorites.indexOf(h.id) !== -1; });
    currentList = favList;
    setActive('btnFav');
    if (!favList.length) { document.getElementById('list').innerHTML = '<div style="text-align:center;padding:30px;color:#999;">Добавьте песни в избранное, нажав ⭐ рядом с номером</div>'; return; }
    render(favList);
}

function toggleFav() {
    if (!currentHymn) return;
    var idx = favorites.indexOf(currentHymn.id);
    if (idx === -1) favorites.push(currentHymn.id); else favorites.splice(idx, 1);
    localStorage.setItem('fav', JSON.stringify(favorites));
}

function setActive(btn) {
    document.getElementById('btnAll').classList.remove('active');
    document.getElementById('btnTOC').classList.remove('active');
    document.getElementById('btnFav').classList.remove('active');
    document.getElementById(btn).classList.add('active');
}

function back() {
    if (currentMode === 'section') render(currentList);
    else if (currentMode === 'favorites') showFavorites();
    else render(DATA);
}

function prevHymn() { if (!currentHymn || !currentList.length) return; var idx = currentList.findIndex(function(x) { return x.id === currentHymn.id; }); if (idx > 0) showLyrics(currentList[idx-1]); }
function nextHymn() { if (!currentHymn || !currentList.length) return; var idx = currentList.findIndex(function(x) { return x.id === currentHymn.id; }); if (idx < currentList.length-1) showLyrics(currentList[idx+1]); }

function toggleTheme() {
    document.body.classList.toggle('dark');
    document.getElementById('btnTheme').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : '');
}
if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); document.getElementById('btnTheme').textContent = '☀️'; }

document.getElementById('q').addEventListener('input', search);
document.getElementById('btnAll').addEventListener('click', showAll);
document.getElementById('btnTOC').addEventListener('click', showTOC);
document.getElementById('btnFav').addEventListener('click', showFavorites);
document.getElementById('btnTheme').addEventListener('click', toggleTheme);
document.getElementById('btnBack').addEventListener('click', back);
document.getElementById('btnPrev').addEventListener('click', prevHymn);
document.getElementById('btnNext').addEventListener('click', nextHymn);

showAll();
</script>
</body>
</html>
