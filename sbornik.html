 стали Кровию Христа.\n\n    Громко пойте: аллилуйя! (Громко пойте: аллилуйя!)\n    Бог нас спас и оправдал (Бог пас спас и оправдал).\n    Наши имена навеки (наши имена навеки)\n    В книгу жизни записал (в книгу жизни записал, навеки записал).\n\nНыне приступили не к Синаю мы,\nНас уж не пугают гром и молнии,\nСлово благодати слышим со креста,\nМы спаслись от гнева Кровию Христа.\n\nВерой и любовью мы теперь живём \nИ, омыты Кровью, к небесам идём.\nСветлая надежда веселит сердца,\nБудем жить вовеки Кровию Христа."}, {"id": 222, "title": "О, мира спасенье - святая любовь!", "text": "О, мира спасенье - святая любовь!\nЗа наше прощенье Христос пролил кровь;\nНаш мир искупил Он, дал радость, покой —\nВесь мир пусть ликует (3 раза), исполнен хвалой\n\nГрехов моих много, и тёмен мой дух,\nНо Слово Господне затронуло слух,\nИ сердце смирилось, и слезы я лью - \nГосподь Искупитель (3 раза) спас душу мою!\n\nО, дар несравненный, священный обет!\nГосподь заключил с нами вечный завет.\nОн наш Победитель, рассеял Он тьму.\nПою аллилуйя (3 раза) Христу моему!\n\nХочу я молиться и верить могу,\nЧто в Нём пораженье навеки врагу.\nОн светом небесным весь мир озарил.\nОсанна Иисусу (3 раза), Господу сил!\n\nВеликую славу, бессмертья венец,\nДарует мне в Нём всемогущий Отец.\nСольются пусть хоры земли и небес\nДля песни победы (3 раза): в Христе я воскрес!"}, {"id": 223, "title": "О, дивный день! О, дивный час! Когда Спаситель в первый раз", "text": "О, дивный день! О, дивный час! Когда Спаситель в первый раз \nС душой моей в завет вступил и мир мне в сердце подарил.\n\n    Дивный день, дивный день, когда Господь меня простил!\n    С тех пор Христос всегда со мной и водит Сам меня рукой. \n    Дивный день, дивный день, когда Господь меня простил!\n\nО, дивный день, когда Христос меня нашёл в долине слёз;\nОн мой теперь и я Его, и не страшусь я ничего.\n\nО, дивный день, когда простёр ко мне Он руку, я прозрел,\nКогда Христа увидел взор, и дух любовь Его воспел.\n\nО, дивный день, когда душой я к жизни радостной восстал,\nКогда и счастье, и покой Спаситель в душу мне послал.\n\nО, дивный день, когда душой поверил я в любовь Христа\nИ был омыт Крови струёй, стекавшей некогда с креста."}, {"id": 224, "title": "Иисус меня заблудшего нашёл,", "text": "Иисус меня заблудшего нашёл,\nОт насилья и оков освободил,\nИ ничто не может мир нарушить мой,\nОн меня навеки с небом примирил.\n\n    Да, во Христе спасение от зла и вечной тьмы!\n    В Нём радость, утешение и источник доброты!\n\nБез Христа я был несчастный и слепой,\nБез Христа в греховной тени я погряз,\nНо невидимой пронзённою рукой \nИисус меня от страшной смерти спас.\n\nСо Христом я буду вечно ликовать,\nСо Христом на небо в славу я приду,\nБуду Бога со святыми прославлять,\nБесконечный там покой душе найду."}, {"id": 225, "title": "Солнце - светлый дар любви, Дух заветный всепрощенья", "text": "Солнце - светлый дар любви, Дух заветный всепрощенья \nНам даруешь, Боже, Ты в знак святого примиренья.\n\n    Ты, Господь, моя надежда, моя радость и покой. \n    Милосердием безбрежным льётся Твой поток живой.\n\nБлагодать Твоя росой душу нежно омывает,\nИ святая Кровь струёй каждый раз грехи смывает.\n\nТы, Господь, за много лет до пришествия Христова \nДал нам Свой святой обет и ведешь нас к жизни новой."}, {"id": 226, "title": "Когда Христос меня простил, то землю в небо превратил;", "text": "Когда Христос меня простил, то землю в небо превратил;\nСреди скорбей, борьбы земной - там небо, где Христос со мной!\n\n    Хвала Христу! Он спас меня, простил грехи, открыл Себя! \n    На суше, в море, над землёй - там небо, где Христос со мной!\n\nНебесный мир мне был далёк, меня Христос к Нему привлек, \nКогда вошёл Он в жизнь мою, с тех пор о Нём всегда пою!\n\nНеважно, где теперь живу: на высоте, внизу во рву,\nВ стране родной, в стране чужой - там небо, где Христос со мной!"}, {"id": 227, "title": "Будем радоваться, братья! Прочь уныние и страх:", "text": "Будем радоваться, братья! Прочь уныние и страх:\nПринял нас Христос в объятья и хранит в Своих руках. \nБратья! радуйтесь о Боге, о Его святых делах,\nИ с восторгом, без тревоги воспевайте вы в сердцах.\n\nПрежде гибель нам всечасно здесь грозила на пути,\nНо Христос рукою властной нас призвал за Ним идти. \nБыли в рубищах мы бедных, ныне мы богаты в Нём, \nДрагоценные одежды Он нам даст в раю Своём.\n\nКак слепые, в тьме греховной мы блуждали средь путей; \nСвет небесный, свет духовный дал нам зренье для очей. \nЕсли б скорби, искушенья в жизни допустил Господь, — \nВера может все сомненья и печаль в нас побороть.\n\nПусть средь бед и испытаний в тайных помыслах сердец \nТвёрдо будет упованье: с нами Бог, благой Отец!\nРадость наша совершенна от Христа, не от людей,\nИ ничто во всей вселенной овладеть не может ей."}, {"id": 228, "title": "Ах, радость, радость будет там искупленным сердцам,", "text": "Ах, радость, радость будет там искупленным сердцам,\nКогда окончим жизнь свою и будем там в раю,\nГде жизни дерево с плодом там пред Спасителем Христом, \nГде Он, избавивший людей, царит в любви Своей!\n\n    Ах, что за радость там, радость там, радость там! \n    Ах, что за радость там спасённым будет нам,\n    Где все святые без числа поют Христу вдали от зла; \n    И мы там громко воспоём, когда свой путь пройдём.\n\nДорога узкая одна к спасенью нам дана,\nИ если ею не пойдём — навеки мы умрём;\nКогда ж путь узкий изберём, то, хоть и слёзы здесь прольём, \nМы там в блаженстве воспоём пред любящим Отцом.\n\nХристос воскрес, рассеяв страх, и вот в великий час \nВ пречистых, светлых небесах Он предваряет нас.\nАх, верьте, робкие друзья: есть вечной радости края;\nХоть тяжко, грустно в мире нам, зато спасенье там!"}, {"id": 229, "title": "О, как чудно сменён образ жизни моей —", "text": "О, как чудно сменён образ жизни моей —\nЛишь когда я Христа познал.\nИ в душе у меня свет сияет сильней —\nЛишь когда я Христа познал.\n\n    Лишь когда я Христа познал (познал),\n    Лишь когда я Христа познал (познал),\n    Радость в сердце моём бьёт горячим ключом, \n    Лишь когда я Христа познал.\n\nИ у ног Иисуса, учась, я сижу —\nЛишь когда я Христа познал.\nНепрестанно трудясь, я Ему служу —\nЛишь когда я Христа познал.\n\nЯ надежду обрёл, с нею путь мой светлей,\nЛишь когда я Христа познал.\nВозрастаю пред Богом я верой моей —\nЛишь когда я Христа познал.\n\nЯ иду в Град святой, где Господь ждёт меня — \nЛишь когда я Христа познал.\nИ шагаю вперёд к свету вечного дня-\nЛишь когда я Христа познал."}, {"id": 230, "title": "Буду петь, как Искупитель дух мой грешный возлюбил,", "text": "Буду петь, как Искупитель дух мой грешный возлюбил,\nКак страдал Он, Избавитель, и меня освободил.\n\n    Песнь звучит пусть об Иисусе (песнь звучит пусть об Иисусе)! \n    Кровью Он меня купил (Кровью Он меня купил),\n    На кресте меня простил Он (на кресте меня простил Он), \n    Долг мой взяв (освободил), освободил (освободил).\n\nБуду петь, как Искупитель славен вечным торжеством,\nИ силён, как победитель, Он над смертью и грехом.\n\nБуду петь, как Искупитель любит слабого меня;\nОн мне в рай путеводитель, вечно с Ним пребуду я!"}, {"id": 231, "title": "Да, я спасён, спасён я от блужданий", "text": "Да, я спасён, спасён я от блужданий \nПытливого и гордого ума.\nСпасён от сердца тягостных страданий \nПод ношею житейского ярма!\n\nСпасён от страха смерти, осужденья \nЗа гpex давно лелеемых страстей.\nСпасён от бездны вечного забвенья \nВо тьме среди томящихся теней!\n\nДа, я спасён! Спасён я не делами,\nНе мудростью людскою, не умом,\nНе жертвою тельцов и не дарами,\nНе тленным золотом, не серебром;\n\nСпасён я безграничною любовью \nИ силою живительной Христа.\nСпасён невинною и чистой Кровью, \nПролитою с Голгофского креста.\n\nДа, я спасён! Пусть лев мне угрожает, \nПусть шепчет смертный приговор закон, \nПусть тьма неверья пытки собирает:\nЯ не страшусь! Я знаю: я спасён!\n\nИ больше чем спасён — насыщен хлебом, \nНапоен я живительной водой,\nОбогащён дарами, принят небом\nИ просветлён негаснущей зарёй.\n\nДа, я спасён! Не гордости то слово —\nТо песня славы Спасшему меня,\nТо клич о пристани, спасти готовой, \nТому, кто гибнет так, как гибнул я.\n\nДа, я спасён! Поставлен на твердыне, \nСокрыт под крыльями любви святой,\nИ не прервётся песнь моя отныне:\nХвала, хвала Тебе, Спаситель мой!"}, {"id": 232, "title": "Я люблю размышлять (2 раза) о Спасителе дивном Христе.", "text": "Я люблю размышлять (2 раза) о Спасителе дивном Христе.\nЯ хочу рассказать (2 раза), что со мной Он всегда и везде.\n\n    Хорошо (хорошо и легко) и легко (хорошо и легко),\n    Когда я в союзе с Христом;\n    Хорошо (хорошо и легко) и легко (хорошо и легко)\n    Через скорби пройти с Ним вдвоём.\n\nВ небесах, в небесах (2 раза) дорогая Отчизна моя;\nВ небесах, в небесах (2 раза) я увижу во славе Христа!\n\nНа земле, на земле (2 раза) одна лишь печаль, суета,\nНа земле, на земле (2 раза) нет отрады душе без Христа.\n\nСъединимся, друзья (2 раза), во единую Божью семью,\nБудем ждать мы Христа (2 раза), Он возьмёт нас в родную страну."}, {"id": 233, "title": "И вот промчится ещё день, такой же, как и все,", "text": "И вот промчится ещё день, такой же, как и все,\nВсё те же будни, та же грусть, когда Христа в нём нет.\nИ лишь с Тобой всегда светло: и в дождь, и в град, и в снег. \nИ на душе всегда легко, когда Ты рядом есть.\n\n    Иисус, о Иисус! Тебя увижу я когда?!\n    Иисус, о Иисус! С Тобою быть хочу всегда!\n\nПришёл к Тебе когда-то я и грусти не скрывал,\nСказал: «Прости, Иисус, меня», - и Ты мне руку дал.\nТой встречи день настанет вновь, и там увижу я \nТебя, Христос, моя любовь, что вёл меня, храня!\n\nМне не забыть Твоей любви, Твоих пронзённых рук,\nЧто подарили мне они спасение от мук.\nИ ведь с Тобой так хорошо и в дождь, и в град, и в снег,\nИ на душе всегда легко, когда Ты рядом есть!"}, {"id": 234, "title": "Почему Господь любил древнюю Вифанию?", "text": "Почему Господь любил древнюю Вифанию?\nКруг друзей там верных был, живших по Писанию.\n\nНужно всюду поступать по словам Евангельским \nИ стараться подражать жизни высшей, ангельской.\n\nБудет наш Господь любить новую Вифанию,\nЕсли каждый будет жить только по Писанию.\n\nХристианский путь тернист, доля наша трудная,\nНо грядущий день лучист - ждёт Обитель чудная!\n\nО! Держитесь за Христа, жители Вифании!\nПусть кругом гремит гроза - будьте твёрды в звании!"}, {"id": 235, "title": "Христос мой, как о Тебе молчать, как Тебя не благодарить?", "text": "Христос мой, как о Тебе молчать, как Тебя не благодарить?\nВедь Ты дал право Тебя познать и Твой свет всем людям дарить.\n\n    Не покидай меня, я быть хочу с Тобой \n    Каждый день и час, и миг земной!\n    Руку подай, любя, в вечность веди меня - \n    В мир счастья солнечного дня.\n\nТворец мой, Ты для людей лишь миф, для меня - Спаситель Христос, \nСоздатель неба, планет и звёзд, Утешитель горя и слёз.\n\nВсевышний, Ты нас благослови для труда во имя Христа,\nПошли нам больше добра, любви, чтоб не смолкли наши уста."}, {"id": 236, "title": "Дивный Спаситель, Христос, Ты самый лучший мой Друг,", "text": "Дивный Спаситель, Христос, Ты самый лучший мой Друг,\nВсё я Тебе отдаю (даю): сердце, любовь, красоту.\n\nВ мире блуждал далеко, в грехах неправде служил,\nНо Ты меня возлюбил (любил), Кровью грехи все омыл.\n\nПесню о ласке Твоей в сердце вселил Ты моё.\nДай силы крест свой нести (нести), верным Тебе быть во всём.\n\nДивный Спаситель, Христос, Ты самый лучший мой Друг,\nВсё я Тебе отдаю (даю): сердце, любовь, красоту."}, {"id": 237, "title": "Ты заботишься о многом, что на смерть осуждено;", "text": "Ты заботишься о многом, что на смерть осуждено;\nВ мире скорбном и убогом нужно только лишь одно.\n\n    Чтобы жить тебе в блаженстве,\n    Нужно только лишь одно:\n    Чтобы сердце в совершенстве было Богу отдано!\n\nО великих лаврах славы помышляешь ты давно,\nНо её пути лукавы, - нужно только лишь одно.\n\nО богатстве ты мечтаешь, но Христом разъяснено:\nС ним и небо потеряешь, - нужно только лишь одно.\n\nСколько в мире дел ненужных, лишних дел совершено; \nДля несчастных и недужных нужно только лишь одно.\n\nСердце с Господом в общенье, что Самим Творцом дано, \nСчастье - духа освященье! Вот что значит то одно!\n\nТам, у ног Христа в смиренье, сердце радостью полно. \nСкажем миру в наставленье: «Нужно только лишь одно!»"}, {"id": 238, "title": "И морозною зимой, и в жаркий летний день", "text": "И морозною зимой, и в жаркий летний день \nЯ нуждаюсь, мой Господь, в Твоей любви,\nПотому что без Тебя словно вымерла земля.\nМой Спаситель, будь, пожалуйста, со мной.\n\nКак отрадно сердцу быть с Тобой наедине \nИ внимать Твоим живительным словам,\nЖажду у толить души, говоря с Тобой в тиши; \nТвёрдо верю я - ведёшь меня Ты Сам.\n\nПролетают жизни дни, стирая в памяти \nТо, что было пустотой унесено.\nО, как жаль мгновений тех, проведённых в суете... \nТы прости меня и будь всегда со мной.\n\nПосвятить хочу себя служению Тебе,\nВсей душой Тебя любить и верным быть,\nСвято имя чтить Твоё за спасение моё,\nКаждый миг Тебя, Господь, благодарить."}, {"id": 239, "title": "Как стремится олень к потокам, так стремится душа к Тебе!", "text": "Как стремится олень к потокам, так стремится душа к Тебе! \nЖаждет Богу, вовек Живому, сердце славу петь в хвале.\n\n    Ты мой щит и моя опора, лишь Ты Хозяин души моей. \n    Сердце жаждет Тебе, Живому, в бесконечной петь хвале.\n\nТы мой Друг, Ты мой Брат любимый, хоть Ты Царь над землёю всей, \nНет другого, кого любил бы, как Тебя, Царя царей.\n\nБольше, чем серебра и злата, я желаю Тебя, Иисус!\nТы души моей отрада, сердцем я к Тебе стремлюсь."}, {"id": 240, "title": "Через всю жизнь, из года в год, в тоске, в нужде, в разлуке", "text": "Через всю жизнь, из года в год, в тоске, в нужде, в разлуке \nНас всех ведут, ведут вперёд невидимые руки.\n\nОни заботились о нас, несли, вели, держали;\nМы их присутствие не раз реально ощущали.\n\nОни ласкали нас порой, порою бичевали,\nВели с врагом в неравный бой, встречали, провожали.\n\nИ нам казалось иногда, что мы их потеряли,\nО, как мы плакали тогда, как их найти желали.\n\nНо в час, когда окончим путь, умолкнут речи звуки.\nНас в Отчий Дом перенесут невидимые руки.\n\nВ объятья примет нас Отец для жизни без разлуки,\nИ там увидим, наконец, невидимые руки."}, {"id": 241, "title": "В Иисусе нашёл я счастье, в Нём одном, знаю я, покой.", "text": "В Иисусе нашёл я счастье, в Нём одном, знаю я, покой. \nИисус, Ты мой Искупитель, Ты мой Бог, Я навеки Твой.\n\n    Иисус, Ты моя защита! Иисус, Ты мой щит и меч! \n    Иисус, Ты моя победа! Ты мой Царь, Ты мой Бог навек!\n\nНо, а если бывает в жизни нелегко по пути идти,\nТогда я говорю в молитве: «Иисус, Ты меня защити».\n\nС Иисусом пойду я смело, знаю, Он меня поведёт\nПо дороге к святой Отчизне, в Царство света и мир красот."}, {"id": 242, "title": "Нашёл я Друга одного, дороже всех на свете,", "text": "Нашёл я Друга одного, дороже всех на свете,\nПришёл освободить меня Он из греховной сети.\nОн сердце покорил моё Своей ко мне любовыо;\nОн мой теперь и я Его, святою куплен Кровью.\n\nНашёл я Друга одного, пошёл Он на мученье,\nЧтоб дать нам вечной жизни дар, чтоб нам купить спасенье. \nЧто я имею и достиг, своим я не считаю:\nМои таланты, жизнь и честь Ему я посвящаю.\n\nНашёл я Друга одного, меня хранить Он будет \nИ поведёт Своей рукой, вовеки не забудет.\nСиянье славы впереди, туда стремлюсь душою,\nЧрез скорбь и труд мой путь лежит к небесному покою.\n\nНашёл я Друга одного, Он чудный мой Спаситель;\nИ близок, верен Он всегда, всесильный Утешитель\nКакая сила разлучит с тем Другом несравненным?\nЯ навсегда соединён с Ним вечным, неизменным."}, {"id": 243, "title": "Тебя, мой лучший Друг, мой любящий Спаситель,", "text": "Тебя, мой лучший Друг, мой любящий Спаситель,\nХочу прославить я от всей души.\nБлагодарю Тебя, мой дивный Избавитель,\nЧто Ты со мною в буре, Ты со мной в тиши.\n\n    О, дай мне не забыть то чудное мгновенье,\n    О, дай мне не забыть Твою любовь, Отец.\n    Дай мне любить Тебя так искренно, так нежно, \n    Чтоб верен был Тебе я до конца, Творец.\n\nВернул Ты мне любовь, которая остыла,\nЗажёг светильник мой, когда угас.\nТеперь и жизнь в душе иная наступила,\nИ слёзы радости текут из моих глаз.\n\nТеперь веди меня Ты Сам Своей рукою,\nТебе хочу от сердца я служить,\nДай силы мне, Господь, остаться лишь с Тобою,\nВедь скоро Ты придёшь, дай только свято жить."}, {"id": 244, "title": "Счастлив я безмерно, спас меня Христос,", "text": "Счастлив я безмерно, спас меня Христос,\nК вечной жизни новой Он мой дух вознёс. \nЗову благодати всей душой я внял \nИ к ногам Иисуса трепетно припал.\n\n    За Христом пойду я в вечные края,\n    Ведь Его люблю я, в Нём вся жизнь моя!\n\nМир мне стал далёким, как к Христу пришёл, \nЯ покой и радость в Господе нашёл.\nГде ещё найду я счастья полноту?\nЛишь в Иисусе дивном мир я обрету!\n\nИ в краю небесном, где Господь живёт,\nБог Своей рукою слёзы мне отрёт.\nВ небе песнь победы буду воспевать,\nСо святыми вместе вечно пребывать."}, {"id": 245, "title": "Я нашёл себе спасенье, во Христе сокрылся я,", "text": "Я нашёл себе спасенье, во Христе сокрылся я,\nИисус меня наставил, успокоил Сам меня.\n\nИ никто не поколеблет мир души и не смутит;\nЕсли враг людей приходит - я в руках Христа сокрыт.\n\nЕсли я в пути устану, под крыло Его приду,\nИ для жажды утолсньс в Слове вечном я найду.\n\nИскупитель мой со мною, часто с Ним я говорю,\nНо беседы этой дивной передать я не могу!\n\nОн меня не отвергает, слыша жалобу мою,\nИ в нужде моей случайной руку мне даёт Свою.\n\nОн в несчастье ободряет, устраняет от греха,\nОн ведёт меня к спасенью, Он давно простил меня.\n\nЕсли вы узнать хотите счастье рая на земле,\nТо оставьте все сомненья и сокройтесь во Христе.\n\nНавсегда в душе решите пред лицом Его идти;\nОн вас любит бесконечно и поддержит на пути."}, {"id": 246, "title": "Я на жизнь рассчитывать не вправе, смерть меня не раз к себе звала.", "text": "Я на жизнь рассчитывать не вправе, смерть меня не раз к себе звала. \nКак же мне, Господь, Тебя прославить за Твои чудесные дела?\n\n    Чем воздать мне за Твои даянья? Я всегда перед Тобой в долгу. \n    Прихожу к Тебе я с покаяньем - это всё, что сделать я могу.\n\nТы провел через огни и воды и, хотя я истины не знал,\nУкрывал меня от непогоды, от врагов меня оберегал.\n\nЯ с Тобою сиротою не был, от меня Ты, Отче, недалёк.\nПод Твоим голубоглазым небом Ты мне дал спокойный уголок."}, {"id": 247, "title": "Иисус, Ты очень нужен мне, нет Тебя — и исчезает радость.", "text": "Иисус, Ты очень нужен мне, нет Тебя — и исчезает радость.\nЯ согласен крова не иметь, лишь бы Ты был постояно рядом.\n\nВ мире неуютно и темно, терпит бедствие земная дружба. \nОставайся, Иисус, со мной, Ты мне нужен, очень-очень нужен\n\nИисус, Ты мне необходим! Извлекаю из скорбей уроки:\nБез Тебя немыслимо идти по тяжёлой жизненной дороге."}, {"id": 248, "title": "Только в Иисусе счастлив я всегда,", "text": "Только в Иисусе счастлив я всегда,\nТолько в Иисусе отдых от труда;\nОн мой Друг, Который верен мне во всём. \nВерного Друга я нашёл лишь в Нём.\n\n    О, какое счастье другом быть Христа! \n    Этого не могут выразить уста,\n    Только моё сердце радуется в Нём,\n    В Иисусе, Друге дивном моём!\n\nДруг, с Которым вечно буду жить в любви, \nДруг, Который спас меня в Своей Крови, \nДоказал любовь Свою Он на кресте. \nВерного Друга я нашёл в Христе!\n\nСоюз вечной дружбы заключил со мной,\nС юных лет ведёт меня Своей рукой\nВ ту страну, откуда Он придет за мной,\nГде вечно буду ликовать душой!"}, {"id": 249, "title": "Я слышу голос Твой, зовёт меня к Тебе", "text": "Я слышу голос Твой, зовёт меня к Тебе\nОмыться Кровию святой, пролитой на кресте.\n\n    О Спаситель мой, прихожу к Тебе:\n    Кровию Твоей омой, пролитой на кресте.\n\nХоть слаб и грешен я, Ты силу мне даешь, \nСнимаешь грех, живишь меня, любовию влечёшь.\n\nЖизнь новую Свою Ты Сам во мне творишь,\nИ благодать на благодать Ты щедро мне даришь.\n\nТы сердцу весть даёшь, что я Твоё дитя,\nЧто Духом Ты во мне живёшь, а в Нём вся полнота.\n\nГосподь, Тебе хвала! Хвала Твоей любви!\nОтец небес, Тебе хвала! Хвалу от нас прими!"}, {"id": 250, "title": "Протяни ко мне святые руки и веди меня Своим путём,", "text": "Протяни ко мне святые руки и веди меня Своим путём,\nДай Твои мне помнить крест и муки и послушным быть Тебе во всём.\n\nПомоги мне за Тебя сражаться, прояви во всём Твою любовь, \nЧтобы с нею мог я подвизаться, за друзей молиться, за врагов.\n\nСоверши, Господь, моё желанье неразлучным быть всегда с Тобой, \nЧтоб любви Твоей святой дыханье наполняло грудь и разум мой."}, {"id": 251, "title": "Я хочу идти с Христом по тернистому пути,", "text": "Я хочу идти с Христом по тернистому пути,\nПребывать лишь только в Нём, в свете Слова и любви. \nИ поэтому всю жизнь я хочу в Христе пребыть,\nЧтобы ясно созерцать к людям Божью благодать.\n\nМир весь стонет во грехах среди этой тёмной мглы, \nПозабыв и стыд, и страх, хочет счастье в тьме найти.\nО, прости, Господь, меня, что не вижу я огня\nТой любви, что дал мне Ты, чтобы в мир я мог нести.\n\nДай мне, Боже, исполнять все слова Твоей любви\nИ Тебя лишь прославлять, не страшась ни зла, ни тьмы. \nЧтобы быть всегда с Тобой и найти душе покой,\nЧтобы вечность мне узреть и всегда Тебе лишь петь."}, {"id": 252, "title": "Если б Иисус меня встретил прямо среди дня,", "text": "Если б Иисус меня встретил прямо среди дня,\nНе как неба Властелин, просто Галилеянин,\nКак однажды, говоря у колодца Сихаря,\nРаспознал бы я Его - Спасителя моего?\n\n    Да, я узнал бы! Да, я узнал бы!\n    Душою узнал бы я Агнца Божьего.\n\nЧто бы делал я тогда средь волны сомнения,\nКак однажды Иисус по дороге в Эммаус\nДвум Своим ученикам вдруг явился странником, \nРаспознал бы я Его - Спасителя моего?\n\nБыл бы в Нём особый знак - в кротости - я б мог узнать \nАгнца Божьего везде: и в покое, и в труде.\nПо ребру и по рукам, по челу и по ногам \nРаспознал бы я Его - Спасителя моего!"}, {"id": 253, "title": "В часы тревог, унынья и сомненья,", "text": "В часы тревог, унынья и сомненья,\nНе видя света, света пред собой,\nДуша болит, терзается в волненье...\nСпешу, Господь, прийти к Тебе с мольбой.\n\n    Как счастлив я, что я Христа имею!\n    Как счастлив я, что Он всегда со мной! \n    Живу я Им - об этом не жалею.\n    Как счастлив я, что Он со мной, Друг мой!\n\nО образ дивный, кроткий и смиренный,\nХристос Господь, живи во мне всегда,\nЧтоб в сердце был моём запечатлённый,\nНе дал упасть под тяжестью креста.\n\nК кому пойду я в горести сердечной,\nС участьем кто протянет руку мне?\nЛишь Ты один с любовью бесконечной \nМеня простил, меня привлёк к Себе.\n\nНо мне порой так тяжело бывает \nИ кажется, оставил Бог меня.\nНо вновь душа словам Твоим внимает:\n«Я не оставлю, Я люблю тебя!»"}, {"id": 254, "title": "Господь есть истинный мой путь, ведущий к светлым небесам.", "text": "Господь есть истинный мой путь, ведущий к светлым небесам. \nОн мне сердце утешает, Своим словом ободряет,\nОсвещает путь ногам (2 раза). Господь есть истинный мой путь!\n\nГосподь - Хранитель мой и щит во время бури и невзгод,\nПод сенью крыл Своих хранит. «Не бойся», - сердцу говорит,\nЗа руку правую ведёт (2 раза). Господь - Хранитель мой и щит!\n\nГосподь есть часть моя вовек, Господь - моя твердыня.\nА я, ничтожный человек, так беден, нищ и наг, и слеп,\nНо им храним доныне  (2раза).Господь есть часть моя вовек!\n\nГосподь - спасение моё, источник вечной жизни.\nВ сердце веру Он вселяет, тайны неба открывает,\nОн прибежище моё (2 раза).Господь - спасение моё!"}, {"id": 255, "title": "Не уходи, Иисус, не уходи,", "text": "Не уходи, Иисус, не уходи,\nМне страшно без Тебя в земном пути,\nКак ночью одному в глуши лесной. \nПутеводитель, будь всегда со мной!\n\n    Я ошибаться с малых лет горазд,\n    Но Ты меня оберегал не раз. \n    Наставник! В мире столько зла и бед, \n    Не уходи, мне нужен Твой совет.\n\nПротивник много раскалённых стрел \nПускал, уже сразить меня хотел.\nЯ без Тебя не продержусь и дня,\nНаставник веры, не оставь меня!\n\nНе любящий других - кимвал и медь. \nСмысл жизни в том, чтобы любовь иметь, \nНо нет без Бога вечного огня.\nО Бог любви, не покидай меня!\n\nХочу я встретить вечную весну \nС Тобой, Господь, а если я усну,\nКак Лазаря в пещере, пробуди,\nОт смерти в жизнь меня переведи."}, {"id": 256, "title": "Течет ли жизнь мирно, подобно реке,", "text": "Течет ли жизнь мирно, подобно реке,\nНесусь ли на грозных волнах, - \nВо всякое время, вблизи, вдалеке \nВ Твоих я покоюсь руках.\n\n    Ты со мной (Ты со мной)! Да, Господь, (да, Господь) \n    В Твоих я покоюсь руках!\n\nНи вражьи нападки, ни тяжесть скорбей \nНе склонят меня позабыть,\nЧто Бог мой меня из пучины страстей \nВ любви восхотел искупить.\n\nЧто в мире сравнится с усладой такой?\nМой грех весь как сеть, целиком,\nК кресту пригвождён, и я Кровью святой \nИскуплен всесильным Христом.\n\nОт сердца скажу: «Для меня жизнь - Христос,\nИ в Нём мой всесильный оплот.\nСледы от греха, искушений и слёз \nС меня Он с любовью отрёт».\n\nГосподь! Твоего я пришествия жду,\nПринять мою душу гряди!\nЯ знаю - тогда лишь вполне я найду \nПокой у Тебя на груди."}, {"id": 257, "title": "Чтоб пасти народ избранный, Ты спустился к нам с небес,", "text": "Чтоб пасти народ избранный, Ты спустился к нам с небес, \nПастырь добрый, неустанный, милосердный наш Отец.\n\nЧей язык красноречивый, чьи блаженные уста\nНам расскажут, как счастливы овцы Пастыря Христа?\n\nЧто опасность нам и нужды? Разве силы нету в Нём?\nК злу мы будем вечно чужды с нашим Пастырем Христом.\n\nЕсли нас недуг терзает, кто покой нам ниспошлет?\nКто врачует, утешает, как не чудный Пастырь тот?\n\nО, великий Пастырь стада верных, избранных Твоих!\nТы святая мне ограда на земных путях моих."}, {"id": 258, "title": "Наша жизнь - это Бог, наша радость в Иисусе,", "text": "Наша жизнь - это Бог, наша радость в Иисусе,\nНаше счастье лишь в Нём, только в Нём.\nВ неразрывном, едином священном союзе \nЗа Христом мы пойдём, пойдём, пойдём.\n\nОн наш Царь, наш Отец, наш Хранитель Он верный, \nЛучший Друг в пору горя и слёз,\nВ Нём любовь неизменна, ей нет окончанья,\nГлубже моря она, ярче солнца и звёзд.\n\nИисус - Он наш Вождь, с Ним рассветы, закаты. \nЧрез всю жизнь Имя то пронесём,\nИисуса, Того, Кто за нас был распятым,\nПо следам мы Его пойдём, пойдём.\n\nТо ли жизнь, то ли смерть, даже ужас мучений,\nНо ничто Имя то не сотрёт,\nОно Кровью святою записано в сердце,\nИ оно там живёт, растёт, цветёт."}, {"id": 259, "title": "О, образ совершенный любви и чистоты!", "text": "О, образ совершенный любви и чистоты!\nСпаситель, Царь смиренный, пример мой вечный - Ты. \nНа лик в венце терновом хочу душой взирать;\nХочу делами, словом Тебе лишь подражать.\n\nХочу Твои слова я лишь в жизни повторять;\nХочу, благословляя, врагам моим прощать,\nХочу о них молиться, как Ты молил о них;\nХочу, как Ты, смириться среди сынов земных.\n\nВ Тебе пребыть желаю, к Тебе хочу прильнуть;\nТебя я умоляю: и Ты во мне пребудь.\nТогда моё сознанье наполнит образ Твой,\nИ я, Твоё созданье, навек сольюсь с Тобой.\n\nТогда уж не порывом, а каждый миг земной \nВ общении счастливом я буду жить с Тобой.\nЗасветит «неземное» снаружи и внутри;\nПогаснет «я» плотское в лучах Твоей зари."}, {"id": 260, "title": "Кто есть на небе у меня? Только Ты!", "text": "Кто есть на небе у меня? Только Ты!\nА в жизни только песнь моя: «Мой Христос!»\nОн за меня в горниле был, меня Он Кровью искупил \nИ душу с Богом примирил, мой Христос!\n\nНе милы мне богатств дары - только Ты!\nЯ не хочу их мишуры, мой Христос!\nМир вечного нам не даёт, всё тленья облик в нём несёт,\nМоя же радость не пройдёт - мой Христос!\n\nХотя б я бедным плотью стал - только Ты! - \n«Он знает лучше, - я б сказал, - Мой Христос!»\nПусть в винограднике беда, и пусть маслины без плода,\nИ пусть бичует мор стада - мой Христос!\n\nХоть я среди вражды, огня - только Ты!\nИ осаждает грех меня - мой Христос!\nХоть мир готовит грозный бой, хоть вес враги идут войной, \nЯ в Нём силён, прорву их строй - мой Христос!\n\nКогда ж расстанусь я с землёй - только Ты!\nВ Его руках найду покой - мой Христос!\nКогда мне скорби дух стеснят, природы силы замолчат,\nЯ буду петь сквозь смерти яд: «Мой Христос!»"}, {"id": 261, "title": "Не знаю, почему открыт мне благодати дар,", "text": "Не знаю, почему открыт мне благодати дар,\nИль почему спасенья щит мне дан от вечных кар, -\n\n    Но я знаю, в Кого я верю,\n    Ничто меня с Богом не разлучит;\n    И Он мне спасенье вручит \n    В день, когда опять придёт.\n\nНе знаю, как мой Бог даёт мне веры слух живой,\nИ как та вера мир несёт скорбящему душой, -\n\nНе знаю я, как Дух Святой к греху внушает страх,\nИ как даёт Христос благой прощение в грехах, -\n\nНе знаю времени, ни дня, когда Господь придёт,\nИ через смерть иль Сам меня в тот день Он позовёт,"}, {"id": 262, "title": "Если, друг, душою ты устанешь от тяжёлой жизненной борьбы,", "text": "Если, друг, душою ты устанешь от тяжёлой жизненной борьбы,\nИ любить, и верить перестанешь, окунувшись в волны суеты,\n\nЕсли вдруг захочешь возвратиться в мир страстей, забыть Иисуса путь, \nНе забудь прийти к Нему проститься, ещё раз в глаза Ему взглянуть.\n\nЕщё раз сказать Ему, как прежде, обо всём, что дух смутило твой, \nО твоей несбывшейся надежде, о тоске отчаянной, глухой,\n\nО друзьях, о братьях, не хотевших тебе руку помощи подать,\nЧтоб тебя от бури налетевшей защитить и в горе поддержать.\n\nПомолись. И в этот миг прощальный, может быть, душа твоя поймёт, \nОтчего ты грустный и печальный, отчего тоска тебя гнетёт.\n\nИ с Иисусом чудное общенье, может быть, тебе дарует вновь \nВеру в жизнь, надежду, обновленье и святую первую любовь."}, {"id": 263, "title": "Жизнь моя так быстро мчится, я знаю, скоро в Отчий дом", "text": "Жизнь моя так быстро мчится, я знаю, скоро в Отчий дом \nВойду, но здесь хочу молиться и петь Тебе хвалы псалом.\n\n    Пусть жить моя лишь для Тебя прожита будет мной,\n    И сердце пусть всегда поёт Тебе, Спаситель мой!\n    Пусть мысли все и разум мой направятся к цели одной:\n    К Тебе стремиться в небеса, чтоб вечно быть с Тобой.\n\nТак часто день тот вспоминаю, когда услышал в первый раз: \nСын Божий, кровью истекая, был вознесён на крест за нас.\n\nТебя, Господь, я прославляю, ведь Ты мой грех на крест вознёс; \nТебе всю жизнь я посвящаю: Ты умер за меня, Христос!"}, {"id": 264, "title": "К небу взор я возношу и Тебя, Господь, прошу:", "text": "К небу взор я возношу и Тебя, Господь, прошу:\nБудь со мной как верный Друг, пусть хоть свет, хоть мрак вокруг.\n\n    Рядом с Тобой идти - цель лишь одна!\n    Чашу Твою испить - пусть хоть до дна!\n    Радость Тебе дарить, за всё благодарить буду я всегда!\n\nЖизнь моя в Твоих руках, хоть я пред Тобою прах;\nГосподи, Твоя любовь греет сердце вновь и вновь.\n\nДень за днём идут года, как с вершины гор вода,\nТак и мы к концу идём. Где же вечность обретём?"}, {"id": 265, "title": "В Церкви святой, в союзе с Тобой,", "text": "В Церкви святой, в союзе с Тобой,\nЯ счастлив навек, хоть я человек.\nИ я не один, христианин, над всею землёй звучит голос мой:\n\n    Когда я в Тебе, тогда Ты во мне,\n    Когда я с Тобой, тогда Ты со мной.\n\nС Иисусом в труде, в житейской борьбе,\nНа всяком пути легко с Ним идти\nС тяжёлою ношей. Когда устаю, тогда я знакомую песню пою:\n\nКак радостно мне - Он Духом во мне,\nИ сердцем я с Ним, с Иисусом моим.\nВедь я не один, христианин, над всею землёй звучит голос мой:"}, {"id": 266, "title": "Я нуждаюсь в Тебе, мой Спаситель, я желаю всегда быть с Тобой.", "text": "Я нуждаюсь в Тебе, мой Спаситель, я желаю всегда быть с Тобой. \nТы Господь мой, любимый Учитель, упованье моё и покой.\n\n    Я жду Тебя! Люблю Тебя! Мне трудно на пути.\n    Без Пастыря, Хранителя мне нелегко идти.\n\nОчищенья душа моя жаждет, плоть желает противного ей.\nВсё борьба и борьба, о, когда же я достигну небесных дверей?\n\nИ когда в этой жизни унылой от борьбы истомится душа,\nПодойди же ко мне, мой Спаситель, ведь с Тобою так жизнь хороша.\n\nПоселись же во мне, мой Спаситель, и даруй чувствованья Твои, \nЧтобы верным я был, Твой служитель. О, приди же ко мне и живи."}, {"id": 267, "title": "Почему Иисус пострадал на кресте? Почему был осмеян людьми?", "text": "Почему Иисус пострадал на кресте? Почему был осмеян людьми? \nПочему Иисус на земле жил, как мы? Почему был гоним Он везде?\n\n    Освободил, освободил Он меня от греха и суда!\n    Иисус один, Иисус - один мой Спаситель, со мной Он всегда. \n    Да, лишь Ему пусть звучит песнь моя: освободил Он меня!\n\nЗа тебя и меня пёс Он тяжесть креста; победил этим Он грех и тьму. \nК нам на землю Сын Божий пришел потому, что погибнуть ты мог навсегда!\n\nЯ хочу Ему петь, Его благодарить за терпенье ко мне и любовь.\nЗа прощенье грехов хочу петь Ему вновь, для Него хочу жить и любить!"}, {"id": 268, "title": "Иисус, души Спаситель, дай прильнуть к Твоей груди!", "text": "Иисус, души Спаситель, дай прильнуть к Твоей груди! \nСреди волн будь мой Хранитель, не оставь меня в пути. \nЯ Тебе лишь доверяюсь, я Тебе лишь отдаюсь,\nВечно зреть Тебя желаю, быть Твоим, мой Иисус.\n\nБлагодать и примирсньс лишь в Тебе, Спаситель мой. \nЛишь к Тебе моё стремленье, о, прими меня - я Твой! \nНет прибежища иного для меня - лишь только Ты.\nНе оставь меня больного средь житейской суеты.\n\nО, храни средь бури жизни, до конца со мной пребудь, \nЧтоб я мог достичь Отчизны и в ней вольно отдохнуть. \nТы источник вечной жизни, жажду можешь утолить\nИ ручьём святой Отчизны в моём сердце можешь жить."}, {"id": 269, "title": "Жить снова без Бога меня мир зовёт", "text": "Жить снова без Бога меня мир зовёт \nИ радость плотскую в награду даёт.\nНо здесь на земле, где во всём суета,\nНет большего счастья, чем верить в Христа.\n\nШирокой дорогой в нём люди идут,\nМеня они с торной тропинки зовут.\nПусть камнем и терном усеян мой путь,\nЯ - в рай, они к гибели вечной идут.\n\nЖестокие люди не любят меня \nЗа то, что твержу им о Господе я,\nНо сердцу одно лишь ограду даёт,\nЧто рядом со мной Тот, Кто горе поймёт.\n\nОн нежен и силен, мой Друг и Творец,\nВ награду за верность мою мне венец \nГотовит Он в райских чертогах Своих \nВдали от скорбей и страданий земных.\n\nЕму посвятил я всю юность свою \nИ, радостно славя, «Осанна!» пою. \nСокрылся я в Нём, и живёт Он во мне,\nИ большего счастья не надобно мне."}, {"id": 270, "title": "Я хочу быть Твоим, мой Господь дорогой,", "text": "Я хочу быть Твоим, мой Господь дорогой,\nЯ хочу в чистоте проводить свои дни.\nЯ хочу каждый день и ночною норой \nТвоё имя шептать и лелеять в груди.\n\n    Я хочу быть Твоим, Твоё имя шептать \n    День и ночь, день и ночь!\n\nЯ хочу, чтобы сердце свой жизненный срок \nВ каждом стуке своём прославляло Тебя!\nЯ хочу, чтобы каждый почувствовать мог, \nКак Тебе благодарен, что любишь меня!\n\nЯ хочу, чтобы подвиг Голгофский сиял \nПеред взором сердечных, духовных очей, \nЧтоб Тобою я жил и Тобою дышал,\nЧтоб Ты был мне дороже всей жизни моей!\n\nТы страдал за меня, Ты пролил Свою кровь, \nТы воскрес для того, чтоб явить славу вновь. \nХочешь Ты, чтобы я эту жертву ценил\nИ всем сердцем любил, и Тобою лишь жил."}, {"id": 271, "title": "Мне счастья в жизни большего не надо,", "text": "Мне счастья в жизни большего не надо,\nЧем быть, Господь, в общении с Тобой.\nТы спас меня от злых объятий ада \nИ вознесёшь в небесный Край родной.\n\n    Это Бог меня нашёл! Это Бог ко мне пришёл \n    И когда в грехе тонул, Он мне руку протянул!\n\nМне счастья в жизни большего не надо,\nЧем быть, Господь, в общении с Тобой.\nТы дал мне радость жизни и отраду\nИ в сердце поселил Свой Дух Святой.\n\nМне счастья в жизни большего не надо,\nЧем мне с Тобой, Господь, в общенье быть.\nТы добрый Пастырь избранного стада,\nС Тобой навеки я хочу пребыть."}, {"id": 272, "title": "Пусть Иисус моим сердцем владеет,", "text": "Пусть Иисус моим сердцем владеет,\nВ мыслях и в чувствах лишь Он пусть живёт. \nБольшей любви ведь никто не имеет;\nВ Нём лишь покой моё сердце найдёт.\n\n    Полно заботиться, полно томиться, \n    Брат и Спаситель - навек Он со мной! \n    Он обещал: «Никогда не покину!»\n    Бурь не страшусь и стремлюсь я Домой.\n\nХристос Иисус даровал мне победу,\nМощной рукою оковы разбил.\nСилой любви той мне дух сокрушил Он, \nМира елей в мою душу излил.\n\nЕсли в боренье душой ослабею,\nОн лишь один слабый дух укрепит;\nВ Нём я поток очищенья имею,\nСилу и радость душе Он дарит.\n\nКончится труд мой, - в селенья святые \nОн лишь с любовью меня приведёт.\nМир не нарушат страданья земные,\nВ Отчих объятьях мой дух отдохнёт."}, {"id": 273, "title": "Как много разных песен в этом мире, где славится земная красота,", "text": "Как много разных песен в этом мире, где славится земная красота, \nГде славит человек свои кумиры, а у меня лишь песнь всегда одна!\n\n    Пою о Боге я, об имени великом,\n    О том, как любит Он, как сильно любит Он!\n    О том, что Он мой Друг и мой Спаситель,\n    О том, что я навеки Им спасён!\n\nИ эту песню петь не устаю я, она звучит во сне и наяву,\nИ ранним утром, днем и даже в полночь я этой песней только и живу.\n\nЯ песнь пою, когда бывает грустно, когда врагом изранена душа, \nПою, а сердце наполняет чувство, где нет печали, Господу хвала!\n\nЯ песнь мою хотел бы петь всем людям, хотелось бы, чтоб поняли её, \nХотелось бы, чтоб в Друге Иисусе нашли бы все спасение своё!"}, {"id": 274, "title": "Для Бога жить — святое приглашенье,", "text": "Для Бога жить — святое приглашенье,\nДля Бога жить - то долг души,\nДля Бога жить - то призыв ко спасенью, - \nДля Бога жить, для Бога жить!\n\nДля Бога жить — Христова Кровь струилась, \nЧтоб грешных с Богом примирить,\nЧтоб каждый грешник принял Божью милость, \nДля Бога жить, для Бога жить.\n\nДля Бога жить, хоть мир враждой встречает,\nИ льётся кровь, и смерть грозит, —\nТо жребий всех, кто пламенно желает \nДля Бога жить, для Бога жить.\n\nДля Бога жить, ведь Он не оставляет \nТого, себя кто не щадит,\nНо твёрдо лишь одно в душе решает:\nДля Бога жить, для Бога жить!\n\nДля Бога жить — пускай волной последней \nПройдёт по миру этот зов.\nДля Бога жить! Нельзя уж больше медлить, - \nХристос грядёт, Христос грядёт!"}, {"id": 275, "title": "Славною рекою льётся Божий мир,", "text": "Славною рекою льётся Божий мир,\nВсё превозмогая, разливаясь вширь.\nХоть уже он полон (хоть уже он полон) - \nВсё ж течёт полней (всё ж течёт),\nГлубже проникает и живит людей.\n\nВсех сокрытых в крепких Божиих руках \nНе прельстит лукавый, не настигнет враг; \nПод рукой могучей (под рукой могучей)\nВ мире сохранит (сохранит),\nОн всегда для верных самый крепкий щит\n\nРадость или горе свыше суждены, \nКаждому по силам Господом даны.\nЕсли Богу верим (если Богу верим),\nТо войдём в покой (то войдём),\nВерен Бог для тех, кто верует душой."}, {"id": 276, "title": "С мыслью о спасении моём шёл Христос на крест, на смерть,", "text": "С мыслью о спасении моём шёл Христос на крест, на смерть, \nПотому, друзья, решил и я: с Ним и жить, и умереть.\n\n    Без Христа я жизни не хочу, без Него она пуста!\n    Я душой общения ищу с Тем, в Ком счастья полнота!\n    С Тем в Ком счастья полнота! (2 раза)\n\nЧтобы мне открылась рая дверь, был Христос презрен, гоним; \nКак же я могу, друзья, теперь без креста идти за Ним?\n\nВ славе царственной Христос воскрес, Он вселенной Царь благой, \nОн наследство вечное небес разделил, друзья, со мной.\n\nПусть идёт войною на меня духов злобы легион,\nВерю: не дано всем силам зла разлучить меня с Христом."}, {"id": 277, "title": "Есть счастье святое, есть дивная радость, подобной ей нам не найти:", "text": "Есть счастье святое, есть дивная радость, подобной ей нам не найти: \nВ молитве к Иисусу — любовь и отрада, и сила, чтоб крест свой нести.\n\n    В Тебе моя радость, в Тебе моя сила,\n    В Тебе, мой Иисус дорогой!\n    К Тебе я взываю, Христос мой любимый,\n    Тебя я люблю всей душой!\n\nИ меркнет сознанье пред тем одеяньем, пред Господом силы всех сил. \nЗа скорбь, за мученье, за все носмеянья мне ризы Христос подарил.\n\nСредь тяжких мучений, борьбы и тревоги, во мраке разбитых сердец \nЕсть счастье святое — беседовать с Богом в сиянии светлых одежд.\n\nЕсть счастье святое! Я радуюсь в Боге! Меня Он для жизни одел \nИ место навек обещает в чертоге, где будет мой вечный удел.\n\nЕсть пламя молитвы, простёртые руки к Создателю светлых небес. \nЕсть луч утешенья средь скорби и муки, дарованный Богом чудес."}, {"id": 278, "title": "Воспойте в восторге сердечном Спасителя, Господа сил!", "text": "Воспойте в восторге сердечном Спасителя, Господа сил!\nОн нас возлюбил бесконечно, Он нас от гpexa искупил.\n\nОн славную дал нам победу над всем обольщеньем плотским, \nВедет с нашим сердцем беседу Он голосом кротким Своим.\n\nВ надежде спасительной стойте и с радостью верьте в Него!\nВ восторге духовном воспойте Иисуса Христа Своего!"}, {"id": 279, "title": "Нет больше утешенья, нет радости полней,", "text": "Нет больше утешенья, нет радости полней,\nКак быть всегда в общенье с Создателем людей.\n\n    Сладко, чудно быть в общенье (вечном) с Ним;\n    Сладко (чудно), чудно (сладко) быть в общенье с Ним.\n\nОбщенье с Богом Вечным, Учителем людей,\nУченикам прилежным даст знание полней.\n\nКак сладостно общенье с Всесильным как с Отцом;\nОтцово попеченье даёт мне вечный Дом.\n\nЕсть дивное общенье, общенье двух друзей;\n«Он Друг мой», — нет ученья превыше для людей.\n\nЛюблю я с Ним беседу в восторженной мольбе;\nДаёт Он мне победу в моей земной борьбе."}, {"id": 280, "title": "Как скучно на сердце порой, когда я не вижу Христа:", "text": "Как скучно на сердце порой, когда я не вижу Христа:\nПрирода пустеет пред мной и меркнет (4 раза) её красота.\n\nИ солнце неясно горит, и в поле всё мёртво кругом;\nНо раем пустыня глядит, когда я в союзе (2 раза) с Иисусом Христом.\n\nВ Иисусе - сокровище сил, и быть с Ним дороже всего!\nКогда бы со мною Он был, на сердце (4 раза) мне было б легко.\n\nЛишь был бы Он близок всегда, я б с Ним ничего не желал; \nОбъятый любовыо Христа, я всё бы (4 раза) за сор почитал."}, {"id": 281, "title": "Я любви не достоин Твоей, не достоин Твоей благодати.", "text": "Я любви не достоин Твоей, не достоин Твоей благодати.\nСколько лет, сколько солнечных дней без Т ебя я блуждал, мой Создатель.\n\nЖил, как многие, лишь для себя, в сердце зла сорняки только зрели. \nНикого никогда не любя, жил без светлых исканий и цели.\n\nНо Ты в сердце мос постучал. Я открыл - наступило прозренье.\nТы, как блудного сына, принял и простил все мои согрешенья.\n\nНе сдержал благодарных я слёз, свою душу Христу посвящая,\nИ узнал я, как любит Христос, как пришедших к Нему Он прощает.\n\nЯ любви не достоин Твоей, не достоин Твоей благодати.\nСколько лет, сколько солнечных дней безТебя я блуждал, мой Создатель."}, {"id": 282, "title": "Всё Иисусу отдаю я, весь Ему принадлежу;", "text": "Всё Иисусу отдаю я, весь Ему принадлежу;\nВ упованье и смиренье пред лицом Его хожу.\n\n    Всё я отдаю (всё я отдаю), всё я отдаю (всё я отдаю), \n    Всё Тебе, мой Искупитель, всё я отдаю.\n\nВсе Иисусу отдаю я, все кладу к Его ногам.\nСуету отверг земную, направляюсь к небесам.\n\nВсё Иисусу отдаю я, весь хочу Христовым быть.\nДух Предвечный да научит знать Христа, Христа любить.\n\nВсё Иисусу отдаю я. Боже, храм во мне создай!\nБлагодатью и любовью ум и сердце наполняй.\n\nВсё Иисусу отдаю я. Чудо Он во мне свершил:\nМир и радость дал святую. Слава, слава Богу сил!"}, {"id": 283, "title": "Я знаю, жив Христос Спаситель, Он место дать мне обещал,", "text": "Я знаю, жив Христос Спаситель, Он место дать мне обещал,\nОн дверь открыл мне жизни вечной и чадом Божиим назвал.\n\n    Никто не может взять меня из рук Спасителя Христа! \n    Никто не может взять меня из рук Спасителя Христа!\n\nВедь здесь я только жду призыва, когда Господь придёт за мной, \nКогда возьмёт меня от мира и приведёт меня домой.\n\nВсецело сердцем доверяю Тому, Кто за меня распят;\nЯ голосу Его внимаю: «О, приходи! Я жду тебя!»\n\nЯ побеждён Его любовью, Он за меня Страдальцем стал,\nОн истекал пречистой Кровью и жизнь мне смертью крестной дал.\n\nСпаситель мой придёт уж скоро и Сам меня туда возьмёт,\nГде под лучом Христова взора мой дух навеки воспоёт."}, {"id": 284, "title": "Иисус, как Ты дорог для меня! Иисус, внемлешь Ты мольбе моей.", "text": "Иисус, как Ты дорог для меня! Иисус, внемлешь Ты мольбе моей. \nО Иисус, поднимешь Ты, коль упаду. Как Ты дорог, дорог для меня!\n\nИисус, Тебя люблю я восхвалять. Иисус, Ты без начала и конца.\nО Иисус, Т ы умер и простил мой грех! Как Ты дорог, дорог для меня!\n\nИисус, Ты обещал прийти сюда. Иисус, мы ждём Тебя, открыв сердца. \nО Иисус, услышь Ты наши голоса. Как Ты дорог, дорог для меня!"}, {"id": 285, "title": "Жить для Иисуса, с Ним умирать, -", "text": "Жить для Иисуса, с Ним умирать, - \nЛучшую долю можно ль желать? \nСтоит смиряться, стоит бороться, \nСтоит за это жизнь всю отдать.\n\nЖить для Иисуса, краток уж день \nИ недалёко смертная тень.\nНе унывая, не уставая,\nПусть нам трудиться будет не лень.\n\nЖить для Иисуса, грех победить, \nКрест поношенья бодро сносить, \nКончив путь жизни, чтобы в Отчизне \nСлавой бессмертья венчанным быть."}, {"id": 286, "title": "О Господь, Твой раб услыхал глас Твой, он любовыо поли, Бог мой!", "text": "О Господь, Твой раб услыхал глас Твой, он любовыо поли, Бог мой! \nВеры луч святой осиял меня - ночь светлее стала дня.\n\n    Ближе, ближе к Твоему кресту, где Ты умер за меня!\n    Ближе, ближе (ближе) к Твоему кресту, о Господь, влеки меня!\n\nСилою Своей, Бог Спаситель мой, моё сердце осени;\nЧтоб служить Тебе мог я всей душой, силу новую вдохни.\n\nЧуден, Боже сил, тихий час ночной, час, когда спит мир людской, \nСловно с Другом я говорю с Тобой - Ты даешь душе покой.\n\nГлубину Твоей без конца любви здесь отчасти понял я,\nРадость вечных дней мне скорей яви, просвети скорей меня."}, {"id": 287, "title": "Ты мне близок, словно берег морю,", "text": "Ты мне близок, словно берег морю,\nТы мне дорог, словно детям мать. \nТы пришёл, чтоб сладким сделать горе, Ты пришёл,чтоб милостью объять.\n\nБез Тебя и жизни мне не надо, без Тебя я только что дышу.\nТы святая в жизни мне отрада; будь моим, Господь, Тебя прошу.\n\nТам, где небо встретится с землёю, чтоб из рук её принять меня, \nТам впервые встречусь я с Тобою, и глаза мои узрят Тебя.\n\nА пока с надеждою живою я живу, пока в свой час умру.\nТы мне ближе, чем песок прибою, и дороже, чем вода в жару."}, {"id": 288, "title": "Я Друга дивного познал, и есть ли в мире равный?", "text": "Я Друга дивного познал, и есть ли в мире равный? \nЛюбил меня, когда не знал Его любви я славной;\nМеня с Собой соединил Он милостью державной \nИ чувство веры мне вложил, и я Его навеки!\n\nЯ Друга дивного познал; Ему, о люди, верьте!\nМои грехи с меня Он снял и спас меня от смерти. \nПридите все к стопам Его и опытом измерьте,\nКак велика любовь Его и ныне, и вовеки.\n\nЯ Друга дивного познал; Он силой обладает,\nИ если б мир мне угрожал - Он помощь обещает.\nМне вера от Него дана и дух мой ободряет.\nТеперь кругом борьба, война - затем покой вовеки.\n\nЯ Друга дивного познал; Он любит бесконечно.\nМоим советником Он стал, Вождём к Отчизне вечной. \nКакая сила разорвёт союз мой с Ним сердечный:\nИль жизнь, иль смерть, иль чад забот? Нет, я Его навеки!"}, {"id": 289, "title": "Ты расстался с престолом сияющим Божьим", "text": "Ты расстался с престолом сияющим Божьим \nИ распят за грехи человечества был;\nЯ хочу, Иисус, на Тебя быть похожим \nИ любить так, как Ты грешный мир возлюбил.\n\nИногда, устремляясь к достижениям большим, \nПопадаю, бывает, я в гордости плен.\nЯ хочу, Иисус, на Тебя быть похожим,\nБыть смиренным хочу так, как Ты был смирен.\n\nВся планета Земля Тебе служит подножьем, \nНу, а небо есть Твой благодатный престол.\nЯ хочу, Иисус, на Тебя быть похожим\nИ идти, не ропща, под житейским крестом.\n\nТы за грешных страдал Сыном будучи Божьим \nИ ценою Крови нам спасенье купил.\nЯ хочу, Иисус, на Тебя быть похожим,\nЧтобы жизнь я свою ненапрасно прожил."}, {"id": 290, "title": "Какое небо голубое, какая чистая река!", "text": "Какое небо голубое, какая чистая река!\nКак хорошо, Господь, с Тобою, когда ведёт Твоя рука.\n\n    С Тобою горе как не горе, с Тобой потеря - не урон,\n    Ты возместишь утрату вскоре и радость возведёшь на трон.\n\nТы сохранишь, и Ты поможешь святые ценности найти, \nПокажешь, что всего дороже на этом жизненном пути.\n\nЛюбовь и веру, и надежду Ты в помощь мне, Господь, послал. \nИмея пищу и одежду, я никогда не унывал.\n\nВ душе звездою путеводной Ты для меня, Спаситель, был.\nЯ, окрылённый и свободный, нашёл в Тебе источник сил."}, {"id": 291, "title": "Иисус, Ты мой лучший Друг, Ты так близок, когда мне трудно,", "text": "Иисус, Ты мой лучший Друг, Ты так близок, когда мне трудно, \nКогда сердце заноет вдруг, Ты один мой Учитель чудный.\nБез Тебя нет покоя мне, без Тебя лишь одно томленье,\nЛишь в Тебе нахожу вполне для души удовлетворенье.\n\n    Я любовью Твоею живу, и она моё сердце греет:\n    Всей душою Тебя я люблю, и ничто мне Тебя не заменит!\n\nДаже если оставят друзья, и весь мир от меня отвернётся,\nЗнаю, Ты не оставишь меня, наша дружба вовек не прервётся.\nТы один понимаешь всё, Ты мечты мои знаешь и тайны.\nТы со мной, - что же нужно ещё мне искать на земле печальной.\n\nКраток стих мой и беден язык, чтоб души излить благодарность, \nО Иисус, как в любви Ты велик! Ты и счастье моё, и радость!"}, {"id": 292, "title": "Христос, кто бы знал Твоё имя здесь, на этой планете печальной?", "text": "Христос, кто бы знал Твоё имя здесь, на этой планете печальной? \nПришёл, оказался Ты жертвою, чтоб знал близкий и дальний.\n\n    Христос - это имя мне дорого! Христос - это имя мне мило! \n    Христос, Ты не хочешь ни одного оставить, не зная Тебя.\n\nМой друг! На Голгофы взгляд свой брось, постой, посмотри молчаливо. \nТам кровь за тебя и меня лилась, чтоб мы были счастливы.\n\nХристос, освяти, как всегда, Ты нас, вложи в нас стремленья благие, \nИ тех, кто услышит нас в первый раз, прими в объятья святые."}, {"id": 293, "title": "Иисус — моё вдохновение в золотых лучах Откровения!", "text": "Иисус — моё вдохновение в золотых лучах Откровения!\nИисус - Лоза виноградная, к ней летят дожди благодатные.\n\nИисус — для мира спасение! Иисус — моё воскресение!\nОн ведет долиной чудесною, нас зовет в Обитель небесную.\n\nВ небесах лазурь колыбельная, в небесах страна беспредельная, \nНа заре в сады виноградные небо шлёт дожди благодатные.\n\nДождь пошёл по вольному полю, зазвенел над горными тропами, \nДождь плывёт холмами высокими, дождь поёт ручьями, потоками.\n\nИ шумят дожди пробуждения, в Иисусе сила спасения;\nНад землёй весенняя радуга, Иисус, над нами Твоя рука!"}, {"id": 294, "title": "С Иисусом жить мне радостно, радостно, радостно,", "text": "С Иисусом жить мне радостно, радостно, радостно,\nОн нас ведёт по пастбищам, по злачным пастбищам!\n\n    О Иисус, Спаситель! Ты вечно мой,\n    Ты вечно будешь мой наилучший Друг!\n\nМеня Он смертью искупил, искупил, искупил \nИ от оков освободил, меня освободил.\n\nОн Дух Святой мне ниспослал, ниспослал, ниспослал, \nТем Духом Он меня крестил и сердце оживил.\n\nЕго всем сердцем я люблю, я люблю, я люблю,\nИ жизнь свою я отдаю Иисусу моему.\n\nЯ Бога буду прославлять, прославлять, прославлять \nЗа милость ту великую и радость вечную."}, {"id": 295, "title": "Иисус, о Тебе я пою, светом Ты озарил мою душу,", "text": "Иисус, о Тебе я пою, светом Ты озарил мою душу,\nЯ за всё благодарен Тебе, и во всём вижу я Твою руку.\n\n    Знаю я, Ты всегда со мной, в обещанье Своём Ты верен, \n    Кровь Твоя за меня лилась, чтобы в небо открыть мне двери.\n\nСколько раз Ты меня хранил на земных поворотах жизни!\nТы избрал меня, искупил и наполнил Собой моё сердце.\n\nЯ живу и покоюсь в Тебе, Ты надежда моя и радость!\nИисус, счастье только в Тебе, в Тебе жизнь моя и отрада."}, {"id": 296, "title": "Нашёл Того, о Ком душа моя давно томилась,", "text": "Нашёл Того, о Ком душа моя давно томилась,\nВ Ком вечный мир она нашла, пред Кем в любви склонилась. \nИисус страдал за грех земли,\nОн клад бесценный для души. (2 раза)\n\nНашёл Того, Кто в нищете шёл ко кресту, страдая,\nС венцом терновым на главе, от ран изнемогая.\nНа крест Голгофский посмотри,\nТам клад бесценный для души. (2 раза)\n\nНашёл Того, Кого душой люблю я бесконечно,\nИ Кто введёт меня в покой, где я пребуду вечно.\nХристос, в тот край меня введи,\nГде клад бесценный для души. (2 раза)"}, {"id": 297, "title": "Есть то, чего никто отнять не может, чем живы мы в долине суеты.", "text": "Есть то, чего никто отнять не может, чем живы мы в долине суеты. \nПрошу Тебя, великий, вечный Боже: среди тревог пребудь со мною Ты.\n\nМне мир порой так много обещает, зовя оставить прежние мечты, \nНо видишь Ты, душа моя желает лишь одного: пребудь со мною Ты!\n\nЯ не хочу греховного забвенья, мне дорог путь добра и чистоты. \nПусть мир бросает яростно каменья, я буду рад: пребудь со мною Ты.\n\nА если путь мой станет тяжелее, сгустятся тучи зла и суеты,\nТебе, мой Бог, любовью пламенея, одно скажу: пребудь со мною Ты!"}, {"id": 298, "title": "Ты моя истина! Ты моя радость, цель моей жизни, надТы моя истинаёжный покой!", "text": "Ты моя истина! Ты моя радость, цель моей жизни, надТы моя истинаёжный покой! \nТы моя сила, общения сладость! Ты мой Спаситель желанный, благой! \nБлаго мне в жизни к Тебе приближаться, о, укрепляй наш блаженный союз. \nДай наименьшим Твоим называться, славя великое имя - Иисус.\n\nЗнаю, что в мире без света и Бога, счастье душе я уже не найду.\nТы моё счастье, к Церкви дорога! Я по следам Твоим кротко пойду. \nБуду слезами я мыть Тебе ноги, буду я раны Твои врачевать.\nО Иисус, днями жизни немногими имя Твоё научи прославлять.\n\nИмя Твоё столько было поругано миром бездушным средь мрака и тьмы; \nДетям Твоим так отрадно и дорого, будем с любовью шептать Его мы. \nО Иисус, Ты ценою мученья жизнь и спасение людям принёс.\nВечно достойно оно прославления, имя любимое нами - Христос!"}, {"id": 299, "title": "Когда покоя в сердце нет, слеза блестит в глазах моих,", "text": "Когда покоя в сердце нет, слеза блестит в глазах моих,\nИ тяжело моей душе, - молитву я несу к Тебе.\nЯ не одинок - со мною мой Бог!\nГде бы ни был я, Ты со мной, Ты со мной!\nЯ не одинок - со мною мой Друг, все печали мои удалит.\n\nНа всей земле, вселенной всей есть лишь один Творец миров;\nИ нашу жизнь переменить поможет Он, Отец и Бог.\nЯ не одинок - со мною мой Бог!\nГде бы ни был я, Ты со мной, Ты со мной!\nЯ не одинок - со мною мой Друг! Ничего не страшусь - Ты со мной\n\nГрехи мои Господь забрал, омыл меня и убелил.\nИ каждый день Его устав хранит меня, меня хранит.\nЯ не одинок - со мною мой Бог!\nГде бы ни был я, Ты со мной, Ты со мной!\nЯ не одинок - со мной Иисус, Спаситель Господь, Он со мной!"}, {"id": 300, "title": "Люблю я, Спаситель, Тебя всей душой!", "text": "Люблю я, Спаситель, Тебя всей душой!\nХотя попирал я закон Твой святой,\nНо милостью Ты мне открыл в небо дверь: \nТебя ещё больше люблю я теперь!\n\nМеня окружил Ты любовью кругом,\nМеня возлюбил, когда я был врагом,\nЗа этот, Спаситель, великий пример \nТебя ещё больше люблю я теперь!\n\nВ обителях славы пред ликом Творца \nЯ буду Тебя восхвалять без конца.\nСкажу и тогда: «За меня Ты терпел!\nТебя ещё больше люблю я теперь!»"}, {"id": 301, "title": "Верую: в единого Бога Отца, всемогущего,", "text": "Верую: в единого Бога Отца, всемогущего,\nТворца неба и земли, всего видимого и невидимого;\nВ единого Господа Иисуса Христа, Сына Божьего,\nЕдинородного, от Отца рождённого,\nНесотворённого, прежде всех веков,\nСвет от Света, Бога истинного от Бога истинного,\nРождённого, несотворённого, единородного,\nЧерез Которого всё начало быть;\nРади нас людей и ради нашего спасения Он с неба сошёл \nИ тело принял от Духа Святого и Девы Марии, и стал Человеком; \nРаспятым был, за нас страдал и погребённым был,\nНо в третий день воскрес, как было написано!\nИ вознёсся на небо, и воссел справа от Отца Своего,\nИ вновь придёт во славе судить живых и мёртвых,\nЕго же Царству не будет конца;\nИ в Духа Святого, Господа животворного,\nПришедшего от Отца миров;\nЕму с Отцом и Сыном поклонение и слава,\nПровозглашённые чрез пророков;\nВ единую соборную апостольскую Церковь!\nПризнаю одно крещение и прощение грехов,\nОжидаю воскресения мёртвых и жизни будущего века.\nАминь."}, {"id": 302, "title": "Верить, надеяться, любить -", "text": "Верить, надеяться, любить - \n    Больше в этой жизни ничего не надо.\n    Верить, надеяться, любить - \n    Самая большая радость.\n\nИисус понимает всё, трудностей в жизни много.\nОн верою меня ведёт по жизненной трудной дороге.\n\nИ я иду за Ним, любовью Его хранимый.\nМоя рука в Его руке, и я не разлучаюсь с Ним."}, {"id": 303, "title": "Твёрдо я верю: мой Иисус! Им я утешен и Им веселюсь;", "text": "Твёрдо я верю: мой Иисус! Им я утешен и Им веселюсь;\nНеба наследье хочет Он дать, как же приятно им обладать!\n\n    Вечно я буду петь с торжеством об Иисусе дивном моём.\n\nТвёрдо я верю: с часа того, как узнал Бога, дитя я Его.\nМир наполняет сердце моё, в Нём нахожу я хлеб и питьё.\n\nТвёрдо я верю: сильной рукой Он простирает Свой кров надо мной. \nЧтоб ни случилось, радостен дух, вечно со мною Пастырь и Друг.\n\nЧудный и полный мир и покой дух мой находит в союзе с Тобой; \nДай, чтоб Тебе я сердце отдал, я б умалялся - Ты б возрастал."}, {"id": 304, "title": "От греха я спасён, в Божий мир водворён, сердцем верую я в Иисуса;", "text": "От греха я спасён, в Божий мир водворён, сердцем верую я в Иисуса; \nОн покой мне даёт, снял с души всякий гнёт, в Сына Божия верую я!\n\n    Верю я (верю я), верю я (верю я), сердцем верую я в Иисуса! \n    Верю я (верю я), верю я (верю я), в Сына Божия верую я!\n\nИскупил Он меня, верой принял то я, сердцем верую я в Иисуса; \nВ неизменной любви Он Хранитель души, в Сына Божия верую я!\n\nО, как радостно мне, Он со мною везде, сердцем верую я в Иисуса; \nЖажду вечно хвалить, Иисусу служить, в Сына Божия верую я!"}, {"id": 305, "title": "За евангельскую веру, за Христа мы постоим;", "text": "За евангельскую веру, за Христа мы постоим;\nСледуя Его примеру, все вперёд, вперёд за Ним!\n\n    Дружной, радостной семьёю, как один Его народу \n    Одним сердцем и душою за Христом вперёд, вперёд!\n\nЖарок бой и страшно пламя, и колеблются места; \nПодымите выше знамя Победителя Христа.\n\nВ мире жизни равнодушной наш Христос пренебрежён; \nПостоим единодушно за Его святой закон.\n\nКрепость веры, жизнь дающей, будем дружно защищать; \nИ оружьем Гедеона вражью силу отражать.\n\nПодвиг правды, труд суровый будем смело совершать \nИ шатры любви Христовой будем в мире расширять."}, {"id": 306, "title": "Что вера без дел? Это звук лишь пустой,", "text": "Что вера без дел? Это звук лишь пустой, \nЦветок рукодельный, цветок неживой,\nТо дерево с пышной листвой без плода, \nМираж изобилья, где скудость, нужда.\n\n    Господь, с высоты наше сердце проверь: \n    Поведай, какая в нас вера теперь.\n    О вере с плодами, о вере живой \n    Тебя умоляем, Создатель благой.\n\nЧто тело без духа - то вера без дел,\nПечален и жалок той веры удел;\nУвидит се проходящий Христос - \nИ взор затемнится от грусти и слёз.\n\nОн хочет увидеть такие дела:\nЧтоб вера добро, как свой дар, принесла, \nЧтоб дело её было зрелым плодом, \nРождённым с молитвами в Духе Святом.\n\nНапрасны ученья, напрасны слова,\nВедь вера без дел перед Богом мертва.\nЛишь вера, несущая плод для Христа, \nВелика, могуча, пред Богом свята."}, {"id": 307, "title": "Вера через шторм проводит корабли, караваны движет по пустыне,", "text": "Вера через шторм проводит корабли, караваны движет по пустыне, \nУвлекает пленника земли к отдалённым звёздам в небе синем.\n\nБез неё нет дружбы, нет любви, без неё вея жизнь в тумане сером, \nНо её ты всё-таки зови просто человеческою верой.\n\nЛишь когда божественным лучом твою душу небо посетило - \nВера вспыхнет радостным огнём, как любви гигантское светило!\n\nЗазвучит набатом в тишине, под напором бури не согнётся,\nВедь она в моей родной стране верою Евангельской зовётся!\n\nЭта вера горы низведёт, повергая в грозную пучину,\nИ на небо в радости введёт, в торжество Возлюбленного Сына.\n\nТьма неверья в панике бежит, Бог ломает намеренья гордых,\nИ горит, бессмертием горит вера, воскрешающая мёртвых!"}, {"id": 308, "title": "Я в бессмертье иду, наступая на зло, средь скорбей и страданий дорога;", "text": "Я в бессмертье иду, наступая на зло, средь скорбей и страданий дорога; \nНа душе у меня и тепло, и светло, потому что я верую в Бога!\n\nПротив истины войско ведёт сатана, духи зла ополчились, как звери; \nЖдёт меня впереди неземная страна, потому что я в Господа верю!\n\nЗнаю я, что мне можно и что мне нельзя, знаю, что хорошо и что плохо; \nЗнаю, что на земле существую не зря, потому что я верую в Бога!\n\nДаже если встречаю следы катастроф, исчезает из сердца тревога, \nКак подумаю я, что есть любящий Бог; и я счастлив, что верую в Бога!\n\nНет от радости слов - очень мне повезло, мною найдена в небо дорога, \nНа душе у меня и тепло, и светло, потому что я верую в Бога!"}, {"id": 309, "title": "Верю я, что есть великий Бог, только Он создать такое мог:", "text": "Верю я, что есть великий Бог, только Он создать такое мог: \nМир, людей и жизнь земли - это Его дела.\nПеред Ним в молитве я склонюсь и с благодареньем помолюсь, \nВедь Его рука меня вела в мире зла.\n\nВерю я, что через всё пройду, через испытанья и беду,\nИ меня ничто не вырвет из Господних рук.\nЯ иду в небесный вечный Дом и увижу все, что будет в нём, - \nЭто стоит всех земных разлук, стоит мук.\n\nВерю я, что все мои друзья, кто прожил земную жизнь не зря, \nБудут в небесах носить венцы прекрасные.\nКто отдал себя на труд Христа - вечные года получит в дар! \nВерой получил он свой удел, он преуспел."}, {"id": 310, "title": "Верю в обещания Христа Царя, к Богу вознесётся в небо песнь моя.", "text": "Верю в обещания Христа Царя, к Богу вознесётся в небо песнь моя. \nСлава в вышних Богу, уж взошла заря; верю в обещания Христа!\n\n    Верю я, верю я, верю в обещания Христа (я верю)!\n    Верю я, верю я, верю в обещания Христа!\n\nВерю в обещания, Ему хвала, не страшусь я грозных бурь греха и зла, \nЛишь бы милость Божия со мной была, верю в обещания Христа!\n\nВерю в то, что обещал Спаситель мне, отдаюсь Ему я всей душой вполне, \nИ хочу с Ним быть в небесной той стране; верю в обещания Христа!\n\nВерю в обещания, за них держусь, и душой, и сердцем в Боге веселюсь; \nРадостно воскликну, как пред Ним явлюсь: верю в обещания Христа!"}, {"id": 311, "title": "Если мир лишит тебя золота и серебра", "text": "Если мир лишит тебя золота и серебра\nИ покинет, обобравши дочиста,\nПред людьми не падай ниц, помни: Бог питает птиц, - \nСвоё бремя положи у ног Христа.\n\n    Положи (положи) и оставь (и оставь)\n    Своё бремя, положи у ног Христа.\n    Если верою живём, Бог поможет нам во всём, \n    Своё бремя положи у ног Христа.\n\nЕсли телом страждешь ты, в прах рассыпались мечты, \nИ земная увядает красота,\nНе поможет стон и плач, Иисус — Господь и Врач, — \nСвоё бремя положи у ног Христа.\n\nОкружён ли ты враждой, всё закрыто пред тобой, \nПомни: Бог открыл тебе небес врата.\nОн услышит и поймёт, сохранит среди невзгод, —\nСвоё бремя положи у ног Христа.\n\nЕсли юность отцвела, старость тихо подошла,\nИ теснит тебя земная суета,\nНе горюй: Спаситель твой всюду и всегда с тобой, — \nСвоё бремя положи у ног Христа."}, {"id": 312, "title": "Могучую силу имея, бесстрашен и силен Самсон;", "text": "Могучую силу имея, бесстрашен и силен Самсон;\nВ своих волосах назорея ту силу испытывал Он.\n\nОн льва одолел, как козленка, ворота носил на спине \nИ челюстью свежей ослёнка врагов победил на войне.\n\nНо вскоре коварно Далида, всю тайну узнав от него,\nВо сне его кудрей лишила и тем погубила его.\n\nОн взят без труда был врагами, позорно лишился очей.\nИ долго потом жерновами ворочал он в узах цепей.\n\nТак долго Самсон был в темнице... Но волосы вновь отросли,\nИ к Господу стал он стремиться и силы у Бога просил.\n\nНам это дано для примера: как сильный Самсон без волос - \nБессилен, в ком мёртвая вера, в чьём сердце не властен Христос."}, {"id": 313, "title": "Я верю в Иисуса, Он цель моей жизни и свет.", "text": "Я верю в Иисуса, Он цель моей жизни и свет.\nЯ верю в Иисуса - прекраснее имени нет.\nЯ верю в любовь, великую Божью любовь.\nВ Нём наше спасенье, прощение наших грехов.\n\n    Моя радость, моя радость лишь в Нём.\n    Моё счастье, моё счастье лишь в Нём.\n    Моя сила, моя сила лишь в Нём,\n    Только в Нём, только в Нём, только в Нём.\n\nЯ верю в Иисуса и помню, как нежно Он звал, \nСпасенье и счастье Господь даром мне предлагал.\nНа зов этот чудный Спаситель услышал в ответ:\n«Ты Бог мой единый, другого воистину нет!»\n\nИ вот моё сердце наполнила радость о том,\nКакое же счастье быть близким в общенье с Христом. \nХочу, чтобы люди смогли это всё увидать,\nДушою и сердцем на Божьей груди отдыхать."}, {"id": 314, "title": "Сверкал в лучах огромный истукан - бог Вавилона,", "text": "Сверкал в лучах огромный истукан - бог Вавилона,\nК нему текла прислужников река по воле трона.\nНе видела такого торжества земля Нимрода.\nВо множестве теснились, как листва, князья народов.\n\nВ потоке пёстром, волею Творца, Седрах с друзьями,\nОни хранят по-прежнему в сердцах Господне знамя. \nРазорвана указом тишина вдруг пред всем миром:\n«При звуке труб падите, племена, перед кумиром!»\n\nЯзычников повергнул вмиг оркестр аккордом страшным. \nНе тронулись, однако, трое с мест среди упавших. \nПылало пламя, гневом царь дышал: «Кто эти трое?»\nИх бросят в печь... Но смерть от них ушла, они - герои!\n\nГорят горнила скорби и сейчас, в презренье вера.\nМир не спешит услышать правды глас, живёт неверьем... \nНи смерть, ни жизнь, ни ширь, ни высота, ни злоба ада \nНе смогут отлучить нас от Христа! В мир нет возврата! \nПусть давит плечи трудностей свинец, душа, отвергнись! \nНавек украсит в небе твой венец святая верность!"}, {"id": 315, "title": "Когда душа моя страдает, изнемогла в земной борьбе,", "text": "Когда душа моя страдает, изнемогла в земной борьбе,\nИ слёзы очи застилают, - спешу в молитве я к Тебе.\n\n    Я знаю, что к цели трудный путь идёт.\n    Я знаю, что Ты ведёшь меня вперёд.\n    Я знаю, что в двери рая Твоя рука меня введёт.\n\nТак тяжело мне, Боже сильный, Твоей тропой идти подчас. \nПодай моей душе Ты силы, чтобы светильник не погас.\n\nНо через слёзы воспеваю и сердцем радуюсь в борьбе, \nСвятою верой побеждаю, надежда вся моя в Тебе.\n\nНе вечны будут искушенья, придёт конец земным скорбям; \nСклонюсь я в небе пред Иисусом, за все Ему хвалу воздам!"}, {"id": 316, "title": "Не угасай же, посвети немного,", "text": "Не угасай же, посвети немного,\nСветить непросто в беспросветной тьме, \nНо ты свети мне, вера, ради Бога, \nНедолгий путь уже остался мне.\n\nЯ в небесах увижу счастье полдня \nИ в семицветье радостно вольюсь, - \nВсе это будет завтра, а сегодня\nЯ без тебя никак не обойдусь,\n\nУже конец пути, уже преддверье,\nУже я слышу вечности шаги.\nЯ плохо вижу - посвети мне, вера,\nВойти в чертог небесный помоги."}, {"id": 317, "title": "Бывали в жизни трудные минуты,", "text": "Бывали в жизни трудные минуты,\nИ горе посещало нас не раз,\nНо с нами наш Господь, и потому-то \nНадежда не обманывала нас.\n\n    Надежда - светлый луч во тьме ночной, \n    Надежда - якорь среди бури злой. \n    Надежда наша не боится гроз.\n    Надежда наша - Иисус Христос! (2 раза)\n\nМир потрясают ужасы, как прежде,\nСтраданий много, горестей и слёз,\nНо Бог дал нам блаженную надежду \nВ одном чудесном имени «Христос».\n\nСтареет наше тело, как одежда,\nИ часто бремя нам не по плечу,\nНо мы несём в сердцах своих надежду,\nКак на ветру горящую свечу."}, {"id": 318, "title": "Добрые руки неба с помощью к нам придут,", "text": "Добрые руки неба с помощью к нам придут, \nЕсли попросим хлеба - камень не подадут, \nЕсли попросим счастья - счастье своё узрим, \nТолько самим бы чаще нам доверяться им.\n\nДумаем, что над нами небо да облака,\nТолько за облаками - Божьей любви рука. \nНебу не безразличны наши земные дни,\nВ переживаньях личных вовсе мы не одни.\n\nС нами от колыбели, в трудностях всех дорог, \nВ дождики и метели был милосердный Бог. \nКружит мира воронка, чтоб от неё спастись, \nДо высоты ребёнка верою вознесись."}, {"id": 319, "title": "Весна вновь наш край посетила, блеснула в ручьях серебром,", "text": "Весна вновь наш край посетила, блеснула в ручьях серебром, \nСнега на полях растопила своим благодатным теплом.\n\n    А сердце томится, сердце ждёт,\n    Сердце печальную песнь поёт:\n    Когда же с небес к нам придёт она, вечная весна? (2 раза)\n\nЗаботы, печали, тревоги - вот лучшая доля людей.\nУстал я шагать по дороге к небесной Отчизне моей.\n\nТебя я молю, мой Спаситель, дай силу мне вновь обрести \nИ в дивную неба Обитель с победною славой войти.\n\nВедь с вечной весною ненастьям и горестям будет конец; \nСпаситель мой с нежным участьем подарит мне чудный венец.\n\n    И сердце не будет томиться, ждать,\n    Песню печали и слёз слагать:\n    Когда же с небес к нам придёт она, вечная весна? (2 раза)"}, {"id": 320, "title": "Я люблю Тебя, Боже, люблю всей душой,", "text": "Я люблю Тебя, Боже, люблю всей душой,\nНо в груди моей мало огня.\nИ мой дух изнемог под житейской борьбой, \nОдолела усталость меня.\n\n    Нет, нет, силы нет, Боже мой, я молю: \n    Укрепи Ты меня, вся надежда моя на Тебя.\n\nТы зажги в моём сердце священный огонь,\nДай мне радость и счастие вновь,\nДай мне верным и твёрдым всегда быть во всём, \nК моим ближним дай, Боже, любовь.\n\nИ лукавый смущает и мучит меня,\nХочет душу мою обмануть;\nНо Ты, Боже, скала и твердыня моя,\nТы не дай мне духовно уснуть.\n\nИ когда Ты придёшь осудить этот мир,\nМир греховный, порочный и злой,\nДа войду, о Господь, я на брачный Твой пир,\nВ Твой прекрасный чертог золотой."}, {"id": 321, "title": "Когда на сердце тяжело, никто понять тебя не может;", "text": "Когда на сердце тяжело, никто понять тебя не может;\nИ жизнь тебе уж не важна, и тяжкий гнёт тебя тревожит.\n\n    Приди, склонись перед Христом,\n    Открой всю тяжесть сердца Богу,\n    И Он пошлёт тебе покой,\n    И удалит с души тревогу.\n\nПоверь, один лишь только Он, тебя поймёт, тебе поможет, \nВедь поругание и крест за грешных нас понёс Сын Божий.\n\nХристос не хочет усложнять земной твой путь, твою дорогу, \nНо ты всё хочешь сделать сам, без упования на Бога."}, {"id": 322, "title": "Когда одолеют тебя испытанья,", "text": "Когда одолеют тебя испытанья,\nКогда в непосильной устанешь борьбе \nИ каплю за каплей из чаши страданий \nПить будешь, упрёки бросая судьбе, - \nНе падай душою, судьбу не злословь: \nЕсть вера, надежда, любовь.\n\nКогда твоё сердце заноет тоскою, \nНаступят скитанья тяжелые дни,\nИ зова душа не услышит к покою,\nНикто ей не скажет: «Иди, отдохни», - \nТы вспомни, что греет и душу, и кровь, \nТо: вера, надежда, любовь.\n\nПостигнет ли в жизни утрата какая,\nНе плачь безутешно о ней никогда.\nЗнай: участь начертана свыше такая, \nРешенье сбылось неземного суда.\nИ ты утешенья ищи и даров,\nГде вера, надежда, любовь.\n\nТерпенья не станет, ослабнут ли силы,\nВ тумане сомнений потонет душа, -\nС девизом иди ты до самой могилы,\nВедь жизнь и в страданье всегда хороша. \nВ ней большего счастья не может и быть: \nНадеяться, верить, любить."}, {"id": 323, "title": "Друг, припомни, сколько в жизни раз в отчаянье, преклонив колени,", "text": "Друг, припомни, сколько в жизни раз в отчаянье, преклонив колени, \nТы молился Богу в трудный час, прочь гоня гнетущее сомненье.\nА потом с волненьем слушал ты в своём сердце радостные звуки, \nИ тебя спасали от беды добрые (добрые) невидимые руки.\n\nСколько раз те руки боль души нежно так, с любовью врачевали, \nИ тебя, уставшего в пути, руки те с участьем поднимали!\nА когда нежданная слеза застилала взор твой в час разлуки, \nВытирали бережно глаза эти же (эти же) невидимые руки.\n\nРуки те с рубцами от гвоздей принесли всем грешникам спасенье \nИ во все века в любви своей людям шлют с небес благословенье. \nА когда греху придёт конец, навсегда уйдут страданья, муки,\nНа главу возложат мне венец Господа (Господа) сияющие руки!"}, {"id": 324, "title": "О, имя Иисуса нам так сладостно оно!", "text": "О, имя Иисуса нам так сладостно оно!\nСпасенье, счастие сердцам от Бога в Нём дано.\n\nВ Нём исцеленье тяжких ран и язв души больной;\nВ Нём утешенье христиан среди борьбы земной.\n\nВ Нём мой маяк, к Нему плыву и направляю путь;\nВ Нём пристань, где склоню главу, чтоб вечно отдохнуть.\n\nВ Иисусе Бог мне не судья, Он Друг и Пастырь мой,\nОн мой покров и жизнь моя, и радость, и покой."}, {"id": 325, "title": "Лишь в Боге душе моей успокоенье,", "text": "Лишь в Боге душе моей успокоенье,\nЛишь Он мир дарует ей и утешенье;\nСкала и опора мне, я в Нём покоюсь,\nПусть буря грозит душе - в Христе укроюсь.\n\nСпасенья оплот святой - мне защищенье;\nВ Нём счастлив средь бури злой, средь тьмы волненья. \nХоть ищут все духи зла тот мир встревожить,\nВ Нём силу душа нашла, Он превозможет.\n\nБлаженный приют душе у ног Иисуса;\nСомненья не страшны мне, к Нему стремлюсь я.\nПокой я душе нашёл, Христос - мне счастье,\nВ любви Его мир обрёл среди ненастья."}, {"id": 326, "title": "Что за Друга мы имеем? - нас Он к жизни пробудил,", "text": "Что за Друга мы имеем? - нас Он к жизни пробудил,\nВ Нём мы счастием владеем, в Нём источник вечных сил. \nАх, как часто мы страдали, боль терпя напрасно там,\nГде просить мы забывали, чтоб один помог Он нам.\n\nИскушенье ль нас тревожит, пытки ль тяжки для кого, \nКаждый пусть из нас возложит скорбь свою всю на Него. \nОн один среди вселенной может свет средь тьмы пролить; \nЛишь Христос один мгновенно может горе облегчить.\n\nИзнываем мы под зноем этой жизни суетной;\nСердце лишь Ему откроем, и Он даст душе покой.\nЕсли нас друзья забыли, скажем Господу о том,\nИ Христос проявит в силе, что Он верный Друг во всём."}, {"id": 327, "title": "Кто верным Богу пребывает и чтит Его святой завет,", "text": "Кто верным Богу пребывает и чтит Его святой завет,\nТого Он чудно охраняет среди житейских грозных бед;\nКто в вере твёрд, тот в Нём найдёт защиту от земных невзгод.\n\nКак часто на земле мы носим в груди заботы, скорбь и страх, \nИ у Него пощады просим, и ропщем на судьбу в слезах,\nНо чем нас давит жизнь сильней, тем наша слабость нам ясней.\n\nОтбрось ты всякое сомненье, неси с смиреньем крест земной, \nЧтобы святое провиденье всегда царило над тобой;\nБог любит нас и знает Он, какой нуждой наш дух смущён.\n\nСлужи Ему нелицемерно во всех словах, во всех делах,\nК тебе придёт Он непременно с словами мира на устах;\nОн в роковой невзгоды час от всех тревог спасает нас.\n\nСреди житейского волненья не думай, что ты Им забыт,\nА раб плотского наслажденья под сенью благ земных укрыт, \nБыть может, завтра принесёт нежданный для тебя исход.\n\nДля Всемогущего нетрудно богатых в бедных превратить\nИ всех, живущих в доле скудной, земным богатством наделить. \nВедь гордые пред Ним падут, а слабые покров найдут.\n\nИди же ты Его путями и духом в битве не слабей, и верь,\nЧто Он всегда над нами с великой благостью Своей;\nКто уповает на Него, увидит Бога Своего!"}, {"id": 328, "title": "«Не оставлю Я вас, не забуду! — говорит Он и мне, и тебе, —", "text": "«Не оставлю Я вас, не забуду! — говорит Он и мне, и тебе, —\nСохраню и в пустыне безлюдной, и в суровой житейской борьбе.\n\nПомогу одолеть все преграды, силой свыше в пути наделю;\nИ в минуты тяжёлой утраты утешенье и крепость пошлю.\n\nНе оставлю Я вас, не забуду, если мать и отец, и друзья \nОтрекутся от вас и осудят, верным другом для вас буду Я!\n\nИсцелю воспалённые раны, уврачую сердечный недуг, \nПерестрою разбитые планы, ободрю обессилевший дух.\n\nВоспитаю с заботою нежной, приучу ваши руки к труду, \nСохраню в этой жизни мятежной и в Небесное Царство введу.\n\nНе оставлю Я вас, не забуду! Если мир вас отвергнет, то Я\nВам Отцом и Хранителем буду, не покинет вас милость Моя!»"}, {"id": 329, "title": "Так уж бывает летней порою, когда луч солнца радует нас,", "text": "Так уж бывает летней порою, когда луч солнца радует нас,\nЧас испытанья чёрной рукою небо закроет от нас.\n\n    Пусть даже не станет овец в загоне,\n    И виноград не даст плода,\n    Всё равно я буду славить Господа Христа!\n\nИ если закружит меня волною в водовороте суетного дня,\nВерой поднявшись над суетою, вдруг запост душа моя:\n\nИ если, бывает, теряешь много, вспомни слова Иисуса Христа: \n«Где ваша ценность - там сердце будет», - значит, потеря невелика.\n\nИ если так станет, что жизненный выбор - ради Иисуса и славы Отца \nНужно лишиться овец в загоне, хочу, чтобы спела душа моя:"}, {"id": 330, "title": "Наша надежда - Ты, Христос! Ты наше счастье и любовь!", "text": "Наша надежда - Ты, Христос! Ты наше счастье и любовь!\nТы наша радость! Ты наша жизнь! Ты наше счастье и мечты!\n\n    На Тебя мы уповаем, на Тебя жизнь полагаем,\n    На Тебя взор устремляем, ввысь к небесам.\n\nТы пострадал за нас, Христос, Ты на кресте пролил Свою кровь; \nТы нам спасенье ныне принёс, Ты нас избавил от горя и слёз.\n\nНе в силах мы оценить ту любовь, которую Ты открыл для нас вновь, \nТы с неба доброту, кротость принёс; дай светлый разум понять это всё."}, {"id": 331, "title": "Ах, в этой бурной жизни, кто сердцу даст покой,", "text": "Ах, в этой бурной жизни, кто сердцу даст покой,\nКто жаждущих напоит живительной водой?\n\n    Христос лишь один (Христос лишь один),\n    Христос лишь один (Христос лишь один),\n    Христос лишь один (один) тебя утешит навсегда.\n\nЯ скорбью удручённый, со всех сторон враги,\nКто защитит, утешит на жизненном ну ги?\n\nО, грех меня терзает, страшусь я пред судом;\nНе знаю: избавленье найти мне где и в ком?\n\n    В Христе лишь одном (в Христе лишь одном),\n    В Христе лишь одном (в Христе лишь одном),\n    В Христе лишь одном (одном), мой друг, спасенье ты найдёшь."}, {"id": 332, "title": "Если грех тебя теснит - всё скажи Иисусу,", "text": "Если грех тебя теснит - всё скажи Иисусу,\nЕсли враг тебе грозит - всё скажи Иисусу.\n\n    С верой на Христа взирай, на Него лишь уповай, \n    Лишь Его словам внимай, всё скажи Иисусу.\n\nИль заботы тяготят - всё скажи Иисусу,\nТы не бойся, пусть грозят - всё скажи Иисусу.\n\nПуть твой узок, одинок, - всё скажи Иисусу, - \nНо наградою высок - всё скажи Иисусу.\n\nИ в работе, и в труде - все скажи Иисусу - \nОбещает Он помочь - всё скажи Иисусу."}, {"id": 333, "title": "Если душа истомится в страданьях, и изнеможет мой дух,", "text": "Если душа истомится в страданьях, и изнеможет мой дух,\nВерю, что в жизненном море скитаний Ты самый лучший мой Друг.\n\n    Знаешь Ты всё, омой дивный Учитель, видишь невзгоды души. \n    «Всё мне ко благу», - сказал мой Спаситель. Верю, послал это Ты.\n\nЕсли в болезни душа истомится, вспомни, ведь Я Муж скорбей. \nБез Моей воли ничто не случится, ты не страшись, будь бодрей!\n\nЕсли друзья изменяют порою, Ты говоришь: «Не грусти.\nЯ лучший Друг твой, Я буду с тобою и сохраню на пути»."}, {"id": 334, "title": "Я избрал путь христианский, путь тернистый и святой;", "text": "Я избрал путь христианский, путь тернистый и святой; \nИ иду тропою узкой в вечность, где найду покой.\n\n    Христианская надежда, ты влечёшь меня вперёд. \n    Христианская надежда - самый светлый огонёк.\n\nРадость сердце окрыляет, хоть дорога тяжела.\nС неба помощь обещает веры твёрдая рука.\n\nЦарство Божье наполняет сердца хижину мою.\nХоть и слаб - Бог помогает, верю: к цели я дойду.\n\nБуду вечно с Иисусом и к груди Его прильну,\nСвоим духом с Ним сольюсь я и от странствий отдохну."}, {"id": 335, "title": "Когда в море бушует волна, ветер рвёт твои паруса,", "text": "Когда в море бушует волна, ветер рвёт твои паруса,\nИ бессмысленной стала борьба, - пой тогда:\n\n    Иисус, Ты моя скала! Иисус, Ты живая вода!\n    И Голгофа - завет в Крови! Верен Ты!\n    Упованье моё и покой! Я однажды вернусь домой \n    И услышу Твои слова: «Ждал Я тебя!»\n\nВ нашей жизни любая беда, словно в море крутая волна, \nГубит тех, кто бросил грести - свой крест нести.\n\nУкрепившись любовью Отца, веря в ж
