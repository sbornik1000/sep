ишь веточка Твоя,\nТвоими соками питаясь, дай пребывать в Тебе всегда."}, {"id": 109, "title": "Наш меч не из стали блестящей, не молотом кован людским,", "text": "Наш меч не из стали блестящей, не молотом кован людским, \nОн, пламенем правды горящий, дарован нам Богом Самим.\n\nНе плоть он людей поражает и братскую кровь он не льёт,\nОн в душу и дух проникает и зло, и неверье сечёт.\n \nОн цепи греха разрывает и пленным свободу даёт,\nСквозь дебри он путь пролагает и к истине вечной ведёт.\n \nКак молния грозные тучи, пронзает он вражеский строй.\nОт Господа меч наш могучий, и нужен ли меч нам иной?\n\nОтточим же меч наш острее любви и молитвы огнём, \nПоднимем его и смелее пойдём за великим Вождём.\n\nНе дрогнем, когда на мгновенье Амалик ряды потрясёт. \nСмотрите: сквозь тьму и смятенье день славной победы грядёт"}, {"id": 110, "title": "Устроен колодец в пустыне сухой,", "text": "Устроен колодец в пустыне сухой,\nНаполнен он светлой кристальной водой. \nИ люди идут по тем знойным путям \nК заветным воротам, к далёким краям.\n\nИ многие с жаждой в усталой груди \nПроходят, не видя колодца того;\nИ лучшего ищут они впереди,\nНо гибнут в пути, не найдя ничего.\n\nИные приходят к колодцу тому,\nДрузей вопрошают: когда, почему \nИ кем он был вырыт? И спорят они;\nИ в споре проходят их лучшие дни.\n\nИные подходят к источнику вод\nИ радостно пыот из живой глубины,\nИ с новою силой стремятся вперёд \nК заветным воротам небесной страны.\n \nО, видишь ли, друг, ты колодец Христа? \nОчнись же, не стой в стороне от него; \nКоль жаждешь, так пей из колодца того, \nВедь Слово Господне - живая вода!"}, {"id": 111, "title": "Утром очень рано в стане Авраама", "text": "Утром очень рано в стане Авраама \nУ шатра стояла с мальчиком Агарь.\nВ путь собралась дальний, с грустью и печалью \nС госпожой проститься кротко подошла.\n\nИ в минуту грусти, в час их расставанья,\nСарра посмотрела на свою рабу\nИ сказала мужу в горести сознанья:\n«Отпусти их с миром, пусть себе идут».\n\nАвраам наполнил их мехи водою \nИ запасы хлеба в путь им положил.\nИ Агарь спокойно, поступью прямою \nШла, а с нею рядом сын шёл, Измаил.\n\nИ в пустыне дикой, солнцем опаленной,\nВ час, когда средь зноя кончилась вода, \nПосмотрев на сына, подняла мать руки - \nК небу устремилась с верою она.\n\nПлакала пред Богом, слёз не утирая, \nВозносились к небу скорбные слова:\n«Не могу смотреть я, как он умирает,\nВидишь Ты, Владыка, - кончилась вода».\n\nЖаждой и страданьем отрок истомлённый \nШевелил губами, умолял Творца.\nВдруг явился ангел, возвестил с любовью,\nУказав на место, где была вода.\n\nИ, мехи наполнив чистою водою,\nМать и сын собрались в дальний путь скорей.\nИ, блестя на солнце золотой струёю,\nЛился благодатный и живой ручей.\n\nУтомлённый путник! Если ты в пустыне \nТак же будешь жаждать - обратись к Отцу.\nОн тебе укажет, как и той рабыне,\nНа источник жизни, только верь Ему."}, {"id": 112, "title": "О, наш Отец на небесах! Прими моление моё:", "text": "О, наш Отец на небесах! Прими моление моё:\nДа славно в славных чудесах святится имя ввек Твоё!\n\nВсеведущ Ты и всемогущ, трепещет пред Тобою всё;\nВсевидящ Ты и вездесущ, да приидет Царствие Твоё.\n\nПремудрости Ты, Боже, полн, и в счастье мысль одна моя:\nПусть средь житейских бурь и волн да будет воля ввек Твоя!\n\nТы всеблагой наш Бог и Царь, Ты жизнь даёшь всем существам, \nИ вся к Тебе взывает тварь: «Дай хлеб насущный ныне нам!»\n\nТы милосерд, Ты справедлив; оставь долги ты наши нам,\nКак, гнев и злобу позабыв, прощаем мы своим врагам.\n\nКто без Тебя безгрешен был? Во искушенье не введи!\nНас немощных, о Боже сил, от злого духа огради.\n\nТвои все дивные дела, Твоё и Царство, Властелин!\nТебе и слава, и хвала во веки вечные! Аминь!"}, {"id": 113, "title": "Услышь слова мои Ты ныне, нужду мою уразумей!", "text": "Услышь слова мои Ты ныне, нужду мою уразумей!\nВ Твоей любви и благостыне внемли мольбе души моей.\n\nПредстану рано пред Тобою и буду дар Твой ожидать.\nЯ знаю — Ты не любишь злое, греху не хочешь место дать.\n\nИ я по милости великой войду в Твой дом и поклонюсь,\nИ пред Твоим небесным ликом в благоговении склонюсь.\n\nВсе, уповающие духом, с восторгом будут ликовать.\nДля нас содслался Ты Другом, Тебя хотим мы восхвалять.\n \nО Боже, Ты благословляешь дарами сына Своего, \nБлагословеньем укрываешь, как крепкою бронёй, его."}, {"id": 114, "title": "Я к Тебе, Господь, взываю из сердечной глубины,", "text": "Я к Тебе, Господь, взываю из сердечной глубины,\nВзор и мысли простираю я к пределам той страны,\n\nГде, любовью озарённый, Ты во славе Сам царишь,\nИ откуда осужденным Ты Свой мир святой даришь.\n\nМне внемли, о Царь вселенной! Я к Тебе с мольбой пришёл. \nНе припомни в плоти тленной совершённых мною зол,\n\nНе припомни речи бранной, дел постыдных, что творил,\nЯ в неправде постоянной время лучшее прожил.\n\nЯ был мёртв, но жизни семя Ты в меня Сам заронил,\nСнял моих пороков бремя, от оков освободил.\n\nСвергни иго осужденья и от всех грехов омой!\nДай мне счастие спасенья, пусть я буду вечно Твой!\n\nО небесный мой Владыка, Иисус, мольбе внемли:\nТы прости мой грех великий, муки сердца удали!\n\nУ меня одно хотенье, чтоб Ты был всегда со мной;\nТолько Ты моё спасенье, упованье и покой!"}, {"id": 115, "title": "Не в словах молитвенных речей и не в песнях жизнь души моей,", "text": "Не в словах молитвенных речей и не в песнях жизнь души моей, \nВся она сокрыта во Христе; все мои источники в Тебе!\n\nНe в желаньях я ищу покой и не в счастье, данном мне Тобой; \nПеснь одна всегда звучит во мне: все мои источники в Тебе!\n\nВидишь Ты забот моих волну и даёшь мне в сердце тишину,\nВсе желанья приношу Тебе; все мои источники в Тебе!\n\nТы явил Себя, любовь Свою, будет ли отраднее в раю?\nРадостью трепещет всё во мне; все мои источники в Тебе!\n\nРазве мне от зноя Ты не сень? Спрячусь я в Тебе в палящий день. \nВоспою в пустыне я Тебе: все мои источники в Тебе!\n\nСила вражья мне кругом грозит, но душе Господне имя - щит! \nПолную победу дал Он мне! Все мои источники в Тебе!\n\nТы моя опора и покой, крепость и покров, Спаситель мой!\nВечное блаженство дал Ты мне! Все мои источники в Тебе!"}, {"id": 116, "title": "Исцели моё сердце больное и простри ко мне руку Свою.", "text": "Исцели моё сердце больное и простри ко мне руку Свою.\nО, излей слей Духа Святого на усталую душу мою.\n\nДай, Спаситель, Твоей благодати, кротко, тихо с Тобою идти,\nНа Голгофу смотреть, на распятье и смиренно стоять на пути.\n\nЯ хочу в Край блаженства и рая, в Край, где правда святая царит, \nГде Твой лик, славой всё озаряя, для спасённых Иисусом открыт.\n\nТам, где воды Твои серебрятся, пышно лилии, пальмы цветут,\nС горем там уж нельзя повстречаться, слёзы, мрак уж туда не войдут.\n\nТам не солнечный свет освещает, не луна и не звёзды горят,\nЯрче солнца Дух Божий сияет, вечной славы лучи там царят.\n\nТам светло, и в Краю том прекрасном ждут нас радость и мир, и любовь. \nО Иисус, Тебе вечная слава за Твой крест и пролитую Кровь.\n\nО Господь мой, Тебе всё возможно, Словом Ты сотворил мир земной. \nВ этом мире печальном и ложном, мой Спаситель всегда будь со мной."}, {"id": 117, "title": "Ты единый мой Учитель на пути моём земном;", "text": "Ты единый мой Учитель на пути моём земном;\nНедостойный Твой служитель стал Твоим учеником.\n\nЯ в Твоей незримой школе и сижу у ног Твоих,\nВсем умом и всею волей ожидаю слов живых.\n\nНаучи меня молиться повседневною мольбой,\nЧтобы мне обогатиться благодатию святой.\n\nНаучи меня молиться о других, не о себе,\nЧтобы мне усовсршиться, уподобиться Тебе.\n\nНаучи мольбе целебной для себя и для людей;\nНаучи мольбе хвалебной под крестом Твоих скорбей.\n\nНаучи такой молитве, как молился Ты, Христос, -\nВ каплях крови, словно в битве, и в огне горячих слёз.\n\nНаучи меня смиренью, кротости души Твоей;\nНаучи меня терпенью под ярмом житейских дней.\n\nНаучи меня трудиться, как, Господь, трудился Ты, \nЧтобы мне не утомиться в мире зла и суеты."}, {"id": 118, "title": "Благодарю Тебя, Христос, за путь святой, тернистый,", "text": "Благодарю Тебя, Христос, за путь святой, тернистый,\nЧто к небу светлому ведёт меня Твой образ чистый.\n\n\n    Услышь, Господь, когда к Тебе взываю,\n    Мой добрый Пастырь, Иисус Христос!\n    Когда с мольбою очи поднимаю,\n    Своей рукой их осуши от слёз.\n\nКак много скорби на пути, Тебе молюсь я, Боже.\nО как до цели мне дойти? Лишь Ты в пути поможешь.\n\nОтрадно знать, о Вождь благой, что средь житейской битвы \nТы обещал пребыть со мной и в помощь дал молитву."}, {"id": 119, "title": "Когда в сердце моём появляется грусть иль тоска от душевной тревоги,", "text": "Когда в сердце моём появляется грусть иль тоска от душевной тревоги, \nЯ склоняю колени и Богу молюсь, чтобы Он помогал мне в дороге.\n\nЧтобы Он не оставил меня никогда, когда враг над душою моею, \nКогда битва кипит, в сердце пламень горит, и я духом к Нему пламенею.\n\nЧтобы Он помогал мне и в трудный тот час вечной силой святою Своею \nИ взглянул на меня и тогда, когда я на тернистом пути ослабею.\n\nВ ту минуту меня не страшит ураган, не пугают ни грозы, ни бури, \nПотому что я вижу святой Ханаан предо мной в необъятной лазури!\n\nИ мне хочется с Ним поскорее дойти к лучезарному, вечному Граду,\nДо конца путь тяжелый, тернистый пройти и скорей получить там награду."}, {"id": 120, "title": "Господи, Тобой душа согрета. Ты велик, а я так слаб и мал!", "text": "Господи, Тобой душа согрета. Ты велик, а я так слаб и мал!\nДай мне помнить вес мои обеты, что не раз в молитве я давал.\n\nЧтобы я любым своим дсяньсм радовал Тебя в своих путях, \nЧтобы все мои благодеянья не были лишь только на словах.\n\nЧтоб молитва искренней, горячей в каждое мгновение была, \nЧтоб во всех печалях и удачах не смолкала Господу хвала.\n\nМного лет я изнывал в пустыне, Ты свершил в душе переворот. \nГосподи, веди меня к вершине из пучины скорби и забот.\n\nДай мне с трудной справиться задачей: победить земную суету! \nТолько полной радостной отдачей я Тебя, Господь, приобрету."}, {"id": 121, "title": "К Тебе спешат мои мечты, о Христос!", "text": "К Тебе спешат мои мечты, о Христос!\nК Тебе я поднимаю взор полный слёз.\nК Тебе я сердцем возношусь: дай покой, \nУслышь меня, утешь меня, Боже мой!\n\nТвою красу не превзойдут все цветы. \nИсточник жизни неземной - только Ты!\nИ солнце меркнет в свете дня пред Тобой!\nО, ниспошли любви, огня, Боже мой!\n\nК Тебе с нуждой я прихожу, мой Христос. \nДай навсегда мне побороть свою плоть,\nЧтоб Дух Святой царить лишь мог, о Творец, \nУслышь меня, мой Царь и Бог, мой Отец!\n\nТы Пастырь добрый, верный мой, о Христос! \nСам укрепи Своей рукой в мире слёз,\nЧтоб мне достигнуть славы той, где царишь, \nСтраны небесной, неземной. О, услышь!"}, {"id": 122, "title": "Когда сердце болит и тоскует порой,", "text": "Когда сердце болит и тоскует порой, \nНепосильным покажется путь,\nТы склонись надо мной, Боже мой, Боже мой, \nДай мне сил у Тебя почерпнуть.\n\nЕсли в сердце сомненья нарушат покой,\nИ унынье уснуть не даёт,\nТы склонись надо мной, Боже мой, Боже мой, \nИ сними с меня тяжкий мой гнёт.\n\nЕсли видишь меня в тишине Ты ночной \nНа коленях, в слезах пред Тобой,\nТы склонись надо мной, Боже мой, Боже мой,\nИ очисти, прости и омой.\n\nКогда время придёт мне расстаться с землёй \nИ оставить всю жизнь позади,\nТы склонись надо мной, Боже мой, Боже мой, \nИ в покой меня вечный введи."}, {"id": 123, "title": "Если солнце угасает за деревней, за холмом,", "text": "Если солнце угасает за деревней, за холмом,\nОно дух мой призывает на молитву пред Творцом.\n\nТот, Кто солнцем управляет, Тот по милости Своей \nПуть дитяти устрояет в этой жизни средь людей.\n\nВождь планет, небес Владыко, взглянь на малое дитя;\nСолнце в прелести великой пред Тобой бежит, светя.\n\nНо Ты мне Отцом открылся, Сын Твой вечный стал мне брат, \nОн на землю к нам явился дверь открыть в Эдемский сад.\n\nДуха Твоего дыханье часто чувствую в мольбе.\nСлышишь Ты моё стенанье, ближе всё влечёшь к Себе.\n\nВ этот день при всём старанье не исполнил я того,\nЧто читал в Твоём Писанье, в книге Слова Твоего.\n\nПосмотри на раскаянье и прости, Творец, меня,\nСоверши моё желанье, чтобы был сильнее я.\n\nУгодить Тебе желаю, но я в жизни испытал,\nЧто не так я поступаю, как бы я того желал.\n\nЧасто дух мой равнодушен, вера и любовь - слова;\nЧасто сердцем малодушен, холодна моя мольба.\n\nНедостатки замечаю, а желанье всё сильней:\nБыть, как ангел, я желаю чистым от земных страстей.\n\nО, возьми меня Ты в руки, если я впадаю в сон,\nВспомни тех, кто в тайной муке отвергает Твой закон.\n\nКто не верит, кто гордится, кто в сомненье, как в огне,\nНаучи Ты их молиться, дай им счастье, как и мне."}, {"id": 124, "title": "В минуту жизни трудную, теснится ль в сердце грусть", "text": "В минуту жизни трудную, теснится ль в сердце грусть \nОдну молитву чудную твержу я наизусть.\n\nЕсть сила благодатная в созвучье слов живых,\nИ дышит непонятная святая прелесть в них.\n\nС души как бремя скатится, сомненье далеко,\nИ верится, и плачется, и так легко-легко."}, {"id": 125, "title": "Я усталый, изнурённый, о Господь, к Тебе иду,", "text": "Я усталый, изнурённый, о Господь, к Тебе иду,\nИ, грехом обременённый, я к ногам Твоим паду.\n\n\n    О, Господь! К Тебе иду я, дух мой слабый оживи,\n    И,Твой мир святой даруя, укрепи в Твоей любви!\n\nЯ несчастный мира житель, где покой душе найду?\nЯ пришёл к Тебе, Спаситель, от Тебя я не уйду.\n\nО, утешь мой дух печальный, дай теперь мне отдохнуть; \nПомоги свершить мне дальний и тернистый в мире путь.\n\nИ когда средь болей жгучих я устану на пути,\nНа руках Твоих могучих, верю, будешь Ты нести."}, {"id": 126, "title": "Когда в душе тоска немая, и со грехом опасна битва,", "text": "Когда в душе тоска немая, и со грехом опасна битва,\nНапрасно плачешь, унывая, одно лишь средство есть - молитва.\n\nКогда житейскою волною надежда твёрдая разбита,\nНе унывай - Господь с тобою, Ему нужна твоя молитва.\n\nКогда себя ты ощущаешь и одиноким, и забытым,\nНапрасно, сетуя, страдаешь, отраду даст одна молитва.\n\nИ если нет огня в служение, на сердце - тягостные муки, \nПочаще плачь в уединенье и воздевай в молитве руки.\n\nИ если ты, друг, с Иисусом желаешь быть всегда в общенье - \nМолитва есть беседа с Богом, она источник освященья."}, {"id": 127, "title": "Среди волнений в житейском море, когда страданья терзают грудь,", "text": "Среди волнений в житейском море, когда страданья терзают грудь, \nЯ так нуждаюсь в Твоей опоре, молю, Спаситель, со мной пребудь.\n\n\n    Так жаждет сердце моё покоя! Устал я, Боже, в борьбе земной! \n    Душа страдает в потоке горя, о Милосердный, пребудь со мной!\n\nВражда, неверье и лицемерье - зловещий отблеск мирских огней; \nЯ знаю, Церковь живёт в преддверье великих, славных грядущих дней.\n\nЯ знаю, Боже, что очень скоро придёшь, положишь скорбям конец, \nИ тем, кто в Боге имел опору, подаришь в небе святой венец."}, {"id": 128, "title": "Я знаю, что в мире покой не найду я,", "text": "Я знаю, что в мире покой не найду я,\nЗдесь много искали — найти не могли,\nНо Ты успокоишь, Свой мир мне даруя;\nО Боже, молитве моей Ты внемли.\n\n\n    Меня возлюбил Ты любовию вечной,\n    Я славлю Тебя, мой Создатель и Бог! \n    Устрой Себе место Ты в келье сердечной, \n    Избавь от печали, тоски и тревог.\n\nЯ здесь одинок, но Ты мир посылаешь, \nЛюбовью Своей окружаешь меня\nИ радостью сердце моё наполняешь,\nТы помощь, Ты сила, надежда моя.\n\nС Тобою я счастлив, пусть стрелы летают,\nЯ их не боюсь, Ты - защита моя!\nПлыву я без страха: меня охраняет \nВеликая милость и верность Твоя!\n\nИ так до конца, к той небесной лазури,\nГде я, упоенный блаженством Твоим,\nС Тобой отдохну, утомлённый от бури,\nУзрю Тебя, Боже, мой Бог и Творец."}, {"id": 129, "title": "О Иисус, ко мне приди, будь со мною впереди,", "text": "О Иисус, ко мне приди, будь со мною впереди, \nОкружи меня вокруг, о, приди, мой лучший Друг.\n\n\n    О, приди (о,приди), о, приди (о,приди),\n    О, приди, мой лучший Друг.\n\nО, как жажду я Тебя, как сладка Твоя вода.\nПризываю я Тебя: будь со мною навсегда.\n\nВ развлеченьях счастья нет, в них погибель, а не свет. \nПребывание Твоё - вот желание моё!\n\nНе открою никому дверь и в сердце не приму.\nЛишь Тебе открою дверь, о, войди, Христос, теперь!\n\nНазываю одного лишь Тебя своим Вождём.\nБудь для сердца моего, Агнец страждущий, Царём!"}, {"id": 130, "title": "Милосердный Отец! Слаб и немощен я;", "text": "Милосердный Отец! Слаб и немощен я;\nКак несчастный слепец, я ходил без Тебя!\n\nТы мне ум просветил благодатью живой,\nДал мне радость в пути по пустыне земной.\n\nДай же мне целиком лишь Твоим быть рабом, \nЧтоб меня не увлек этой жизни поток!\n\nПомоги сохранить огнь Божественных Слов, \nЧтоб на зовТвой святой я всегда был готов!"}, {"id": 131, "title": "Как овечку, Пастырь сильный, Ты веди меня вперёд;", "text": "Как овечку, Пастырь сильный, Ты веди меня вперёд;\nПажити Твои обильны, к водам голос Твой зовёт.\nО, Иисус мой! О, Иисус мой! За меня Ты Кровь пролил. (два раза)\n\nНа земле Ты будь мне Другом, агнцев в мире охраняй;\nНас веди небесным лугом, а заблудших выручай.\nО, Иисус мой! О, Иисус мой! Ты грехи мои понёс. (два раза)\n\nО, исполни обещанье: дай Свою мне благодать!\nПосле долгого скитанья поспеши меня принять.\nО, Иисус мой! О, Иисус мой! Приближай меня к Себе. (два раза)\n\nСделай сердце мне способным вечный Твой завет любить.\nДай любовь ко мне подобным, научи любовью жить.\nО, Иисус мой! О, Иисус мой! До могилы будь со мной! (два раза)"}, {"id": 132, "title": "Если твой дух утомится в трудной житейской борьбе,", "text": "Если твой дух утомится в трудной житейской борьбе,\nДруг мой, начни ты молиться — это даст силу тебе.\n\n    Если кто утомлённый, к Богу пусть тот воззовёт. \n    Сердцу, усталому в жизни, силу молитва даёт.\n\nЕсли заботы с нуждою давят усталую грудь,\nБог да пребудет с тобою и уравняет твой путь.\n\nЕсли мечты и желанья в жизни разбиты твои,\nНе забывай: упованье наше в Христовой любви.\n\nЕсли болезнь и страданья душу твою потрясут,\nВ тяжкие дни испытанья слёзы из глаз потекут,\n\n    Друг мой, нужно молиться, сила, поверь же, в мольбе. \n    Ею твой дух укрепится и станет легче тебе."}, {"id": 133, "title": "Я Тебя неоднократно, Боже правый, умолял,", "text": "Я Тебя неоднократно, Боже правый, умолял,\nЧтобы силой благодатной Ты мне помощь оказал. \nОтчего, не постигаю, до сих пор ответа нет?\nОтчего я продолжаю изнывать от прежних бед?\n\nНе желаешь ли к терпенью слабый дух мой приучить, \nЧтобы к славному служеныо силой свыше наделить? \nНо мой дух горит томленьем, я в мольбе не замолчу \nДо тех пор, пока моленьям Твой ответ не получу.\n\nБуду я Тебе молиться духом, сердцем и умом, \nПросьбы веры будут литься утром, вечером и днём. \nКак душе сознанье ценно: Ты Отец, а не судья!\nИ ответишь непременно - в том уверен твёрдо я.\n\nКак вдова перед судьёю, буду я к Тебе взывать\nИ слезами, и мольбою непрестанно докучать.\nИ я вновь, Господь, взываю, я опять у ног Твоих \nИ ответа ожидаю каждый час и каждый миг."}, {"id": 134, "title": "О, я грешник бедный, правда, я таков.", "text": "О, я грешник бедный, правда, я таков.\nЕсли б Бог бессмертный не был полн даров,\nНе был полн любовью и не спас меня,\nТо погиб давно бы в мире этом я.\n\nБуду с верой в сердце на Пего смотреть,\nЕсли «мир!» не скажет - мне им не владеть. \nЕсли ж я услышу слово от Него -\nБуду славить сердцем, воспевать Его.\n\nВ сладком размышленье, что Ты Пастырь мой, \nИсчезают сразу грех и страх людской; \nРадостно желаю я в Тебе пребыть,\nДля Тебя трудиться и с Тобою жить.\n\nДа, мой Бог, Ты дивный Царь даров святых, \nСлово правды вечной и души Жених.\nПусть я буду бедный духом пред Тобой,\nЧтоб в Тебе нуждаться и дышать Тобой!"}, {"id": 135, "title": "На трудной жизненной тропе, о, дай, Спаситель, силы мне", "text": "На трудной жизненной тропе, о, дай, Спаситель, силы мне \nСказать безропотно Тебе: «Как хочешь Ты!»\n\nИ если Ты захочешь взять, что мне больней всего отдать,\nО, дай мне радостно сказать: «Как хочешь Ты!»\n\nИдёт ли срсдь страданий путь, лишь Ты моей опорой будь;\nСо мной всегда, Господь, пребудь: «Как хочешь Ты!»\n\nВсю волю покори Себе, смиренье дай и силу мне,\nЧтоб каждый день сказать Тебе: «Как хочешь Ты!»\n\nКогда ж придёт последний час, пусть шепчет мой усталый глас \nТому, Кто дух навеки спас: «Как хочешь Ты!»"}, {"id": 136, "title": "Боже, да будет воля Твоя! Твоим сосудом сделай меня.", "text": "Боже, да будет воля Твоя! Твоим сосудом сделай меня.\nЧтоб перестроил волю мою, перед Тобою с верой стою.\n\nБоже, да будет воля Твоя! Проверь, исследуй всего меня,\nСнега белее меня омой, даруй смиренье, пошли покой.\n\nБоже, да будет воля Твоя! Скорби земные сердце теснят. \nТвёрдость и силу Ты мне пошли, Боже, помилуй, Царь всей земли!\n\nБоже, да будет воля Твоя! Да знают люди сущность бытья.\nСердце так жаждет Духа вдвойне, чтоб видел каждый Бога во мне."}, {"id": 137, "title": "Человека сердце жаждет милости, любви Творца,", "text": "Человека сердце жаждет милости, любви Творца,\nБез Него оно так страждет, как без пастыря овца.\n\nО мой Бог, Ты видишь, знаешь: я хочу любви Твоей;\nИ я знаю, Ты желаешь дать любовь душе моей.\n\nЗнаю я из слов Писанья: Ты меня уж возлюбил - \nДля меня Ты в день страданья Сына Своего забыл.\n\nСердцем, полным умиленья, я б хотел па крест взирать; \nКровь и раны от мученья никогда не забывать!\n\nЯ б хотел, чтоб вид мученья влил в меня огонь такой,\nЧтоб он сжёг во мне сомненья, все соблазны, грех плотской.\n\nЧтоб, любя не для на!рады, беззаветно и вполне,\nЯ не видел бы преграды для любви Твоей ко мне."}, {"id": 138, "title": "Научи меня, Боже, молиться, Твой священный закон соблюдать;", "text": "Научи меня, Боже, молиться, Твой священный закон соблюдать; \nНаучи гордым сердцем смириться, Твою волю во всём исполнять.\n\nЧтобы жил Ты во мне безраздельно, Дух Святой чтоб во мне пребывал, \nЧтоб любил я Тебя беспредельно и лишь имя Твоё прославлял.\n\nЧтоб, омыт драгоценною Кровью, чистым сердце своё я хранил \nИ святой, бескорыстной любовью всей душой своих ближних любил."}, {"id": 139, "title": "Христос, Христос, к Тебе душа стремится,", "text": "Христос, Христос, к Тебе душа стремится,\nК Твоим бескрайним светлым небесам. \nКак я хочу в дом Отчий возвратиться! \nХристос, Христос, приди скорее к нам.\n\nГрех так открыто, явно торжествует,\nТвой гимн любви осмеян уж давно.\nБегут века, всех будущность волнует,\nА сколько светлых дней погребено?\n\nИ в этот миг отчаяний и муки \nВ душе сознанье ясное горит:\nЧто сердца ропот и упрёков звуки \nТвоя любовь безмерная простит.\n\nО, да царит во всём Твоя лишь воля,\nА нам дай сил быть верными Тебе,\nКакая б нас ни ожидала доля,\nКак ни теснил бы враг нас на земле."}, {"id": 140, "title": "Я хочу с Тобой поговорить, мой хороший, самый лучший Друг,", "text": "Я хочу с Тобой поговорить, мой хороший, самый лучший Друг,\nНа меня с небес Ты посмотри, слышишь сердца частый-частый стук.\n\nЯ хочу с Тобой поговорить, облегчить печали тяжкий груз;\nТо, что здесь мне некому открыть, я несу Тебе, мой Иисус.\n\nЯ с Тобой поговорить хочу, потому что далеки друзья,\nС ними я о горе помолчу, им не понесу печали я.\n\nЯ спешу с Тобой поговорить в час, когда темно-темно вокруг;\nНа меня с небес Ты посмотри и приди, как самый лучший Друг."}, {"id": 141, "title": "Прихожу к Тебе, мой Отче, милосердный Боже мой,", "text": "Прихожу к Тебе, мой Отче, милосердный Боже мой, \nДа узрят святые очи дух мой слабый и больной.\n\nЧасто я во тьме блуждаю без надежды на Христа \nИ напрасно расточаю драгоценные года.\n\nЯ оставлю мир порочный и в родимый край пойду, \nПусть не сыном, а слугою - в ноги Отчие паду!\n\nПред Тобой склоняюсь, Боже, я пришел к Тебе душой, \nТы прощенье дать мне можешь, даровать душе покой."}, {"id": 142, "title": "Когда я в житейских волнах утопаю, и вера слабеет моя,", "text": "Когда я в житейских волнах утопаю, и вера слабеет моя,\nК Тебе я в молитве своей простираюсь, молю, чтоб услышал меня.\n\n    Но веры так мало и силы не стало,\n    И гаснут порывы любви.\n    Молитва ослабла, надежда увяла,\n    Прошу, мой Господь, помоги.\n\nВ волнениях жизни порою слабею, идти за Тобою нет сил, \nДушою своею так сильно болею, молю, чтоб меня Ты простил.\n\nИ верю, что слышишь меня Ты, Отец мой, хоть вера слаба так в груди, \nИ Ты дашь мне силы идти до Отчизны, не падая духом в пути!"}, {"id": 143, "title": "В тихий вечер склоняю я колени в тиши", "text": "В тихий вечер склоняю я колени в тиши \nИ Тебя призываю: «О, Властитель души!\nТы приди в мою душу, тихо свет Свой пролей. \nЯ Твой голос услышу, Твоё Слово - елей».\n\nВсе заботы земные отошли далеко,\nИ в минуты ночные мне бывает легко.\nЗнаю я, Ты ответишь на вопросы души. \nПриходи в тихий вечер, о Иисус, приходи.\n\nСветом правды жизнь нашу навсегда озари, \nКак в Эммаус когда-то, рядом с нами иди. \nРазъясняй Слово жизни, чтоб горели сердца, \nНа дороге к Отчизне с нами будь до конца."}, {"id": 144, "title": "Как воин на вождя глядит в борьбе (глядит в борьбе),", "text": "Как воин на вождя глядит в борьбе (глядит в борьбе),\nГлаза обращены мои к Тебе (мои к Тебе);\nСпаситель мой, Тебя я ожидаю,\nК Тебе (Господь) я сердце простираю.\n\nВзгляни, Господь, Всеведец, Царь всего (и Царь всего),\nКак трудно ждать прихода Твоего (да, Твоего).\nДай силу в терпеливом ожиданье,\nЧтоб не заснуть (врагу) на посмеянье.\n\nДай каждый день считать последним мне (последним мне), \nЧтоб Ты меня здесь не застал во сне (застал во сие);\nПридёт Жених - услышим зов к покою,\nГотовые (в Твой мир) войдут с Тобою.\n\nПриди, душа взывает, близко ль Ты (о, близко ль Ты)?\nИ жаждет зов услышать с высоты (зов с высоты).\nЯ жду Тебя с сердечною мольбою;\nСпаситель мой, (приди) приди за мною!"}, {"id": 145, "title": "О Господь, Спаситель мой, льну к Тебе я всей душой;", "text": "О Господь, Спаситель мой, льну к Тебе я всей душой;\nЯ хочу с Тобою жить, я хочу в Тебе пребыть.\nО, пребудь во мне Ты Сам, по Своим веди путям,\nБудь мне Пастырем, Царём, будь для сердца всё во всём.\n\nБез Тебя я был в цепях, а с Тобой освобождён;\nБез Тебя тонул в волнах, а с Тобою я спасён.\nБез Тебя я был покрыт, как проказою, грехом,\nА с Тобою я омыт, убелён Твоим ручьём.\n\nБез Тебя печали гнёт над душой моей царит,\nА с Тобой и в дни невзгод сердце радостью горит.\nБез Тебя кругом зима, а с Тобой весны расцвет;\nБез Тебя и ночь, и тьма, а с Тобою вечный свет.\n\nБез Тебя порока яд, а с Тобой блаженства край;\nБез Тебя и смерть, и ад, а с Тобой и жизнь, и рай.\nБез Тебя я прах земной, а с Тобою неба сын;\nМоим сердцем и душой, о, владей же Ты один!"}, {"id": 146, "title": "Как я желаю к Тебе, мой Боже, как я хотел бы туда - в небеса.", "text": "Как я желаю к Тебе, мой Боже, как я хотел бы туда - в небеса. \nТолько с Тобою я всё побеждаю, только с Тобою на сердце роса.\n\nЖизнь так тревожна часто бывает, давят на душу и грех, и тоска. \nТолько в Тебе, Бог мой, твёрдо я знаю-радость, надежда и жизни весна.\n\nБоже, мой Боже, я так желаю, чтобы дал сил Ты мне твёрдо идти. \nС кем поделюсь я о том, как желаю на небеса, в то блаженство войти?\n\nПесни Тебе я, Боже, слагаю, петь я хочу Тебе там в небесах.\nПусть же та песня вовек не смолкает, пусть она будет всегда на устах!"}, {"id": 147, "title": "Молитва - речи нет подобной! Душа в ней с Богом говорит.", "text": "Молитва - речи нет подобной! Душа в ней с Богом говорит. \nМолитва - сердцу так свободно, и от неё грех прочь бежит. \nМолитва с небом съедиияет, молитва силу нам даёт,\nСреди страданий укрепляет и у тверждает средь невзгод.\n\n    Молитва есть души дыханье,\n    Молитва - свет средь тьмы ночной!\n    Молитва - сердцу упованье,\n    Несёт покой душе больной!\n\nТакой молитве Бог внимает: сердечной, искренней, простой. \nИё к Себе Он принимает и в душу льёт Свой мир свя той. \nМой друг, гори огнём молитвы, Иисусу сердце открывай,\nИ устоишь в тяжелой битве. Всегда молись, не забывай!"}, {"id": 148, "title": "Господи! Я взываю к Тебе!", "text": "Господи! Я взываю к Тебе!\nГосподи! Ты один лишь помощник в борьбе!\nПребудь же со мной, о Боже благой,\nМеня охраняй на пути Своею могучей рукой.\n\nГосподи! Сколько горя вокруг!\nГосподи! Ты один лишь надёжный мой Друг!\nВ сердечной мольбе взываю к Тебе \nИ тайную сердца тоску Тебе одному приношу.\n\nГосподи! Ты надежда моя!\nГосподи! Полагаюсь я лишь на Тебя!\nИ всею душой стремлюсь быть с Тобой \nВ той вечной стране, где всегда царит мир и дивный покой."}, {"id": 149, "title": "Боже мой (Боже мой),от Тебя не скрыты мои тайны,", "text": "Боже мой (Боже мой),от Тебя не скрыты мои тайны, \nИ все муки сердца знаешь Ты.\nКак стрела греха наносит раны,\nЗнаешь Ты (знаешь Ты) (2 раза),знаешь Ты.\n\nЗнаешь Ты (знаешь Ты), что я часто так изнемогаю, \nНо хочу я свято жизнь прожить,\nЛишь идти покорно за Тобою,\nСвято жить (свято жить) (2 раза),свято жить.\n\nНа кресте (на кресте) умер Ты,за нас кровь проливая. \nТы заступником стал и моим.\nТы молил, с любовью умирая:\n«Прости им (прости им) (2 раза), прости им».\n\nЗнаю я (знаю я), что прощённых и омытых Кровью \nОтдых ждёт от тяжкого пути,\nНо когда в дороге упаду я -\nМне прости (мне прости), мне прости."}, {"id": 150, "title": "О Господь, в молитве пред Тобой склоняюсь,", "text": "О Господь, в молитве пред Тобой склоняюсь, \nБлагодарность сердца приношу Тебе \nЗа любовь, за путь Твой; Боже, умоляю:\nОсвяти, очисти жизнь мою в Себе.\n\nО Иисус, Ты очи мне открыл однажды,\nЯ себя увидел в страшной нищете\nИ в слезах горячих пал к ногам пронзенным. \nВ эту ночь, Иисус мой, Ты пришёл ко мне.\n\nНежно Ты склонился над моей главою\nИ спросил так тихо: «Любишь ли Меня?»\nНе упрёком строгим, нежною любовью \nТы тогда навеки приобрёл меня.\n\nВсю земную прелесть, суету и мудрость \nПроменял на счастье, что мне дал Христос. \nНичего не нужно больше в этой жизни"}, {"id": 151, "title": "Как цветок полевой, что сквозь пыльный покров", "text": "Как цветок полевой, что сквозь пыльный покров \nРвется к солнечным, светлым лучам,\nТак из мрака греха я стремлюсь всей душой, \nМой Господь, к Твоим дивным рукам.\n\nК тем рукам, по которым лилась Твоя кровь \nЗа мой грех на позорном кресте,\nК тем рукам, что несут людям свет и любовь, \nОзаряя мой путь в темноте.\n\nК тем рукам, что поднять могут в бурю скорбей \nТяжкий камень с усталой груди,\nЧто с любовью отрут слёзы горя с очей\nИ с участьем утешат в тиши.\n\nК тем рукам, что уж скоро от грешной земли\nМеня в райский чертог позовут,\nГде под сводом небес для бессмертной души \nСолнце радости вечной зажгут."}, {"id": 152, "title": "Молись, мой друг, молитва укрощает", "text": "Молись, мой друг, молитва укрощает \nМучительный сомненья в сердце яд.\nЖивит, больную душу исцеляет.\nНе унывай, молись и верь, мой брат.\n\n    Молитва - светлой веры крылья,\n    Чтоб улететь от суеты, тревог.\n    Молись в день радужный и в час бессилья, \n    И верь, что слышит неизменный Бог.\n\nМолись Ему, когда рассеять тучи \nСомненья и тоски бессилен ты,\nКогда свирепый ураган могучий \nУносит вдаль все лучшие мечты.\n\nМолись, когда сильней бушует море,\nТвоей ладье погибелью грозит.\nКогда в нужде, в опасности и в горе,\nГосподь твой дух в молитве укрепит."}, {"id": 153, "title": "Учитель мой, не оставляй меня, ведь я так слаб и мне нужна опора.", "text": "Учитель мой, не оставляй меня, ведь я так слаб и мне нужна опора. \nИ лишь с Тобой смогу я устоять в борьбе с волнами жизненного моря.\n\nУчитель мой, не оставляй меня, Ты дал мне жизнь, ведь я Твоё творенье, \nТы дал мне искорку сердечного огня, душе моей послал освобожденье.\n\nУчитель мой, не оставляй меня, веди Своей могучею рукою;\nТы знаешь всё, и пусть душа моя согрета будет лишь одним Тобою."}, {"id": 154, "title": "К Тебе, Спаситель мой, взываю, к Тебе стремлюсь больной душой;", "text": "К Тебе, Спаситель мой, взываю, к Тебе стремлюсь больной душой; \nС надеждой на Тебя взираю и горько плачу пред Тобой.\n\nПростри ко мне святые руки и от греха меня омой;\nХочу забыть я сердца муки и лишь в Тебе искать покой.\n\nХочу горячими устами Твоё лишь имя призывать.\nХочу раскаянья слезами я о прощенье умолять.\n\nПрости мне ропот мой безумный, что горя я не мог снести;\nПорыв отчаяния бурный забудь, Спаситель мой, прости!\n\nЯ к людям не пойду с тоскою: им мало дела до других,\nНо пред Тобой склонюсь главою и отдохну у ног Твоих.\n\nО, дай мне силы, дай терпенья нести свой крест и не роптать, \nКогда на камень преткновенья я должен в жизни наступать.\n\nЧтоб всей душой, а не наружно я людям мог бы вес простить, \nЧтоб я служил, когда им нужно, и мог бы искренно любить."}, {"id": 155, "title": "О Боже, Боже, дай мне силы за ближних душу полагать", "text": "О Боже, Боже, дай мне силы за ближних душу полагать \nИ в сердце вечно до могилы врагам обиды все прощать.\n\nНе дай мне с ложью примириться в суровой жизненной борьбе \nИ научи меня молиться, молиться пламенно Тебе.\n\nО Господи, в словах проклятья здесь многие клеймят меня,\nНо дай открыть мне им объятья, Христову заповедь храня.\n\nПусть камни в грудь мою бросают, не признавая чувств святых, \nПусть ненавидят, проклинают, дай душу положить за них.\n\nО, дай мне сил Твои заветы в душе страдающей хранить\nИ помоги врагов наветы с терпеньем, с кротостью сносить."}, {"id": 156, "title": "Прими наши приношенья, Боже,", "text": "Прими наши приношенья, Боже,\nЧто с любовью мы несём к Тебе.\nС верой и надеждой Тебя просим, Боже,\nДай усердия в молитве и труде.\n\nДай познать нам волю Твою, Боже,\nЖизнь свою хотим мы изменить.\nВедь нам заменить Тебя никто не сможет,\nБез Тебя нам невозможно, Боже, жить.\n\nНе оставь нас, Господи, в сомненьях - \nИх с Гобой сумеем разрешить.\nУкажи нам путь в молитвах каждодневных,\nЕсли мы не знаем, как нам поступить.\n\nХорошо с Тобой в общенье, Боже,\nНо другие свет Твой не нашли;\nГосподи, Тебя встречаем мы в любом прохожем, \nДай, чтоб через нас к Тебе пришли."}, {"id": 157, "title": "Луч последний за горами вспыхнул и погас...", "text": "Луч последний за горами вспыхнул и погас...\nО Господь, останься с нами в этот поздний час. \nПод покровом ночи тёмной зло и грех творят, \nЛишь у ног Твоих спокойно души верных спят.\n\nПастухи овечек поят и ведут домой...\nПастырь наш, водой живою жажду успокой; \nИсцели все наши раны, гордость изгони,\nИ везде нам будь охраной во все наши дни.\n\nШирь земную покрывает неприятный мрак,\nК злому делу приступает старый хитрый враг. \nНо когда и к нам придёт он, чтоб украсть покой, \nТы разрушь его работу правдою святой.\n\nЛуч последний за горами вспыхнул и погас...\nО Господь, останься с нами, не оставь Ты нас. \nКогда смерти ночь настанет, нам во тьме свети, \nОт житейских испытаний в край родной веди."}, {"id": 158, "title": "Я хочу с Тобою быть, о Спаситель мой.", "text": "Я хочу с Тобою быть, о Спаситель мой.\nЛишь в Тебе хочу пребыть каждый час земной.\nБез Тебя мне мира нет, без Тебя мне счастья нет,\nЛишь в Тебе сияет мне жизни вечной свет.\n\nЯ бродил в плену греха, Ты освободил.\nЯ был мёртв, но Ты меня к жизни возвратил.\nГде найду я свой покой? Где склонюсь больной душой \nНа Твоей, Христос, груди мой святой покой!\n\nНа Голгофе Ты страдал, Кровь Свою пролил,\nВ тяжких муках умирал, жизни не щадил.\nЯ хочу страдать с Тобой, Иисус, Спаситель мой.\nЗнаю, твёрдо верю я - жизнь в Тебе моя!\n\nЧто могу ещё сказать о Тебе, Христос?\nНе сдержу от счастья я благодарных слёз.\nЛишь в Тебе хочу пребыть, лишь Тебе хочу служить, \nТы, Господь мой, верю я, - будущность моя!"}, {"id": 159, "title": "О, если б навеки я мог быть Твоим, у ног Твоих, нежно внимая,", "text": "О, если б навеки я мог быть Твоим, у ног Твоих, нежно внимая,\nЯ б слушал покорно с восторгом живым о повестях чудного рая.\n\nО счастье, о мире, о дружбе, любви Ты Книгу Свою открывал бы. \nИ вечным блаженством, как ангел в тиши, я душу свою наполнял бы.\n\n0, если б навеки я мог быть Твоим, к груди Твоей нежно прижаться, \nЯ всё, всё земное отдал бы другим, чтоб только Твоим называться.\n\nИ слышится мне, будто кто-то в тиши меня, утешая, ласкает \nИ шепчет мне тихо: «Давно от тебя решений твоих ожидаю.\n\nЯ душу Мою за тебя положил, во мраке скитался одиноко,\nИ Кровью Своею тебя искупил, хотя ты отбился так далёко.\n\nА ныне ты Мой, и сомненья твои с тебя Я навеки снимаю.\nО, друг Мой! О, брат Мой! Скорее иди, тебя Я давно ожидаю!»\n\nИ пал я, рыдая, пред Богом моим, одежды свои раздирая.\nА Бог мой меня называет Своим, за всё и во всём мне прощая."}, {"id": 160, "title": "Господь Спаситель мой, к Тебе взываю я, услышь мольбу мою!", "text": "Господь Спаситель мой, к Тебе взываю я, услышь мольбу мою!\nУ ног Твоих святых нужду слагаю я и всю печаль свою.\n\nЛюбовь Твоя меня нашла, поставила, сказала мне: «Иди!»\nИ к вечной радости спешить заставила, огонь зажгла в груди.\n\nТы нежным голосом сказал душе моей: «Нe бойся бурь в пути! \nТы не один пойдёшь, но также буду Я всегда с тобой идти.\n\nИ если ты, скорбя, заплачешь иногда среди борьбы и бед,\nУтешу Я тебя и укажу тогда на Мой кровавый след.\n\nИль обессилишь ты средь тьмы и суеты, приди ко Мне в мольбе: \nЯ путь твой озарю, чтоб ты не пал в бою, и силы дам тебе».\n\nИ Слово истины звучит так сладостно в моей больной душе,\nИ в сердце мир царит, и дух мой радостно хвалу поёт Тебе."}, {"id": 161, "title": "На заре, на рассвете дня Ты услышь, Господи, меня,", "text": "На заре, на рассвете дня Ты услышь, Господи, меня,\nСлабый дух Словом подкрепи, для труда сил пошли.\n\n    О небесный (о небесный) Отец, Ты отрада (Ты отрада) сердец, \n    Ты мой Пастырь благой! О, пребудь же всегда со мной!\n\nСреди дня Ты мольбе внемли и меня на пути храни,\nМой Господь, за руку веди и от зла огради.\n\nМой Господь, и на склоне дня льну к Тебе, Ты услышь меня;\nВ сердце мир свыше Ты пролей, будь охраной моей."}, {"id": 162, "title": "Господь! Дай жизнь душе моей, возьми её, как достоянье.", "text": "Господь! Дай жизнь душе моей, возьми её, как достоянье.\nНес за нес Ты крест скорбей, терпел и боли, и страданья.\nИ пусть, Тобою спасена, да будет ввек Твоя она!\n\nГосподь! Дай жизнь душе моей, очисти сердце, помышленья. \nДать всё один Ты можешь ей, взгляни на скорбь и искушенья. \nНичтожен и бессилен я: Ты помощь, сила, жизнь моя!\n\nГосподь! Дай жизнь душе моей, излей в неё Свою Ты силу, \nНе дай во тьме погибнуть ей и во грехах сойти в могилу;\nДа буду сердцем и душой я вечно съединён с Тобой."}, {"id": 163, "title": "Когда безбрежный рокот океана", "text": "Когда безбрежный рокот океана \nБросает, словно щепы, корабли,\nНеся их в даль навстречу урагану,\nЯ говорю: «Как слаб, бессилен сын земли!»\n\n    Тогда молитву я творю и Богу в сердце говорю: \n    «Что человек, что помнишь, Боже, Ты его?»\n\nКогда смотрю на путь созвездий млечных,\nНа солнца, что бегут из века в век\nВокруг миров в пространствах бесконечных,\nЯ говорю: «О, как ничтожен человек!»\n\nКогда я слышу, что Творец творенья,\nМогущий мир стереть в единый миг,\nЗовет людей в объятия прощенья,\nЯ мыслю: «Боже, мир не стоит благ Твоих!»\n\nКогда я слышу: Бог для счастья твари \nПослал на муку Сына Своего,\nЯ погружаюсь в мысль о Божьем даре:\n«Что человек, что помнишь, Боже, Ты его?»\n\nО вечный Бог, царишь Ты над мирами,\nИ ангелы у трона Твоего\nПоют хвалу безгрешными устами.\nЧто человек, что помнишь, Боже, Ты его?"}, {"id": 164, "title": "Не вечно буду я скитаться в долине сумрачной земной;", "text": "Не вечно буду я скитаться в долине сумрачной земной;\nЯ странник, уж пора расстаться мне с этой жизнью, и домой.\n\nТебе служить хочу, Спаситель: я куплен дорого Тобой,\nТы Царь и сильный мой Властитель; я весь и вечно буду Твой.\n\nТвой мир святое наслажденье даст печальному душой;\nО, ниспошли мне утешенье и светлый, радостный покой!\n\nДаруй, чтоб с ревностью стремился я труд свой исполнять всегда, \nИ чтобы свет Твой не затмился в душе смиренной никогда.\n\nКогда же нету вдохновенья в молитве, нет любви огня,\nПусть Кровь Твоя, Твой крест, мученья на подвиг вдохновят меня."}, {"id": 165, "title": "Кипит и бушует, шумит и клокочет,", "text": "Кипит и бушует, шумит и клокочет,\nНесётся со скал водопадом река.\nИ пенятся волны её, низвергаясь,\nИ страшно шумит, разъярившись, вода.(2 раза)\n\nИ тут же на ветке, средь брызг водопада,\nЯ пташечку вижу сквозь пар и туман.\nСпокойно порхая над грозной пучиной,\nПоёт свою песенку под ураган. (2 раза)\n\nМалиновка милая, Божия пташка,\nНаставь нас, как петь среди бури земной.\nСкажи, как покой свой ты здесь сохраняешь,\nГде только паденья рёв слышится злой? (2 раза)\n\nНо птичка лишь песню свою повторила, \nРасправила крылья в просторах небес...\nТак вот в чём покой твой и в чём твоя сила:\nСама хоть мала ты, да крылышки есть! (2 раза)\n\nДа, крылья, лишь крылья нужны нам средь бури, \nВсегда чтоб могли подниматься мы ввысь.\nИ кто-то шепнул мне: «Ведь крылья даны нам:\nКоль хочешь подняться, то верь и молись!» (2 раза)"}, {"id": 166, "title": "Господи, к Тебе я поднимаю взор, к Тебе ищу пути.", "text": "Господи, к Тебе я поднимаю взор, к Тебе ищу пути.\nДуша томится с давних пор, покой где обрести?\nСлезы туманят очи мне и счастья нет в пути!\nУслышь, Господь, я жду! Куда же я пойду? Покой где обрести\n\nГосподи, к Тебе хочу прийти, в Тебе хочу найти \nЯ счастье, радость и покой, прими меня, я Твой.\nЛишь Ты мне можешь счастье дать, мне можешь мир послать \nИ снять с души тоску, сердечную тоску, и светом осиять!\n\nГосподи, к Тебе я поднимаю взор, к Тебе ищу пути.\nТы - Утешитель с давних пор, к Тебе хочу прийти.\nСлезы туманят очи мне и счастья нет в пути!\nУслышь, Господь, я жду! Куда же я пойду? Покой где обрести \nЛишь Ты мне можешь счастье дать, мне можешь мир послать \nИ снять с души тоску, сердечную тоску, и светом осиять!"}, {"id": 167, "title": "О молитва, о молитва! В жизни Богом ты дана.", "text": "О молитва, о молитва! В жизни Богом ты дана.\nВ скорбной жизни среди битвы поднимала ты меня. \nТёмной ночью я не спал, на коленях всё стоял \nИ душою с Богом говорил: «Ты услышь меня, мой Бог, \nСреди жизненных тревог помоги, я выбился из сил!»\n\nЗа окном бушует ветер, хлещет снегом ледяным,\nИ такой же бурей в сердце в этот вечер я томим.\nНо, смирившийся во прах, со слезами на очах\nЯ в скорбях Иисуса умолял: «О мой Бог! Ты знаешь всё, \nНа душе так тяжело, я измучен и почти упал».\n\nБоже мой, я жизни лёгкой и беспечной не хочу,\nПусть страдания и скорби на пути своём найду.\nОб одном прошу лишь я, чтоб я чувствовал всегда,\nКак Твоя всесильная рука на плечах лежит моих\nИ среди житейских битв ободряет ласково меня.\n\nО молитва, о молитва! Благодарностью горю, \nПрославляю Божью силу, благодати глубину!\nБоже! Ты в любви святой укреплял дух слабый мой,\nКогда в бурю падал я без сил. К небесам сердечный вздох \nВозносился средь тревог, я в молитве радость получал."}, {"id": 168, "title": "Ты - помощь мне, Господь, на всякий час;", "text": "Ты - помощь мне, Господь, на всякий час;\nИ мир дарует мне Твой нежный глас.\n\n    К Тебе моё стремленье во всякий час с нуждой, \n    В Тебе моё спасенье, в Тебе покой!\n\nТы - помощь мне, Господь, пребудь вблизи,\nИ искушенья власть Сам отрази.\n\nТы - помощь мне, Господь, среди скорбей!\nПриди, вселись и Сам Твой свет пролей.\n\nТы - помощь мне, Господь, мной управляй \nИ, как Ты обещал, не оставляй.\n\nТы - помощь мне, Господь, мой Царь, мой Бог,\nЧтоб силой я Твой всё превозмог."}, {"id": 169, "title": "Бог мой, храни меня! Бог мой, храни!", "text": "Бог мой, храни меня! Бог мой, храни!\nДаруй, чтоб прожил я краткие дни \nС Книгой святой в руках, Словом Твоим в устах. \nБог мой, храни меня! Бог мой, храни!\n\nМудрость мне в ум вложи, Слово - в уста,\nВ сердце любовь пошли, в дух - Дух Христа; \nВсем, всем, как есть, снабди, к вечности Сам веди. \nБог мой, храни меня! Бог мой, храни!\n\nВсюду, где стану я из Твоих слов \nЛюдям вслух возвещать подвиг Христов,\nГде б враг, следя за мной, мне мог грозить бедой, \nБог мой, храни меня! Бог мой, храни!\n\nЕсли бы грех меня стал соблазнять,\nТо помоги, чтоб я смог устоять \nВерным Тебе слугой в вере Твоей святой.\nБог мой, храни меня! Бог мой, храни!"}, {"id": 170, "title": "Услышь меня, Боже, когда я изранен", "text": "Услышь меня, Боже, когда я изранен \nТоскою, измучено сердце в груди.\nУслышь, когда слабый мой дух опечален,\nКо мне Ты на помощь, Спаситель, приди.\n\nУслышь меня, Боже, так слаб я порою,\nИду против ветра, в ночи и пургу.\nУслышь, ведь я часто страдаю душою,\nУстал я и больше идти не могу.\n\nМой дух угнетён той тяжёлою ношей,\nКак камень на плечи греховный лёг груз.\nК Тебе я сердечно взываю, о Боже,\nУслышь и ответь на молитву, Иисус!\n\nПошли же ответ, я совсем обессилел.\nСними мою ношу и мир сердцу дай.\nПусть дух мой усталый, расправивши крылья, \nНаправит полёт в безмятежный Твой край!"}, {"id": 171, "title": "Господь, я Тебе благодарен за вечный, божественный свет.", "text": "Господь, я Тебе благодарен за вечный, божественный свет.\nДо смерти Тебя буду славить, прими же теперь мой обет.\n\n    Пусть я бессилен и устал, пусть на пути не устоял,\n    Но ведь души моей мечты знаешь лишь Ты.\n\nГлаза мои полны печали, и сердце так сильно болит.\nЛишь Ты мои слышишь желанья, и радость лишь Ты мне даришь.\n\nМолитвы к Тебе посылаю и верю - услышишь меня.\nИ сердце к Тебе направляю. О Боже, прости же меня!"}, {"id": 172, "title": "Ты знаешь, Боже, моё желанье, мои молитвы слышишь Ты,", "text": "Ты знаешь, Боже, моё желанье, мои молитвы слышишь Ты,\nТебе известно моё страданье, мои стремленья и мечты.\n\nТы знаешь, Боже, что не ищу я богатств и почестей земных,\nМоим всем сердцем Тебя люблю я, хочу с Тобой быть каждый миг.\n\nСкорблю я часто, душа томится, не вижу радости бытья;\nЯ одинокий, как в клетке птица, и умолкает песнь моя.\n\nНикто не знает, не спросит даже, куда и что меня влечет,\nИ кто утешит, кто путь укажет, когда на сердце тяжкий гнёт?\n\nМне мир чужим стал, и я - для мира. О Боже, дай мне Твой покой! \nУстал бороться, слабеют силы, а путь далёкий предо мной."}, {"id": 173, "title": "Веру крепкую мне, Боже, и терпенье дай,", "text": "Веру крепкую мне, Боже, и терпенье дай,\nИ Святого Духа тоже в сердце (3 раза) посылай.\n\nВ Слове жизни разбираться помоги мне Сам\nИ ходить дай научиться по Твоим, лишь по Твоим следам.\n\nДай, чтоб Слово Твоё, Боже, я любил всегда \nИ ценил его дороже слитков (3 раза) серебра.\n\nДай, чтоб только Твоё дело я,Господь, любил\nИ Тебе во славу смело жизни (3 раза) путь свершил.\n\nДай мне, Боже, отрешиться в мире от всего,\nДай мне силы не страшиться в жизни (3 раза) ничего.\n\nДай, чтоб мог я весть благую грешным возвещать \nИ на Кровь Твою святую людям (3 раза) указать."}, {"id": 174, "title": "Исцели моё сомненье, что приходит иногда", "text": "Исцели моё сомненье, что приходит иногда\nВ час минутного забвенья с ношей горького плода.\n\nЯ хочу не сомневаться ни на миг, что я Твой сын,\nЧто я призван подвизаться посреди Твоих дружин.\n\nУдали мос сомненье, будто в мире я без сил;\nСам приди, веди в служенье, чтоб с Тобой я победил.\n\nПомоги, чтоб я душою от Тебя не отходил,\nЧтобы враг своей стрелою дух мой слабый не смутил"}, {"id": 175, "title": "Я колени склоню, и услышит Всевышний,", "text": "Я колени склоню, и услышит Всевышний, \nБлагодарность мою и желанья мои.\nЯ колени склоню и душою услышу \nТихий голос Христа, голос вечной любви.\n\nЯ колени склоню и увижу так ясно \nЗаблужденья мои и ошибки в пути;\nЯ пойму, что Христос был мне светом в ненастье, \nНёс меня на руках и без гнева простил.\n\nЯ колени склоню - и откроется небо:\nДивный города храм, где не гаснет заря;\nИ согреется сердце живительным светом,\nИ исполнится сил, новым светом горя.\n\nЯ колени склоню перед Богом Всевышним,\nСвоё сердце как дар принесу к алтарю;\nТихий голос Христа над собою услышу...\nЯ колени склоню, я колени склоню."}, {"id": 176, "title": "Дай мне с Тобой быть там, где Ты, Спаситель, вечный мой покой!", "text": "Дай мне с Тобой быть там, где Ты, Спаситель, вечный мой покой! \nНе будет сердцу пустоты, вполне утешится Тобой.\n\nДай мне с Тобой быть, там где Ты, Твою дай славу созерцать!\nНе будет сердцу темноты, не будет под грехом стонать.\n\nДай мне с Тобой быть там, где Ты, где все уста полны хвалой!\nНе будет сердцу тесноты; польётся песнь струёй живой.\n\nДай мне с Тобой быть там, где Ты, где нет разлуки, пет тоски, \nОбилье сердцу полноты блаженства, жизни и любви!"}, {"id": 177, "title": "Научи меня, Господи, славить Тебя,", "text": "Научи меня, Господи, славить Тебя,\nНаучи меня, Боже, молиться,\nНаучи исполнять Твою волю, любя;\nДай мне силы на пользу трудиться.\n\nДай стряхнуть мне греховное бремя своё, \nДай мне выплакать всё пред Тобою,\nДай мне в помощь святейшее имя Твоё, \nБез Тебя я не справлюсь с собою.\n\nБез Тебя я ничтожен, как червь на земле, \nБез Тебя мне и жизнь не в отраду,\nБез Тебя, Бога света, погибну во тьме,\nБез Тебя буду жертвою ада.\n\nО Иисус, мой Спаситель, помилуй меня! \nКак Творец над творением сжалься,\nКак Спаситель спаси от геенны огня\nИ как Врач моих ран не гнушайся.\n\nИзлечи мою бедную душу скорей \nИ прими во грехах покаянье.\nО, услышь меня, Боже, я здесь, у дверей, \nТвоей милости жду подаянья."}, {"id": 178, "title": "Душа тоскует в мире одиноко, покоя не найдя себе порой.", "text": "Душа тоскует в мире одиноко, покоя не найдя себе порой.\nИ слёзы застилают моё око, и хочется уйти скорей Домой.\n\n    Я вновь иду к Тебе, Отец, в молитве.\n    Лишь Ты поймёшь всю боль души, мой Бог.\n    Как тяжело мне было в этой битве,\n    О, сколько огорчений и тревог.\n\nПрости, что в душу проникает холод, что не горит Тобой душа моя. \nВеди меня, ведь я ещё так молод. Да будет надо мной рука Твоя.\n\nНе уходи, мой Бог, я умоляю, с Тобой могу всю боль перенести, \nПеред Тобой колени я склоняю,Тебе хочу хвалу лишь вознести.\n\n    И дай мне верить, что мою молитву \n    Ты слышишь и поможешь мне, мой Бог,\n    Мне станет легче, я забуду битву,\n    Не будет огорчений и тревог."}, {"id": 179, "title": "К Тебе, Господь, взываю я в этот час,", "text": "К Тебе, Господь, взываю я в этот час,\nУслышь мольбу, не уходи от нас.\n\n    О мой Бог, прошу Тебя, Ты услышь меня, \n    Без Тебя здесь, на земле, трудно мне.\n\nКак хочется уйти с земли навсегда,\nОставить всё, найти покой у Христа.\n\nЗдесь люди на земле забыли Тебя,\nВ земном богатстве ищут смысл для себя.\n\nВсё счастье - Ты, в Тебе найду я покой. \nУслышь меня и сердцу мир дай святой."}, {"id": 180, "title": "Научи меня, мой Господь, во всём волю исполнять лишь Твою,", "text": "Научи меня, мой Господь, во всём волю исполнять лишь Твою,\nЧтобы мне всей жизнью своей показать, что Тебя я, Спаситель, люблю.\n\n    Научи меня среди тысячи голос слышать лишь Твой,\n    Научи меня за Тобой идти в Край желанный, дорогой.\n\nНаучи меня в грешном мире жить, чтобы свет Твой сиял во мне, \nВедь не может скрыться город большой, находясь на высоком холме.\n\nНаучи меня жизнь свою прожить, чтоб в конце услышать я мог: \nДобрый, верный раб, скорее войди ты в блаженства небесный Чертог!"}, {"id": 181, "title": "Я согрешил, Господь мой, пред Тобою. Ты видишь зло в моих делах,", "text": "Я согрешил, Господь мой, пред Тобою. Ты видишь зло в моих делах,\nТы видишь грех души, объятой тьмою; взгляни на скорбь в моих очах!\n\nМой вопль, мой стон перед Тобой не скрыты, обилен слёз моих поток. \nДоколь я буду мучиться, разбитый? Доколе будешь Ты далек?\n\nНе по грехам Ты поступи со мною и не воздай мне по вине.\nТебя ищу я скорбною душою: открой же лик Твой ясный мне!\n\nИсполни дух мой благодатью рано, мой Бог, Отец и Властелин! \nДай радости спасительной, желанной: её Ты можешь дать один.\n\nО, дай, чтоб вновь нашла Твою дорогу моя нетвёрдая нога,\nЧтоб искренно потом служил я Богу, как сын, как ревностный слуга.\n\nУслышь мольбы мучительные звуки и мне на помощь Сам приди! \nВозьми, как сына блудного, за руки и ко спасению веди."}, {"id": 182, "title": "Жизнь посвящаю Тебе и отдаюсь я в мольбе,", "text": "Жизнь посвящаю Тебе и отдаюсь я в мольбе,\nТы управляй ею Сам и направляй к небесам.\nЖизнь эта не моя, так будет пусть Твоя,\nЕё Ты Сам мне дал, чтоб я Тебя прославлял.\n\nВ мире диавол царит, хочет меня погубить,\nЧтобы ему я служил и по-греховному жил.\nНо я Тебя молю: силу пошли Свою\nИ мне защиту дай, в битве с грехом укрепляй.\n\nЧестно желаю я жить, ближних хочу всех любить,\nЗло и обиды прощать и о Тебе возвещать.\nО мой Господь и Бог, если б я в жизни смог \nТвою любовь познать и всем о ней рассказать!\n\nСкоро Ты в славе придешь и Свою Церковь возьмёшь, \nТак приготовь и меня, чтобы достоин был я\nВечно с Тобой пребыть, злобу людей забыть\nИ в небе увидать то, что Ты хочешь нам дать."}, {"id": 183, "title": "Душа моя болит, тревоги полная.", "text": "Душа моя болит, тревоги полная.\nИ сердцу, и душе покоя нет.\nКругом печаль царит, печаль глубокая.\nИ кто б ко мне пришёл, чтоб дать ответ?\n\nНет близких у меня, нет братьев и сестёр.\nДалёки стали все и чужды мне.\nКто б в сердце влил огня, кто б руку мне простёр, \nЧтоб не остаться мне без Царства, вне?\n\nНо неужель никто не подойдёт ко мне \nИ не расправит слабых крыл моих?\nЯ знаю, верю в то, что сильный Царь грядёт,\nНо буду ль я тогда среди своих?\n\nНастанет ли конец мучениям моим?\nКогда же я покой найду душе?\nНо вот во мгле ночной пробился яркий луч, \nУслышал я в тиши: «Приди ко Мне»."}, {"id": 184, "title": "Молись в день радужного счастья, пред трудным подвигом молись!", "text": "Молись в день радужного счастья, пред трудным подвигом молись! \nМолись, когда грозит несчастье, когда смущаешься - молись!\n\nМолись, когда обиду сносишь, когда в опасности - молись! \nМолись, когда за милых просишь, за злого недруга молись!\n\nМолись, когда слабеют силы, когда возносишься - молись! \nМолись у дорогой могилы, за жизнь рожденную молись!\n\nМолись в минуту искушенья, коль победил себя, молись!\nМолись в печальное мгновенье, чтоб Бог простил тебя, молись!"}, {"id": 185, "title": "Отче небесный, Боже могучий,", "text": "Отче небесный, Боже могучий,\nТы Утешитель, Дух правды Ты,\nТы вездесущий и всемогущий,\nБудь, Боже, с нами, нас освяти.\n\nОтче, Источник счастья для многих, \nНас, уповающих, не забывай;\nВ наших сердцах поселись Ты убогих, \nБлагослови нас, счастье нам дай.\n\nОтче, избавь нас от всяких падений, \nДуши укрась чистотою Твоей;\nДай нам в делах и святых песнопеньях \nБольше прославить Тебя средь людей."}, {"id": 186, "title": "Любовь Господню описать не могут всей земли сыны,", "text": "Любовь Господню описать не могут всей земли сыны, \nОна превыше дальних звёзд и глубже всякой глубины. \nЧтоб нас опять к Себе принять, послал Бог Сына в мир, \nЕго рукой снять грех людской и приготовить пир.\n\n    Любовь Господня велика, верна, чиста, сильна. \n    Исчезнет мир, пройдут века, но не пройдёт она.\n\nВсему придёт последний день, земные царства упадут,\nА равнодушные теперь молиться в ужасе начнут,\nНо нет конца любви Творца, безмерной и святой: \nСнимает грех, спасает всех, - о ней всечасно пой.\n\nКогда б в чернила - океан, в пергамент небо превратить, \nА в перья - все былинки трав и всем живущим поручить \nЛюбовь Господню описать, - не стало бы чернил,\nА свиток, равный небесам, всего бы не вместил!"}, {"id": 187, "title": "Любовь Христова! Она как солнце,", "text": "Любовь Христова! Она как солнце,\nЧто светит в небе над всей землёй. \nЛюбовь Христова! Что поравняться \nМогло б на свете с любовью той?\n\n    Любовь святая, любовь Христа,\n    Она повсюду со мной была!\n    Когда я падал, бессчётно поднимала \n    И снова к небу меня вела.\n\nЛюбовь Христова! Там на Голгофе \nСтрадал Спаситель за грешных нас. \nЛюбовь Христова! В оковах тяжких \nОт страшной боли Христос нас спас.\n\nЛюбовь Христова! Она сегодня \nК тебе все ближе, приди теперь!\nПриди к Иисусу, к Нему стремись ты, \nПока открыта спасенья дверь."}, {"id": 188, "title": "В Слове Своём Христос учит меня, чтобы я знал, как Он любит меня;", "text": "В Слове Своём Христос учит меня, чтобы я знал, как Он любит меня; \nВ Книге святой много вижу чудес, но всех отраднее эта мне весть.\n\n    Как счастлив я! Он любит меня, любит меня, любит меня! \n    Как счастлив я! Он любит меня, любит Иисус и меня.\n\nЛюбовь свела Его с чистых небес и вознесла Его за нас на крест; \nВерю, что любит Спаситель меня, знаю, что также люблю Его я.\n\nЕсли сбиваюсь с Его я путей, близок ко мне Он любовью Своей;\nК Его ногам я вернуться спешу, Ему любовь за любовь приношу.\n\nСтану в любви я Его пребывать, силой Его сатану отгонять;\nИ всякий гpex убежит от меня, как вспомню я, что Бог любит меня.\n\nЕсть песнь прекрасная в сердце моём, я воспою её в небе святом. \nТам я увижу во славе Христа и повторю: «Как Он любит меня!»\n\nСладкий покой в упованье найдёт всякий, кто к Господу с верой придёт; \nДух Божий в сердце его станет жить и про любовь Иисуса твердить."}, {"id": 189, "title": "Вечной любовью тебя возлюбил Я! О, не тоскуй же, мой друг,", "text": "Вечной любовью тебя возлюбил Я! О, не тоскуй же, мой друг, \nЕсли в борьбе ты совсем обессилел и потемнело вокруг.\n\n    «Я возлюбил тебя вечной любовью!» — так Иисус говорил. \n    Он драгоценной, невинною Кровью нас от греха искупил.\n\nНе унывай, не печалься, но помни: вечно Он любит тебя.\nПусть поднимаются грозные тучи — верь, снизойдёт тишина.\n\nПомни, не вечны твои испытанья - вечна Христова любовь. \nСкоро Он снимет то бремя скитанья, мир нам пошлёт за борьбой."}, {"id": 190, "title": "Глубже всех морей и океанов, необъятна, вечна, велика,", "text": "Глубже всех морей и океанов, необъятна, вечна, велика,\nВыше всех златых светил небесных —беспредельная любовь Христа!\n\n    Он омыл грехи мои, дал ризы снежной белизны,\n    Вечное спасенье даровал и чадом Божиим назвал.\n\nМрачны, беспросветны и ужасны были годы в страшной тьме греха; \nПогибал, израненный, несчастный, но Иисус нашёл и спас меня.\n\nСчастлив я! Христовой благодатью я спасён от смерти и суда; \nСердцем грех теперь не овладеет: в нём обитель Господа Христа."}, {"id": 191, "title": "Любит лишь Христос безмерно, как любит только Он!", "text": "Любит лишь Христос безмерно, как любит только Он! \nНавсегда так нежно, верно, как любит только Он! \nСчастье мира всё ничтожно, разлюбить друзьям возможно, \nОн же любит непреложно, - как любит только Он!\n\nКрестной смертью искупивший, - как любит только Он! \nСамых слабых не забывший, - как любит только Он! \nИм всё прошлое покрыто, сколько радости сокрыто\nВо Христе, кому открыто, как любит только Он!\n\nКто познать Его желает, - как любит только Он! \nМир и радость тот узнает, - как любит только Он! \nОн врачует все страданья и дарует оправданье; \nОн нам жизнь и упованье, - как любит только Он!\n\nВсех к Себе Он призывает, - как любит только Он! \nВ Свое Царство принимает, - как любит только Он! \nВсё блаженство обещая и заботой окружая,\nОн ведёт нас в двери рая, - как любит только Он!"}, {"id": 192, "title": "Долго в сумраке скитался на путях греховных я,", "text": "Долго в сумраке скитался на путях греховных я,\nВ жизни разочаровался, мир обманывал меня.\nЯ взывал: «Кто мне поможет? Скорбь мою увидит кто?»\nИ услышал голос Божий: «Я люблю тебя давно!»\n\n    « Так давно, так давно, Я люблю тебя давно! -\n    О как сладок голос Божий, - Я люблю тебя давно!»\n\nОн меня с любовью принял и от всех грехов омыл.\nЯ к ногам Его склонился и за всё благодарил.\nИ теперь всегда покоюсь я на пажитях Его,\nПостоянно слышу голос: «Я люблю тебя давно!»\n\nИ ни в чём мне нет отрады, мир греха мне чуждым стал,\nВо Христе лишь, Друге дивном, утешенье я познал.\nО, как чудно быть в объятьях у Того, Кто жизнь даёт,\nСлышать голос утешенья: «Я люблю тебя давно!»\n\nО, приди, обременённый, лишь доверься - Он простит.\nС верой взглянь на крест Голгофский - и тебя Он оживит.\nЕсли, искренне покаясь, в сердце примешь ты Его,\nНепременно ты услышишь:«Я люблю тебя давно!»"}, {"id": 193, "title": "Правда, любит Бог меня: дар спасенья Он мне дал,", "text": "Правда, любит Бог меня: дар спасенья Он мне дал,\nВ тьме ночной иль в свете дня быть со мной Он обещал.\n\n    Правда (правда, любит), любит (правда, любит), \n    Любит (правда, любит) Бог меня!\n    Правда (правда, любит), любит (правда, любит), \n    Любит (правда, любит) Бог меня!\n    За (за меня Он) меня (за меня Он)\n    Он (за меня Он) пострадал (пострадал).\n\nПравда, любит Бог меня: если слышит скорби стон, \nНадо мной главу склоня, утешает сердце Он.\n\nПравда, любит Бог меня: в тяжком жизненном бою, \nВражьи стрелы отстраня, Он даёт мне мощь Свою.\n\nПравда, любит Бог меня, и хочу я одного:\nСлово истины храня, без конца любить Его!"}, {"id": 194, "title": "Любви святой дыханье свет жизни нам даёт,", "text": "Любви святой дыханье свет жизни нам даёт,\nИ уст её лобзанье в сердца ограду льёт.\nЛюбовь у колыбели о счастье нам поёт,\nСклонившись у постели, за нас молитву шлёт.\n\nКогда гроза с ветрами надежду потрясёт,\nЛюбовь горюет с нами и помощь нам несёт.\nКогда наш брат стенает, скорбящий иль больной, \nЛюбовь повелевает нам жертвовать собой.\n\nЛюбовь врагам внушает друг другу руки дать,\nИ грешных нас прощает, и учит нас прощать.\nНе в буре ревнованья, не в облаке мечты, - \nЛюбовь сильна в сознанье безгрешной чистоты.\n\nИ речи дар прекрасный, и поприще крови,\nИ подвиг веры властной, - всё мусор без любви.\nИ знанье увядает, и солнце дня зайдёт, - \nЛюбовь не умирает, одна любовь живёт.\n\nЛюбовью мир несчастный восставлен к счастью вновь; \nЕй ангелы прекрасны, и вечный Бог - любовь.\nНе в буре ревнованья, не в облаке мечты, - \nЛюбовь сильна в сознанье безгрешной чистоты."}, {"id": 195, "title": "Почему об одном я пою и всегда об одном говорю -", "text": "Почему об одном я пою и всегда об одном говорю -\nОб Иисусе Христе дорогом, Искупителе дивном моём?\nПотому что Он Кровью Своей грех ужасный с души моей смыл, \nДобровольно Он отдал Себя и до смерти меня возлюбил.\n\nПочему же всем сердцем, душой непрестанно стремлюсь я к тому, \nЧтоб всегда, даже ночью и днём, приносить Ему в жертву хвалу? \nПотому что Он к жизни святой воскресил слабый мертвый дух мой \nИ в разбитое сердце моё влил целительный, сладкий покой.\n\nЭто имя святое - Иисус, всех дороже на свете имён,\nИ другого нигде не найдёшь: ни вверху, ни внизу, под землёй.\nВот зачем об одном я пою и об имени этом твержу,\nЧто другого такого, как Он, я подобного не нахожу!"}, {"id": 196, "title": "Возрадуйся, душа моя, Христа Иисуса славословь!", "text": "Возрадуйся, душа моя, Христа Иисуса славословь! \nХвалы лишь ждёт Он, ждёт Он от тебя.\nО, как нежна, нежна Его любовь!\n\nОн видел, как я грех творил, но всё ж меня Он возлюбил \nИ спас меня, меня, проливши Кровь:\nКак велика Его, Его любовь!\n\nПусть на меня весь ад идёт и осаждает сердце вновь; \nМеня Он к небу, к небу доведёт:\nО, как сильна, сильна Его любовь!"}, {"id": 197, "title": "Воспою любовь Христа! Умер Он от мук креста", "text": "Воспою любовь Христа! Умер Он от мук креста \nЗа тебя и за меня, всех нас грешных возлюбя.\n\n    Воспою (воспою) любовь Христа,\n    Вознесут (вознесут) хвалу уста.\n    Умер Он (умер Он), чтоб я мог жить,\n    По Его путям ходить.\n\nПрежде слёз моих за грех плакал Он тогда за всех, \nПрежде, чем молился я, Он молился за меня.\n\nГлубину Его любви не могу вполне понять,\nКак Он снял грехи мои и дарует благодать.\n\nЧем же я Ему воздам? Ведь за грех мой Он страдал. \nО Господь, возьми меня, чтоб я был Твоим всегда!"}, {"id": 198, "title": "Когда ночная мгла окутывает город,", "text": "Когда ночная мгла окутывает город,\nЯ воспеваю вновь любовь Твою, Иисус.\nСокрылся я в Тебе, мне не страшны невзгоды,\nИ смертной тени я не убоюсь.\n\n    Благослови (3 раза) меня, Господь Иисус, благослови. \n    Благослови (2 раза), мне не прожить и дня без Твоей любви.\n\nПусть смехом и презреньем меня встречают люди,\nПусть близкие мои посмотрят свысока,\nЯ знаю, что меня Господь не позабудет \nИ заберёт к Себе за облака.\n\nОбязан я Тебе, мой Бог, вторым рожденьем.\nТы Дух Свой поселил в мою земную плоть.\nК Тебе, Спаситель мой, взывает на коленях \nТвой раб - благослови его, Господь."}, {"id": 199, "title": "Любовь Христа безмерно велика,", "text": "Любовь Христа безмерно велика,\nНачала нет, и льётся как река,\nИ как волна лобзает берега,\nИ глубока, светла и широка.\n\n    И если б не было любви,\n    Любви Христа, мы б не смогли \n    Иметь надежду вечно жить \n    И, как Спаситель, всех людей любить.\n\nПриди скорей, скорей! Тебя Он ждёт,\nДавно стоит у каменных ворот,\nСтучит к тебе, открой, уже пора,\nПрими любовь без злата, серебра.\n\nО, если б знал живущий на земле \nЛюбовь Христа, лишь ею дышат все,\nИ если б Бог любовь отнял на миг,\nТо этот мир давно б уже погиб.\n\nОн возлюбил тебя, меня давно,\nОн возлюбил и тех, кто лишь одно \nТвердили «нет!» и поднимали смех,\nА Он с любовью призывает всех."}, {"id": 200, "title": "Как много звёзд на небесах горит в бесчисленных лучах,", "text": "Как много звёзд на небесах горит в бесчисленных лучах,\nНо лучше звёзд всех красота божественной любви Христа.\n\n    Любовь Христа! Любовь Христа!\n    Любовь Христа! Она светлее всех светил!\n\nО сердце, торжествуй всегда! Как Вифлеемская звезда, \nЛюбовь Христа в пути твоём ведёт тебя в Отцовский дом.\n\nПришёл Христос, с тех пор она для всех очей теперь видна; \nИ в мире лишь она одна тьму сердца просветить сильна.\n\nНад морем, сушей, ночью, днём - всегда горит она огнём \nИ льёт с небес свой кроткий свет и утешенье в мире бед.\n\nОна ведёт меня к Христу сквозь жизни мрак и темноту;\nЯ на неё хочу взирать и ей лишь в жизни доверять"}, {"id": 201, "title": "О, Любовь! Что могу о тебе я сказать?", "text": "О, Любовь! Что могу о тебе я сказать?\nБренный разум, сражённый, молчит.\nОн бессилен хоть часть Твоих свойств понимать, \nПеснь любви только в сердце звучит.\n\nС кем сравню несравненно прекрасный Твой лик \nИль чему уподоблю Тебя?\nПред Тобой мир - ничто, как бы ни был велик, \nПред Тобой в прах склоняюсь и я.\n\nТолько Ты, и в Тебе я нашел красоту,\nДля Тебя и Тобой хочу жить.\nИ весь смысл бытия моего на земле,\nЧтоб, как Ты, так и я мог любить.\n\nТы, Любовь, заставляешь томиться, страдать \nИ гореть в Твоих чувствах святых,\nНо не страшно в любви свою жизнь всю отдать \nЗа друзей и за ближних своих.\n\nО Любовь, Твоё славное имя - Иисус,\nО Иисус, Твоё имя - Любовь.\nНаполняй моё сердце Собою полней,\nДай гореть с каждым днём всё сильней!"}, {"id": 202, "title": "Я слышу зов любви, на крест Христа гляжу", "text": "Я слышу зов любви, на крест Христа гляжу\nИ в жертве праведной Крови мир сердцу нахожу.\n\n    Любовь Христа превыше дальних звёзд, небес, \n    Она светлее всех светил земли.\n    Любовь Христа спасла от гибели меня,\n    Дала покой и мир моей душе.\n\nТот мир, как Божий трон, навек незыблем он,\nОн, как Господне имя, свят, он слаще всех услад.\n\nНад нами облака проходят в вышине,\nЕго ж любовь всегда близка, не изменяет мне!\n\nЯ слаб в любви порой, в труде нссовсршсн,\nНо мир Его всегда со мной и нет в нём перемен!\n\nИзменчив я, но Он всегда все так же благ,\nВсё так же мудр в Своих путях и так в любви силён."}, {"id": 203, "title": "Люблю, Спаситель, в Книге дивной слова любви Твоей читать,", "text": "Люблю, Спаситель, в Книге дивной слова любви Твоей читать, \nИ вести радостной, призывной люблю восторженно внимать.\n\nЛюблю Твоё успокоенье обременённым возвещать\nИ свет небесный обновленья на лицах братьев созерцать.\n\nЛюблю идти Твоей тропою, Тобою данный крест нести; \nЛюблю усталою душою у ног Твоих покой найти.\n\nЛюблю Тебя я, хоть порою завет Твой вечный забывал.\nЛюблю, хоть не любовью тою, какою б пламенно желал.\n\nЛюблю Тебя я! Ты же прежде меня, созданье, возлюбил;\nТы в мире был в людской одежде и за меня Свой крест носил.\n\nТы Сам, Господь, Любовь святая, и как перед светилом дня \nЛучина тусклая, ночная, гак пред Твоей любовь моя.\n\nНо, Боже, Ты не угашаешь и искр курящегося льна,\nОгнём его воспламеняешь, и в нём любовь Твоя видна.\n\nЛюблю Тебя и не могу я не возлюбить Отца любви.\nМолю: любовь Свою даруя, мою возгрей и оживи."}, {"id": 204, "title": "Высока любовь и дивна, чиста, свята, глубока,", "text": "Высока любовь и дивна, чиста, свята, глубока,\nИзливается из сердца неизменного Христа.\n\n    Он врата небес откроет, чтобы мне туда войти (туда войти), \n    Подарил Он мне спасенье и прощает все грехи.\n\nЯ на дно греха спустился, как заблудшая овца,\nВ горе, в скорби я томился, Он в любви нашёл меня.\n\nЧудная любовь Иисуса! Вес грехи Он мне простил!\nЧесть Ему, хвала и слава, за меня Он Кровь пролил!"}, {"id": 205, "title": "Струн души рука Христа касается - и она восторженно поет!", "text": "Струн души рука Христа касается - и она восторженно поет!\nПеснь ещё одна на свет рождается, песнь о Том, Кто счастье нам даёт.\n\nО Тебе поют сады весенние трелью звонких птичьих голосов,\nТы даришь от смерти мне спасение, жаль, что нет таких на свете слов.\n\nТвой привет мне льётся ароматами всех полей цветущих и садов, \nЯ расстался раз с мирскими взглядами и навек принял Твою любовь.\n\nЯ любовь великую, безмерную нахожу во всём, что видит взор,\nИ люблю любовью самой нежною я Того, Кто сиял с меня позор.\n\nСтрун души рука Христа касается - и она восторженно поёт! \nПусть вовеки песня не кончается, песнь о Том, Кто счастье нам даёт!"}, {"id": 206, "title": "Бог есть любовь! О, какое счастье!", "text": "Бог есть любовь! О, какое счастье!\nБог есть любовь! Он нас возлюбил!\n\n    Пусть всякий радостно поёт и славит, \n    Его да славит; Бог есть любовь!\n\nБог есть любовь! Он послал к нам Сына.\nБог есть любовь! Он избавил нас.\n\nБог есть любовь! Мы греху служили.\nБог есть любовь! Он освободил.\n\nМой Искупитель меня избавил,\nМой Искупитель меня простил.\n\n    Теперь я буду вечно петь и славить,\n    Я буду славить Твою любовь."}, {"id": 207, "title": "В душе моей всю жизнь звучит святая песнь Твоей любви,", "text": "В душе моей всю жизнь звучит святая песнь Твоей любви, \nНад миром вознесённая, Голгофою рожденная.\n\n    Ты выше солнца, дальше звёзд, глубже моря, шире вод. \n    Твою любовь измерит кто, кто, кто, кто, Христос? \n    Твоей любви предела нет, Ты за меня пошёл на крест \n    И подарил душе рассвет, жизнь и свет.\n\nДуша моя тогда поёт, когда она в Тебе живёт.\nВ руке Твоей рука моя, у ног Твоих склоняюсь я.\n\nУстал я так в земном пути от всех забот и дел людских, \nКогда ж прильну к святой груди, уйду когда от бурь земных?\n\nВ Твоих руках судьба моя, Иисус, в Тебе вся жизнь моя,"}, {"id": 208, "title": "О, Любовь! Пою Твоё явленье,", "text": "О, Любовь! Пою Твоё явленье,\nВозвещаю всем благую весть,\nЧто для нас Спаситель с неба послан \nМир и счастье грешникам принссть.\n\n    Его любовь есть чудная, Его любовь есть дивная! \n    Он возлюбил меня, на крест отдал Себя —\n    Его любовь есть чудная!\n\nО любовь, что явлена в Иисусе,\nКогда Он здесь в мире с нами жил.\nОн безгрешный, наш Христос Спаситель,\nНа кресте спасенье совершил.\n\nО, Любовь! Бальзам на раны сердца,\nЩит душе от бед и бурь земных;\nОвладей моим ты всем сознаньем,\nНаправляй к Обители святых."}, {"id": 209, "title": "Раньше жил я во грехах, в горе, болях и скорбях,", "text": "Раньше жил я во грехах, в горе, болях и скорбях,\nНикогда не думал я о вечности,\nНо Иисус нашёл меня, разорвал все узы зла,\nПолон я теперь небесной радости!\nЯ свободен (я свободен), я свободен (я свободен),\nЯ свободен от неправды и греха!\nИисус нашёл меня, разорвал все узы зла, - \nПолон я теперь небесной радости!\n\nСлово Божье учит нас: Дух Господень не погас,\nСилу даст Он возвещать всем о Христе.\nТот божественный огонь, с неба посланный Отцом,\nНаделяет силой слабых на земле.\nОн пылает (он пылает), да, пылает (да, пылает),\nДух Святой зажёг огонь в моей душе.\nТот божественный огонь, с неба посланный Отцом,\nНаделяет силой слабых на земле\n\nЕсли болен ты, друг мой, обратись к Христу с мольбой,\nУдалит Он немощь и печаль твою.\nЧто угодно пусть болит - Он здоровье возвратит,\nКровь Христова исцеление дарит.\nКровь Христова (Кровь Христова), Кровь Христова (Кровь Христова) \nИ сегодня исцеляет всех больных.\nЧто угодно пусть болит, Он здоровье возвратит,\nКровь Христова исцеление дарит.\n\nВот смоковница цветёт - скоро наш Господь придёт,\nЧтоб забрать Свою Невесту в небеса.\nИ конец придёт скорбям, что за радость будет там!\nДруг, готов ли встретить Господа Христа?\nТы готов ли (ты готов ли), ты готов ли (ты готов ли)?\nДруг, готов ли ты покинуть этот мир?\nИ конец придёт скорбям, что за радость будет там!\nДруг, готов ли встретить Господа Христа?"}, {"id": 210, "title": "Пусть земля вся утверждает, что Тобой я не спасён.", "text": "Пусть земля вся утверждает, что Тобой я не спасён.\nДух мой песню воспевает: «Принят раб Твой на Сион!»\n\n    Радуйтесь со мною, люди! Нет сомненья - я спасён! \n    Пусть весь мир твердит иное - знаю, я Христом спасён!\n\nЕсли б ангел сам явился и сказал: «Не обращён!»\nИ тогда б я не смутился, помня вечный Твой закон.\n\nЕсли ум мой усомнится, призову Тебя душой.\nТы придёшь, и ум смирится, и настанет Твой покой.\n\nЗнаю я, в Кого я верю, дух мой в Нём несокрушим;\nВ жизни всякую потерю с радостью снесу я с Ним.\n\nКаждый миг Его я слышу, каждый миг с Ним говорю;\nОн любовь мне дарит свыше, и Его огнём горю.\n\nНету места для сомненья в сердце избранных Тобой.\nВ час минутного затменья будь на страже, Пастырь мой."}, {"id": 211, "title": "О сердце, громко возглашай и песню славы пой,", "text": "О сердце, громко возглашай и песню славы пой, \nМолитвой чистой возгрсвай огонь любви святой.\nВедь Тот, Кем свод небес зажжён, Кем светится звезда, \nОтец мой! Не оставит Он меня здесь никогда.\n\nЯ был окутан темнотой, её мне ад послал,\nИ грех как призрак роковой, как лев мне угрожал. \nИсчезла сила у меня, и дух мой угасал.\n«Избавь меня!» - так, страх гоня, я к Господу воззвал.\n\nВнезапно свет тот засиял, скорбь в радость превратил. \nЯ благо жизни увидал и славу вечных сил.\nЯ стал с любовью созерцать леса, поля цветов,\nИ стал мне скорбный мир опять как лучший из миров.\n\nБлагодарю Отца любви, что благо мне дарит,\nЗа силу пролитой Крови Ему хвала звучит,\nИ с каждым взглядом вижу я ясней страну мою.\n«Он свят, свят, свят!» - вот песнь моя, её всегда пою!"}, {"id": 212, "title": "С тех пор, как я уверовал, я светом озарён.", "text": "С тех пор, как я уверовал, я светом озарён.\nВ душе я жизнь почувствовал, и ныне я спасён.\n\n    Я знаю, в Кого уверовал, и верю, что Он всесилен;\n    Хранит (хранит) навек залог мой для меня на оный день.\n\nИзвестна мне Его любовь, Его могущество,\nПролитая святая Кровь, над смертью торжество.\n\nСокрыт в руках Господних я от страха и тревог.\nЦветы цветут иль тернии - со мною вечный Бог.\n\nПусть всё исчезнет, всё пройдёт, теперь я не один,\nПусть сердце песню воспоёт Тебе, мой Властелин!"}, {"id": 213, "title": "Радость, радость непрестанно! Будем радостны всегда!", "text": "Радость, радость непрестанно! Будем радостны всегда!\nЛуч отрады, Богом данной, не погаснет никогда.\n\n    Радость, радость непрестанно! Будем радостны всегда! \n    Луч отрады, Богом данной, не погаснет никогда.\n\nБог нас Сам ведёт за руки, помогает нам в борьбе,\nНас хранит от бед и муки, нашей внемлет Он мольбе.\n\nПо следам пойдём Христовым, будем льнуть к рукам Его,\nЧтоб под бременем суровым не остаться без Пего.\n\nРадость веры, жизнь дающей, пусть как солнце в нас горит!\nЛюбит грешных Всемогущий, много благ Он нам дарит."}, {"id": 214, "title": "Радость во Христе я нашёл, Он покой мне в сердце вселил,", "text": "Радость во Христе я нашёл, Он покой мне в сердце вселил,\nЯ к Нему с повинной пришёл и прошенья дар получил.\n\n    С той минуты я Его сын, счастлив, что Он принял меня. \n    Он со мной, и я не один, с Ним иду в святые края.\n\nСчастье мне Отец подарил - гибнущего в мире нашёл,\nВсе мои грехи Он простил, в Нём я вечный мир приобрёл.\n\nЯ в слезах к ногам Его нал, дал покой мне добрый Отец, \nРадость и надежду послал, подарив спасенья венец!"}, {"id": 215, "title": "Христу хвала за то, что день прошёл,", "text": "Христу хвала за то, что день прошёл,\nКогда в грехах к погибели я шел,\nИща напрасно мир в краю чужом.\nГосподь мой спас меня, сокрыт теперь я в Нём.\n\n    С Христом я буду в небесах,\n    С ветвями дивных пальм в руках,\n    С золотым на голове венцом\n    Там вечно буду петь: «Спасён Христом!»\n\nСомненье и боязнь Он удалил,\nОн жало смерти смертью угасил;\nВ святой Крови меня Он убелил,\nМеня, в грехах погибшего, Он возлюбил.\n\nХвала Спасителю, теперь Он мой,\nВо мне Он храм создал Себе святой.\nЯ не страшусь: Господь всегда со мной,\nОт бед спасёт меня Он сильною рукой.\n\nТеперь, всегда, навеки я Его,\nОн щит мой и охрана от всего,\nСпаситель мой и крепкая скала,\nЕму от всех да будет слава и хвала!"}, {"id": 216, "title": "О, благодать! Спасён Тобой я из пучины бед.", "text": "О, благодать! Спасён Тобой я из пучины бед.\nБыл мёртв - и чудом стал живой, был слеп - и вижу свет.\n\nСперва внушила сердцу страх, затем дала покой.\nЯ скорбь души излил в слезах, Твой мир течёт рекой.\n\nПрошёл немало я скорбей, невзгод и тёмных дней,\nНо ты всегда была со мной, ведёшь меня Домой.\n\nСловам Господним верю я, моя вся крепость в них:\nОн верный щит, Он часть моя во всех путях моих.\n\nКогда же плоть моя умрёт, придёт борьбе конец,\nМеня в небесном Доме ждёт и радость, и венец.\n\nПройдут десятки тысяч лет, забудем смерти тень,\nА Богу так же будем петь, как в самый первый день."}, {"id": 217, "title": "Радость, почему её не видно в тех, кому навек она дана?", "text": "Радость, почему её не видно в тех, кому навек она дана?\nПочему до горести обидно, что душа так радостью бедна?\n\nСлабыми, усталыми мы стали, наших ликований смолкла песнь. \nЕсли нам не радоваться с вами, то кому же радоваться здесь?\n\nКто ещё спасён от тьмы греховной, кроме верных Божиих детей? \nПочему же этой жизни волны заглушают радость вечных дней?\n\nРадуйтесь, чтоб радоваться вечно, радуйтесь в печалях и скорбях, \nПусть сияет в жизни скоротечной эта радость в искренних сердцах.\n\nРадуйтесь! Тепло души дарите! Будем ближе к Господу, друзья,\nИ своею радостью влеките гибнущих в небесные края."}, {"id": 218, "title": "Я радуюсь и торжествую: спасенный я Кровью Христа!", "text": "Я радуюсь и торжествую: спасенный я Кровью Христа!\nИисуса имя прославляю за подвиг Голгофы креста.\n\n    Иисус меня освободил, на крест Голгофский взойдя,\n    Грехи простил, в Крови омыл, и ныне я Божье дитя.\n\nХристос в моей душе родился - словами нельзя передать!\nОн в моём сердце поселился, и хочет Он в нём обитать.\n\nКонец страданьям и печалям лишь в небе душа обретёт.\nИ я стремлюсь к небесным далям, меня мой Спаситель там ждёт."}, {"id": 219, "title": "Нам Отец спасенье дал даром, даром, даром!", "text": "Нам Отец спасенье дал даром, даром, даром!\nС неба Сына к нам послал даром, даром, даром! \nНаши все грехи простил, Кровию Своей омыл,\nС Богом нас Он примирил даром, даром, даром!\n\nВот течёт поток для всех даром, даром, даром! \nОмывает всякий грех даром, даром, даром! \nВсякий, кто к Нему придёт, тот спасение найдёт, \nИ получит тот венец даром, даром, даром!\n\nГрешник, любит Бог тебя даром, даром, даром! \nХочет Он спасти тебя даром, даром, даром! \nСердце ты Ему отдай, этот зов не отвергай\nИ получишь вечный рай даром, даром, даром!"}, {"id": 220, "title": "Отрадой полно сердце, не может умолчать,", "text": "Отрадой полно сердце, не может умолчать,\nМои уста пылают желаньем восхвалять.\n\nЧто радует мне душу? Что в сердце счастье льет? — \nЧто Иисус Спаситель спасенье мне даёт.\n\nНашёл я мир душевный в венце Его заслуг;\nОн разорвал те узы, что связывают дух.\n\nТеперь же я ликую, мой дом на небесах,\nИ блага все земные считаю я за прах.\n\nЗа скорбь Он дал мне радость, и вместо бурь — покой; \nОмыл моё Он сердце в Крови Своей святой.\n\nДля сердца жизнь — Спаситель! В Нём слава вся моя; \nЕго на царства мира не променяю я.\n\nО, если б об Иисусе узнали все края,\nЧто сделал для меня Он, чем стал Он для меня!\n\nО люди, все придите, взгляните на Пего\nИ с верою примите блаженство, торжество!"}, {"id": 221, "title": "Братья, все ликуйте: славный день настал!", "text": "Братья, все ликуйте: славный день настал!\nСёстры, торжествуйте: Бог нам радость дал!\nНекогда чужие — мы теперь друзья,\nБлизкими мы
