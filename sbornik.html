, твой Спаситель с тобой (Он с тобой), \n    Помни, Он дарует покой.\n    Бодрствуй, скоро время придёт (да, придёт), \n    Искупитель к Себе нас возьмёт.\n\nНелегко нам тернистой тропою идти,\nВсюду враг-искуситель встречает,\nИ слабеем порою в далёком пути,\nБеспросветная ночь окружает.\n\nДолго ль будем томиться в пустыне сухой?\nСкоро светом восток озарится,\nИ рассеется мрак, что покрыл лик земной,\nИ на землю Господь возвратится."}, {"id": 451, "title": "Словно лилия степная, расцветая, оживи, душа моя!", "text": "Словно лилия степная, расцветая, оживи, душа моя!\nКак орёл, стремись высоко и далёко к небу, в Божии края.\n\nТы стремись к стране желанной постоянно! Там тебя давно уж ждут, \nТам у Божьего престола гимн весёлый хоры ангелов поют.\n\nЖизни волн не бойся, смело и умело в челноке Христа плыви; \nСкоро к пристани прибудешь, там забудешь испытания свои.\n\nПусть тебя не привлекает, не пленяет мир блестящей суетой;\nБлеск, для мира драгоценный, призрак тленный, поглощён он будет тьмой.\n\nДруг и Врач земли несчастной! Ежечасно дух несётся мой к Тебе: \nНе отвергни же стремленье и моленье, а прими меня к Себе!\n\nУкрепи Своё созданье! В день страданья от меня не отходи! \nПодыми в часы паденья, в день сомненья мощной верой утверди.\n\nО, гряди как Царь победный в мир наш бедный и меня возьми с Собой. \nТам в конце борьбы опасной в мир прекрасный двери жизни мне открой.\n\nТы ведь принял наказанье за деянья и за грех души моей.\nСмерть Тобою побеждёна и сражёна; воцарись, мой Бог, скорей!"}, {"id": 452, "title": "Воспойте о славе небес теперь средь земного труда,", "text": "Воспойте о славе небес теперь средь земного труда,\nДля нас она полна чудес, о, как же нам будет тогда?\nО, как (о, как)? О, как (о, как)? О, как же нам будет тогда? \nДля нас она полна чудес, о, как же нам будет тогда!\n\nОмывшись в Христовой Крови, мы ждём только зова туда, \nМы счастливы в Божьей любви, о, как же нам будет тогда? \nО, как (о, как)? О, как (о, как)? О, как же нам будет тогда? \nМы счастливы в Божьей любви, о, как же нам будет тогда!\n\nМы призваны к Агнцу на брак, идём мы в восторге туда, \nВокруг же нас холод и мрак, о, как же нам будет тогда?\nО, как (о, как)? О, как (о, как)? О, как же нам будет тогда? \nВокруг же нас холод и мрак; о, как же нам будет тогда!\n\nВ божественном Слове струёй нам льётся живая вода,\nКак ключ средь пустыни сухой; о, как же нам будет тогда? \nО, как (о, как)? О, как (о, как)? О, как же нам будет тогда? \nКак ключ средь пустыни сухой; о, как же нам будет тогда!\n\nЛюбовью нас Бог окружил, но хочет от нас Он плода \nПо мере полученных сил; о, как же нам будет тогда?\nО, как (о, как)? О, как (о, как)? О, как же нам будет тогда? \nПо мере полученных сил; о, как же нам будет тогда!\n\nОтрадно от мысли одной, что вскоре минует нужда \nИ вечный увидим покой, о, как же нам будет тогда?\nО, как (о, как)? О, как (о, как)? О, как же нам будет тогда? \nИ вечный увидим покой, о, как же нам будет тогда!"}, {"id": 453, "title": "Куда теперь идти мне? Куда направить путь?", "text": "Куда теперь идти мне? Куда направить путь?\nК земным ли благам жизни? Где можно отдохнуть?\n\n    Лишь там найду покой я, лишь там не будет слёз, \n    Лишь там забуду скорбь я - где Сам царит Христос.\n\nКак трудно всё оставить, стремиться лишь туда,\nГде ждёт меня Отчизна, желанная страна.\n\nНе знаю, что со мною случилось вдруг теперь,\nА сердце всё тоскует о Родине моей."}, {"id": 454, "title": "Христианин, неси огонь чудесный свой,", "text": "Христианин, неси огонь чудесный свой,\nКоторый дал тебе Христос.\nОн умер на кресте, пожертвовав Собой.\nОгонь любви Он всем принёс.\n\n    Гори огонь (гори огонь), всегда гори (всегда гори)! \n    Воспламеняй собой холодные сердца \n    И новый мир прекрасный озари,\n    В котором радость без конца.\n\nВот путник, он устал в пути, он изнемог,\nСогрей его и ободри,\nСкажи, что не покинет его вечный Бог,\nЗасветит солнце впереди.\n\nА если путник вдруг свернёт с того пути,\nКоторый к радости ведёт,\nТо ты огонь любви зажги в его груди,\nИ он тот путь святой найдёт.\n\nИ если станет очень тяжело тебе,\nИ гаснет в мире светоч твой,\nНе унывай, Господь с тобой в земной борьбе,\nТебя хранит в руке святой."}, {"id": 455, "title": "Так сердце томится и хочет покоя, и стонет, и плачет порой,", "text": "Так сердце томится и хочет покоя, и стонет, и плачет порой,\nНо нет утешенья в сём мире забвенья, душе не нашёл я покой.\n\n    Домой, домой, хочу я домой!\n    Домой, домой, хочу я домой (хочу я домой)!\n\nУстал средь волнений житейского моря, я в мире живу, как чужой, \nЛью слёзы, скучаю, покоя не знаю, о Боже, хочу я домой!\n\nЗдесь только тревоги, унынье и слёзы, так хочется в небо домой. \nТобой наслаждаюсь, Тебе доверяюсь, в Тебе нахожу свой покой.\n\nИзбавлюсь я скоро от всех испытаний, войду в небеса, в Дом родной, \nТам нет ни страданий, ни слёз, ни стенаний, хочу всё забыть—и домой!\n\nНе слышал я ухом и глазом не видел, что нам приготовил Благой; \nТам радость и счастье, любовь и участье. О, скоро приду я домой!"}, {"id": 456, "title": "Мне Господь Иисус дороже клада, больше нет отрады, чем с Ним быть.", "text": "Мне Господь Иисус дороже клада, больше нет отрады, чем с Ним быть. \nОн со мной, мне ничего не надо - мир в душе ничем не заменить, \nМир в душе ничем не заменить!\n\n    Он источник всех благословений, Он родник живительной воды, \n    Он нас исцеляет от сомнений и хранит от горя и беды.\n\nХоть и страшно завывает буря, и клубятся низко облака,\nНо я знаю: выше туч, в лазури - жизни нескончаемой река,\nЖизни нескончаемой река!\n\nИ туда иду я шаг за шагом, с каждым днём короче путь земной. \nМиг один - и над небесной гладью встретится Спаситель мой со мной! \nВстретится Спаситель мой со Мной!"}, {"id": 457, "title": "Сколько есть заманчивых дорог, Ты от них храни нас, вечный Бог,", "text": "Сколько есть заманчивых дорог, Ты от них храни нас, вечный Бог, \nИ веди нас жизненной тропой по стезям колючим за Собой.\n\n    За Тобой пойду я сквозь туман. Не беда, что кровь течёт из ран, \n    Впереди меля Ты Сам идёшь и меня в Обители ведёшь. \n    Сквозь пургу, сквозь жизни ураган за Тобой иду я в Ханаан.\n    В жизни Ты меня, мой Бог, храни, силы дай вперёд всегда идти.\n\nЕсли Божий Дух в твоей груди, встретишь ты преграды на пути, \nНо как счастлив тот, кто пронесёт верность Богу сквозь кольцо невзгод.\n\nТак веди ж меня Своей тропой, напояй живительной водой;\nДай мне силы лишь Тобою жить, жаждущих водой Твоей поит"}, {"id": 458, "title": "Я здесь лишь странник, странствую в мире, на Родину я свою спешу.", "text": "Я здесь лишь странник, странствую в мире, на Родину я свою спешу. \nСкоро расстанусь я с этим миром, и в Край небесный я войду.\n\n    В белых одеждах ангелы встретят,\n    И вместе с ними пребудем мы;\n    Облекшись силой Его святою,\n    Мы будем славить и петь псалмы.\n\nМинуют годы, пройдут и беды, увижу новый Иерусалим;\nИ воспою я в нём песнь победы, и вечно буду с Отцом моим.\n\nПусть ветер воет, несутся тучи и угрожают мне пусть вокруг.\nЯ знаю то лишь, что Бог могучий со мной пребудет, как лучший Друг!"}, {"id": 459, "title": "Не раз, не два мой утлый чёлн бросал, как щепку, грозный вал", "text": "Не раз, не два мой утлый чёлн бросал, как щепку, грозный вал\nИ заливал потоком волн, и парус мой на клочья рвал.\nКазалось мне в моей беде, что в гавань я не доплыву,\nНайду покой в седой волне, на дне морском склоню главу.\n\nНо каждый раз Ты шёл ко мне, шагая просто по воде, - \nСмолкала буря в тишине, страх исчезал, не знаю где. \nСменялась радостью печаль, овладевал душой покой,\nСияла вновь лазурью даль, виднелась цель - подать рукой.\n\nПредвижу бурю впереди, опасен морем путь домой;\nМолю: «Господь, не проходи, как обещал, пребудь со мной». \nТогда, уверен в этом я, благоуспешен будет путь;\nЗалог того - любовь Твоя, и потому со мною будь!"}, {"id": 460, "title": "Моя ладья в волнах плывет туда, к тем берегам;", "text": "Моя ладья в волнах плывет туда, к тем берегам;\nСквозь бури рёв ее ведет мой верный Капитан.\n\nО, не страшись, недолог путь, видны уж берега;\nИ слышно, как хвалу ноют друзья у ног Христа.\n\nТы знаешь ли тот дивный край, где Родина моя,\nГде братья ждут, где вечный рай? Ах, встречу ль там тебя?\n\nМой чёлн благую весть несёт всем гибнущим в волнах: \nХристос спасает и даёт блаженство в небесах."}, {"id": 461, "title": "Иисус, вся жизнь моя сокрыта лишь в Тебе одном, Спаситель мой.", "text": "Иисус, вся жизнь моя сокрыта лишь в Тебе одном, Спаситель мой. \nИ любовь Твоя в сиянье света над моей простёрта головой.\n\n    Только Ты Хранитель всесильный,\n    У Твоей груди покоюсь я!\n    По прекрасным пажитям обильным \n    В Край небесный Ты ведёшь меня.\n    По прекрасный пажитям обильным \n    В Край небесный Ты ведёшь меня.\n\nВижу я Твои благодеянья, вижу я Твою любовь ко мне.\nХоть иду тропою испытанья - мне с Тобою радостно вполне!\n\nИ когда предстану пред Тобою в славный день венчанья Твоего, \nНе отвергни и не будь Судьёю, но прими как сына Своего."}, {"id": 462, "title": "О Тебе пою, Спаситель, этот гимн души моей", "text": "О Тебе пою, Спаситель, этот гимн души моей\nНа пути земном в Обитель, на пути борьбы, скорбей.\n\n    В этом гимне утешенье, зов небесной красоты,\n    В нём и сила, и забвенье, этот гимн, Спаситель, - Ты!\n\nТруден путь, но гимн прекрасный помогает мне идти \nИ Христовой силой властной дух мой радует в пути.\n\nИ когда приду я в вечность, этот гимн опять спою,\nГимн святой и бесконечный про святую жизнь в раю."}, {"id": 463, "title": "Бог любви на путь меня наставил; долго я во тьме один блуждал,", "text": "Бог любви на путь меня наставил; долго я во тьме один блуждал, \nСам Господь теперь меня избавил, светом свыше путь мой осиял.\n\n    Вижу (вижу) Край чудесный, вечный (вечный) Дом небесный, \n    Радостно, радостно туда стремлюсь.\n\nКак звезда, что утро предвещает среди ночи здесь в земной стране, \nТак Господне Слово мне сияет и вещает о великом дне.\n\nСтрах и ужас часто обнимают, но Господь в опасности хранит, \nМир даёт и душу ободряет, силу сердцу моему дарит."}, {"id": 464, "title": "Я хочу, мой Господь, свою жизнь так прожить,", "text": "Я хочу, мой Господь, свою жизнь так прожить,\nЧтобы каждый, хоть робкий, шаг в жизни \nПриближаться к Тебе, к той заветной стране,\nК Твоей славной небесной Отчизне.\n\nЯ хочу в небе жить и Христу другом быть,\nДля того жизнь дана средь страданий.\nИ хотя на пути надо бури пройти,\nЯ не буду стоять в отчаянье.\n\nМир влечёт всё сильней, и мираж вечных дней \nДаст мне шаткая слава обмана,\nНо счастливой земли золотые огни \nНас уводят от бурь, урагана.\n\nЗнаю, будут в пути ночь и скорбь впереди, \nВетер душу пронзит, не жалея,\nВсё же буду я ждать, верой тьму побеждать! \nДень придёт, верю я без сомненья!"}, {"id": 465, "title": "Как тяжко бывает на сердце порою,", "text": "Как тяжко бывает на сердце порою,\nИдя по тернистому жизни пути,\nНо всё же иду я, Спаситель, с Тобою,\nКак Ты повелел за Тобою идти.\n\nЯ странник и пленник в стране незнакомой, \nНикем не любимый и всеми забыт.\nВисит моя арфа на ветке вербовой,\nИ песня смолкает, струна не звучит.\n\nИ часто бывает, как плачет ребёнок,\nТак я сокрушаюсь и в скорби молюсь;\nИ к Родине славной и крепко любимой \nДушою и сердцем, и духом стремлюсь.\n\nВ лазурное небо, где солнце восходит,\nТуда, к небесам, устремляю взор свой.\nТам путник усталый приют свой находит,\nТам всеми желанный получим покой.\n\nИ песнь неземная польётся в эфире,\nС той песней небесной свой голос солью.\nА здесь я, как странник и пленник в сём мире, \nПою лишь печальную песню мою."}, {"id": 466, "title": "О, как трудно идти мне на узком пути, каменистом.", "text": "О, как трудно идти мне на узком пути, каменистом.\nУраган всё ревёт, даже ужас берёт — путь тернистый.\nЯ ж ничтожен собой и бороться с судьбой малосилен,\nИ давно бы погиб, если был бы забыт Тем, Кто силен, Тем, Кто силен.\n\nНо, смотря на Христа, в Ком вся жизнь, полнота, я мужаюсь.\nИ иду я в народ, шаг за шагом вперёд, подвизаюсь.\nИзнемог и Христос, когда крест тяжкий нёс на распятье,\nНо потом воссиял, как из гроба восстал от проклятья, от проклятья.\n\nВдаль я с верой гляжу и, борясь, прохожу жизни поле.\nВ небе песнь воспою, как Христа я узрю на престоле.\nХоть и трудно идти, мне поможет в пути мой Спаситель.\nУраган пусть ревёт, но меня проведёт Избавитель, Избавитель."}, {"id": 467, "title": "К заоблачным далям, к далёким вершинам нелёгкие тропы ведут.", "text": "К заоблачным далям, к далёким вершинам нелёгкие тропы ведут. \nВ манящую высь, оставляя долины,\nЯ к цели по кручам опасным иду.\nА впереди лежат в перевалах угрюмые скалы,\nТуманом залитая даль.\n\nИду, а в душе рой священных желаний и в высь неземную порыв, \nТуда от земных безотрадных скитаний\nУносят нас крылья горячих молитв.\nТам навсегда забудем тревоги, всю тяжесть дороги \nИ скорби земного бытья.\n\nСуровые бури и ветры встречают нас в этом нелёгком пути,\nНо дух наш усталый надежд не теряет\nК высотам желанным небесным дойти.\nА впереди осталось немного тернистой дороги, - \nИ солнцем засветится даль.\n\nСквозь годы и бури, борьбу и тревоги Спаситель нас к небу ведёт. \nОн нас не оставит в далёкой дороге\nИ в вечность нам дверь, Он нам дверь распахнёт.\nА впереди - последние грозы, последние слёзы \nИ в вечности чудный покой."}, {"id": 468, "title": "Услышь, Господь, моё моленье, бессилен я - дай силы мне.", "text": "Услышь, Господь, моё моленье, бессилен я - дай силы мне.\nК Тебе всю жизнь моё стремленье, чтоб свято жить здесь, на земле.\n\n    Я здесь не свой (я здесь не свой), страна чужая,\n    И для души (и для души) всё чуждо в ней.\n    Я рвусь душой в просторы рая, где ярче, лучше и светлей.\n\nЯ рвусь туда, где руки брата не обагрит людская кровь,\nГде жизнь чиста, тиха и свята, где вместо воздуха - любовь.\n\nМоя мечта - страна святая, привольно там душе с Христом.\nТам не настигнет ложь людская, и брат не станет злым врагом.\n\nТам не восстанет жизнь плотская в борьбе смертельной на дух мой. \nХочу я, на Христа взирая, здесь свято жить, идя домой."}, {"id": 469, "title": "Среди гор и пустынь узкий путь наш проходит.", "text": "Среди гор и пустынь узкий путь наш проходит.\nИ пройти до конца - значит всё победить,\nЧтоб потом вечно жить, чтобы смерть навсегда уничтожить \nИ награду из рук Бога сил получить.\n\nНаши чувства здесь всем непонятны и странны,\nЧасто злобу к себе мы встречаем в сердцах;\nЗдесь под небом чужим мы пришельцы в стране нежеланной, \nИ таков весь наш путь, милый друг, до конца.\n\nНочь темнеет вокруг, ночь свои силы множит,\nТьма не дремлет и зло восстаёт против нас.\nТвёрдым будь в этот час! Наш Отец обещал, что поможет.\nОн не сводит с тебя и меня Своих глаз.\n\nАх, родная Страна! Будет путь наш нелёгким.\nПуть к границам твоим с каждым годом трудней.\nТак возлюбим же, друг, нашу Родину чувством высоким, \nЧтоб, достигнув её, всем нам встретиться в пей!"}, {"id": 470, "title": "Я иду по дороге земной, через бури иду и дожди,", "text": "Я иду по дороге земной, через бури иду и дожди,\nНо я знаю: Спаситель со мной на нелёгком и долгом пути.\nЯ не знаю, что завтрашний день принесёт, я не знаю, что ждёт впереди, \nНо я знаю, что рядом Спаситель идёт, значит можно спокойно идти.\n\nС каждым шагом труднее дышать, набирает тропа высоту,\nМне придётся немало страдать, прежде чем до Отчизны дойду.\nТы по этой тропинке прошёл до меня, Ты открыл мне к спасению путь; \nИ Твоими слезами омылась земля, чтобы мог я спокойно вздохнуть.\n\nРуку помощи Бог протянул, светом жизни меня воскресил \nИ ведёт в ту святую страну, где навеки меня поселил.\nИ я верю, что солнце блеснёт из-за туч и осветит тропинку во тьме. \nТы страдал, чтобы землю согрел этот луч, чтобы стало светлей на земле.\n\nЯ иду по дороге земной, через бури иду и дожди,\nНо я знаю, Спаситель со мной на нелёгком и долгом пути.\nСлава Господу Богу звучит от меня, что открыл мне к спасению путь, \nЧто слезами Иисуса омылась земля, чтобы мог я спокойно вздохнуть."}, {"id": 471, "title": "Мы не созданы для лёгкого пути,", "text": "Мы не созданы для лёгкого пути,\nМы народ Христовой Церкви, и поэтому \nВсе нам трудности должно перенести, \nВедь должны мы быть готовы к этому!\n\nМы не созданы для лёгкого пути,\nВетер с севера и юга поднимается.\nНам плоды святые надо принести,\nВ этом сущность жизни заключается.\n\nМы наследники наследия отцов;\nС нами Бог, и крылья сильные духовные \nНам помогут до скончания веков \nПобеждать стихии все греховные.\n\nНаша цель ясней, чем солнца яркий свет, \nМы идём дорогой жизни восхождения;\nИ нигде пути такого больше нет,\nЛишь в Иисусе Бог нам дал спасение."}, {"id": 472, "title": "-Ты куда идешь, скажи мне, странник с посохом в руке?", "text": "-Ты куда идешь, скажи мне, странник с посохом в руке?\n-Дивной милостью Господней к лучшей я иду стране. \nЧерез горы и долины, через степи и поля,\nЧрез леса и чрез равнины я иду домой, друзья.\n\n- Странник, в чём твоя надежда? - Во стране моей родной \nБелоснежная одежда и венец весь золотой,\nТам источники живые и небесные цветы;\nЯ иду за Иисусом через жгучие пески.\n\n-Страх и ужас не знакомы разве на пути тебе?\n-Ах, Господни легионы защитят меня везде!\nИисус Христос со мною, Он направит Сам меня \nНеуклонною тропою прямо, прямо в небеса.\n\n- Так возьми ж меня с собою, где чудесная страна.\n-Да, мой друг, пойдём со мною, вот тебе моя рука. \nНедалёко уж родная и желанная страна.\nВера чистая, живая нас введёт с тобой туда."}, {"id": 473, "title": "Ты на помощь ко мне приди, мне так помощь необходима;", "text": "Ты на помощь ко мне приди, мне так помощь необходима;\nЯ не знаю, как дальше идти, помоги мне, Христос любимый.\n\n    Чтобы только с Тобою рядом мне идти до конца пути, \n    Чтоб под ласковым Твоим взглядом сердце радовалось в груди.\n\nСердце камнем в груди моей давит, а язык хуже жала втрое;\nДушу спящую пробуди и омой Сам святою Кровью.\n\nЯ в грехах, как в болоте топком, оказался в большой беде;\nТы поставь на любую тропку, чтобы только вела к Тебе"}, {"id": 474, "title": "Я хочу за Тобою идти, мой Спаситель, куда б Ты ни вёл,", "text": "Я хочу за Тобою идти, мой Спаситель, куда б Ты ни вёл,\nПомоги крест тяжёлый нести, чтоб без ропота с радостью шёл.\n\nКогда я упаду на пути, Ты простри ко мне руку Свою,\nПомоги за Тобою идти, ведь Тебя я (Создатель) люблю.\n\nМне легко за Тобою идти, когда всё улыбается мне,\nНо коль скорби придут, помоги мне дойти к той небесной стране.\n\nПоложиться мне дай на Тебя, твёрдость веры во мне сохрани,\nТы страдал на кресте за меня, должно мне часть страданий нести.\n\nНо ведь я человек, без Тебя нету силы, я прах пред Тобой;\nВся надежда моя на Тебя, только Ты моя радость, покой.\n\nКогда я упаду на пути, Ты простри ко мне руку Свою,\nПомоги за Тобою идти, ведь Тебя я (Создатель) люблю."}, {"id": 475, "title": "Пустыней греховной, земной, где неправды гнетущий обман,", "text": "Пустыней греховной, земной, где неправды гнетущий обман,\nЯ к Отчизне иду неземной по кровавым следам христиан.\n\n    В Край родной (в Край родной), неземной (неземной)\n    От обмана мирской суеты\n    Я иду (я иду) и дойду (и дойду) к незакатному солнцу любви.\n\nТемнеет вечерняя мгла, длится темный и страшный мой путь,\nНо не гаснет надежда моя: я в Отчизне моей отдохну.\n\nИди же смелее вперёд за Христом, не пугаясь врага.\nСкоро кончится путь твой земной, засияют Сиона врата."}, {"id": 476, "title": "Ещё недолго, да, совсем недолго - и наш Спаситель нас к Себе возьмёт.", "text": "Ещё недолго, да, совсем недолго - и наш Спаситель нас к Себе возьмёт. \nХоть и тревог встречаем в жизни много, но в небесах покой душа найдёт.\n\n    Ещё недолго, да, совсем недолго -и я узрю Того, Кого люблю. \n    Ещё недолго, да, совсем недолго -и в небесах Христу я воспою.\n\nМой путь тернистый тягостен порою, и не растут цветы на нём нигде. \nЯ падаю, измученный душою, но, вновь поднявшись, я иду к Тебе.\n\nЯ пилигрим усталый, изнурённый, о, будь со мной и помогай в борьбе! \nКогда Ты рядом - я тогда спокоен и в горе, и в страданье, и в нужде.\n\nЯ радуюсь, что Ты меня так любишь, что среди ночи помогаешь мне! \nЯ верю, Ты меня не позабудешь. О, будь со мной всегда, во всём, везде!"}, {"id": 477, "title": "Когда на заре моих дней я блуждал в греховной пустыне земной,", "text": "Когда на заре моих дней я блуждал в греховной пустыне земной, \nВпервые я голос Христа услыхал: «Дитя моё, следуй за Мной!»\n\n    Следуй за Мной, за Мной!\n\nКогда я в завет с Иисусом вступил - враги ополчились стеной.\nОн силы мне дал и меня ободрил: «Не бойся и следуй за Мной!»\n\nЯ падал в пути - Он меня поднимал, склоняясь в любви надо мной, \nИ дивною речью меня укреплял: «В смирении следуй за Мной!»\n\nКогда я робел перед тьмою врагов, редел строй друзей предо мной, \nЯ слышал Его ободряющий зов: «Мужайся и следуй за Мной!»"}, {"id": 478, "title": "Путь наш не устлан цветами, только каменья, шипы.", "text": "Путь наш не устлан цветами, только каменья, шипы.\nНо ныне будь, Боже, с нами и охраняй на пути.(2 раза)\n\n    Без Него я упаду, без Христа не устою,\n    Без Него и жизни мне не надо.\n\nДьявол лукавый не дремлет, часто пугает меня,\nНо обещание помню: «Я не оставлю тебя!»(2 раза)\n\nВ жизни, конечно, нам трудно, часто нет силы идти,\nНо Сам Господь стал нам Другом, и Он хранит нас в пути.(2 раза)\n\nОн говорит мне: «Надейся, только взирай на Меня,\nВедь Я прошёл тот путь прежде и пострадал за тебя».(2 раза)"}, {"id": 479, "title": "Следуй за Мной, когда море бушует,", "text": "Следуй за Мной, когда море бушует,\nСледуй за Мной, когда тьма торжествует,\nСледуй за Мной через терны, шипы!\nСледуй, лишь следуй за Мной!\n\nСледуй за Мной, когда в жизни страдаешь,\nСледуй за Мной, когда силы теряешь,\nСледуй за Мной - помогу Я тебе!\nСледуй, лишь следуй за Мной!\n\nСледуй за Мной, когда враг искушает,\nСледуй за Мной, когда друг изменяет,\nСледуй за Мной - не оставлю тебя!\nСледуй, лишь следуй за Мной!\n\nСледуй за Мной, когда дали темнеют,\nСледуй за Мной, когда очи тускнеют,\nСледуй за Мной - в вечный дом ты войдешь!\nСледуй, лишь следуй за Мной!"}, {"id": 480, "title": "Небо ль надо мной синеет или в мрачный час ночной", "text": "Небо ль надо мной синеет или в мрачный час ночной\nСвет добра в душе лелею,потому что Бог со мной.\nТы Своей святой рукою посылаешь мир, покой,\nЯ иду Твоей тропою, твёрдо знаю: Ты со мной.\n\n    Ты со мной, и с Тобою легко мне везде,\n    Ты со мной, рядом в радости, рядом в беде,\n    Ты со мной, Твои милости вижу вокруг,\n    Ты со мной, мой Господь, самый лучший мой Друг!\n\nИ долина тени смертной, и холодный час ночной\nНе вредят душе бессмертной, потому что Ты со мной.\nУкрепляешь, помогаешь и Своей святой рукой\nПуть к Отчизне направляешь. Мне легко, ведь Ты со мной.\n\nА когда приду к Отчизне, знаю, встретишь, Пастырь мой,\nИ мне скажешь в вечной жизни: Будь навеки ты со Мной.\nПрипаду к ногам пронзённым и, услышав голос Твой,\nПрошепчу: Я всех счастливей, потому что Ты со мной."}, {"id": 481, "title": "Шествуем к небу дорогой тернистой,", "text": "Шествуем к небу дорогой тернистой,\nВеруя сердцем в Иисуса Христа.\nСмело идём к правде вечной и чистой, \nПусть славят Господа наши уста.\n\nНас окружают все тёмные силы,\nДуши хотят погубить навсегда.\nБудем же верны Христу до могилы.\nНет, не изменим Ему никогда!\n\nПомним слова, что Спаситель сказал нам: \n«Гнали Меня, будут гнать также вас». \nБудем стремиться к Христу постоянно, \nЧтобы Дух Божий в сердцах не угас.\n\nСкоро вернётся наш верный Учитель, \nВсех нас, друзья, от земли восхитит; \nСкоро войдём мы в Христову обитель. \nПуть наш тернистый на небо лежит.\n\nСлушайте все, в ком ещё сердце бьётся: \nСкоро конец всем невзгодам придёт. \nВремя летит, Божий глас раздаётся:\nО, пробудитесь, Господь уж грядёт!"}, {"id": 482, "title": "Есть много дорог и много путей,", "text": "Есть много дорог и много путей,\nНо только лишь Бог - путь жизни моей. \nОн за руку Сам проводит меня \nДомой, к небесам, по острым камням.\n\nИ в стужу, и в зной, и ночью, и днём \nСпаситель со мной, я радуюсь в Нём. \nТак страшно кругом, темно впереди, \nНо в битве с врагом Господь победил.\n\nБушует гроза. Потоками дождь.\nНо видно стезю, и близок мой Вождь. \nСо мной Иисус - победа моя,\nИ с Ним я стремлюсь в родные края."}, {"id": 483, "title": "О мой Господь, сегодня понял я, что без Тебя печален жребий мой.", "text": "О мой Господь, сегодня понял я, что без Тебя печален жребий мой. \nЛишь Ты один, могучий Судия, купил мне жизнь великою ценой.\n\nЯ как сосуд в Твоих руках, Господь, и Ты во мне всё новое творишь \nЛишь потому, что в славных небесах Ты пребывать неправде не велишь.\n\nКогда я сам веду с грехом борьбу, когда томит он душу через плоть, \nЯ не могу осилить сатану, но Он сражён Тобою, мой Господь.\n\nИ пред Тобой тогда склоняюсь я, не видя больше выхода из бед, \nТвоя рука тогда ведёт меня путём великих, радостных побед."}, {"id": 484, "title": "Мы бодрей на жизненном пути пойдём, если будем доверять Иисусу.", "text": "Мы бодрей на жизненном пути пойдём, если будем доверять Иисусу. \nСилу Божию в работе мы найдём, если будем доверять Иисусу.\n\n    Просветлеет путь тогда, радость будет навсегда,\n    Не смутит враг никогда, если будем доверять Иисусу.\n\nОбещанья Божьи станут нам ясней, если будем доверять Иисусу. \nБлагодать наполнит сердце всё полней, если будем доверять Иисусу.\n\nВолю Божию научимся творить, если будем доверять Иисусу. \nПостоянно взоры к небу возносить, если будем доверять Иисусу."}, {"id": 485, "title": "Не тоскуй ты, душа дорогая, не печалься, но радостна будь;", "text": "Не тоскуй ты, душа дорогая, не печалься, но радостна будь;\nО, поверь, жизнь настанет другая, любит нас Сам Господь, не забудь.\n\nУповай ты на Господа Бога, и почаще молись ты в тиши,\nИ утихнет на сердце тревога, и получишь покой для души.\n\nВ мире волны бушуют, как в море, ветер страшно и грозно шумит. \nНо взгляни ты: с любовью во взоре на тебя Твой Спаситель глядит.\n\nЖизнью нашей Он Сам управляет и защиту свою подаёт, \nПосылает нам то, что желает и что к радости, к счастью ведёт.\n\nНам страдать здесь осталось немного, мы готовы к последней борьбе. \nСкоро кончится путь наш суровый, и возьмёт нас Спаситель к Себе.\n\nПристань тихая нас ожидает, бури страшной и грозной в ней нет; \nЯрче солнца Христос там сияет, жизни вечной не меркнет в Нём свет.\n\nНе смущайся в тяжёлые годы, пусть на бремя не ропщут уста, \nЧасто в жизни бывают невзгоды, но надейся на милость Творца.\n\nНе забудь, что Христос твой Спаситель тебя ради страдал на кресте, \nОн от бед твой благой Искупитель, Он с тобою всегда и везде.\n\nНе тоскуй ты, душа дорогая, не печалься и радостна будь!\nВ небе Родина наша святая, там наш вечный блаженный приют."}, {"id": 486, "title": "Ступени молитвы ведут нас к любви, по ним мы должны восходить", "text": "Ступени молитвы ведут нас к любви, по ним мы должны восходить \nНе раз и не два, а до боли в ногах, чтоб там все заботы сложить.\n\n    О добрый мой Пастырь, единственный Друг,\n    В молитве меня укрепи.\n    С Тобою успешен для вечности труд,\n    Который ты Сам мне вручил.\n\nБывает, что ноги устали, болят, все силы утратил в пути,\nНо крепости духа Господь может дать - и снова отрадно в пути.\n\nБез связи с Христом я душою паду. Молитва - вот сила моя!\nИ верю я твёрдо, что с нею приду в Господни святые края."}, {"id": 487, "title": "Я знаю, да, я знаю, что жив Спаситель мой,", "text": "Я знаю, да, я знаю, что жив Спаситель мой,\nЧто Им я обретаю дар жизни неземной.\n\nЯ знаю, Кто в мгновенье отчаянья и бед \nМне подаёт спасенье и помощь, и совет.\n\nЯ знаю, если стражду под ношею скорбей,\nКто утоляет жажду больной души моей.\n\nЯ знаю, что из праха по смерти оживу\nИ с радостью, без страха пред Ним склоню главу."}, {"id": 488, "title": "Ты взываешь к Отцу, а ответа всё нет,", "text": "Ты взываешь к Отцу, а ответа всё нет,\nА твоей ведь душе, о, как нужен совет!\nНе совет человека, не друга совет,\nА общение с Богом, от Бога ответ.\n\n    Может быть, ещё раз в трудный жизни час \n    Нужно тебе помолиться.\n    Ещё раз, ещё раз в тихий поздний час \n    На колени пред Богом склониться.\n\nТы взываешь к Отцу, а ответа всё нет,\nСилы только слабеют, так нужен совет.\nНежный голос в душе вновь и вновь говорит,\nНа колени пред Богом вновь встать Он велит.\n\nТы взываешь к Отцу, а ответа всё нет,\nИ ты веру теряешь на Божий ответ.\nТвои вздохи и слёзы, что значат они?\nВедь они все у Бога давно сочтены."}, {"id": 489, "title": "Он знает всё: когда скорбь со мной, как бурлящий воды поток,", "text": "Он знает всё: когда скорбь со мной, как бурлящий воды поток, \nКогда скорби гнёт моё сердце жмёт, когда труден путь и далёк.\n\n    О, да, Он знает скорбь мою, я сердцем чувствую всё.\n    Он знает раны и жизни удары, Спаситель знает всё.\n\nОн знает всё: когда скорбь близка, в моём сердце грусть и тоска, \nКогда ночи гнёт моё сердце жмёт, когда дух повержен во прах.\n\nОн знает всё, когда злая смерть сердце верное унесёт\nИ разлучит нас в этот скорбный час, — моя скорбь к Иисусу взойдёт."}, {"id": 490, "title": "Пусть на земле много скорбей, пусть,", "text": "Пусть на земле много скорбей, пусть,\nПусть на земле я слезы лью, пусть,\nПусть на земле я без друзей, пусть, -\nБыл бы Иисус, мой лучший Друг, рядом со мной.\n\n    Ведь с Иисусом легко шагать,\n    Трудности в жизни пройти.\n    Он лучший Друг, Он жизнь моя,\n    В Нём красота и любовь.\n\nПусть на земле обман и ложь, пусть,\nПусть для людей я нехорош, пусть,\nПусть говорят, что я неправ, пусть,\nНо знаю я, что цель моя там, где Иисус.\n\nПусть ураган злобный ревёт, пусть,\nПусть налетит девятый вал, пусть,\nПусть клевета сердце гнетёт, пусть,\nДруг Иисус крепкой рукой развеет грусть."}, {"id": 491, "title": "Не найдёт душа себе покоя на земле чужой, здесь странник я;", "text": "Не найдёт душа себе покоя на земле чужой, здесь странник я;\nТак томлюсь, мне чужда радость мира, песни мира не возьму в уста. \nБез Иисуса всё вокруг печально, солнца свет не радует меня, \nПустота вокруг покрыта мраком, - я спешу в небесные края.\n\nБоже мой, душа моя желает подойти к источнику воды,\nЖажду утолить, снять утомленье, принять чудный дар святой любви. \nОтче мой, как сердце ждёт Иисуса, в трепетном волнении душа. \nВот идёт Он чудный и прекрасный, Сын великий славного Отца.\n\nОн идёт - как будто солнце всходит, оживляя всё в Своих лучах, \nЛикованье, торжество приносит, расцветает перед Ним душа. \nПрипаду к груди Иисуса нежно, ноги обниму, смочу слезой.\nИ без многих слов поймёт меня Он, и найду душе своей покой.\n\nИ Он скажет: «Сын мой, иди с миром, Я с тобой, не бойся, будь смелей. \nУкрепляйся, принимая силу, что тебе дана в Крови Моей».\n\nИ Он скажет: «Дочь Моя родная, Я с тобой, не бойся, будь смелей. \nУкрепляйся, принимая силу, что тебе дана в Крови Моей»."}, {"id": 492, "title": "На Христа взирая, жизнь Ему отдай!", "text": "На Христа взирая, жизнь Ему отдай!\nГрешных призывая, Он даст им рай.\nЗа тебя страдая, взял твой грех Он Сам;\nНа Христа взирая, верь Его словам!\n\nНа Христа взирая, в бой за Ним вступай! \nБудет битва злая - ты ж не унывай.\nПусть душа больная слаба пред врагом;\nНа Христа взирая, верь, победа в Нём!\n\nНа Христа взирая, не забудь о Нём \nВ час, когда, сияя, день горит лучом; \nРадость ведь земная исчезает вдруг;\nНа Христа взирая, в Нём пребудь, о друг!\n\nНа Христа взирая, труд свершай ты свой, \nИ, свой день кончая, в Нём найдёшь покой, \nИ рука святая приготовит пир;\nНа Христа взирая, в Нём ищи свой мир!\n\nВ мире скорби жгучей взор твой устаёт, \nЗатемняют тучи вид Христа красот;\nТам же, в царстве рая, горе позабыв,\nНа Христа взирая, будешь ты счастлив."}, {"id": 493, "title": "Не говори, что не видать конца пути.", "text": "Не говори, что не видать конца пути.\nНе говори, что ты устал за Ним идти.\nНе говори, что ты измучен от креста,\nНе говори! Христос распят был за тебя!\n\nНе говори, что нету места от тоски.\nНе говори, что побелели уж виски.\nНе говори, что нет забот твоим конца,\nНе говори! Христос распят был за тебя!\n\nО, сколько мук Он за тебя, мой друг, принял \nО, сколько вёсен, сколько зим тебя Он ждал! \nНе говори, что дверь к Нему уж заперта,\nНе говори! Христос распят был за тебя!"}, {"id": 494, "title": "Только в Боге успокаивается душа моя,", "text": "Только в Боге успокаивается душа моя,\nОт Него только спасение мос, а Он,\nОн Утешитель мой, в сердце даёт покой,\nТолько в Боге успокаивается душа моя.\n\nЕсли трудно и никто тебя с друзей понять не смог, \nВоззови к небу: там всесильный Бог, а Он,\nОн Утешитель твой, в сердце Он даст покой, - \nТолько в Боге успокаивается душа моя.\n\nЕсли слёзы затуманили твой взор, и скорбь гнетёт, \nОн рукой нежной их со щеки отрёт, ведь Он,\nОн Утешитель твой, в сердце Он даст покой, - \nТолько в Боге успокаивается душа моя.\n\nМой Учитель утешает меня в скорби и нужде,\nТы другого Бога не найдёшь нигде, ведь Он,\nОн истинный есть Бог, в трудностях всех дорог \nТолько в Боге успокаивается душа моя."}, {"id": 495, "title": "Мой Господь, эту ночь проведу я с Тобой,", "text": "Мой Господь, эту ночь проведу я с Тобой,\nНа коленях в молитве, с слезами,\nНо я верю всем сердцем и всею душой,\nЧто Ты слёзы отрёшь мне Своими руками. (2 раза)\n\n    Умолкнет гром, утихнут грозы, и ветер бурный улетит, \n    Вновь расцветут прекрасно розы, луч солнца дивный заблестит.\n\nБудут звёзды смотреть на меня с высоты,\nИ луна нежным светом осветит,\nНо, а душу мою озаришь только Ты,\nЭтот свет, как бальзам, раны сердца излечит. (2 раза)\n\n    Пройдут печали, испытанья, не буду лить я больше слёз,\n    И все невзгоды и страданья смирит Спаситель мой Христос.\n\nВновь воспрянет душа, к небу взор устремив,\nПозабыв про земные страданья,\nИ звучать будет в сердце небесный мотив.\nО Господь, как прекрасно с Тобою свиданье! (2 раза)\n\n    Никто-никто душе не сможет в минуту горя радость дать, \n    Лишь только Он в беде поможет, в скорбях Он силен утешать."}, {"id": 496, "title": "Когда огорченье ты встретишь в пути,", "text": "Когда огорченье ты встретишь в пути,\nВ людях утешенья тебе не найти;\nВ слезах умиленья и в тайне души \nХристу сокрушенье излей ты в тиши.\n\nОн, любящий, знает о горе твоём,\nТебя ожидает на лоне Своём;\nУзнаешь, как властно спасенье Христа,\nО Нём ежечасно петь будут уста.\n\nСтрадальцев так много под гнётом скорбей; \nС утехой от Бога спеши к ним скорей, \nСкажи им с любовью о дивном Христе, \nОмывшем их Кровью на скорбном кресте."}, {"id": 497, "title": "Твой город не здесь, среди мёртвой пустыни, где царство греховных страстей,", "text": "Твой город не здесь, среди мёртвой пустыни, где царство греховных страстей, \nГде грязнут сердца омраченных неверьем в объятьях лукавых сетей.\n\nНе здесь, где презренье Господней святыни, гоненья от ревности злой, \nГде жизнь и доныне полна лицемерья и явно не скрытой враждой.\n\nТы странник здесь, помни, твой город на небе, строитель которого Бог, \nОн отдых тебе и отрада святая в печальной долине тревог.\n\nХоть труден тебе, о скиталец, путь тесный, с грехом в постоянной борьбе, \nНо счастлив наследник прекрасного рая, блажен ты и благо тебе!\n\nПусть тьма, обличённая светом Христовым и правдою жизни твоей, \nТак злобно глумясь, предаёт поруганью путь веры Господних детей.\n\nНо ты, укреплённый Божественным Словом, взведи свои очи к горам. \nТам помощь от Бога в минуту страданья, там песнь изнурённым сердцам.\n\nСтремись же туда, несмотря на преграды, подняться в восторге душой. \nИ в сердце твоё, о пришелец гонимый, блаженный прольётся покой.\n\nО, помни всегда, что усталому чаду приют на Сионе готов,\nИ ты, умягчённый елеем незримо, войдёшь под желанный покров.\n\nИди же, пути остаётся немного! Уж близок желанный конец!\nПобеда твоя! И помни, с тобою всегда твой небесный Отец.\n\nТебя мы приветствуем именем Бога, желаем мы блага тебе;\nИди, уповая, что скоро к покою Он путника примет к Себе."}, {"id": 498, "title": "Есть радость в том, чтоб люди ненавидели, добро считали злом,", "text": "Есть радость в том, чтоб люди ненавидели, добро считали злом,\nИ мимо шли, и слёз твоих не видели, назвав тебя врагом.\n\nЕсть радость в том, чтоб вечно быть изгнанником и, как волна морей, \nКак туча в небе, одиноким странником, и не иметь друзей.\n\nБлаженны вы, бездомные, томимые печалию земной.\nБлаженны вы, презренные, гонимые жестокою толпой.\n\nПрекрасна только жертва неизвестная! Как тень хочу пройти.\nИ сладостна да будет ноша крестная здесь на земном пути.\n\nО, верь, твоё сокровище нетленное не здесь, а в небесах.\nВ твоих скорбях - величье сокровенное! Восторг - в твоих глазах!\n\nЖиви, как Он, с любовью и надеждою, не слыша дальних бурь,\nИ серафимов крылья белоснежные умчат тебя в лазурь."}, {"id": 499, "title": "Ах, куда сокроюсь я? В ком и где искать спасенье?", "text": "Ах, куда сокроюсь я? В ком и где искать спасенье?\nГде найдёт душа моя от недуга исцеленье?!\n\nНет мне помощи ни в ком. Где конец греху, паденью?\nЛишь в Тебе, Господь, одном радость бедному творенью.\n\nЯ грехом обременён, о Господь, внемли моленьям!\nБуду ль я когда спасён? Будет ли конец паденьям?\n\nО, предвечный Божий Сын! Я к Тебе в мольбе взываю:\nТы Спаситель, Ты один — это твёрдо в сердце знаю.\n\nБеден я, греховен, зол, дух бесчувствен, сердце - камень,\nНо, Господь, Ты в мир сошёл, чтоб возжечь любви в нас пламень.\n\nСам смягчи мне волю, дух; дай мне в сердце упованье,\nИсцели греха недуг, в очи - слёзы покаянья.\n\nМуки, раны, смерть Твоя мир, отраду, избавленье \nВсем даруют - в них и я от грехов найду спасенье;\n\nКровью Агнца благодать может смыть все прегрешенья \nИ в число детей принять, дать мне в скорби утешенье."}, {"id": 500, "title": "В разбитой волнами ладье во мраке ночи плыл,", "text": "В разбитой волнами ладье во мраке ночи плыл,\nТуда где в непроглядной тьме так грозно ветер выл. \nГрозила смерть, а мрак ночной сгущался всё сильней,\nИ над пучиной роковой грозила буря злей.\n\nНо вот вдали блеснул маяк, лучом прорезав тьму.\nО, гибнущий в волнах моряк, направь ладью к нему! \nСквозь бурю голос прозвучал Спасителя ко мне,\nИ голос этот я узнал: Он влёк меня к Себе.\n\nО брат, мужайся, близко цель, пусть не смолкает дух. \nСтремись вперёд, будь бодр и смел, хоть волны так ревут. \nУтихнет буря, ночь пройдёт, заблещет солнца луч, -\nИ в пристань тихую войдёт, кто духом был могуч."}, {"id": 501, "title": "Над бушующим морем, далеко от земли,", "text": "Над бушующим морем, далеко от земли,\nС грозной бурею споря, пронеслись журавли.\nЛишь один, позабытый, с перебитым крылом, \nТяжким горем убитый, озирался кругом.\n\nОн всё ниже садился над пучиной морской,\nХоть и очень стремился воспарить над волной.\nИ казалось, что гибель для него уж близка, - \nВдруг, он остров увидел среди волн свысока.\n\nЕсли в битве житейской тебя ранит стрела,\nНе страшись, друг, но с верой посмотри на Христа. \nСредь кипучего моря суеты и страстей,\nОт страданий и горя ждёт Спаситель людей."}, {"id": 502, "title": "Если, ношей утомлённый, ты споткнёшься на пути,", "text": "Если, ношей утомлённый, ты споткнёшься на пути, \nЗнай: Спаситель вознесённый может бремя понести.\n\nТолько Он, любвеобильный, может горе усладить; \nТолько Он один, всесильный, может силой наделить.\n\nТолько Он, небес Властитель, может сердце исцелить, \nТолько Он, твой Искупитель, может грех тебе простить.\n\nТолько Тот, Кто ночь могилы превратил в поток лучей, \nМожет мир души унылый воскресить для новых дней."}, {"id": 503, "title": "Среди печалей и невзгод, житейского волненья", "text": "Среди печалей и невзгод, житейского волненья\nЛишь Ты один, Господь мой Бог, мне даришь утешенье.\n\nИзраненный грехом, лежал я при пути без силы,\nУж смерть витала надо мной, и гибель мне грозила.\n\nНо мимо проходили все без чувства сожаленья,\nЛишь Ты приблизился ко мне с бальзамом исцеленья.\n\nИ вновь всё ожило во мне. Вновь солнце засияло.\nЯ исцелён теперь вполне. Жизнь новая настала."}, {"id": 504, "title": "Подними меня, Спаситель, и приблизь к Своей груди,", "text": "Подними меня, Спаситель, и приблизь к Своей груди,\nИ могучею десницей в этом мире огради.\nЯ под бременем стенаю, изнемог в земной борьбе;\nНа коленях умоляю: «Подними меня к Себе!»\n\n    Подними меня, Спаситель, в горний мир из тьмы скорбей; \n    У груди Твоей защита и покой душе моей.\n\nПодними меня, Спаситель, от греховной пустоты.\nСердце страха не увидит, если рядом будешь Ты;\nНет скорбям границ и края, я открыл свой грех Тебе.\nОбещанье выполняя, подними меня к Себе.\n\nПодними меня, Спаситель, и рассей душевный мрак,\nОкажи Твою мне милость, чтоб не тешился мой враг.\nЛишь в Тебе успокоенье, внемлешь Ты моей мольбе;\nТы мой Бог, моё спасенье, подними меня к Себе!"}, {"id": 505, "title": "Возвеселись, печальный друг! Воспой Христа, любя!", "text": "Возвеселись, печальный друг! Воспой Христа, любя! \nБез дел твоих и без заслуг Он милует тебя.\n\nЕго любовию спасён, получишь ты венец,\nПридёт пора - положит Он твоей борьбе конец.\n\nЗачем роптать среди забот, печалясь день и ночь?\nОн видит твой душевный гнёт, Он знает, как помочь.\n\nС начала дней твоих земных, не Им ли ты храним? \nНе знаешь ли, что Он в Своих путях непостижим.\n\nНе унывай же никогда пред жизненной грозой!\nИ будешь счастлив ты тогда и сердцем, и душой."}, {"id": 506, "title": "Открой своё горе пред Богом святым,", "text": "Открой своё горе пред Богом святым,\nИ мысли твои Он развеет, как дым.\n\nТы в тихой молитве в ночную пору \nСкажи своё горе Иисусу Христу.\n\nСпаситель ведь знает о горе твоём,\nТебя Он утешит на лоне Своём.\n\nИ свет засияет на трудном пути,\nИ мир неземной сможешь ты обрести.\n\nИ в миг тот блаженный от гнёта нужды \nНавеки свободным окажешься ты.\n\nУтешенный Богом дашь радость другим; \nБог хочет помочь всем страданьям твоим"}, {"id": 507, "title": "Спаситель мой живёт! Да будут далеки", "text": "Спаситель мой живёт! Да будут далеки\nОт сердца ужасы забот, унынья и тоски!\n\nОн Сам вблизи меня, и Он готов хранить \nМой дух от муки и огня и мир мне подарить.\n\nИ в сумраке ночей, и пред толпой врагов,\nИ средь невидимых сетей - везде Он мой покров.\n\nКогда в пути своём нежданно подскользнусь,\nЯ мир святой найду лишь в Нём и в вере укреплюсь.\n\nЗачем же мне скорбеть? Припав к стопам святым, \nХристу готов я славу петь и радоваться с Ним."}, {"id": 508, "title": "Что хочет Бог тебе послать, то надо с радостью принять;", "text": "Что хочет Бог тебе послать, то надо с радостью принять;\nСвиреп ли ветер иногда, ты утешайся и тогда, - то хочет Бог.\n\nНет воли Божией ценней: в ней жизнь и счастье для людей; \nПредайся воле ты Его, желай лишь в мире одного, - что хочет Бог.\n\nНет сердца Божьего верней, оно рассеет мрак скорбей\nИ от ударов сохранит того, кто Бога в мире чтит, - так хочет Бог.\n\nХотел бы силой я владеть, как должно, Господа воспеть\nИ славить Бога каждый час за то, что мир Он грешный спас. Так хочет Бог."}, {"id": 509, "title": "Мой Бог - скала в тревожном море зла,", "text": "Мой Бог - скала в тревожном море зла,\nВ Тебе укроюсь от бурь житейских я.\nМоё убежище от скорби и тревог,\nНадежда, радость, песня, - Ты, мой Бог!\n\n    Так без Тебя душа моя болит,\n    И песня в моём сердце не звучит; \n    Надежды нет и жизни без Тебя.\n    И гаснет вера слабая моя!\n\nЯ в мире без Тебя не проживу,\nХочу, чтоб веру Ты укрепил мою.\nЯ без Тебя, как без воды бы изнемог, \nИсточники мои в Тебе, мой Бог.\n\n    С Тобою стихнут боли все мои,\n    С Тобою песня в сердце зазвучит,\n    С Тобою жизнь, надежда оживёт \n    И вера в то, что счастье в небе ждёт.\n\nНе выпускай из сильных рук Своих,\nВедь нет страшнее любых разлук земных - \nС Тобой разлука, о Отец мой дорогой:\nНет жизни без Тебя, Спаситель мой."}, {"id": 510, "title": "Ты Мой! Не бойся ничего, хотя бы мир поднялся целый", "text": "Ты Мой! Не бойся ничего, хотя бы мир поднялся целый \nИ все свои направил стрелы в слугу спасенья Моего.\n\nНе бойся ничего! Ты Мой! И вот тебе Моя десница;\nПод нею можешь ты укрыться. Иди, не бойся! Я с тобой!\n\nНе бойся! Над тобой Мой щит! Будь духом бодр, будь верой камень; \nИди без страха в грозный пламень и огнь тебе не повредит."}, {"id": 511, "title": "Мой в небе край родной, мой в небе дом!", "text": "Мой в небе край родной, мой в небе дом!\nТам мой Отец благой, - мой в небе дом!\nЯ странник на земле, мой путь лежит во мгле,\nИ скорби лишь кругом, - мой в небе дом!\n\nНе долог путь земной, - мой в небе дом!\nХоть тяжек жизни путь, - мой в небе дом!\nНо всё пройдёт, как сон, и будет путь свершён, \nИ буду я с Отцом, - мой в небе дом!\n\nТам, где Христа народ, - мой в небе дом!\nМой дух туда влечёт, - мой в небе дом!\nТам буду ликовать, Иисуса воспевать \nПеред Его лицом, - мой в небе дом!\n\nИ буду ль я страдать, - мой в небе дом!\nВсё ж не могу роптать, - мой в небе дом!\nВедь Сам Христос страдал, и в небе обещал \nУкрасить Он венцом мой в небе дом!"}, {"id": 512, "title": "В край родной, в край родной, в край родной страны,", "text": "В край родной, в край родной, в край родной страны,\nВ край мира, счастья, тишины стремлюсь я всей душой\n\nВедь мир не родина моя, ему душа чужда;\nНа небе дом мой и друзья, стремится дух туда!\n\nК небесам, к небесам я поднял свой взор;\nЯ знаю - много близких там, я ж в мире до сих пор.\n\nЖесток здесь бой, дни тяжелы и страшно мне в борьбе, \nИ часто средь греховной мглы спешу к Тебе в мольбе.\n\nНедалёк, недалёк злой борьбе конец;\nУж слышу песен я поток, - идёт к борцам Отец.\n\nЧего глаз смертный не видал и в мыслях не имел,\nО чём я слухом не слыхал, - там будет мой удел!"}, {"id": 513, "title": "Мы у берега земного; там, за бурною рекой,", "text": "Мы у берега земного; там, за бурною рекой,\nВиден берег жизни новой, жизни вечной и святой.\n\n    Будем с верою живою ждать Вождя чрез Иордан, \n    И Он Сам Своей рукою приведёт нас в Ханаан.\n\nВ блеске солнца виден пышный и святой Иерусалим; \nПесни радости там слышны, их язык неизъясним.\n\nВот уж многие святые перешли к тем берегам;\nИ грядут часы благие, скоро мы все будем там.\n\nСумрак смерти над рекою, но за далью непогод \nЦарство вечного покоя и блаженства свет нас ждёт."}, {"id": 514, "title": "Гора Сион, гора святая, престол где Господа стоит!", "text": "Гора Сион, гора святая, престол где Господа стоит!\nК тебе стремлюсь, гора родная, где солнце вечное блестит.\n\nГде бури нет и нет ненастья, где радость вечная царит,\nГде всё согрето светом счастья, и дивная хвала звучит.\n\nГде наш Господь Свой лик являет искупленным детям Своим \nИ Сам слезу их утирает! Там город благ - Иерусалим!\n\nНесётся там, не умолкая, звук песни дивной, неземной;\nИ никакая речь людская сказать не может песни той.\n\nО, скоро, скоро там я буду с Христом на той горе святой! \nТогда я вечно не забуду, что Кровью я спасён святой!"}, {"id": 515, "title": "Вокруг престола пред Отцом хор детских голосов", "text": "Вокруг престола пред Отцом хор детских голосов \nВ Его присутствии святом поёт Творцу миров.\n\n    И там, и там хор детских голосов,\n    И там, и там поёт Творцу миров.\n\nКто всех детей туда собрал, кто ввёл их в небеса, \nКто в чудной песне сочетал малюток голоса?\n\nГосподь Иисус, Который спас Своею смертью их, \nИм в небе место то припас близ ангелов святых.\n\nЛюбили Господа они в свои земные дни;\nЧтобы сильней любить могли, Он взял их от земли."}, {"id": 516, "title": "Есть чертог наслажденья для малых детей,", "text": "Есть чертог наслажденья для малых детей,\nСам Спаситель туда их принял;\nОн небесною радостью их осиял \nДалеко от греха и скорбей.\n\n    Чудный Божий чертог, чудный Божий чертог \n    Приготовлен для малых детей.\n    Там уста их полны непрестанной хвалой. \n    Чудный Божий чертог для детей!\n\nДети ангелам вторят спасённой душой,\nСлавя жертвенный подвиг Христов.\nАгнец Божий, избавивший их от грехов,\nДал им видеть Свой образ живой.\n\nОн их в доме Отца Своего водворил,\nХлебом жизни питает их Сам;\nНет уж голода их искупленным сердцам,\nОн навеки его утолил.\n\nОн их поит спасительной чистой водой \nИ их водит по дивным лугам,\nОкружает дарами, любовью святой\nИ внимает их детским устам."}, {"id": 517, "title": "Встретимся ли мы с тобою, где святые все поют,", "text": "Встретимся ли мы с тобою, где святые все поют,\nГде спокойною рекою воды чистые текут?\n\n    Да, мы встретимся с тобою над чудною, над чудною рекою; \n    Там с неумолкаемой хвалою Иисусу мы будем служить.\n\nНад прозрачною рекою, чистой, светлой как кристалл,\nТам воскликнем мы с тобою: «Вечный день теперь настал!»\n\nМежду нами и рекою путь непроходимый был,\nНо сколь тяжкою ценою Агнец нам его открыл!\n\nТам, в сиянье над рекою, лик Христа мы будем зреть,\nКто на землю за тобою нисходил, чтоб умереть.\n\nСкоро будем над рекою, скоро путь придёт к концу,\nСкоро встретимся с тобою, вознеся хвалу Отцу."}, {"id": 518, "title": "Мой дом на небе, за облаками, где жизни новой уж нет конца;", "text": "Мой дом на небе, за облаками, где жизни новой уж нет конца; \nДрузья, родные где будут с нами петь песни славы там у Отца.\n\nО Дом небесный, где быть желаю, туда стремлюсь я, чтоб вечно жить; \nТам буду Бога я вечно славить и в свете чудном Христу служить.\n\nКак в бурю с моря моряк стремится причалить в гавань, чтоб отдохнуть, \nТак рвусь я сердцем в жилище света, где отдых ждёт всех, свершивших путь.\n\nОтрадно будет в том вечном Доме, увижу Друга души моей,\nКто на Голгофе за грех наш умер и примирил нас с Отцом людей.\n\nВ печалях горьких слёз лить не будем, навеки славу мы будем петь; \nРазлуки, скорби, болезнь забудем, не будем больше нужды терпеть.\n\nО Дом небесный, где быть желаю, туда стремлюсь я, чтоб вечно жить; \nТам буду Бога я вечно славить и в свете чудном Христу служить."}, {"id": 519, "title": "Наша жизнь коротка, словно птицы полёт,", "text": "Наша жизнь коротка, словно птицы полёт,\nИ быстрей челнока улетает вперёд.\n\nНаша жизнь, словно тень, на земле нам дана;\nИ как солнце зайдёт - исчезает она.\n\nКак цветок полевой поутру расцветал,\nА уж к вечеру в зной пожелтел и завял.\n\nЖизнь ведь только, как звук, как удар молотка, \nКак нежданный испуг - так она коротка.\n\nИ не думаешь ты ни о чём, человек,\nЧто ты скоро умрёшь и короток твой век.\n\nПозаботься же ты и Христа поищи,\nВ Нём отраду найдёшь и спасенье души."}, {"id": 520, "title": "В доме Господнем звучит Слово Божье,", "text": "В доме Господнем звучит Слово Божье,\nВ мире нет слова для сердца дороже.\nСлово то душу, как хлеб насыщает,\nСилы даёт и в скорбях утешает.\nСлово то мёда пчелиного слаще.\nНе оставляйте собраний ваших! (2 раза)\n\nВ доме Господнем колени склоняют \nИ к милосердному Богу взывают.\nПеред молитвой смиряется горе,\nИ по молитвам сдвигаются горы.\nМногое могут молитвы наши.\nНе оставляйте собраний ваших! (2 раза)\n\nВ доме Своём наш Господь призывает \nТех, кто ещё о спасенье не знает.\nК гордым сердцам, что не могут смириться. \nБог через наше служенье стучится,\nХочет спасти Он всех грешных и падших. \nНе оставляйте собраний ваших! (2 раза)\n\nВ доме Господнем мы сёстры и братья, \nНаши открыты друг другу объятья.\nБеды и радости прошлой недели \nПоровну между собою разделим.\nИ наставление примем от старших.\nНе оставляйте собраний ваших! (2 раза)\n\nЕсли во имя Его помолиться\nИ побеседовать мы согласимся,\nПусть будет мало нас, двое иль трое,\nОн обещание дал нам благое:\nБыть вместе с нами в общении нашем.\nНе оставляйте собраний ваших! (2 раза)"}, {"id": 521, "title": "Не храм, не золотое зданье, не круг отобранных друзей, -", "text": "Не храм, не золотое зданье, не круг отобранных друзей, -\nХристова Церковь есть собранье Крестом искупленных людей.\n\nСобранье душ, теперь нашедших прощенье тягостных грехов; \nСобранье душ времён прошедших и ожидаемых веков.\n\nСобранье душ из всех народов, со всей земли и разных царств,\nИз тюрем, из-под царских сводов, из всех общин и всяких паств.\n\nСобранье душ, кто в царстве рая слились в блаженстве и хвале, \nСвои молитвы воссылая о братьях скорбных на земле.\n\nХристова Церковь - мир воскресший и обновлённый род людской; \nЕё наделит крест Понёсший и новым небом, и землёй.\n\nНе для покоя в мире этом Христова Церковь избрана;\nЗдесь Богом и Его заветом ей только битва суждена.\n\nЕё борцы теперь в изгнанье, облиты кровью боевой;\nОна в слезах, она в рыданье за мир, объятый суетой.\n\nНо день уж близок, и великий Глава-Жених её идёт;\nУж слышны радостные крики сквозь шум морей и гром невзгод.\n\nИдёт Он взять её из мира, из тесных уз тюрьмы земной;\nТам ждут её венец, порфира и вечный рай, и пир святой.\n\nТа Церковь вечна и едина. Хотел бы в Ней я быть слугой,\nНо слуг гам нет. Прими как сына меня в ту Церковь, Бог благой!"}, {"id": 522, "title": "Слышна в мире весть о том повсюду: Властелин искупленной души,", "text": "Слышна в мире весть о том повсюду: Властелин искупленной души, \nСвятостью и славой озарённый, за Невестой-Церковью спешит. \nКак прекрасно чудное венчанье у престола Господа Отца,\nТам небесных хоров ликованье, счастье и блаженство без конца.\n\nТоржествуй, наследница Христова, на тебе спасения печать, \nБодрствуй и молись, и будь готова Господа желанного встречать. \nДень придёт и встреча та настанет на ладонях белых облаков,\nИ Невеста перед Ним предстанет, сохранивши верность и любовь!\n\nЭта встреча скоро состоится - Он придёт за Церковью Своей; \nТолько надо верить и молиться, чтобы не остаться вне дверей. \nСовершится чудное венчанье, будет хор небесный ликовать,\nИ Невеста в брачном одеянье будет песням радостным внимать."}, {"id": 523, "title": "Против Церкви воздвигнут вал, она крепость в кольце блокады.", "text": "Против Церкви воздвигнут вал, она крепость в кольце блокады. \nСколько раз сатана бросал к её стенам все силы ада!\nКто сказал - побеждать легко, будто всё нам даётся даром? \nСколько братьев-борцов легло и сестёр, молодых и старых.\n\nОт Пилата до наших дней штаб диавола строит козни,\nИх задача - разбить скорей всех борцов за твердыню Божью. \nКогда двигался тучей враг, чтоб из крепости сделать груды, \nТогда верные, ставши в ряд, защищали свободу грудью.\n\nК праху их не найти стезей средь тайги и хребтов Урала.\nИ на холмик рука друзей не положит букет фиалок.\nИх в статистике точной нет, и в музее их нет реликвий.\nОни подвигов яркий след оставляли - пример великий.\n\nИ теперь, когда в стены бьёт безрассудство и ложь тараном, \nГолос павших и нас зовёт устоять перед злом тиранов.\nБудет время: и всем венцы раздадутся в общенье славном.\nА пока нам кричат гонцы: «Братья, выше Христово знамя!»"}, {"id": 524, "title": "Отчего одиноко воркуешь, голубица, в ущелье скалы,", "text": "Отчего одиноко воркуешь, голубица, в ущелье скалы,\nО небесной отчизне тоскуешь, унывая в полночной тиши. \nГолубица Моя, голубица Моя, для тебя песнь оградная есть, \nНад тобою простерта десница, охраняя печальную здесь.\n\nИстомлённая тяжестью зноя и гонимая бурею злой,\nЗнаю, хочешь свободы, покоя, знаю, хочешь на небо, домой. \nГолубица Моя, голубица Моя, за тобою Я скоро приду;\nЕсли будешь терпеть и молиться, Я в Обитель тебя приведу.\n\nЯ купил тебя тяжкой ценою, позабыть Я тебя не смогу.\nХоть ты плачешь, томишься порою, но Я Сам твои слёзы утру. \nГолубица Моя, голубица Моя, ты, гонимая бурею злой, \nБезутешная, скорбная птица, Я уж скоро приду за тобой.\n\nНе печалься, настанет то время, когда кончатся скорбные дни, \nЯ сниму с тебя тяжкое бремя, осушу Я ресницы твои. \nГолубица Моя, голубица Моя, за тобою Я скоро приду,\nНе печалься, Моя голубица, Я в Обитель тебя приведу."}, {"id": 525, "title": "Церковь Божья, поднимайся! К встрече ты приготовляйся,", "text": "Церковь Божья, поднимайся! К встрече ты приготовляйся, \nБог готовых лишь возьмёт, скоро, скоро Он придёт.\n\n    Моя Невеста, ты так устала,\n    Страдать так мало тебе осталось;\n    Ты потрудись здесь ещё немного - \n    Там в небесах ты отдохнёшь!\n\nСкоро будет избавленье, только в Боге утешенье!\nО Невеста, не страшись, твёрдо истины держись.\n\nЯ ведь знаю, ты устала, ты гак много пострадала,\nСкоро кончен будет путь, скоро сможешь отдохнуть.\n\nТолько в небе будет радость, вкусишь там покоя сладость. \nО Невеста, ободрись! Встань, для Бога потрудись!"}, {"id": 526, "title": "Христос - Основа Церкви, лишь в Нём стоит она,", "text": "Христос - Основа Церкви, лишь в Нём стоит она, \nЕго бессмертным Словом Она возрождена;\nС небес её взыскал Он, за жизнь её страдал,\nОмыл Своею Кровью и к святости призвал.\n\nРассеяна повсюду, но Духом скреплена,\nЕдиным хлебом свыше питаема она.\nОдно святое Имя сливает все сердца,\nВ едином упованье претерпят до конца.\n\nТерзаема раздором, грехом угнетена, \nНеверностью пред миром теперь посрамлена,\nНо глас святых взывает, не смолкнет их мольба, \nДоколе светлым утром сменится ночи тьма.\n\nСредь скорби и томленья, и битвы со грехом.\nКак жаждет наступленья покоя со Христом;\nКогда ж виденье славы узрят её глаза,\nТам тожество победы наступит навсегда!\n\nИ здесь она в общенье с Огцом и со Христом,\nИ облаком объята свидетелей кругом.\nВелико их блаженство! О, дай, Господь, и нам, \nПодобно им, смиренно стремиться к небесам!"}, {"id": 527, "title": "Люблю, Господь, Твой дом - чертог любви Твоей;", "text": "Люблю, Господь, Твой дом - чертог любви Твоей; \nЛюблю я Церковь из людей, искупленных Христом.\n\nЛюблю, предвечный Бог, я Церковь - Твой алмаз; \nТы, как зрачок лучистых глаз, хранишь её порог.\n\nО Церкви дорогой, собранье душ живых,\nВзываю сердцем и душой всегда в мольбах своих.\n\nЯ рад иметь всегда общенье Духа с ней,\nНести все тяжести труда и крест её скорбей.\n\nЯ знаю, разделю с ней славу я Твою,\nС ней буду петь я пред Тобой спасённою душой."}, {"id": 528, "title": "Невеста Господа, идёт Спаситель Твой", "text": "Невеста Господа, идёт Спаситель Твой \nВ венце сияющем, чтоб взять тебя.\nОткрой твои глаза, поправь наряд святой,\nОтвергни мир, встречай Христа!\n\n    О Церковь Божия, Христом омытая, \n    Одежды белые надень свои;\n    Спаситель твой грядёт, любовь великая \n    Тебя уж вскоре восхитит (2 раза).\n\nЛюбовью жертвенной учись любить людей, \nПрощать и радовать вокруг собой.\nБлагословляя, жить учи своих детей,\nИ облекаться чистотой.\n\nБудь кроткой, с верою иди, с терпением.\nДевизом искренность возьми себе,\nНе расточай своё благословение,\nБудь совершенной в полноте.\n\nОмыта Кровию невинною, святой,\nЛюби Спасителя ты всей душой,\nГотовься к встрече с Ним - прекрасный и родной \nГрядет Жених небесный твой."}, {"id": 529, "title": "Спроси Самарянку, что всем рассказала.", "text": "Спроси Самарянку, что всем рассказала.\nКак там у колодца Христа повстречала.\nС тех пор уж прошли столетья, года,\nНо в этом колодце всегда есть вода.\n\n    Там песни поют, где в колодце вода,\n    И колосом полным пшеница легла,\n    И вечного счастья для всех полнота.\n    Там Божий колодец, где Церковь Христа!\n\nПоследнее время страшит человека,\nА мы утешенье имеем навеки.\nУ нас есть колодец, и в нём есть вода - \nТо Слово спасенья, то Слово Христа.\n\nГрехом истомился народ и земля.\nПриди к Иисусу скорей навсегда.\nИ там, где в колодце живая вода.\nНайдёшь ты спасенье у ног лишь Христа."}, {"id": 530, "title": "Когда в пути душа утомляется", "text": "Когда в пути душа утомляется \nПод бременем борьбы и труда,\nСпешу я в Церковь, где не кончается \nИсточник мира, радости никогда.\n\nПод звуки псалмов общего пения \nЯ умиляюсь сердцем до слёз,\nЧрез проповедников Откровения \nДуши касается нежно так Христос.\n\nИ если в сердце боль затаилась вдруг,\nКем огорчён иль ранен стрелой,\nКровью Христа, стекавшей с пронзённых рук, \nЯ вновь омыт и - счастлив иду домой.\n\nМой милый друг, ты жизнью израненный,\nТы посетил молитвенный дом.\nПрими спасенье в день этот памятный,\nИ с нами вместе радостно в путь пойдём."}, {"id": 531, "title": "Мрак сгустился над всей землёй, зло свирепствует яростно,", "text": "Мрак сгустился над всей землёй, зло свирепствует яростно, \nЛюди в страхе от ужасов, ожидая конца.\nНо для нас Словом Истины Бог давно открыл истину.\nХоть кричит враг неистово, наша цель нам ясна.\n\n    Церковь Божья, ты всегда служи Богу искренно, \n    Побеждай ложь истиной, царство тьмы опустошай, \n    Шествуй ты воинственно, цепи рабства разрывай, \n    Людям ко Спасителю путь прямой указывай.\n\nПосмотри же вокруг себя - нивы ждут своего жнеца, \nКаждый колос ты подними, правды путь укажи.\nКак же много ещё труда, мы почти у заката дня,\nПодвизайся, брат и сестра, уже вечность видна.\n\nБрань последняя впереди, так не будь где-то позади,\nСлово Божье возьми скорей, сердцем ты не робей.\nТы помазана побеждать, не сдаваться, но наступать,\nДух Господень ведь на тебе - помни это везде."}, {"id": 532, "title": "Чрез туманы невзгод и забот и в лазурные светлые дали", "text": "Чрез туманы невзгод и забот и в лазурные светлые дали \nПуть себе пролагает народ, к небесам, где не будет печали.\nС силой ветра и бурей борясь, озарённая светом небесным, \nПобеждает врага, не боясь, Святым Духом сплочённая тесно.\n\n    Это Церковь Иисуса Христа, это души, омытые Кровью, \n    Увлечённые силой Христа и святой бесконечной любовью.\n\nБрачный пир ожидает гостей - небеса ожидают спасённых\nИ искупленных Богом людей, чрез Иисуса с Отцом примирённых. \nВстреча радостной будет тогда, в ликованье на небо прибудем.\nНе умолкнет тот пир никогда, и так вечно мы с Господом будем.\n\nО мой друг, посмотри на Христа, на Того, Кто любовию вечной \nВозлюбил, искупивши сполна, тебя, грешника, смертию крестной. \nХочет быть Он с тобою всегда в небесах, где любовью всё дышит. \nНе покинет тебя никогда, голос Твой от земли всегда слышит."}, {"id": 533, "title": "Святая Церковь, о тебе преданья", "text": "Святая Церковь, о тебе преданья \nХранят народов многих племена.\nТы с первых дней твоих земных скитаний \nПрошла, как светоч, в наши времена.\nУже с рожденья тучи окружали,\nЖелая скрыть тебя в ненастных днях; \nТвоих сынов в темницы, к львам бросали, \nВселить желая в сердце твоё страх.\n\nТвою любовь подчас враждой встречали, \nНо больше было у тебя друзей.\nВо всех скорбях, в гоненьях и печалях \nНеслись молитвы к Господу сильней.\nИ Бог один лишь знает, сколько горя \nИ слёз пролито у твоих детей, - \nСобрать бы их в одно большое море \nОт первых до последних наших дней.\n\nНо ты молилась, Бога умоляя,\nЧтоб Он простил обидчиков твоих,\nИ, никому худого не желая,\nНесла к Иисусу слабых и больных.\nКак часто тьма, крылом своим касаясь, \nГубила свет любви в твоих рядах.\nА тех, кто верны Богу оставались,\nКак злых людей сжигали на кострах.\n\nНо был сильнее адских мук, терзаний \nОгонь любви сынов твоих сердец.\nТы верила в гоненьях и страданьях:\nС тобою рядом любящий Отец.\nИ в наши дни, последние, быть может, \nЛюбовь Христа - хранитель в мире бед. \nПусть твоё сердце грех не потревожит, \nПусть знает мир, что жив небесный свет!"}, {"id": 534, "title": "Одарённые спасеньем, чужды мы греховных уз;", "text": "Одарённые спасеньем, чужды мы греховных уз;\nБратским сладостным общеньем спаяны в один союз.\n\n    За единство Церкви Божьей всей душою постоим, \n    Усилия битву с ложью, грех и козни победим.\n\nВ ночь делений единенье крепко, братья, сохраним \nИ, покорные ученью, будем следовать за Ним.\n\nТвёрдой верой в дни сомненья Божий стан огородим,\nЯд сомнений, маловерья до конца искореним.\n\nСемена любви посеем до окраины морей,\nСлово Божье возвещая для спасения людей."}, {"id": 535, "title": "Солнце светит ласково в бирюзовой вышине,", "text": "Солнце светит ласково в бирюзовой вышине, \nВзором весь простор земной охватить нельзя.\nИ смотрю я в сторону, где любимый город мой. \nТам живут и трудятся милые друзья.\n\nКак мне с вами дорого в близком быть в общении. \nРазделять веселие, плакать и скорбеть;\nНет мне больше радости, лучше утешения,\nКак для вас, друзья мои, жить и умереть.\n\nЯ хочу, чтоб не было между нами пропасти,\nЧтоб огонь сердечности мог в сердцах пылать, \nЧтоб могли мы искренно свет любви Христа нести \nИ всегда за ближнего душу полагать.\n\nВетерок проносится в лёгком дуновении,\nО любви Христа поёт, колосом звеня,\nИ смотрю я в сторону в сладостном забвении,\nГде живут и трудятся милые друзья."}, {"id": 536, "title": "Дни прошли, и снова собрались друзья,", "text": "Дни прошли, и снова собрались друзья,\nЧтобы добрым словом ободрить, любя.\nДни летят за днями, будто лёгкий дым,\nВес пройдёт: и горе, и радость вместе с ним.\n\n    И тогда вернётся снова весна,\n    Все мы соберемся у ног Христа,\n    И тогда не будем годы считать,\n    И не будем страдать.\n\nСколько дней ты будешь радости иметь, \nСколько дней ты будешь в горести скорбеть, - \nМы не знаем, только будь ты со Христом\nИ борись всегда, всегда борись со злом.\n\nСколько зла на свете, но ты добрым будь, \nЛюдям принеси тепла хотя б чуть-чуть, - \nРасцветут прекрасные на пути цветы,\nИ расскажут всем о благости они."}, {"id": 537, "title": "Вместе мы с вами верили, вместе любили, пели,", "text": "Вместе мы с вами верили, вместе любили, пели,\nВместе дороги мерили часто под вой метели.\n\nТруд небольшой, но делали, вместе огнём горели,\nВместе ночами белыми в синюю даль смотрели.\n\nВместе стояли прямо мы, слыша угрозы злые,\nБыли пред Богом правыми, чисты пред миром были.\n\nВ край дорогой и солнечный с светлой придём мы песней. \nТам, где нет слёз и горечи, вечно мы будем вместе."}, {"id": 538, "title": "Манит сердце мечтою высь небес голубая;", "text": "Манит сердце мечтою высь небес голубая;\nНашей общей судьбою стала вера живая.\n\n    Он нас сделал родными, Он нас сделал друзьями, \n    Дал нам новое имя, нас зовут «Христиане»!\n\nИисус стал нам Другом, мы на деле узнали:\nОн врачует недуги, удаляет печали.\n\nОн дарует прощенье, мир и счастье без меры,\nИ второе рожденье, - только искренне веруй."}, {"id": 539, "title": "Пользуйтесь, братья, святою свободой", "text": "Пользуйтесь, братья, святою свободой \nС благодареньем Творцу своему.\nБез разделенья, тернистой дорогой \nДуши ведите к Иисусу Христу.\n\nПрочь славу мира, союзы, раздоры. \nБратья! К единству! Под знамя любви! \nЧтобы погибли враждебные споры. \nЕреси, вздоры, деленья земли.\n\nЧтобы союз один вечного Бога\nБыл лишь союзом меж всеми людьми. \nНашим Учителем вечным - Мессия,\nМы же все - дети Христовой семьи.\n\nНаша обязанность - долг исполнения - \nВечному Богу, друг другу служить, \nСловом, делами, любовью, стремленьем \nК вечному граду, чтоб вечно там жить.\n\nСкоро, быть может, сей мир разъярённый \nЗлобно воздвигнет гоненья на нас,\nЧтобы разрушить строенье Господне, \nЧтоб никакая душа не спаслась.\n\nО, поспешите, поздно ведь будет \nЛюдям вещать об Иисусе Христе. \nПомните, братья, теперь, не забудьте \nНашей свободой владеть на земле."}, {"id": 540, "title": "Научи нас, Боже, состраданию.", "text": "Научи нас, Боже, состраданию.\nПомоги людей нам понимать,\nЧтобы ближних тяжкие страдания,\nКак свои страданья принимать.\n\n    Ты прости, когда своей небрежностью \n    Наших ближних ранить мы могли.\n    О Господь, наполни душу нежностью, \n    Чтоб мы больше людям помогли.\n\nНаучи целительным сочувствием \nЛюдям радость в жизни приносить,\nЧтоб своим отзывчивым присутствием \nМы могли поддержкой для них быть.\n\nПомоги людей переживания \nБлизко к сердцу, Боже, принимать,\nЧтобы там, где слышатся рыдания,\nМы умели искренно рыдать."}, {"id": 541, "title": "Как бы хотелось всё же, чтобы для нас, друзья.", "text": "Как бы хотелось всё же, чтобы для нас, друзья.\nЯсно, как день погожий, стало, что мы - семья,\nВес мы, один другому, все мы - сестра и брат,\nЧтобы любви законы каждый мог исполнять.\n\n    О,наш Отец на небесах один для всех во всех краях,\n    Он твой Отец, Отец и мой, чтоб жили мы одной семьёй!\n\nКак бы хотелось всё же, чтобы чужая боль,\nСтала моею тоже, стала и мне родной.\nДушу отдать за брата - больше ведь нет любви,\nТак ведь Христос когда-то людям любовь явил.\n\nБудет такое время: все мы одной семьей,\nСвергнув земное бремя, в небо уйдём домой.\nБудем навеки вместе в Церкви Христа Царя,\nТам наш Отец Небесный примет нас всех, любя."}, {"id": 542, "title": "Любить! Кто ж постиг это слово святое?", "text": "Любить! Кто ж постиг это слово святое?\nКто ж вник в его смысл и значенье?\nЛюбить - это значит на счастье чужое \nСмотреть со слезой умиленья.\n\nЛюбить - это с ближним, как с другом и братом, \nДелить его горе, мученье,\nБыть недругам другом, прощать виноватым, \nУняв в себе злобу презренья.\n\nЛюбить - это значит смотреть с сожаленьем \nНа зло и пороки людские,\nИ людям заблудшим открыть путь к спасенью, \nДавая советы благие.\n\nЛюбить - это значит для счастья другого \nОтречься от личных стремлений;\nЛюбить - это Бога великое слово,\nНо кто ж его понял значенье?"}, {"id": 543, "title": "Мы у Бога о многом просим, а просить об одном лишь надо -", "text": "Мы у Бога о многом просим, а просить об одном лишь надо - \nО любви, что всё переносит, что чужому успеху рада.\n\nКогда любишь - легко прощаешь, когда любишь - не мыслишь злого, \nНа обиды не отвечаешь злобным взглядом и едким словом.\n\nВ милосердье границ не знаешь, сердце к жертве всегда готово, \nНедостатков не замечаешь, не сквернишь себя клеветою.\n\nЕсли любишь - совсем не важно, что не все тебя понимают.\nТа любовь, лишь вспыхнув однажды, негасимым огнём сияет.\n\nИ огонь её всюду светит, и о нём говорить не нужно,\nЕго всякий сразу заметит; там, где он, там любовь и дружба.\n\nЕсли ты её проявлений в своей жизни не замечаешь,\nЗначит, ты любви не имеешь, но о ней понаслышке знаешь.\n\nИ напрасно просить о многом. Мне, по сути, одно лишь нужно - \nЯ прошу любви лишь у Бога, о других не заботясь нуждах."}, {"id": 544, "title": "В твоём горе, несчастье, беде и в какой бы ты ни был среде,", "text": "В твоём горе, несчастье, беде и в какой бы ты ни был среде,\nКак бы ни были трудными дни, — никогда никого не вини.\nЕсли вянут под зноем цветы, пожелтели деревьев листы,\nЕсли в сердце погаснут огни, — никогда никого не вини.\n\nЕсли в зной лучи солнца палят, если сердце твоё леденят \nМрачной жизни тяжёлые дни, — никогда никого не вини.\nЕсли нет на пути твоём роз, нет тенистых, кудрявых берёз,\nИ лишь острые камни одни, — никого никогда не вини.\n\nКогда ты позабыт, одинок, как на море забытый челнок.\nНикому ты не нужен тогда, — не вини никого никогда.\nЛьются слёзы потоком из глаз, луч последней отрады погас.\nНе забудь, милый друг, одного — не вини никогда никого.\n\nКогда близкий, любимый твой друг свою клятву нарушит и вдруг \nПозабудет, изменит в любви, — и тогда ты его не вини.\nЕсли силы слабеют в тебе, и устал ты в неравной борьбе,\nЕсли ты изнемог, и тогда — никого не вини никогда.\n\nЕсли хочешь счастливым ты быть и примером для ближних служить, \nКак случится что — прежде всего обвини ты себя самого.\nПотому что Спаситель Христос дар любви всем, прошенье принёс. \nНа Него ты, Страдальца, взгляни и ни в чём никого не вини. \nПотому что Бог мир возлюбил, на кресте Свою кровь Он пролил, \nИ страдал за тебя, за меня, всю вину нашу взяв на Себя"}, {"id": 545, "title": "Забудь вчерашнюю обиду, покрой любовью, всё прости,", "text": "Забудь вчерашнюю обиду, покрой любовью, всё прости,\nПрости от сердца, не для вида, и брата с миром отпусти.\n\n    Примиритесь, друзья, примиритесь,\n    В новый день не несите вражду \n    Ради Бога друг друга простите,\n    И ненастные тучи пройдут.\n\nБыть может, брат виновен много: разбойник, мытарь, блудный сын, \nНо он давно прощённый Богом, а ты ему не всё простил.\n\nПусть никогда во гневе вашем на небе солнце не зайдёт,\nЛюбите недругов, прощайте, как вас самих простил Господь."}, {"id": 546, "title": "Люби, люби людей. Пускай они порою", "text": "Люби, люби людей. Пускай они порою \nБывают холодны и мелочны, и злы,\nНо ты люби людей, над бедной их душою \nНависло много тягостной и душной мглы.\n\nИ борются они, и падают без света,\nИ мечутся они, и плачут с давних пор.\nИ часто на слова участья и привета \nУслышишь ты, мой брат, проклятье и укор.\n\nКто б ни был ты, мой брат, когда перед собою \nУвидишь ты всё зло, объявшее людей, -\nНе отвернись от них с холодною душою,\nНо ты люби людей, люби их и жалей.\n\nПускай, не встретишь ты желанного привета \nИ будешь встречен злым глумлением толпы, \nЧем больше радости в душе твоей и света,\nТем больше людям дашь тепла и доброты.\n\nЛюби, люби людей. Из мрака заблужденья,\nИз мрака помоги ты к свету им идти \nПутём высокого смиренья и терпенья,\nПутём прекрасной и возвышенной любви.\n\nЛюби, люби людей. Веди их за собою, \nВстречай их с нежностью, доверчивой душой, \nПрощай им и молись, и плачь о них душою, \nПрощай им и молись, и плачь, и плачь о них."}, {"id": 547, "title": "Нам жизнь дана, чтобы любить, любить без меры, без предела", "text": "Нам жизнь дана, чтобы любить, любить без меры, без предела \nИ всем страдальцам посвятить все силы для благого дела.\n\n    Нам жизнь дана, чтоб утешать униженных и оскорблённых, \n    И согревать и насыщать нуждой и скорбью угнетённых.\n\nНам жизнь дана, чтоб до конца бороться с тьмой, бороться с ложью \nИ сеять в братские сердца одну святую правду Божью.\n\nА правда в том, чтобы любить, любить без меры, без предела \nИ всем страдальцам посвятить все силы для благого дела."}, {"id": 548, "title": "Умчались безвозвратно дни вчерашние,", "text": "Умчались безвозвратно дни вчерашние, \nОдни следы оставив за собой,\nА в них вопрос, звучащий без пристрастия: \n«С чем мы вступаем в новый день с тобой?»\n\n    Пока не прекратились дни погожие, \n    Спешите, ведь откладывать нельзя, \n    Спешите сделать что-нибудь хорошее \n    Во имя Господа, мои друзья.\n\nСпешите ободрить душой уставшего,\nДля блага ближних жертвуя собой;\nИ пламенные искры сердца вашего \nЗажгут в других большой любви огонь.\n\nБыть может, тяжкой ношей обессиленный, \nНаш брат одолевает жизни тьму.\nВы сделайте, что можете, посильное,\nЧтоб стало легче хоть чуть-чуть ему.\n\nСердечное участье бескорыстное \nПолно душевной нежной теплоты.\nИ ваша доброта, и ваша искренность \nПомогут ближним счастье обрести."}, {"id": 549, "title": "Надо мною лист кружится, пожелтевший, медленно упал.", "text": "Надо мною лист кружится, пожелтевший, медленно упал.\nОт других он отделился, без поры, как цвет травы, увял.\nОт чего этот лист пожелтел? Может, влаги в себе не имел?\nСкудны солнца лучи? Или холод в ночи, может, зелени цвет омрачил?\n\n    Друзья, друзья, забывать нам друг друга нельзя. (2 раза)\n\nВспомни, как Христос трудился, показал заботу и любовь. \nВспомни, как к Отцу молился и за нас пролил святую Кровь.\nВот любовь, вот любовь, вот любовь! Как сильна ты, святая любовь! - \nСмог бы я так любить? Мне б хоть каплю любви на сестру и на брата излить?\n\nЧтоб не быть как лист увядший, посмотри, мой друг, вокруг себя, \nЕсли кто, ты видишь, падший, - подними и ободри, любя.\nОтчего этот лист пожелтел? Может, влаги в себе не имел?\nСкудны солнца лучи? Или холод в ночи, может, зелени цвет омрачил?"}, {"id": 550, "title": "Наше вышнее призванье - в жизни радость излучать", "text": "Наше вышнее призванье - в жизни радость излучать \nИ под гнётом испытанья людям Бога указать.\nНаучи, Господь, смиренью, научи прощать врагам!\nКак другим даем прощенье, так прости, Господь, и нам!\n\nВ мир вражды людской, бесцельной Ты, Спаситель наш Христос, \nВ милосердье беспредельном дар любви Своей принес.\nИ любовь воспламеняет все сердца Твоих детей,\nИ любить их научает всех живущих, как друзей.\n\nНаучи Тобой спасённых, как самих себя, любить,\nИ для всех обременённых научи добро творить.\nСлово гнева, укоризны Сам от нас Ты удали!\nДай мне в повседневной жизни свет являть Твоей любви.\n\nДай готовность и отраду - жизнь для ближних отдавать,\nНи похвал и ни награды за добро не ожидать.\nИ любви священный пламень в нас зажги. Спаситель, вновь, \nЧтобы тот, кто чёрств, как камень, мог почувствовать любовь."}, {"id": 551, "title": "Когда, мой друг, ты брата огорчил,", "text": "Когда, мой друг, ты брата огорчил,\nСразив его бессмысленным укором,\nВзамен любви печаль и горечь влил \nВ тайник души его обидным словом.\n\n    Спеши сказать сердечное «прости», \n    Пока в нём жизнь не скрыла ночь немая, \n    И свет горит на жизненном пути,\n    И жарких чувств полна душа живая.\n\nНо если он без мира поспешит\nВ страну теней, тобою оскорблённый,\nНичто тогда, мой друг, не примирит,\nС самим собой твой бедный дух смущённый.\n\nПлиту могилы не прожечь слезой,\nИ жизнь полна, быть может, сожаленья,\nНе может дать из сени гробовой \nВ ответ тебе желанных слёз прощенья."}, {"id": 552, "title": "Всё для тебя Всевышним решено, Господь твой путь заранее предвидел.", "text": "Всё для тебя Всевышним решено, Господь твой путь заранее предвидел. \nСчитать себя обиженным грешно - ты радуйся, коль кто тебя обидел.\n\nОбида часто разрывает грудь. «За что, за что?»-ты повторяешь грустно. \nНе можешь ты забыть всё и заснуть, обидчика бранишь в письме и устно.\n\nВ ответ на грубость лучше улыбнись и руку дай обидчику сердечно, \nИ станет вдруг безоблачною высь, и ты оценишь то, что в жизни вечно.\n\nНе обижаться трудно, знаем мы. И всё ж обиды все преодолимы. \nПрощения улыбка лучше тьмы, она костром вражды неопалима."}, {"id": 553, "title": "Умей прощать, молись за обижающих,", "text": "Умей прощать, молись за обижающих,\nЗло побеждай святым лучом добра.\nИди без колебаний в стан прощающих, \nПока горит Голгофская заря.\n\nУчись прощать, когда душа обижена,\nИ сердце, словно чаша горьких слёз,\nИ кажется, что доброта вся выжжена, - \nТы вспомни, как прощал людей Христос.\n\nУчись прощать естественно, как дышишь. \nКак воду пьёшь, как ешь насущный хлеб; \nВедь Бог тогда твои молитвы слышит,\nКогда в тебе горит прощенья свет.\n\nУмей прощать, прощать не только словом, \nНо всей душой, всей сущностью своей. \nПрощенье то рождается любовью,\nВ борениях молитвенных ночей.\n\nУмей прощать, в прощенье радость скрыта. \nВеликодушье лечит, как бальзам.\nКровь на кресте за всех была пролита,\nУмей прощать, чтоб ты прощён был сам."}, {"id": 554, "title": "Торжествуй, Евангельская правда! Торжествуй, велик её народ!", "text": "Торжествуй, Евангельская правда! Торжествуй, велик её народ! \nТвой Мессия, славный Победитель, всех людей к спасению зовет.\n\n    Есть работы очень (очень) много,\n    Но жнецов на ниве (очень) мало.\n    Все (все) идите, не медлите, спешите звать на ниву всех!\n\nВсе трудиться будем для спасенья, всех поспешно будем призывать, \nПроповедовать Святое Слово, славный путь готовы возвещать.\n\nПравда в мире да восторжествует, Слово правды землю обойдёт, \nГрешный мир пусть во Христе ликует: эту радость небо нам даёт.\n\nВремя благодати уж настало, чтоб светило солнце нам в пути, \nЧтобы люди быстро все узнали, что Христос желает всех спасти.\n\nТоржествуй, Мессия - Победитель! Все Тебе мы славу воздадим. \nБоже, Ты достоин славы, чести! Со Христом лишь все мы победим!"}, {"id": 555, "title": "И повелительно, и нежно Господь позвал тебя на труд:", "text": "И повелительно, и нежно Господь позвал тебя на труд:\nРаботы - океан безбрежный для сердца, для ума и рук. \nПривыкнув жить в тепле, покое, себя не ставя под удар,\nВо время трудное такое ты отказался от труда.\n\nТы отказался от труда, и кто-то, прежде незаметный,\nСвятою ревностью горя, бесшумно занял твоё место.\nНо беспристрастно взвесь теперь, перед лицом великим Божьим, \nПриобретений иль потерь, чего же в жизни твоей больше?\n\nТы отказался от разлук, от будней в вечном напряженье \nИ от поддержки Божьих рук в усталости, изнеможенье;\nДуховно вроде не ослаб и в Церкви Божьей не помеха,\nНо нет во всех твоих делах благословений и успеха.\nВ собранье ходишь ты, поёшь, благословений ловишь капли,\nА был готов пролиться дождь... Но отказался ты, не так ли?"}, {"id": 556, "title": "Ныне Божья любовь обнимает всех живущих людей на земле,", "text": "Ныне Божья любовь обнимает всех живущих людей на земле,\nНо во мраке неверья блуждает мир и гибнет, и стонет во зле.\nКто зажжёт яркий свет искупленья на погибельном тёмном пути? \nБог велит благодать и спасенье нам блуждающим людям нести.\n\nНа тернистой дороге страданья всюду видим мы крови следы, - \nЭто первые шли христиане совершать чудный подвиг любви.\nИх святое небесное пламя бури зла потушить не смогли,\nИ до нас сквозь огонь испытанья его старц
