спешишь ты, окружённый суетой?\nВедь скоро вечность дверь откроет пред тобой, \nИ ты свою оставишь плоть - закон таков,\nА ты, наверно, ты, наверно, не готов?\n\nКуда спешишь ты, окружённый суетой?\nВедь дни бесцельно пролетают пред тобой.\nИ ты идёшь, не замечая красоты\nНад пеленою проходящей суеты.\n\nКуда идёшь ты, окружённый суетой,\nНе замечая даже ближнего порой?\nОстановись и рассмотри, зачем спешить,\nВедь на земле тебе не так уж долго жить?"}, {"id": 664, "title": "Как быстро наши дни текут! Как тень они проходят", "text": "Как быстро наши дни текут! Как тень они проходят \nИ нас с собой туда влекут, откуда не приходят.\n\nЕще скитанья год прошел в пути земном и трудном,\nИ странник ближе подошёл к стране святой и чудной.\n\nО, долго ль будем мы блуждать по тропам этой жизни?\nИ долго ль нам ещё здесь ждать у враг святой Отчизны?\n\nУ Бога книга наших дней - назначил Он скитанья \nИ слёзы наши пишет в ней, и наши испытанья.\n\nКогда тернистый кончим путь, войдём в чертог небесный; \nГосподь велит нам отдохнуть в стране Своей чудесной.\n\nТвою, о Боже, благодать даруй нам в этой жизни,\nЧтоб мудро дни нам исчислять в пути к святой Отчизне.\n\nНе дай нам в скорби унывать, но дай всегда смиряться,\nК Тебе с молитвой прибегать, перед Тобой склоняться."}, {"id": 665, "title": "Улетают года неизбежно, как звук.", "text": "Улетают года неизбежно, как звук.\nСколько радостных встреч, сколько горьких разлук. \nМного в мире скорбей, много в мире тревог,\nМы теряем друзей на развилках дорог.\n\nУплывают года, только мы не спешим,\nНе стремимся вперёд, всё о прошлом грустим. \nЧей-то горестный вздох, чей-то ласковый взгляд, - \nНичего, ничего не воротишь назад.\n\nТо взгрустнём мы порою о прежних друзьях,\nТо вздохнём о напрасно потерянных днях,\nЧто так много бывало ошибок и зла, - \nНичего возвратить и исправить нельзя.\n\nМой Господь, пред Тобой я в смиренье стою,\nТы ведь всё знаешь Сам, видишь душу мою, \nЗнаешь Ты все печали и скорби, и стон,\nТы Создатель миров, Ты Владыка времён.\n\nУдали мои вздохи о жизни земной,\nУкрепи на дороге к Отчизне святой,\nГде не будет скорбей, где не будет тревог,\nГде не будет опасных и ложных дорог."}, {"id": 666, "title": "Пролетят стрелою молодые годы,", "text": "Пролетят стрелою молодые годы,\nИстомится сердце от скорбей, тревоги,\nОбветшает тело, ослабеют силы,\nСтанет душу мучить близкий час могилы.\n\n    Счастлив тот, кто может в старости глубокой \n    Вспомнить без упрёка о весне далёкой.\n\nИ ничто не будет радовать сознанье,\nОвладеют сердцем горечь и страданье, - \nКто в годах увядших видит лишь утрату \nИ не служит правде, истине и брагу.\n\nО друзья, не тратьте бесполезно годы,\nСейте мир и правду, не страшась невзгоды,\nПомогайте ближним, ободряйте брата,\nВ старости чтоб вспомнить юность без утраты."}, {"id": 667, "title": "Бьют часы, прощальный час мне возвещают!", "text": "Бьют часы, прощальный час мне возвещают!\nБьют часы, о чём-то новом говорят!\nБьют часы и боем мне напоминают,\nЧто я пришлец на сей земле, не здесь мой град.\n\n    О том, что ждёт нас впереди, я думаю под этот бой \n    И песню новую пою: «Пора домой! Пора домой!»\n    Пою её, как сладок звук мне песни той!\n    Её всегда я буду петь: «Пора домой!»\n\nБьют часы, я взор свой к небу поднимаю.\nБьют часы, в святую высь меня зовут.\nО, Господь! К Тебе я руки простираю,\nВсевышний Бог, прошу, прими мольбу мою.\n\nБьют часы, я жажду с миром сим расстаться.\nБьют часы, ведь здесь я тяжко так томлюсь.\nО, мой Бог! Хочу к Тебе я ввысь подняться!\nЯ жду тот миг, когда с Тобой навек сольюсь."}, {"id": 668, "title": "Жизнь течёт, и день прекрасный в прошлое уйдёт", "text": "Жизнь течёт, и день прекрасный в прошлое уйдёт \nИ в альбоме дней прожитых место обретёт.\nМы тревожим юность нашу памятью своей,\nА душе не хочется расставаться с ней.\n\n    Будет время — все мы станем юными опять,\n    Как всё будет, мы не знаем, можем лишь гадать. \n    Время есть, и нужно в жизни много наверстать, \n    Не устанет память наша прошлого листать.\n\nЕсть у времени граница, есть всему итог,\nНаша жизнь не вечно длится, краток её срок.\nПусть же сердце устремится к вечной цели той: \nОбновиться в вечности неземной красой.\n\nБыстротечен, знает каждый, юности полёт,\nНе дано прожить нам дважды, всё к концу идёт.\nЧтобы в памяти дней юность светлою была,\nПусть навек её украсят добрые дела."}, {"id": 669, "title": "Проходят дни за днями мгновением одним,", "text": "Проходят дни за днями мгновением одним,\nНеслышными шагами мы к вечности спешим.\nИ буря, и ненастье, и ясный солнца свет,\nИ горести, и счастье прошли, их больше нет.\n\n    Стремись же всей душою к Небесному Отцу, \n    К блаженному покою, нетленному венцу.\n\nЧто пережил - уходит, не пережить опять;\nЗа годом год проходит, не возвращаясь вспять.\nВсё в мире скоротечно и тает всё, как дым.\nНе называй беспечно здесь ничего своим."}, {"id": 670, "title": "Летят года, и без следа проходит день за днём,", "text": "Летят года, и без следа проходит день за днём,\nОт новых дней и лет всегда благословений ждём. \nИ этот год, как все, уйдёт, и грустно на душе,\nЧто Бог сегодня не найдёт святых плодов на мне.\n\n    А год уйдёт и больше не вернётся,\n    Не повторится в жизни никогда.\n    И только сердце трепетно забьётся:\n    Что принесут грядущие года?\n\nУходит год и за собой пусть к вечности несёт \nСреди скитаний и забот, болезней и невзгод. \nЛетят года и без следа проходит день за днём,\nОт новых дней и лет всегда благословений ждём."}, {"id": 671, "title": "Время, ты куда улетаешь? Время, ты куда всё спешишь?", "text": "Время, ты куда улетаешь? Время, ты куда всё спешишь?\nВ жизни ты только след оставляешь и снова куда-то летишь! \nВремя, косяком журавлей улетаешь,\nЗнаю, что ты ко мне опять не прилетишь. (2 раза)\n\nВремя, ты проходишь так быстро, много принося мне скорбей. \nЗнаю то, что вернуть я бессилен мгновенья утраченных дней. \nБоже, почему ослабели так крылья?\nДай же мне сил достичь Страны, где нет скорбей.(2 раза)\n\nБоже, вот опять призываю имя я святое Твоё.\nВ жизни дай мне ценить, умоляю, короткое время своё.\nБоже, не оставь Ты меня, умоляю,\nО, помоги, Боже, войти в Царство Твоё.(2 раза)"}, {"id": 672, "title": "Часы на руках у каждого считают остатки дней.", "text": "Часы на руках у каждого считают остатки дней.\nВ жизни есть много важного - время всего ценней.\n\n    Жить на земле не триста лет,\n    А, может быть, шестьдесят,\n    А, может быть, только тридцать,\n    А, может быть, двадцать пять, -\n    Вот почему молиться старайся не забывать.\n\nВремя - начальник строгий, стрелка бежит и бежит... \nВремя спешит, ведь немного здесь остаётся жить.\n\nВ мире дорог есть много, но так коротка их нить.\nТот, кто доверится Богу, будет вовеки жить!"}, {"id": 673, "title": "Вот недавно были молодые, незаметно головы седые,", "text": "Вот недавно были молодые, незаметно головы седые,\nПобелели, годы пролетели, и морщины тронули лицо.\n\nПозади покинутые годы говорят о радостях, невзгодах,\nДа, о многом! Если жили с Богом - значит, не напрасно годы шли.\n\nГлядя на лицо и ваши руки, улыбнутся дети, даже внуки.\nСтанет ясно: с Господом прекрасно, и наглядно виден труд и плод.\n\nНа закате годы, ближе старость, безусловно, слышится усталость. \nНепременно, есть у вас замена, есть на ниве Божьей молодёжь.\n\nВот недавно были молодые, незаметно головы седые, - \nНепременно, есть у вас замена, есть на ниве Божьей молодёжь!"}, {"id": 674, "title": "Снова за окном белые дома. Снега чистоту небо щедро шлёт.", "text": "Снова за окном белые дома. Снега чистоту небо щедро шлёт.\nВот уже опять к нам пришла зима, и ещё один проходит год.\n\nСколько этих зим будет впереди? - наболевший всем слышится вопрос. \nНа пороге мы вечности стоим, зим не будет там, где ждёт Христос.\n\nПусть сейчас мороз леденит висок, стынет на щеке горькая слеза, \nТолько б не замёрз веры колосок, сердцу остывать никак нельзя.\n\nПусть твоя любовь топит лёд в сердцах и согреет всех доброты теплом. \nИ тебя Господь примет в небеса, где ты будешь жить навек с Христом."}, {"id": 675, "title": "Тихий праздничный час. Год прошёл, год угас...", "text": "Тихий праздничный час. Год прошёл, год угас...\nНовый год, новый год нам Всевышний даёт!\n\nГод прошёл - ближе дом, ближе встреча с Отцом;\nДруг, воспой! Друг, воспой! Ближе вечный покой.\n\nЧто с собой принесёт нами встреченный год?\nСмерть иль пир, смерть иль пир, бурю сердца иль мир?\n\nЧто грядёт - то темно, но мы знаем одно:\nС нами Тот, с нами Тот, Кто нас к небу ведёт.\n\nС нами Вождь, полный сил, Кто врага победил;\nОн сулит, Он сулит нам охрану и щит.\n\nИ мы слышим в мольбе: «Всё ко благу тебе!\nНе страшись, не страшись, только бодрствуй, молись!»\n\nЕсли горе - молись, если радость - стремись \nВоспевать, воспевать Божьих рук благодать."}, {"id": 676, "title": "Оглянусь назад на ушедший год,", "text": "Оглянусь назад на ушедший год,\nЧто увижу я в пролетевших днях?\nНа пути земном, среди всех забот,\nМой всесильный Бог, Ты хранил меня.\nОт невзгод и бед Ты меня хранил,\nПосылал мне сил для трудов моих.\nПод Твоей рукой проходили дни,\nИ любовь Твоя освещала их.\n\n    Словом истины Ты меня водил,\n    В испытаниях возрасти помог.\n    Сколько раз прощал! Сколько раз хранил! \n    Как ты любишь нас, милосердный Бог!\n\nВ самый трудный час мне легко с Тобой,\nНе собьюсь с пути по Твоим следам.\nНо за все дары, но за всю любовь,\nЧем отвечу я, чем Тебе воздам?\nУходящий год - обличитель мой,\nНи один из дней невозможно скрыть.\nТы прости за всё, Иисус благой,\nПомоги, дай сил небесплодным быть."}, {"id": 677, "title": "Не будет времени, не будет, прейдут и небо, и земля;", "text": "Не будет времени, не будет, прейдут и небо, и земля;\nОднажды утром солнце людям не возвестит начало дня.\nПридёт нежданно день Господень, чтоб нас внезапно испытать, \nКто будет Богу неугоден, потерь не сможет наверстать.\n\nНе будет времени, не будет, умолкнет перекличка дней,\nИ больше не услышат люди тот нежный зов: «Приди ко Мне!» \nСегодня время благодати, гонца быстрее дни бегут \nИ на всемирном циферблате осталось несколько минут.\n\nГотовься же, пока не поздно, к приходу Бога твоего,\nНе то услышишь слово «поздно!» - последний грозный приговор. \nИссякнут времени все воды, преткнутся о последний брег; \nХристом спасённые народы с Ним будут царствовать вовек."}, {"id": 678, "title": "Нам кажется, завтра мы станем прилежней", "text": "Нам кажется, завтра мы станем прилежней \nИ лучше, полезней, добрей.\nСегодня мы грубы, а завтра мы нежны,\nИ завтра мы будем мудрей.\nМы завтра проведаем старого друга \nИ завтра напишем родным.\nМы завтра кому-то окажем услугу \nНе только своим - и чужим. (2 раза)\n\n    Так в планах на завтра, что скрыто в тумане, \n    За годом проносится год,\n    А что, если завтра возьмёт и обманет,\n    И завтра совсем не придёт?\n\nМы завтра покаемся в жизни бесплодной \nВ последнем предсмертном бреду,\nОденем раздетых, накормим голодных,\nРазделим чужую беду.\nМы завтра поймём, что такое спасенье,\nИ завтра пойдём за Христом.\nМы завтра пред Богом падём на колени - \nНе ныне, а завтра, потом... (2 раза)"}, {"id": 679, "title": "Год минувший прошёл, как туман над землёй.", "text": "Год минувший прошёл, как туман над землёй. \nНовый год настаёт, что с собой принесёт?\nГде бы ни был бы я, Ты меня не покинь \nВ этом новом году, я молю, я прошу.\n\nЗнаешь ты, дорогой мой Спаситель благой, \nКак меня защитить в час нужды, в час невзгод. \nО, дай мне сохранить в трудный час для меня \nВеру, радость, любовь, сердца верность Тебе.\n\nГоре ль, радость порой, принесёт что с собой \nНовый год; я молю: Боже мой, будь со мной! \nНовый год, новый год что с собой принесёт, \nЗнаешь Ты, дорогой мой Спаситель благой."}, {"id": 680, "title": "Быстро, очень быстро дни бегут, словно тучи чёрные плывут.", "text": "Быстро, очень быстро дни бегут, словно тучи чёрные плывут. \nГолову покрыла седина, старость мне напомнила она.\n\n    Ты, седина, жаль, что видна!\n    Я так мало (мало) потрудился для Христа. (2 раза)\n\nБыл я молод, но не знал Христа, Господа не славили уста,\nПохоти различные любил - так я безрассудно в мире жил.\n\nЛучше с юных лет познать Христа, чтобы жизнь земная не прошла, \nБез труда для Господа не жить, надо с юных лет Ему служить.\n\nИ теперь немолод, знаю я, не вернётся молодость моя,\nНет труда, но милость только в Нём! И хотя седой, но со Христом!"}, {"id": 681, "title": "Годы! Годы юности летят. Годы! Им возврата нет назад.", "text": "Годы! Годы юности летят. Годы! Им возврата нет назад.\nГоды в вечность нас несут с собой. Годы! Дни уходят чередой.\n\nГоды изменяют в жизни нас. Годы! Безвозвратен каждый час. \nГоды! Ты совсем уже седой. Годы, что свершили над тобой?\n\nГоды! С каждым часом ближе Дом. Годы! Скоро встреча со Христом. \nГоды! Скоро полночь, год уйдёт. Годы! Скоро наш Господь придёт.\n\nГоды! Будь готов войти с Христом. Годы! В вечный славный Божий Дом. \nГоды! Там святые без числа. Годы! Все поют Христу: «Хвала!»"}, {"id": 682, "title": "В детстве казалось, что жизнь бесконечной будет всегда,", "text": "В детстве казалось, что жизнь бесконечной будет всегда, \nМожно мгновения тратить беспечно, дни и года,\nНо незаметно полжизни промчалось - не возвратить,\nИ невозможно начать всё сначала, всё повторить.\n\n    День за днём покидает наш дом,\n    Покидает наш дом день за днём.\n    Дни летят, за рассветом - закат,\n    За годами - года, дни летят.\n    Не забудь, что ни дня не вернуть,\n    Не вернуть никогда, не забудь.\n\nТы же считаешь, что жизнь бесконечной будет всегда \nИ что успеешь впустить в своё сердце верой Христа,\nНо не забудь, друг, ведь жизнь твоя мчится - не удержать, \nДень тот настанет - пред Богом отчёт ты будешь давать.\n\nСколько же дней пролетело впустую - не сосчитать,\nИ никогда, никогда ты не сможешь их наверстать.\nДруг мой, подумай и жизнь так беспечно не проводи,\nДни посвяти ты Христу, пока голос Божий звучит."}, {"id": 683, "title": "Последнее время уже наступает, дрожит вся земля,", "text": "Последнее время уже наступает, дрожит вся земля,\nПридёт наш Спаситель, уже не Учитель, но грозный Судья.\nМой друг, ободрись же, мой друг, приготовься, чтоб встретить Царя. \nПоследнее время в эпоху растленья встречает земля.\n\n    Последнее время уже наступает,\n    Дрожит вся земля, в смятенье она.\n    Последнее время тебя вопрошает:\n    «Как встретишь Христа? Как встретишь Христа?»\n\nВ последнее время так много работы для Божьих детей,\nВедь в мире коварном навеки погибнет так много людей.\nНо так же, как прежде, мы верим с надеждой в Иисуса слова. \nПоследнее время в эпоху растленья встречает земля.\n\nПоследнее время летит незаметно со скоростью сна.\nВ заботах житейских совсем не заметил, как осень пришла.\nМой друг, соберись же, последние силы отдай для Христа. \nПоследнее время в эпоху растленья встречает земля."}, {"id": 684, "title": "Дни, как звук, отшумят и исчезнут вдали -", "text": "Дни, как звук, отшумят и исчезнут вдали - \nВ синем небе летят над землёй журавли.\nВ журавлином пути быстрый бег твоих лет.\nИ оставишь ли ты, и оставишь ли ты на земле добрый след?\n\nКак пройти этот путь, чтобы что-то отдать,\nЛюдям счастье вернуть, веру не потерять.\nПусть же юность твоя ярким светом горит\nИ крупицы добра, и крупицы добра людям щедро дарит.\n\nДни, как звук, отшумят и исчезнут вдали - \nВ синем небе летят над землёй журавли.\nВ журавлином пути быстрый бег твоих лет.\nИ оставишь ли ты, и оставишь ли ты на земле добрый след? \nПусть же юность твоя ярким светом горит \nИ крупицы добра, и крупицы добра людям щедро дарит."}, {"id": 685, "title": "Мелькают часы за часами, и днями сменяются дни,", "text": "Мелькают часы за часами, и днями сменяются дни, \nПроходят года за годами, и в вечность уходят они.\n\nГрядущее наше туманно, день завтрашний знать не дано, \nА время летит безвозвратно, преграды не знает оно.\n\nКак часто ты время теряешь, увлёкшись игрою страстей. \nНапрасно себя расточаешь, греховностью губишь своей.\n\nПока ещё время, не поздно, спеши к Иисусу прийти, \nПока ещё Господа милость зовёт и тебя на пути.\n\nЗа каждое жизни мгновенье, за каждый потерянный час, \nЗа мысли, слова и движенья ответ Он потребует с нас."}, {"id": 686, "title": "Ты не грусти, что жизнь быстро мчится, и годы летят чередой,", "text": "Ты не грусти, что жизнь быстро мчится, и годы летят чередой, \nОни улетают, как быстрые птицы, на крыльях неся нас с собой.\n\nТы не грусти, что старость подходит, и кроет главу седина,\nЧто светлая молодость быстро уходит и что не вернётся назад.\n\nТы не грусти-так близко спасенье! Ведь любит тебя наш Христос, \nВедь Он приобрёл на кресте искупленье и страшные муки понёс.\n\nТы не грусти: с землёй расстаёмся, и близится жизни конец,\nВедь ты расстаёшься с тяжёлой дорогой, а в небе тебя ждёт Отец."}, {"id": 687, "title": "Как скоро дни летят вперёд неслышной чередой!", "text": "Как скоро дни летят вперёд неслышной чередой!\nВот день один к концу идёт, вот настаёт другой.\n\n    Когда пробьёт и для меня последний час житья,\n    Где буду после обитать - дано мне Богом знать.\n\nКто верил, уповал, любил и пребывал с Христом,\nТого Христос чрез мрак могил возьмёт в Свой вечный дом.\n\nОт сердца верю, верю я, что тот Господний зов \nНе будет страшен для меня, я буду ввек Христов.\n\nКогда настанет жданный миг расстаться мне с землёй,\nТы вспомни между слуг Твоих спасённого Тобой."}, {"id": 688, "title": "Слава, слава Богу в вышних, мир земле и благодать!", "text": "Слава, слава Богу в вышних, мир земле и благодать! \nПризывайте, братья, ближних, будем Бога воспевать.\n\n    Аллилуйя, аллилуйя, слава Богу в вышних! \n    Аллилуйя, аллилуйя, аллилуйя, аминь.\n\nЦарь царей, причин Причина, Кто имеет Свой престол, \nВ славе вечной Божья Сына человеком в мир пришёл.\n\nГрешники, веем вам прощенье ныне с неба Он принёс. \nС Богом дать вам примиренье ныне хочет Сам Христос.\n\nВ этот день Он воплотился, скромный вид раба обрёл, \nЧтоб без страха обратился грешник и к Нему пришёл.\n\nО, к Нему, к Нему придите вы, погрязшие в грехах, \nБлагодать Его примите и блаженство в небесах."}, {"id": 689, "title": "С неба явилась Правда на землю и обитала среди людей,", "text": "С неба явилась Правда на землю и обитала среди людей,\nВсех научила, как жить в сём мире и славить Бога в жизни своей.\n\n    Где ж эта Правда людям явилась?\n    Где ныне в мире встретишь её?\n    Там в Вифлееме в яслях открылась,\n    Ныне же в сердце верных живёт.\n\nВечная Правда и Дух Небесный ищут доныне веру в сердцах, \nЧтобы вселился в них Бог предвечный и укрепил их в добрых делах.\n\nОн солнце правды, хлеб жизни вечной, верной защитой стал Он для нас! \nЕсли бы люди в жизни беспечной к Богу стремились, Он бы их спас!\n\nДарит Бог радость, путь освещает, миром, любовью правит в сердцах; \nКто Его верой в жизнь принимает, вечность найдёт в святых небесах."}, {"id": 690, "title": "Что за радость людям всем возвещена:", "text": "Что за радость людям всем возвещена:\nВ Вифлееме Дева Сына родила.\nНочью хлев (ночью хлев тот) тог озарился (озарился),\nМиру Божий (миру Божий) Сын родился (Сын родился)- \nБог радость нам дал.\n\nКо Христу с востока мудрецы идут,\nЛадан, злато, смирну в дар Ему несут.\nИх царь Ирод (их царь Ирод) вопрошает (вопрошает),\nО Рожденном (о Рожденном) он не знает (он не знает):\n«Далёк ли ваш путь?»\n\nСтарцы отвечают: «Мы к Младенцу идём.\nЗлато, ладан, смирну в дар Царю несём». -\n«Я прошу (я прошу вас) вас потрудиться (потрудиться),\nДа Младенцу (да Младенцу) поклониться (поклониться), \nВернуться в мой дом».\n\nМудрецы с дарами поклонились Христу \nИ другой дорогой в свои страны идут.\nАнгел тайну (ангел тайну) открывает (открывает):\n«Где Христос (где Христос пусть), пусть царь не знает (царь не знает) \nЗамыслил он зло».\n\nИрод, царь жестокий, в город войско шлёт,\nЧтоб найти Младенца и убить Его.\nСлуги слово (слуги слово) исполняют (исполняют),\nМалых деток (малых деток) убивают (убивают)\nПо воле царя.\n\nМатери в печали плачут, слёзы льют,\nНикому пощады слуги не дают:\n«Что ж, дитя, (что ж, дитя, ты) ты совершило (совершило)?\nЧем страданья (чем страданья) заслужило (заслужило)?\nЗа что же, за что?!»\n\nАнгелы на небе славу вознесли.\nПастухи гой ночыо людям весть несли:\n«Это Божий (это Божий) Сын родился (Сын родился),\nЧтоб небесный (чтоб небесный) мир вселился (мир вселился)\nВ людские сердца»."}, {"id": 691, "title": "К яслям бедным прибежали пастухи,", "text": "К яслям бедным прибежали пастухи,\nПред Младенцем ликовали, как могли.\n\n    Слава в вышних Богу (2 раза)! Людям мир Бог даёт!\n\nАнгел светлый их на поле посетил,\nО Рождённом в Вифлееме возвестил.\n\nПоклонились Жизнедавцу всей земли,\nСердцем чистым Богу славу вознесли.\n\nИм открылся в том Младенце Царь царей,\nКто родился, чтоб избавить всех людей."}, {"id": 692, "title": "Спит спокойно Вифлеем, но горит небес простор:", "text": "Спит спокойно Вифлеем, но горит небес простор:\nВ вышине над миром всем воспевает Божий хор.\n\n    Слава! Слава в вышних Богу! (2 раза)\n\nНо не спят лишь пастухи, и им ангел весть несёт:\nБог, прощающий грехи, вам Спасителя даёт.\n\nПенье ангелов с высот оглашает небосвод.\nГоры, лес и вся земля, - все поют, Христа хваля.\n\nПробудись же, Вифлеем! Пробудись же, грешный люд! \nВстань, послушай сердцем всем песнь, что ангелы поют."}, {"id": 693, "title": "Все вокруг заняты были своим, и только лишь три мудреца", "text": "Все вокруг заняты были своим, и только лишь три мудреца\nПришли поклониться Ребёнку в яслях, Посланнику Бога Огца. \nМилый Малыш сладко дремал на материнских руках,\nА в небе тогда сияла звезда, пели ангелы на небесах:\n\n    Придите к Иисусу любовь обрести,\n    Он наш Спаситель, Сын Бога любви!\n    Придите к Иисусу, Царю Царей,\n    Он призывает, чтоб дать нам любовь. Придите скорей!\n\nТам в городке Вифлееме, в хлеву, Малыш Иисус был рождён, \nМама Мария растила Его, с любовью заботясь о Нём.\nВ яслях в ту ночь Иисус крепко спал под нежным покровом небес. \nИ в Рождество - день рожденья Его услышишь ты ангелов песнь:"}, {"id": 694, "title": "Ныне в городе Давида нам рождён Господь Христос,", "text": "Ныне в городе Давида нам рождён Господь Христос,\nХоть смиренного Он вида, но по-царски дар принёс,\nДар от смерти избавленья, дар свободы и любви,\nДар святого примиренья в жертвенной Своей Крови.\n\n    Бог Творец, благой Отец,\n    Слава вечная Тебе (слава вечная Тебе)! Аминь.\n\nВесть приняли ту благую стерегущие стада.\nВ полночь сонную, глухую загорелась та звезда.\nПастухи пошли послушно, видя чудные дела...\nЗагорелась вера в душах, их к Младенцу привела.\n\nОн, как раб людей, смиренный, тихо на землю пришёл, \nПрежде всех веков Рождённый место в яслях здесь нашёл. \nНе роскошного чертога - ясли ищет Божий Сын,\nЧтобы все любили Бога, Бог Отец для всех Один.\n\nРаствори же сердца двери, пусть в нём скот, вертеп оно - \nБог родится в нём по вере - будет всё обновлено.\nО рождении великом снова ангел воспоёт,\nВ мире мрачном полудиком весть благую понесёт."}, {"id": 695, "title": "Всесильный Царь вселенной! Ты ясли Сам избрал", "text": "Всесильный Царь вселенной! Ты ясли Сам избрал \nИ, как дитя, смиренно в пещере возлежал.\nИ я глядел как зритель и людям говорил:\n«Да, в яслях был Спаситель», - но Ты мне чуждым был.\n\nНо голос услыхал я: «В пещере был, в чаду,\nИ в яслях там лежал Я, теперь к тебе иду;\nХочу в тебе родиться и в сердце жить твоём,\nИ в нём изобразиться, как в зеркале живом».\n\nИ Ты ко мне явился, любовыо осветя;\nИ я в Тебе родился - теперь Твоё дитя.\nИ чудо! Ты родился, Иисус, в душе моей,\nНавечно поселился, обретши ясли в ней.\n\nРасти ж, Дитя святое! Расти во мне, Христос,\nЧтоб я, дитя земное, в гордыне не возрос,\nЧтоб весь я умалялся, и чтоб в любви Твоей \nЯ весь преображался для славы вечных дней."}, {"id": 696, "title": "Земля и небо, земля и небо ныне торжествуют.", "text": "Земля и небо, земля и небо ныне торжествуют.\nАнгелы людям, ангелы людям несут весть благую.\n\n    Христос родился, Бог воплотился,\n    Ангелы ликуют, небо торжествует,\n    Пастухи внимают, стадо оставляют,\n    Чудо, чудо возвещают.\n\nТам в Вифлееме, там в Вифлееме радости причина:\nЧистая Дева, чистая Дева родила нам Сына.\n\nВечное Слово, вечное Слово восприняло тело.\nВо тьме греховной, во тьме греховной солнце засветило.\n\nВолхвы с востока, волхвы с востока в Вифлеем приходят,\nЛадан и смирну, ладан и смирну, и злато приносят.\n\nХристу и Богу, Христу и Богу и мы поклонимся,\n«Слава в вышних Богу! Слава в вышних Богу!»-Ему возгласим все"}, {"id": 697, "title": "Я славлю Тебя, Иисус, родился Ты в тёмную ночь;", "text": "Я славлю Тебя, Иисус, родился Ты в тёмную ночь;\nСпаситель, о, если б не Ты, кто б спас нас от горькой беды?\n\nВсю жизнь я Тебе отдаю, от сердца хвалу приношу,\nТы в тихую звёздную ночь родился, чтоб людям помочь.\n\nОдна у меня есть мечта, чтоб здесь в окружении зла \nЯ сердце своё сохранил и в небе с Тобою пребыл."}, {"id": 698, "title": "Полный благости, полный радости, Благодатный день Рождества!", "text": "Полный благости, полный радости, Благодатный день Рождества!\nМир грехом томился, вот Христос родился, Верующим всем день торжества!\n\nПолный благости, полный радости, Благодатный день Рождества!\nСилы неземные, песни дорогие Возвещают всем день торжества!\n\nПолный благости, полный радости, Благодатный день Рождества!\nЛюдям дан Спаситель, с Богом Примиритель. Радуйтесь, настал день торжества!"}, {"id": 699, "title": "Ангельское пенье в небесах звучит,", "text": "Ангельское пенье в небесах звучит,\nРадость, утешенье, мир оно дарит.\nНам рождён Спаситель, дивное Дитя,\nВсех Он Искупитель грешников, как я.\n\n    Ангельское пенье в небесах звучит: \n    Радость, утешенье, мир оно дарит. \n    Слава в вышних Богу и мир на земле! \n    Слава в вышних Богу и мир на земле! \n    (Аминь! Аминь!)\n\nВ небесах чудесных слава, честь Ему, \nСпасшему нас грешных, возлюбивших тьму. \nИз глубин сердечных к светлым небесам \nЛикований вечных хор стремится сам.\n\nБудем же любовью за любовь платить \nСпасшему нас Кровью, чтобы вечно жить. \nГибнущему брату руку подадим,\nНе за мзду и плату будем вечно с Ним."}, {"id": 700, "title": "В Палестине Царь родился в те далёкие года,", "text": "В Палестине Царь родился в те далёкие года,\nБог на землю к нам явился, и зажглась Его звезда. \nПастухов, стада пасущих, свет великий осиял.\nИ тогда, идя к пещере, каждый Бога прославлял.\n\n    Гори, звезда (гори, звезда), всегда гори (всегда гори)\n    И светом новым озари\n    Всех, кто блуждает в темноте,\n    Пусть весть услышат о Христе.\n\nМудрецы, звезду увидев, в Вифлеемский стан пошли, \nНа колени пред Ним пали и подарки принесли.\nИ теперь она сияет, Вифлеемская звезда,\nСкоро все о ней узнают и поверят во Христа.\n\nМного звёзд на небе светит, только светит всех сильней \nТа, что время возвестила Рождества Царя царей.\nИ когда печаль на сердце, подними глаза туда,\nГде сияет вечным светом Вифлеемская звезда."}, {"id": 701, "title": "Ныне все верные в мире ликуют,", "text": "Ныне все верные в мире ликуют,\nВ небе все силы в Христе торжествуют. \n«Царь вам рождён! - воспевают в хвале, \nСлава в вышних Богу, мир на земле!»\n\n    Слава (слава в вышних Богу), (2 раза) \n    Слава в вышних Богу, мир на земле! \n    Слава (слава в вышних Богу), (2 раза) \n    Царь вам родился - Христос!\n\nПой, Вифлеем, Иисуса рожденье,\nРадостно пой, всё живое творенье,\nПойте, святые, с венцом на челе:\n«Слава в вышних Богу, мир на земле!»\n\nПуть был указан от Бога звездою,\nЧтоб мудрецы поклонились с мольбою.\nМного даров мудрецы принесли:\nЗнали, Младенец - Царь неба, земли.\n\nИрод, услышав о Царском рожденье,\nВ сердце замыслил свершить преступленье.\nТайно Младенца убить захотел,\nМесто рожденья искать повелел.\n\nНочыо Иосиф услышал веленье:\n«Ирод задумал свершить убиенье.\nУтром возьми ты Младенца и мать,\nВ бегстве не медли спасенья искать!»\n\nИрод с войсками детей избивает,\nЦарь же Младенец в Египет вступает.\nДивно Младенец спасён был тогда,\nЧтобы Он после спас мир навсегда."}, {"id": 702, "title": "Младенца дал нам вечный Бог, нам Сын дан от Него,", "text": "Младенца дал нам вечный Бог, нам Сын дан от Него, \nВладычества святой залог на раменах Его.\n\nЕго - Бог крепкий и Творец - мир целый назовёт - \nСоветник, вечности Отец и Чудный в род и род.\n\nВладычество Он укрепит, предела мира нет,\nНавек Он правдой утвердит престол Свой и Завет."}, {"id": 703, "title": "На планету людей, на планету страстей", "text": "На планету людей, на планету страстей \nБожий Сын избавленье принёс.\nЧтобы стать новой жизнью твоей и моей,\nВ бедных яслях родился Христос.\n\nИ, оставив сиянье надзвёздных высот \nИ божественной славы величье,\nОн смиренно пришёл в мир тревог и забот \nИ открыл нам любви безграничность.\n\nИ, рассеяв грехов беспросветную тьму, \nСолнце истины снова взошло.\nНеслучайно тогда мудрецы шли к Нему \nСквозь суровые вёрсты дорог.\n\nОн пришёл, чтоб все тяготы жизни нести, \nСохранить первозданную святость,\nЧтобы в муках Голгофы последним «прости \nНавсегда дать спасенье и радость."}, {"id": 704, "title": "Вести ангельской внемли, Царь родился всей земли!", "text": "Вести ангельской внемли, Царь родился всей земли!\nМилость, мир Он всем дарит, грешных с Богом примирит.\nВсе народы, вознеситесь, с ангелами съединитесь,\nВифлеему песнь поём: Царь Христос родился в нём!\nВести ангельской внемли, Царь родился всей земли!\n\nПрославлять Христа наш долг: Царь Христос, Предвечный Бог, \nВот к концу веков рождён от пречистой Девы Он!\nВ плоти Сам Господь явился, образ взяв раба, смирился,\nЖить с людьми благоволил Иисус Эммануил.\nВести ангельской внемли, Царь родился всей земли!\n\nТы исполнил Свой завет, солнце правды Ты и свет.\nТы для нас сошёл с небес, к исцеленью всех воскрес,\nВ мир пришёл, оставив славу, смерти упразднил державу,\nБыл рождён, чтоб нас поднять, нам рожденье свыше дать.\nВести ангельской внемли, Царь родился всей земли!"}, {"id": 705, "title": "Бог нас всех так любит, что оставил небо", "text": "Бог нас всех так любит, что оставил небо\nИ родился в грешном мире, чтоб людей спасти.\nЧтобы всякий смертный, как бы ни был грешен,\nВместо горя, скорби счастье, радость мог найти.\n\n    Он родился, чтобы грех твой па Себя принять, \n    Чтоб распятым быть на древе, за тебя страдать, \n    А тебе отдать всю славу и любовь Свою,\n    Навсегда ввести в небесную семью.\n\nНеужели в сердце для Христа нет места,\nНеужели не поймёт оно Его любви?\nНеужель напрасно на кресте том страшном \nПроливал Он за тебя поток святой Крови?\n\nОн нас всех так любит, что оставил небо,\nИ нет больше той цены, что за тебя Он дал.\nТак приди ж сегодня на призыв Господень,\nОтзовись, ведь Он тебя так долго, долго ждал."}, {"id": 706, "title": "Все мы вспоминаем радость в славный день такой,", "text": "Все мы вспоминаем радость в славный день такой, \nКак Спаситель в мир родился, людям дал покой. \nРадость Церкви вечно нова, вечно дорога, \nВспоминаем каждый год день Рождества.\n\n    Пойте, люди, пойте, Христос рождён!\n    Будь, Господь, восхвалён!\n    Всем людям мир был возвещён \n    В ту ночь, когда Христос рождён!\n\nВесть благую ангел Божий пастухам сказал,\nГород Вифлеем Иудейский в это время спал,\nВести радостной не слышал, сном он был объят, \nНе внимал словам небесным, не внимал.\n\n«Слава, слава в вышних Богу!» - пусть поют уста. \n«Людям мир, благоволенье», - вторят небеса.\nБог один весь мир так любит, Сына нам послал,\nОт грехов освобожденье всем нам дал!"}, {"id": 707, "title": "«Вот, иду!» - сказал Он. Звёзды расступились,", "text": "«Вот, иду!» - сказал Он. Звёзды расступились,\nИ до края неба возвещалась всем \nТайна воплощенья, ангелы склонились:\nИ вошёл Спаситель ночью в Вифлеем.\n\nОбитавший в славе, в свете неприступном \nИ превыше самых отдаленных звёзд,\nОн сошёл на землю, людям стал доступным;\nВ простоте - великий, а в величье - прост!\n\nСтал Он человеком на земной планете.\nДля того родился, изгнан был за стан,\nЧтоб сроднились с небом мы, земные дети, \nЧтобы наступила эра христиан!"}, {"id": 708, "title": "Нет места, о Спаситель, здесь в мире для Тебя;", "text": "Нет места, о Спаситель, здесь в мире для Тебя;\nИ крова не имел Ты среди людей, скорбя.\nТак принял мир Иисуса Спасителя, Царя,\nКто, в небе трон оставив, пришёл к нам, жизнь даря.\n\nНет места для Тебя здесь, для Матери Твоей;\nЛюбви нет, чтоб с приветом принять Дитя скорбей. \nНо в яслях на соломе, в сырой пещерной мгле \nПровёл Ты, Царь Небесный, день первый на земле.\n\nНет места для Иисуса, приюта нет Тебе;\nНет друга для поддержки, нет помощи в борьбе. \nОдин с оружьем Божьим Ты в бой со злом вступал, \nСражался с тьмой порока и правду защищал.\n\nНет места для Иисуса - лишь на кресте нашлось; \nТвой свет наш мир не принял, и был распят Христос. \nНашлось лишь место злобе, приют для дел плотских, \nА для Тебя не стало местечка в сердце их.\n\nНет места для Иисуса! Да, не было его;\nНо вот я открываю дверь сердца своего.\nПусть мир тебя отвергнет, но если Ты придёшь, \nПриют в сердечной клети Ты для Себя найдёшь."}, {"id": 709, "title": "Тихая ночь, дивная ночь! Дремлет всё, лишь не спит", "text": "Тихая ночь, дивная ночь! Дремлет всё, лишь не спит\nВ благоговенье святая Чета, чудным Младенцем полны их сердца, \nРадость в душе их горит, радость в душе их горит.\n\nТихая ночь, дивная ночь! Глас с небес возвестил:\n«Радуйтесь! Ныне родился Христос, мир и спасение всем Он принёс, \nСвыше нас Свет посетил! Свыше нас Свет посетил!»\n\nТихая ночь, дивная ночь! К небу нас Бог призвал.\nО, да откроются наши сердца и да прославят Его все уста:\nОн нам Спасителя дал, Он нам Спасителя дал."}, {"id": 710, "title": "Придите к Младенцу, верные, с весельем,", "text": "Придите к Младенцу, верные, с весельем,\nПридите скорее к Нему в Вифлеем.\nЦарь вам родился, Царь всего творенья.\n\n    Придите поклониться! Придите поклониться! \n    Придите поклониться Господу!\n\nНебесные хоры, пойте с ликованьем,\nНебесные силы, звучите хвалой:\nСлава вовеки! Слава в вышних Богу!\n\nОтец наш, с молитвой мы к Тебе приходим,\nТебе честь и славу от сердца поём.\nВечное Слово явилось во плоти!"}, {"id": 711, "title": "Кто в убогих яслях спит? Чей Младенец там лежит?", "text": "Кто в убогих яслях спит? Чей Младенец там лежит?\nОн Господь, Христос Спаситель, Божий Сын, наш Избавитель.\n\n    Преклонившись перед Ним, Богу славу воздадим.\n\nКто толпе там говорит? Кто страдальцам мир дарит?\nКто же Он? К Кому несут всех больных, слепых ведут?\n\nКто там плачет и стоит на земле, где Лазарь спит?\nКто так радостно толпой встречен пеньем и хвалой?\n\nКто в саду, припав лицом, так взывает пред Отцом?\nВ теле чьём терзался дух посреди злодеев двух?\n\nКто воскрес, чтобы спасти и заблудших всех найти?\nКто над всей землёй царит и вселенную хранит?"}, {"id": 712, "title": "Радуйся, мир! Господь грядёт.", "text": "Радуйся, мир! Господь грядёт.\nЗемля ликуй пред Ним! Прими скорей Царя царей.\nИ пойте новый гимн (и пойте новый гимн), (2 раза)\nИ пойте, пойте новый гимн (и пойте новый гимн).\n\nРадуйся, мир! Христос пришёл.\nВ церквах поют о Нём. Поля, сады, леса, холмы \nИм вторят с торжеством (им вторят с торжеством),(2 раза) \nИм вторят, вторят с торжеством (им вторят с торжеством).\n\nЧтоб грех не ослеплял народ,\nЧтоб терны не росли, Он жизнь даёт, снимает гнёт \nВо всех концах земли (во всех концах земли),(2 раза)\nВо всех, во всех концах земли (во всех концах земли).\n\nПринёс Он мир и благодать,\nЧтоб все могли познать, как Бог велик и справедлив,\nКак нас Он возлюбил (как нас Он возлюбил),(2 раза)\nКак нас, как нас Он возлюбил (как нас Он возлюбил)"}, {"id": 713, "title": "Радостно славлю я Христа, славьте Иисуса все места!", "text": "Радостно славлю я Христа, славьте Иисуса все места! \n    Быв рождён, как дитя, был положен в ясли Он. \n    Радостно славлю я Христа, славьте Иисуса все места!\n\nЦарь Иисус в пещере кротко возлежал,\nПастухов и мудрецов к яслям привлекал.\n\nПастухи у ясель славили Творца,\nПусть теперь Ему поют всех людей сердца.\n\nМудрецы с дарами ко Христу пришли,\nПринесём Ему и мы все дары земли."}, {"id": 714, "title": "Пастухи в полях дремали, наступило рождество!", "text": "Пастухи в полях дремали, наступило рождество! \nПробудило мир печали неземное торжество.\n\n    Пели ангельские хоры, мир настигла неба весть, \n    И наполнила просторы всех волнующая песнь!\n\nМудрецы спешат с терпеньем за сияющей звездой;\nНам Христос принёс спасенье, грешник, радуйся и пой\n\nПоспешим скорей в пещеру, радость сердца принесём \nИ спасающею верой дар бессмертия возьмём."}, {"id": 715, "title": "В небе Вифлеема вот зажглась звезда,", "text": "В небе Вифлеема вот зажглась звезда,\nТам Дева Мария Сына родила,\nВ пелены повила, в ясли положила.\nВ этот мир Спаситель послан для людей.\n\nМиру Он родился, Человеком стал,\nО Христе-Младенце ангел возвещал.\nАнгелы явились, пастухи склонились,\nА волхвы с востока в Вифлеем спешат.\n\nВ небе засияла яркая звезда,\nИз страны далёкой мудрецов вела.\nПуть их был неблизкий, поклонившись низко, \nЗлато, ладан, смирну поднесли Христу.\n\nИрод, царь лукавый, сильно был смущён,\nЧто Иисус, Сын Божий, в этот мир рождён. \nВойско посылает, Вифлеем не знает,\nПриговор жестокий Ирода царя.\n\nАнгелом Иосиф был предупреждён,\nЧтоб с Новорождённым удалился он.\nВ дальнюю дорогу, повинуясь Богу,\nПоспешил Иосиф, чтоб спасти Дитя.\n\nПосмотри, Сын Божий, на детей Своих,\nТы - Спаситель мира, Царь небес, земли, \nНиспошли, Владыка, дар Твой превеликий. \nЧесть Тебе и слава, Всемогущий Бог!"}, {"id": 716, "title": "Далеко в Назаретской земле, в иудейской стране Палестине,", "text": "Далеко в Назаретской земле, в иудейской стране Палестине,\nБыл зажжён новой эры огонь с чудным приходом Божьего Сына.\n\n    Он родился в такую же ночь,\n    Только лишь без снегов и метели,\n    Чтобы страждущим душам помочь,\n    Чтобы счастье все люди имели.\n\nИ за эту дивную ночь мы приносим своё прославленье.\nЭта ночь нам явила Христа, эта ночь принесла нам спасенье.\n\nИ сейчас радость в наших сердцах.Кто поверил Ему без сомненья, \nТого научил Он любить, у кого мы учились терпенью."}, {"id": 717, "title": "Ангелы на небе радостно поют,", "text": "Ангелы на небе радостно поют,\nВесть благую людям в тёмный мир несут. \nГоры и долины вторят песне той...\nСлушайте весть ангельскую над землёй.\n\n    Пойте песню, что с небес пришла! \n    Славьте Божьи дивные дела! \n    Возвещайте милость вечного Отца, \n    Благодать Господню славьте без конца.\n\nПесню повторяйте, что несётся в даль, \nПеньем прогоняйте всякую печаль:\nНам рождён Спаситель! Радуйся, народ! \nМалый и великий пусть Ему поёт!\n\nСердцем торжествуйте, да звучит хвала! \nБожья милость дивно грешников спасла.\nВ мир явился Пастырь, верен Он Своим,\nВсё Ему подвластно, всё падёт пред Ним!"}, {"id": 718, "title": "Он рождён для нашего спасения, но, принесши миру благодать,", "text": "Он рождён для нашего спасения, но, принесши миру благодать, \nСам прошёл долиной унижения и за грешных должен был страдать.\n\nОн рождён, чтоб осчастливить каждого, кто узрит в Нём Бога своего, \nНо над Ним глумились мира граждане, даже и в отечестве Его.\n\nОн рождён, чтоб светоч благовестил засиял в греховной темноте, \nЧтобы и теперь на всяком месте мы возвещали людям о Христе.\n\nОн рождён, чтоб над земной планетою знамя Христианства водрузить. \nХристиане, слышите, поэтому нам должно страдать, терпеть, любить!"}, {"id": 719, "title": "Что за Дитя в хлеву чужом Мария охраняет?", "text": "Что за Дитя в хлеву чужом Мария охраняет?\nНебесный хор поёт о Нём, а пастухи внимают.\n\n    Сей есть Христос Господь, пришедший в мир с небес высот; \n    Он нам Всевышним дан, Спаситель, Сын Марии.\n\nЗачем же в яслях Он лежит, где овцам корм давали?\nЧтоб всякий мог у Его ног сложить свои печали.\n\nЕму в дар золото, ладан и смирну принесите -\nОн Царь царей, пред Ним скорей дверь сердца отворите."}, {"id": 720, "title": "Там над Вифлеемом зорька засияла,", "text": "Там над Вифлеемом зорька засияла,\n\n    Радуйтесь и ликуйте, люди (и ликуйте, люди)! \n    Божий Сын нам родился!\n\nО рождённом Сыне Божьем возвещала.\n\nСлово стало Плотью, мир наш посетило\n\nИ небесным светом души озарило.\n\nАнгельские хоры в небе воспевают,\n\nМир, благоволенье людям возвещают.\n\nПред Христом рождённым мы сердца склоняем\n\nИ за дар спасенья Бога прославляем!"}, {"id": 721, "title": "Радость мир объяла - Рождество настало!", "text": "Радость мир объяла - Рождество настало!\nОзарился светом ясным хлев с Младенцем в яслях.\n\nВ храм земной телесный Бог наш воплотился,\nТрон оставил Он небесный, в мире поселился.\n\nДивных гимнов звуки землю огласили:\nВсем народам весть благую с неба возвестили.\n\nПастухи с почтеньем и благоговеньем\nПред святым Дитём склонились, славя Божью милость.\n\nПред Новорождённым мы с хвалой предстанем,\nЛишь Его с благоговеньем прославлять мы станем!"}, {"id": 722, "title": "Бог предвечный в мир наш пришёл:", "text": "Бог предвечный в мир наш пришёл:\nДом оставил святой, чтобы каждый покой в Нём одном нашёл.\n\nОн родился в тихую ночь,\nИ весь мир этот злой озарил Он Собой, и ушла тьма прочь.\n\nОт Марии Царь наш рождён:\nЧудо то из чудес, дар спасенья с небес - я Христом прощён!\n\nО, Спаситель, Ты вечный свет!\nБудь же превознесён, ведь Тобою спасён я от многих бед!"}, {"id": 723, "title": "В эту ночь свершилось чудо из чудес:", "text": "В эту ночь свершилось чудо из чудес:\nИисус рожден! Спустился Бог с небес!\nАнгел с неба возвестил Благую Весть.\nВсе народы, славьте Господа чудес!\nОн родился в яслях, как дитя земли.\nВести ангельской о Рождестве внемли.\nПастухам явил Господь любовь Свою.\nВсе народы ныне радостно поют:\n\n    Аллилуйя! Царь рождён! К нам па землю послан Он, \n    Слава Богу в небесах, мир земле и мир в сердцах! \n    Аллилуйя! Честь вовек, чудный Богочеловек!\n    Будь прославлен, возвеличен, Царь царей (Царь царей), \n    Ты велик и Ты достоин славы всей!\n\nВ тишине ночной Младенец мирно спит;\nМать Мария нежно на Дитя глядит.\nЗвезды светят ярко для Царя царей:\nОн похож сейчас на всех земных детей.\nНо безмерно велика Христа любовь:\nОн прольёт за нас Свою святую Кровь!\nДля того теперь на землю снизошёл,\nЧтоб тебя спасти, чтоб ты Его нашёл.\n\nК Иисусу поспеши. Он зовёт, принеси в подарок сердце своё. \nСлавит вся земля Его, ведь сегодня Рождество! (3 раза)\n\nРождество Христа - начало всех начал,\nБог Спасителя для всех людей послал.\nЧтоб спасти весь мир, Он должен был прийти,\nЧтоб дорогу каждый смог к Нему найти.\nИ сегодня для Тебя родился Он,\nПоспеши к Нему. Спаситель восхвалён!\nОчень скоро Иисус опять придёт,\nИ тебя в Свою обитель Он возьмёт."}, {"id": 724, "title": "О, какой беспредельный, великий восторг!", "text": "О, какой беспредельный, великий восторг!\nБог греховные узы расторг \nИ, Голгофскою смертью разрушивши ад,\nИскупил Своих избранных чад!\n\n    В Нём, лишь в Нём, радость в Нём!\n    В Нём вечная жизнь и любви полнота, полнота (полнота)! \n    Все сердца да прославят Иисуса Христа!\n    Все сердца да прославят Христа (да, Христа)!\n\nВ завершенье Своих величайших трудов \nОн восстал из могильных оков;\nДа ликуют все люди и своды небес, - \nНаш Спаситель из гроба воскрес!\n\nВоскресенье Его - оправдание всех;\nВоскресеньем Его попран грех!\nВоскресенье Его - расторжение зла;\nПусть Спасителю льётся хвала!"}, {"id": 725, "title": "О, смерть! Где, скажи, твоё жало? О, ад! Где победа твоя?", "text": "О, смерть! Где, скажи, твоё жало? О, ад! Где победа твоя?\nВ воскресшем Христе засияло нам вечное солнце бытья.\n\n    Христос воскрес, чтоб грех угас,\n    Чтоб в людях мог Дух Божий жить.\n    Христос воскрес, чтоб мёртвых час \n    Из гроба к жизни воскресить.\n    Какая радостная весть! Какая радостная весть!\n    Христос воскрес! Христос воскрес! Хвала Ему и честь!\n\nСмотрите, над гробом был камень, но снят он, и ангел с небес \nВ том гробе сияет, как пламень: Иисуса там нет! Он воскрес!\n\nВоскрес Он, чтоб с сердца людского греховные камни снимать; \nВоскрес Он, чтоб Духа Святого, как ангела в гроб к нам послать.\n\nВоскрес Он, чтоб Царство спасенья над бездной греха основать, \nВоскрес Он, чтоб в день воскресенья искупленных в славе обнять."}, {"id": 726, "title": "Возлюбил людей Спаситель, в деле доказал:", "text": "Возлюбил людей Спаситель, в деле доказал:\nНа кресте святые руки каждый увидал.\nЗа тебя, меня страдая, умер Он, любя,\nКровь святую проливая, нам спасенье дал.\n\n    «Воистину воскрес!» - звучат слова.\n    Воистину воскрес Христос тогда!\n    Воистину живёт Христос всегда \n    В наших сердцах, в наших сердцах! (в сердцах!)\n\nВсё греховное отвергнув, принимай Христа,\nЕго руки полны счастья, их ищи всегда.\nЭто счастье, это радость - путь на небеса,\nВедь Христос воскрес из мёртвых, верим ты и я.\n\nИ хотя проходят годы, вдаль бегут века,\nНашей жизни дни немноги - выбирай Христа.\nИисус оставил путь Свой, по нему пойдём\nИ к небесному чертогу только с Ним дойдём."}, {"id": 727, "title": "О, Господь Иисус воскресший, просиявший торжеством,", "text": "О, Господь Иисус воскресший, просиявший торжеством, \nПлоть людей к Отцу вознёсший и прославленный Отцом! \nЯ счастливее Марии: я могу припасть к Тебе\nИ лобзать персты святые в чистой радостной мольбе.\n\n    Ты воскрес (Ты воскрес), Ты воскрес (Ты воскрес), \n    Слава вечная Тебе, слава вечная Тебе! Аминь!\n\nТы воскрес и цепи тленья силой вечною разбил,\nИ волной землетрясенья вызвал мёртвых из могил;\nТы воскрес и к жизни новой дух мой грешный воскресил, \nИ источник благ готовый для души моей открыл.\n\nЯ в Тебе ищу спасенье, оживи меня, Господь,\nЧтобы вечному забвенью не подверглись дух и плоть.\nО, явись же, Всемогущий, и сними следы могил,\nЧтоб без связи, дух гнетущей, я в Твоей свободе жил.\n\nДай, чтоб всё светлей сияла воскресения заря,\nЧтоб мой дух приготовляла к встрече Вышнего Царя; \nЧтоб бессмертьем в смертном теле я Тебе подобен стал \nИ Твои святые цели на земле осуществлял."}, {"id": 728, "title": "День хвалы и торжества! Христос воскрес!", "text": "День хвалы и торжества! Христос воскрес!\nХвалите все Творца чудес, провозгласите до небес:\nХристос воскрес! Христос воскрес!\n\nДень хвалы и торжества! Христос воскрес!\nНа всей земле туман исчез; проснись же, мир, греховный весь. \nХристос воскрес! Христос воскрес!\n\nДень хвалы и торжества! Христос воскрес!\nСпасенье нам пришло с небес, - какая радостная весть! \nХристос воскрес! Христос воскрес!\n\nДень хвалы и торжества! Христос воскрес!\nСвершилось чудо из чудес: Христос воистину воскрес!\nХристос воскрес! Христос воскрес!"}, {"id": 729, "title": "В вышине под небесами звонко льётся пенье, Господу хваленье.", "text": "В вышине под небесами звонко льётся пенье, Господу хваленье. \nАнгелы поют хорами в торжествующей хвале.\n\n    Пойте (пойте) Богу славы, восклицайте дружно Господу земли! \n    Пойте (пойте) Богу славы, пойте Господу земли!\n\nМилосердье возвещайте: Бог наш возлюбивший грешников погибших! \nВзор к Голгофе устремляйте, умер там за нас Христос.\n\nМуж скорбей за нас страдает, Он в венце терновом пред концом суровым. \nСмерть и власть греха свергает и страдальцам мир даёт.\n\nОн разрушил узы тленья и воскрес в день третий рано на рассвете. \nО, воспойте песнь хваленья, подарил нам жизнь Христос."}, {"id": 730, "title": "Очень рано на рассвете, с ароматами в руках", "text": "Очень рано на рассвете, с ароматами в руках\nЖёны веры, Божьи дети, шли ко гробу, сбросив страх.\n\n    Нет живого среди мёртвых, Иисус Христос воскрес! \n    Пусть Ему сердца охотно воспевают до небес!\n\nНо у гроба изумились, что Иисуса не нашли!\nАнгелы им вдруг явились: «Он воскрес!» - произнесли.\n\n«Вот и место, где лежал Он, - убеждали они жён, -\nПобедил Он смерти жало, и навеки воскрешён!»\n\nРадость славы просияла воскресением Христа,\nОна ныне мир объяла, осчастливила сердца."}, {"id": 731, "title": "Великий день Христова воскресенья!", "text": "Великий день Христова воскресенья!\nПришли мы к вам об этом рассказать,\nЧто этот день - великое знамение -\nНам говорит о жизни в небесах.\n\n    Христос воскрес! Ликуйте, все пароды. \n    Христос воскрес! Дорога в рай дана. \n    Христос воскрес! Поёт, цветёт природа. \n    Христос воскрес! Христу хвала!\n\nЗемлетрясеньем известилось чудо,\nУпали стражи, видя яркий свет.\nБез их стараний двери в гроб открыты.\nО, чудо! Чудо! Наш Христос воскрес!\n\nОн пострадал за наши все ошибки,\nСвоею кровию Он грех омыл, -\nОб этом в Библии даны отрывки.\nЗа всё, что сделал Он, благодарим!"}, {"id": 732, "title": "Идите, скажите Христовым друзьям:", "text": "Идите, скажите Христовым друзьям:\nВоскрес Он из гроба и нет Его там!\nЛюбимый Учитель придёт к ним опять,\nЧтоб радовать их и в любви наставлять.\n\n    Скажите: Сын Божий из мёртвых воскрес! \n    Скажите всем смертным: Сын Божий воскрес!\n\nИдите, несите ту весть и Петру,\nКто трижды отрёкся пред Ним поутру,\nКто стонет теперь от печали и слёз;\nСкажите: из мертвых воспрянул Христос!\n\nХоть ты малодушно Ему изменял,\nНе для осужденья тебя Он восстал;\nОн грех твой простил и навеки забыл,\nИ путь тебе к жизни блаженной открыл.\n\nНе для серафимов, любимцев Творца,\nНе для беспечальных, безгрешных людей -\nВоскрес Он, чтоб грешников скорбных сердца \nУвидели славу Его алтарей."}, {"id": 733, "title": "Не сказка это, не легенда древняя:", "text": "Не сказка это, не легенда древняя:\nИисус Христос был вознесён на крест,\nИ мёртвым был во гроб положен с древа Он,\nИ в третий день из мёртвых Он воскрес.\n\n    «Воистину воскрес!» сегодня слышится. \n    «Воскрес!» - нам говорит счастливый взгляд. \n    Повсюду нам любовь Господня видится.\n    «Воистину воскрес!» -уста твердят.\n\nСегодня праздник ближнему и дальнему.\nПусть слышится под сводами небес \nГорячее приветствие пасхальное:\n«Христос воскрес! Воистину воскрес!»\n\nНе скрыть, не удержать нам этой радости,\nМы торжествуем, мы поём сейчас.\nХристос воскрес! Вы вместе с нами радуйтесь, \nВоистину воскрес Он и для вас!"}, {"id": 734, "title": "Воскресшему служу я! Он с нами во все дни.", "text": "Воскресшему служу я! Он с нами во все дни.\nСвою любовь даруя, меня Он возродил.\nЕго я вижу руку, Его я слышу глас,\nИ в тьме ночной Он со мной во всякий час.\n\n    Он жив! Он жив! Христос вовек живёт,\n    Идёт со мной, даёт покой, ведёт меня вперёд.\n    Он жив! Он жив! Спасенье совершил!\n    Хотите ль знать, живёт Он где? Живёт Он и во мне!\n\nВокруг себя я вижу Господню доброту,\nЧем скорби ко мне ближе, тем ближе я к Христу.\nЧрез бури и смятенья в небесный Дом ведёт \nИ в славный час Он всех нас к Себе возьмёт.\n\nЛикуйте, христиане, возвысьте голос свой,\nПред Господом предстанем с весельем и хвалой.\nНадежда удручённых, опора в час невзгод,\nНам жизнь дарит и хранит Христос Господь!"}, {"id": 735, "title": "Он жив! (Он жив!) (2 раза) Собой Он смерть попрал.", "text": "Он жив! (Он жив!) (2 раза) Собой Он смерть попрал.\n    Он жив! (Он жив!) (2 раза) Господь всех сил восстал. \n    Он жив! (Он жив!) (2 раза) Сияньем окружён,\n    Ведёт пас к вечной жизни Он.\n\nЕго злодеев руки на древо вознесли;\nЕму страданья, муки грехом мы нанесли.\nКровавый пот струился в борьбе с Его чела,\nСвершил Он труд, Ему хвала!\n\nПросил Иосиф тело и снял Его с креста,\nПогрёб без страха, смело в саду своём Христа,\nНо солнце лишь блеснуло - и мрака больше нет.\nГосподь сказал: «Да будет свет!»\n\nС зарёй на гроб явилась Мария, жёны с ней,\nПридя туда, смутилась, сказал там ангел ей:\n«Пойдите, всем скажите: из мёртвых Он воскрес \nИ радость вечную принёс!»\n\nМария тут в волненье душой своей скорбит;\nВдруг видит в изумленье: Господь пред ней стоит.\nОна Ему в восторге «Учитель!» говорит\nИ возвещать о Нём спешит."}, {"id": 736, "title": "Христос воскрес! (Христос воскрес!)", "text": "Христос воскрес! (Христос воскрес!)\n\nВесны дыханье о Нём вещает нам опять,\nЗовёт и нас Его созданье Творца всей жизнью прославлять!\n\nИ птичьи хоры хвалу Воскресшему несут\nИ нас на братские фаворы к единству в Господе зовут.\n\nИ дождь весенний твердит нам каплями без слов:\n«Живите дружно, без сомнений, бессмертна Божия любовь!»\n\nНебес просторы своей лазурью говорят:\n«Забудьте, люди, гнев и споры. Пусть каждый шаг наш будет свят!»\n\nСказали тоже цветы весенние всем нам:\n«Христос для нас всего дороже, Ему несите фимиам!»\n\nНам шепчут горы и в даль бегущий ручеёк:\n«К делам священным будьте скоры, приход Господень недалёк!»"}, {"id": 737, "title": "У пещеры стоит в печали, тихо плачет одна душа,", "text": "У пещеры стоит в печали, тихо плачет одна душа,\nА у гроба отвален камень, и исчезло Тело Христа.\nНо вот ангел предстал перед нею: «Ты во гробе Его не ищи, \nОн воскрес, ты иди поскорее, весть благую друзьям принеси».\n\n    Воскресение Христово - это чудо из чудес!\n    Воскресение Христово нам открыло двери небес.\n    Воскресение Христово - в нём спасенье твоей души.\n    Так прими же это слово и к Иисусу поспеши (поспеши).\n\nВсё ликует: моря и суша, Богу славу поют, Творцу.\nЗа святое рождение свыше, люди, пойте хвалу Отцу.\nОн дарует любовь без меры, исцеляет наши сердца,\nИ когда говоришь Ему «верю!», торжествуя, поют небеса."}, {"id": 738, "title": "Прекрасен, как солнце, восторг наш сердечный:", "text": "Прекрасен, как солнце, восторг наш сердечный: \nВоскрес наш Спаситель, Сын Божий предвечный\n\n    Об этом слагаем мы гимны и песни.\n    О спящий духовно, ты ныне воскресни!\n\nОт жизни греховной, безрадостной прежде, \nВоскресни, чтоб жить и в любви, и в надежде.\n\nДа стихнет неверия грозная вьюга: \nПриветствуйте, братья и сёстры, друг друга!"}, {"id": 739, "title": "Во гробе Он лежал, Иисус Спаситель,", "text": "Во гробе Он лежал, Иисус Спаситель,\nДня славы ожидал Иисус Господь!\n\n    Из гроба Он восстал (Он восстал),\n    И все силы вражьи Он попрал (Он попрал),\n    Он воскрес, над тьмой победу одержал \n    И с Ним вечно царствовать Своих призвал.\n    Он воскрес! (Он воскрес!) Он воскрес! (Он воскрес!) \n    Аллилуйя, Он воскрес!\n\nНапрасно стерегут, - Иисус Спаситель!\nТщетно печать кладут, - Иисус Господь!\n\nСмерть побеждается, - Иисус Спаситель!\nПлен расторгается, - Иисус Господь!"}, {"id": 740, "title": "Казнили Христа и в скале погребли -", "text": "Казнили Христа и в скале погребли -\nТо сердце вселенной в пещере земли \nЗаковано было, но свет воссиял:\nСын Божий нетленный из гроба восстал!\n\n    Свет воскресения Спасителя не скрыть. \n    Да, Он воскрес! Христос воистину воскрес! \n    Свидетели тому земля и мир небес. \n    Христос воскрес! (Христос воскрес!) \n    Христос воскрес! (Христос воскрес!) \n    Христос воистину воскрес!\n\nПронзённое сердце смертельной стрелой \nПомеркло на время, а утром живой \nСпаситель, воскресший, из гроба восстал!\nОн жертвой Своей нам спасение дал.\n\nГолгофская Кровь искупила людей,\nСпешите, о люди, к Иисусу скорей.\nВоскресшие в Господе к жизни святой \nНесут весть благую спасённой душой."}, {"id": 741, "title": "Я верю, мой Бог, мой Создатель всесильный,", "text": "Я верю, мой Бог, мой Создатель всесильный, \nЧто истинно Сын Твой из гроба восстал.\nСвоею рукою, десницею сильной,\nЕго воскресил и жизнь дал.\n\n    Я верю, что есть во Христе воскресенье!\n    Я верю, что есть в Нём нетленная жизнь! \n    Ему приношу честь и благодаренье,\n    Душою стремлюсь в Его высь.\n\nЯ верю, что там за безоблачным небом \nСидит Он теперь одесную Отца,\nТот Вечный, Единый, что стал жизни хлебом.\nЯ верю, Спаситель, Тебе.\n\nЯ верю, и Он помогает мне верить,\nЧто встречусь я с Ним там, на глади небес. \nПронзённые руки откроют мне двери \nВ страну, где есть радость чудес."}, {"id": 742, "title": "О том возрадуйтесь, друзья Христовы,", "text": "О том возрадуйтесь, друзья Христовы,\nЧто Иисус Своими вас назвал.\nХристос воскрес, и смертные оковы \nСвоею смертью ваши Он порвал.\n\nКакая честь и царственное званье \nНам во Христе на небе суждено!\nЗа Кровь Его, за смерть и за страданье \nДля нас оно Христом обретено.\n\nЧто может быть с той радостью сравнимо, \nЧто нас вручил Спасителю Отец?\nВ руках Его могучих мы хранимы,\nИ Пастырь знает нас, Своих овец.\n\nБез воли Бога не падёт на землю \nНи один волос с нашей головы;\nИз рук Отца небесного приемлю \nЯ все дары Его ко мне любви.\n\nВот облако свидетелей пред нами\nНас ожидает встретить со Христом;\nОн нас украсит славными венцами,\nНаш Иисус, вослед за Ним пойдём!"}, {"id": 743, "title": "Свершилось чудо воскресенья, ниц пала стража, видя свет (видя свет),", "text": "Свершилось чудо воскресенья, ниц пала стража, видя свет (видя свет), \nЗемля дрожала в те мгновенья, и нет Христа во гробе, нет. \nОткрыты Им все двери рая, и смерти власть побеждена;\nИ разнеслась та весть благая: Христос воскрес! Нам жизнь дана!\n\nХристос воскрес! - Как эхо грома звучит в пустыне и в горах (и в горах),\nНесётся с дивных мест Сиона и отзывается в сердцах.\nХристос воскрес! Воскресни, Слово, и наши души оживи!\nПусть будут все сердца готовы принять завет Его любви.\n\nСвоей божественною Кровью грехи Он наши искупил (искупил)\nИ всепрощающей любовью нам Царство вечное открыл.\nИ в этот день, друзья и братья, на радостный призыв небес \nОткроем с радостью объятья: Христос воистину воскрес!"}, {"id": 744, "title": "Возрадуйтесь же, люди, Христос воскрес, воскрес", "text": "Возрадуйтесь же, люди, Христос воскрес, воскрес\nЛетит пусть эта песня до самых до небес!\nЕё живые звуки звучат и там, и здесь.\nЛикуйте вместе с нами, Христос воскрес!\n\n    Арфы золотые не смолкнут, нет!\n    Он восстал из мрака, явил нам свет,\n    Нашего спасенья зажёг звезду.\n    Слава, аллилуйя, хвала Христу!\n\nВ борьбе со мраком ада Он вышел, победил. \nГреховные преграды Христос наш сокрушил. \nЗарёю воскресенья мир грешный озарён.\nХристу благодаренье и наш поклон."}, {"id": 745, "title": "Обвитый чистой плащаницей, Сын Божий, снятый со креста,", "text": "Обвитый чистой плащаницей, Сын Божий, снятый со креста, \nБыл погребён и пред гробницей, была положена плита.\n\nНо не утихли гнев и злоба Его врагов: Он может встать.\nИз страха их у двери гроба была положена печать.\n\nМинула ночь. Поутру рано к могиле женщины спешат,\nА там в одежде легкотканной два светлых ангела сидят.\n\nПечать отпала от гробницы, поверглась на землю плита,\nВ гробу нет больше плащаницы, нет в нём лежащего Христа.\n\nОни глядят в недоуменье: куда Учитель их исчез?\nИ слышат слово утешенья: «Кого вы ищите - воскрес!»\n\nИ жёны, радостью объяты, бегут к апостолам Его \nБлаговестить, что Бог распятый восстал из гроба Своего."}, {"id": 746, "title": "Христа, Творца святых чудес, прославьте все сердечным пеньем!", "text": "Христа, Творца святых чудес, прославьте все сердечным пеньем! \nЛикуйте с радостным хваленьем: Христос воскрес! Христос воскрес!\n\nКакой восторг - Христос воскрес! В груди весельем сердце бьётся, \nИ всюду песнь теперь поётся: Христос воскрес! Христос воскрес!\n\nПо всей вселенной до небес хвала из уст народа льётся,\nИ песнь восторженно поётся: Христос воскрес! Христос воскрес!\n\nТебе, Спаситель, Божий Сын, Тебе и слава, и хваленье,\nВеличье, честь и поклоненье во веки вечные! Аминь!"}, {"id": 747, "title": "Христос воскрес из мёртвых, смертию смерть попрал", "text": "Христос воскрес из мёртвых, смертию смерть попрал \nИ сущим во гробах жизнь даровал. (3 раза)"}, {"id": 748, "title": "Я знаю, жив мой Искупитель,", "text": "Я знаю, жив мой Искупитель,\nИ Он стоит (и Он стоит) невдалеке (невдалеке);\nОн мой Господь и Вседержитель, миров судьба в Его руке.\n\n    Я знаю, жив (я знаю, жив) Воскресший чудно,\n    К Его ногам (к Его ногам) враги падут.\n    Я знаю, жизнь (я знаю, жизнь) даёт Он людям,\n    В Его руке и власть, и суд.\n\nЯ знаю, твёрдо обещанье:\nЧто Он сказал (что Он сказал), то совершит (то совершит);\nНе устрашат меня страданья, путь к небесам Христом открыт!\n\nЯ знаю, место мне готово,\nГде ночи нет (где ночи нет), где нет забот (где нет забот); \nТеперь живу под Его кровом, и Он меня к Себе возьмёт."}, {"id": 749, "title": "Предвечный Дух! Приди и свет любви излей,", "text": "Предвечный Дух! Приди и свет любви излей,\nИ царство правды утверди среди Твоих детей.\n\nДай чувствовать, что в нас, что с нами вечно Ты,\nЧто близок Ты и в светлый час, и в пору темноты.\n\nДай глубже нам познать премудрость слов Твоих! \nУчи Твой голос различать средь голосов иных!\n\nУчи нас отражать соблазны благ земных \nИ благо душ учи искать в велениях Твоих!\n\nДай счастье ощущать в страданьях за Тебя,\nКак славу, крест Твой принимать и петь Тебе, скорбя\n\nПредвечный Дух, приди!"}, {"id": 750, "title": "Дух Святой, зовём смиренно: души светом озари.", "text": "Дух Святой, зовём смиренно: души светом озари.\nТы сиял средь тьмы вселенной прежде солнца и зари,\nТы творил, и в нашем сердце Сам обитель сотвори \nИ огнём живительным гори.\n\n    Огонь небесный, сойди скорей \n    И теплотою Своей согрей.\n    Дорогой трудной к Отчизне чудной \n    Мы пойдём уверенней, бодрей.\n\nДух Святой, о Гость небесный, Ты доступен, близок стал. \nИскупивший смертью крестной Твой приход пообещал. \nСокруши греха твердыню, мощь разбей греховных скал, \nЧтоб о Боге каждый услыхал.\n\nДух Святой, вовеки сущий, души силой наполняй, \nТеплотой, Тебе присущей, дело Церкви созидай.\nЦарствуй в наших помышленьях, обличай и утешай, \nПробуди родной уснувший край."}, {"id": 751, "title": "О Дух Святой, Тебя умоляем: «Благослови и силу излей».", "text": "О Дух Святой, Тебя умоляем: «Благослови и силу излей».\nПеред Тобою сердце склоняем, нас не оставь, любовью согрей.\n\n    Молим Тебя (молим Тебя), Господь Всемогущий,\n    Духом Святым (Духом Святым) повей Ты на нас.\n    Ты знаешь всё (Ты знаешь всё), Ты Бог Вездесущий, \n    Благослови (благослови) нас всех в этот час.\n\nО Дух Святой, Ты всё наполняешь, счастье и радость душам даёшь, \nПуть наш во мраке Сам освещаешь и в Дом Отца на небо ведёшь.\n\nО Дух Святой, Ты светом небесным путь на Голгофу нам озарил. \nТам наш Спаситель подвигом крестным двери спасенья грешным открыл."}, {"id": 752, "title": "Боже, коснись меня Духом, силою облеки,", "text": "Боже, коснись меня Духом, силою облеки,\nВ скорби дай терпенье, в истине утверди.\nВсё озари Своим светом: помыслы и пути;\nВечные заветы в сердце запечатли.\n\nСлово любви и прощенья дай мне услышать вновь. \nДарит очищенье Агнца Святого Кровь.\nСердца коснись, о Дух Божий, и освяти Собой, \nВсех наград дороже дар благодатный Твой.\n\nО Утешитель скорбящих, благостный Дух Святой, \nМолим, ниспошли нам мир, тишину, покой.\nПусть воцарится навеки Божьей любви закон, \nПусть польются реки светлой воды живой."}, {"id": 753, "title": "Пустыней знойною, бесплодною иду я узкою тропой.", "text": "Пустыней знойною, бесплодною иду я узкою тропой.\nУж близко, близко моя Родина. Меня проводит Дух Святой.\n\nИ если солнце в горы скроется, и день и ночь покроет тьмой, \nВокруг всё мглой густой покроется, - мне путь осветит Дух Святой!\n\nКогда враги толпою грозною меня окружат, как стеной,\nВ лицо мне смерть дохнёт угрозою, победу даст мне Дух Святой!\n\nКогда в пути к небесной Родине родным я стану как чужой,\nИ если все друзья изменят мне, - мне не изменит Дух Святой!\n\nКогда же всё, что здесь имею я, отнимет смерть своей рукой, \nНаследьем тела станет тление, со мной пребудет Дух Святой"}, {"id": 754, "title": "Словом жизни, Господи, о, оживи меня.", "text": "Словом жизни, Господи, о, оживи меня.\nДух Святой, Утешитель, открой во мне Христа, \nПо пути к Отчизне Ты веди меня, любя;\nС верой полагаюсь я всецело на Тебя.\n\n    О, Отец (2 раза) Сына в мир послал!\n    Иисус (2 раза) жизнь за нас отдал!\n    Дух Святой (2 раза) дал сердцам покой!\n\nДух Святой, прошу, приди в смиренные сердца. \nО, прошу, покрой меня теплом любви Отца. \nУдали сомнения и всякий грех и страх;\nИ душе напомни о священных небесах.\n\nЯ хочу с Тобою слиться и дышать Тобой!\nТы освобождаешь и даёшь душе покой, \nСвятостью окружишь и осветишь путь земной, \nЦарствовать на небе буду вечно я с Тобой."}, {"id": 755, "title": "Отец и Сын, и Дух Святой, Святая Троица,", "text": "Отец и Сын, и Дух Святой, Святая Троица,\nПризри с небес к стране земной, народ Твой молится.\n\n    Тебе мы молимся, о Дух Святой!\n    Тебя мы славим в этот час, Святая Троица!\n    Дай силы верными быть до конца,\n    Хоть мало силы есть у нас, но Церковь строится.\n\nТы силу в Церкви прояви, как в дни начальные,\nИ радостью благослови сердца печальные.\n\nПусть истина чрез Твой народ другим откроется!\nИ к вечной славе средь невзгод веди нас, Троица."}, {"id": 756, "title": "Повей, Дух Божий, вновь, открой источник благ,", "text": "Повей, Дух Божий, вновь, открой источник благ,\nЧтоб проявлял Твою любовь во всех моих делах.\n\nПовей, Дух Божий, вновь и сердце так очисть,\nЧтоб чистой стала, словно снег, моя земная жизнь.\n\nПовей, Дух Божий, вновь, чтоб в этом мире злом \nЯ был всегда, везде готов гореть Твоим огнём.\n\nПовей, Дух Божий, вновь, чтоб смерти я не знал,\nА здесь и там вовек веков Иисуса прославлял. Аминь."}, {"id": 757, "title": "Когда Божий Дух наполняет меня, пою я, как Давид!", "text": "Когда Божий Дух наполняет меня, пою я, как Давид! \nКогда Божий Дух наполняет меня, пою я, как Давид! \nПою я, пою я, пою я, как Давид! (2 раза)\n\nКогда Божий Дух наполняет меня, молюсь я, как Давид! \nКогда Божий Дух наполняет меня, молюсь я, как Давид!\n Молюсь я, молюсь я, молюсь я, как Давид! (2 раза)\n\nКогда Божий Дух наполняет меня, я плачу, как Давид! \nКогда Божий Дух наполняет меня, я плачу, как Давид!\nЯ плачу, я плачу, я плачу, как Давид! (2 раза)\n\nКогда Божий Дух наполняет меня, пою я, как Давид! \nКогда Божий Дух наполняет меня, пою я, как Давид! \nПою я, молюсь я и плачу, как Давид! (2 раза)"}, {"id": 758, "title": "Мы - храм Святого Духа! - так Слово говорит (говорит),", "text": "Мы - храм Святого Духа! - так Слово говорит (говорит),\nИ радостно для слуха оно в сердцах звучит (звучит).\nНе на словах, на деле дай храмом быть Твоим,\nЧтоб люди разумели, как полн любви Ты к нам (2 раза).\n\n\nЧтоб мог Ты жить в жилище, дай сердцу чистоту (чистоту);\n Чтоб делался я чище, влеки меня к кресту (к кресту).\nДай, чтоб всегда во храме светильник Твой сиял,\nЧтоб мир с его грехами сердец не соблазнял (2 раза).\n\nДай, чтоб всегда во храме был жертвенник святой (святой), \nЧтоб возносил с дарами к Тебе порыв я свой (я свой).\nДай, чтоб всегда во храме курился фимиам,\nЧтоб с пеньем и мольбами он нёсся к небесам (2 раза)."}, {"id": 759, "title": "Милости просим, Отец наш Небесный! Ты нам открыл вечной жизни исток", "text": "Милости просим, Отец наш Небесный! Ты нам открыл вечной жизни исток \nИ озарил светом Правды чудесной! Дай же войти в Твоей силы поток!\n\n    Дух Святой, Животворящий, обними сердца,\n    Жаждущие да напьются. Пусть течёт Твоя река.\n\nИстины Слово рождает пусть веру, чтоб исцелились больные сердца. \nИ да увидит сегодня Голгофу тот, кто не видел её никогда.\n\nКровь Твоя, Пастырь наш Добрый, святая, да отделит нас от зла и греха; \nНежность Твоя и любовь неземная пусть наполняют умы и сердца."}, {"id": 760, "title": "Дух Святой! Тобой как силой я стремился обладать.", "text": "Дух Святой! Тобой как силой я стремился обладать. \nСердце жаждало, просило, как подарок, благодать;\n\nНо моленья были тщетны, я, как прежде, беден был,\nИ тогда, как друг заветный, Ты со мной заговорил:\n\n«Я един с Отцом и Сыном, Я твоей души Творец.\nКто же будет властелином: Я иль ты, земной гордец?\n\nПробудись же в раскаянье и, смирясь, молись опять,\nЧтоб твой Царь, придя в сиянье, мог тобою обладать».\n\nИ в груди зажёгся пламень: пал я, с трепетом дыша,\nИ растаял в сердце камень - ожила моя душа!\n\nЯ всего себя всецело, Дух предвечный, отдаю,\nБудь царём души и тела, утверди в них власть Свою.\n\nИ Дух вечный в те мгновенья светлый лик мне Свой явил, \nИ Он снял венок мученья, радость в сердце мне вселил.\n\nИ с тех пор Он помогает мне, как Друг, в беде земной,\nА в печали подкрепляет, как Утешитель благой.\n\nКак Учитель, наставляет Он на истину меня,\nКак Хранитель, избавляет от греховного огня.\n\nЕсли враг мой наступает, Он приходит в тот же миг, \nСилой дух мой исполняет для побед Его святых."}, {"id": 761, "title": "Дух свободы! Цепи тленья Сам разбей в сердцах людских!", "text": "Дух свободы! Цепи тленья Сам разбей в сердцах людских! \nДай, чтоб дух усыновленья в детях возрастал Твоих!\nДух, что в день пятидесятый на Апостолов сошёл \nПолнотой даров богатый, сотвори в нас Свой престол!\n\nДух Утешитель! Скорбящим утешение пошли,\nПомоги Твой труд творящим утешать сынов земли.\nДай дары нам врачеваний, дар пророческих речей;\nНо, что больше всех даяний - дай нам дар любви Твоей!\n\nТы на верных изливаешь благодать на благодать,\nТы в нас Церковь созидаешь, Ты в ней хочешь мир объять. \nДух! В любви Отца и Сына ветви Церкви оживи,\nДа сольются все в едино в вечном подвиге любви!"}, {"id": 762, "title": "На Христа Ты, как голубь, смиренно сошёл,", "text": "На Христа Ты, как голубь, смиренно сошёл,\nЯвным стал для людей неба Житель.\nВ тихом веянье мне так с Тобой хорошо,\nДух Святой, нежный мой Утешитель. (2 раза)\n\nТы Апостолов силой великой облёк,\nВсех исполнив огнём вдохновенья;\nИмя новое гордому Савлу нарёк,\nПроведя через школу смиренья. (2 раза)\n\nДух Святой, на Голгофу Ты мне указал,\nГде текла за меня Кровь святая;\nЖизнь с избытком мне там Иисус даровал, \nОтворив предо мной двери рая. (2 раза)\n\nНесравненный Учитель, Наставник Ты мой, \nТы источник познанья и силы.\nЯ вверяю себя лишь Тебе, Дух Святой.\nО, пребудь же со мной до могилы! (2 раза)"}, {"id": 763, "title": "Дух Святой, приди к нам, душу успокой,", "text": "Дух Святой, приди к нам, душу успокой, \nНовое единство меж людей устрой \nИ свободу духа слабым людям дай,\nИстиною Слова нас Ты ободряй.\n\nВзятых в плен тоскою Ты освободи, \nСмелостью Своею слабых награди.\nИз семян надежды вырастить цветы\nС чашей благодати нам поможешь Ты.\n\nЧтобы взгляд поникший вдруг подняться смог \nИ на старом древе вырос бы росток,\nДух Святой, приди к нам, с нами поселись\nИ в пустыне скудной новую дай жизнь!"}, {"id": 764, "title": "Не расскажет ручей говорливый никому моей тайны святой,", "text": "Не расскажет ручей говорливый никому моей тайны святой,\nПо лесам и полям молчаливым пробежит он холодной струёй.\n\nНе расскажет, что волны слыхали мою тайну смиренной души, \nКогда тело моё погружали при крещенье в полдневной тиши.\n\nКак в прозрачных волнах на мгновенье моё тело покрылось водой: \nПринимал я святое крещенье, заключил завет с Богом святой.\n\nЯ от зла и греха отрекался, обет Богу в крещенье давал,\nЖить во славу Христа обещался, я душой во Христе ликовал.\n\nИ молитве священной внимая, что неслась от воды к небесам, \nМиром душу мою оживляя, благодать Бог мне в сердце послал.\n\nТот поток был свидетель безмолвный моей тайны великой, святой, \nКогда чистые, светлые волны над моею прошли головой."}, {"id": 765, "title": "Мы хотим с вами быть на небесных высотах,", "text": "Мы хотим с вами быть на небесных высотах,\nБерегите наряд белоснежный вы свой.\nМы хотим видеть вас и не только сегодня, -\nМы хотим видеть вас и на браке Христа в день святой.\n\nМы хотим с вами быть на небесных высотах,\nВидеть ваши венцы из нетленных цветов.\nМы хотим видеть там ваш наряд из виссона.\nБерегите, храните, несите чрез жизнь вы свет свой.\n\nМы хотим с вами быть на небесных высотах,\nБерегите наряд белоснежный вы свой.\nБерегите ту жизнь, что дана вам сегодня,\nВо все дни вашей жизни хвалите Христа всей душой."}, {"id": 766, "title": "Веры путь для вас предназначен, день завета - служенья начало.", "text": "Веры путь для вас предназначен, день завета - служенья начало. \nМы желаем, друзья, вам удачи и в великом деле, и в малом.\nЧтобы светом небес лучистых озарялась ваша дорога,\nСердцем жаждущим, искренним, чистым вы ищите близости с Богом.\n\nНа дороге ужасов тени не однажды душа ваша встретит,\nНо почаще склоняйте колени - и Господь на зов ваш ответит.\nЕсли ветер поднимет волны - успокоить Бог силен море,\nВы на волны смотрите спокойно, с вами Он и в скорбях, и в горе.\n\nМы желаем всем вам удачи, будьте святы и слове, и в деле.\nВы живите лишь с Ним, не иначе, чтоб достигнуть верной вам цели. \nЧтобы светом небес лучистых озарялась ваша дорога,\nСердцем жаждущим, искренним, чистым вы ищите близости с Богом. \nЕсли ветер поднимет волны - успокоить Бог силен море,\nВы на волны смотрите спокойно, с вами Он и в скорбях, и в горе"}, {"id": 767, "title": "Все вы, во Христа крестившиеся,", "text": "Все вы, во Христа крестившиеся,\nВо Христа облеклись. Аллилуйя!"}, {"id": 768, "title": "Господь, когда ученикам Ты смерть Свою явил,", "text": "Господь, когда ученикам Ты смерть Свою явил,\nТогда с любовью, как друзьям, взяв хлеб, благословил.\n\nИ, преломив, им всем раздал и им слова сказал:\n«Друзья, примите, ешьте все, то Тело есть Моё!»\n\nЗатем с вином Ты чашу взял, им дал, о ней моля:\n«Сия есть Кровь Моя, - сказал, - все пейте из нея!\n\nВот Новый Мой Завет в Крови, Я вам, друзья, даю!\nСие всегда творите вы, смерть вспомните Мою!»\n\nО, дай же Кровь Твою, Господь, пролитую за нас,\nТвою истерзанную плоть нам вспомнить в этот час.\n\nИ дай, Господь, всегда во всём нам мыслить лишь о том, \nКак много Ты за нас страдал, как тяжко умирал."}, {"id": 769, "title": "Вот подносят к тебе полной чашей вино, трепет тело твоё наполняет,", "text": "Вот подносят к тебе полной чашей вино, трепет тело твоё наполняет, \nИбо символ Крови Иисуса оно - с этой чаши пусть все испивают. \nОсторожно бери! Вспомни Кровь со креста, что стекала с Пречистого Тела. \nЭто право на жизнь от Иисуса Христа, чтоб душа твоя счастье имела.\n\nВспомни жертву пречистой Христовой Крови, что тебя от греха искупила, \nЭто доля великой Господней любви: в этой чаше и радость, и сила. \nТы берёшь, и Господь освящает тебя, чтобы стал ты причастником жизни. \nОцени же Голгофскую жертву Христа ещё здесь на пути до Отчизны.\n\nТы берёшь в руки чашу - на миг задержись и прими её с благоговеньем. \nВ этой чаше твои и спасенье, и жизнь, в Крови Сына твоё искупленье. \nТы омыт от грехов и очищен сполна драгоценною Кровью Господней. \nВ недостойных руках да не будет она, то Святыня для нас всех сегодня.\n\nНа Голгофу смотри, там стекала ручьём кровь во имя спасенья людского. \nИ в руках у тебя эта чаша с вином, помни кровь жертвы Агнца Святого. \nЗа тебя пролилась она каплями там, в ней ручей, что смывает сомненья.\n У Голгофы начало для всех христиан, у Голгофы начало спасенья. \nОсторожно бери! Вспомни Кровь со креста, что стекала с Пречистого Тела. \nЭто право на жизнь от Иисуса Христа, чтоб душа твоя счастье имела."}, {"id": 770, "title": "Ручьём святая Кровь течёт в омытие грехов;", "text": "Ручьём святая Кровь течёт в омытие грехов;\nПокой в нём страждущий найдёт и отдых от трудов.\n\nИисуса Кровь с креста текла, с Его чела, с ланит;\nЯ был в пороках без числа, но ею я омыт.\n\nРазбойник на кресте нашёл тот чудный ключ святой, \nОмытый Им, и он обрёл своей душе покой.\n\nКогда Крови Его струя проникла в сердце мне,\nВновь ожила душа моя в небесной белизне.\n\nОт Господа я был далёк, блуждал в земных путях;\nНо Он меня к Себе привлёк, и я в Его руках.\n\nИ если в немощи я вновь Иисуса огорчу,\nЯ знаю, что святая Кровь сотрёт вину мою."}, {"id": 771, "title": "Здесь мы слышим голос Бога: «Зёрен много - хлеб один,", "text": "Здесь мы слышим голос Бога: «Зёрен много - хлеб один, \nОдна чаша - капель много, вы одно, как Я один».\n\nЧленов много - одно Тело, и едина благодать;\nДай единство Церкви целой нам сегодня ощущать!\n\nВзор наш мир весь облетает через земли и моря \nИ повсюду наблюдает, как Твоим огнём горя,\n\nТвои дети прославляют Твою вечную любовь \nИ погибшим возвещают искупительную Кровь.\n\nВидим мы Тебе поющих, славящих Тебя в делах,\nКрест Твой радостно несущих и в довольстве, и в скорбях,\n\nИ в восторге воспеваем: «Боже, с ними мы одно!» -\nИ Тебя мы восхваляем за единство, что дано.\n\nКровь Твоя соединяет всех разрозненных землёй;\nДух наш выше воспаряет: видим город Твой святой, -\n\nГород радостный небесный, Твой сияющий Сион,\nИ собор в Тебе всеместный торжествующих имён.\n\nЦерковь в радости блаженства, Церковь первенцев святых, \nВ Нём достигших совершенства, сонмы там; мы видим их,\n\nИ светлее льётся пенье: «Ведь и с ними мы одно:\nКровь Твоя, Кровь искупленья, съединила нас давно!»"}, {"id": 772, "title": "Знаешь ли подвиг Иисуса? Знаешь ли ужас креста?", "text": "Знаешь ли подвиг Иисуса? Знаешь ли ужас креста?\nСлёзы из глаз моих льются, вспомню лишь раны Христа.\nО, как над Ним издевались, как заушали Его!\nГвозди так жадно впивались в тело святое Его! (2 раза)\n\nОгненно-красной струёю Кровь истекала из ран,\nА над притихшей землёю ночи клубился туман...\nВ нём от людей притаился лев беззакония сам,\nО, как в Страдальца он впился, к смертным прильнувши крестам. (2 раза)\n\nГорькими плачу слезами, вспомнив о том, как смотрел \nВ мир состраданья глазами Тот, Кто за грешных терпел;\nКак, умирая, молился за распинавших Его,\nКак беспредельно томился в муках конца Своего. (2 раза)\n\nО, посмотри на Иисуса! Взор свой направь на Христа.\nСнова слезами зальюсь я, вспомнив о жертве креста.\nНо понапрасну ликуют тёмные силы врагов,\nРано они торжествуют, смертный соткавши покров. (2 раза)\n\nВзглянь на зарю воскресенья, гимнам хваленья внемли!\nВидишь, выходит из тленья Чудный Спаситель земли.\nЗлобой немой задыхаясь, лев поражённый лежит.\nК овцам любимым склоняясь, Пастырь Собой их хранит. (2 раза)"}, {"id": 773, "title": "Знаешь ли ручей, что бежит со креста, где умер Христос?", "text": "Знаешь ли ручей, что бежит со креста, где умер Христос?\nЗнаешь ли Того, Кто дарит выкуп от страданий и слёз?\n\n    Хоть как пурпур грех мой плотской, хоть вина горы тяжелей, \n    Кровь Христа стекает струёй, ей я сделан снега белей.\n\nПозабытый вечным Отцом, Кровь Свою Христос проливал;\nНа кресте с терновым венцом не напрасно Он пострадал.\n\nЯ пришёл на призыв Христа, Он источник жизни моей,\nВ Нём спасенья вся полнота, Им я сделан снега белей.\n\nСлабый и усталый мой дух мира, счастья долго искал,\nКак к овце заблудшей пастух, мой Господь пришёл и мир дал.\n\nДухом я люблю созерцать со креста текущий ручей,\nЛьётся в нём для всех благодать, им я сделан снега белей."}, {"id": 774, "title": "Что вину мне может смыть? О, ничто! Лишь Кровь Иисуса!", "text": "Что вину мне может смыть? О, ничто! Лишь Кровь Иисуса! \nВновь что может исцелить? О, ничто! Лишь Кровь Иисуса!\n\n    Как дорога струя, омывшая меня! Она сильней морей.\n    О,ничто! Лишь Кровь Иисуса!\n\nЧтоб очиститься, гляжу лишь на Кровь одну Иисуса!\nДар прощенья нахожу лишь в Крови святой Иисуса.\n\nОт греха искупит дух - о, ничто! Лишь Кровь Иисуса!\nНи добро моих заслуг - о, ничто! Лишь Кровь Иисуса!\n\nМир, надежду мне дарит - о, ничто! Лишь Кровь Иисуса! \nМоя святость мне не щит - о, ничто! Лишь Кровь Иисуса!"}, {"id": 775, "title": "Взойдём на Голгофу, мой брат!", "text": "Взойдём на Голгофу, мой брат!\nТам посланный Богом Мессия распят.\nО правде святой проповедовал Он,\nБольных исцелял, а теперь Он казнен. Падём перед Ним!\n\nВзойдём на Голгофу, мой брат!\nОн страждет, и жаром ланиты горят;\nОн жаждет, и уксус Тому подают,\nЧьи воды живые для мира текут. Падём перед Ним!\n\nВзойдём на Голгофу, мой брат!\n«Прости им, не знают, что худо творят», \nОн молит. Взойдём же, дабы и за нас\nМолитва Христова к Отцу вознеслась. Падём перед Ним!\n\nВзойдём на Голгофу, мой брат!\nВот снова Он к небу подъемлет Свой взгляд:\n«Отец мой! Зачем Ты оставил Меня?»\nО, брат мой! Чтоб принять тебя и меня. Падём перед Ним!\n\nВзойдём на Голгофу, мой брат!\nСтрадальца Святого слова там звучат:\n«Свершилось! Я дух Мой Тебе предаю!»\nЗа нас Он пожертвовал душу Свою. Падём перед Ним!\n\nВзойдём на Голгофу, мой брат!\nПосмотрим, как нашей греховности яд \nВ страданиях горьких Христа истомил.\nКак дорого Он нам спасенье купил! Падём перед Ним!"}, {"id": 776, "title": "Господь! Восстав с вечери, Ты шёл на крест скорбей;", "text": "Господь! Восстав с вечери, Ты шёл на крест скорбей; \nС Тобою шли по вере одиннадцать друзей;\nИ Ты в смиренье Сына к Отцу воззвал с мольбой: \n«Да будут все едино, как Я един с Тобой!» (2
