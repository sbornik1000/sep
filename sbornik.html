раза)\n\nОдин Отец всесильный, один Предвечный Сын; \nОдин любвеобильный Дух Правды, Властелин.\nО, тайна Триединства, открытая Христом!\nДа будут все едино, как Сын един с Отцом! (2 раза)\n\nОдна за нас пролита спасительная Кровь;\nОдна для нас открыта бессмертная любовь;\nОдно святое Слово, один источник вод \nСтруёю жизни новой отраду нам даёт. (2 раза)\n\nОдин у нас Властитель, Отечество одно,\nОдна у нас обитель, где счастье суждено.\nИ Вождь у нас единый, и цель у нас одна,\nМы разные дружины, но армия одна. (2 раза)\n\nИ чрез одну пустыню лежит наш путь земной,\nИ за одну святыню идём мы в трудный бой.\nОдно пред нами знамя, одно светило дня;\nОдно сияет пламя Господнего огня! (2 раза)"}, {"id": 777, "title": "Грех победить, о, желаешь ли ты?", "text": "Грех победить, о, желаешь ли ты?\nЕсть сила в Крови, в Крови Христа!\nСердцем в свободу Христову войти? Есть сила в Его Крови!\n\n    Сила Божья животворная в Крови (в Крови) Христа (Христа)! \n    Сила Божья животворная в драгоценной Крови Христа!\n\nХочешь ли гордость и страсть умертвить?\nЕсть сила в Крови, в Крови Христа!\nМожет Христос весь твой грех удалить, есть сила в Его Крови!\n\nЖаждешь ли снега белее ты быть?\nЕсть сила в Крови, в Крови Христа!\nКровь Иисуса всё может омыть, есть сила в Его Крови!\n\nГосподу хочешь ли верно служить?\nЕсть сила в Крови, в Крови Христа!\nЖизнью, устами Иисуса хвалить, - есть сила в Его Крови!"}, {"id": 778, "title": "Ты познал ли силу Крови, о, скажи,", "text": "Ты познал ли силу Крови, о, скажи,\nИ омыт ли ты Кровью Христа?\nБлагодать Его познал ли ты в душе,\nИ омыт ли ты Кровью Христа?\n\n    Чист ли ты? (Чист ли ты?) Кровь Его (Кровь Его) \n    Может пятна греха смыть с тебя (смыть с тебя), \n    Может Кровь, что на кресте пролил Христос, \n    Сделать снега белее тебя.\n\nДень за днём живёшь ли пред лицом Его?\nИ омыт ли ты Кровию Христа?\nИспытал ли милость Бога твоего\nИ омыт ли ты Кровью Христа?\n\nТы готов ли встретить твоего Христа,\nИ омыт ли ты Кровью Его?\nВ край святой войдёт тогда душа твоя,\nКоль очищен ты Кровью Христа!\n\nВо грехах покайся, отступи от зла \nИ омойся ты Кровью Христа!\nНа Голгофе Кровь и за тебя текла,\nО, омойся ты Кровью Христа!"}, {"id": 779, "title": "Праздник Пасхи уже приближался, и во время вечери Христос", "text": "Праздник Пасхи уже приближался, и во время вечери Христос \nПолотенцем вдруг опоясался, в умывальнице воду принёс.\nЗнал Иисус, что разлука так близко, смерть идёт по Его следам,\nИ склонив Свою голову низко, омывал ноги ученикам.\n\nЗапылённые, с грубою кожей - омывал Он их чистой водой, \nОтирал полотенцем, Сын Божий в этот вечер был только слугой. \nПётр смотрел на Христа с изумленьем: «Нет, не будет того вовек. \nТы - Господь, и стоишь на коленях предо мной, я - земной человек.\n\nНикогда ног моих не омоешь!» - «Пётр, не знаешь, что делаю Я. \nНе имеешь ты части со Мною, если Я не омою тебя». -\n«Я готов, Иисус, я согласен, руки, голову мой мою!» -\n«Нет, ты чист, только ноги от грязи Я водою тебе оболью».\n\nЭто дал Иисус для примера, как нам ближнего нужно любить.\nО Господь, укрепи нашу веру, чтобы в истине людям служить."}, {"id": 780, "title": "В багрянице стоишь Ты в терновом венце,", "text": "В багрянице стоишь Ты в терновом венце,\nТуго спереди связаны руки,\nСколько скорби глубокой на бледном лице, \nСколько жалости к людям и муки.\n\nНо не телом скорбишь Ты, Спаситель людей, \nХоть позорная пытка ужасна,\nВ страшный час для Тебя несравненно больней \nЗнать, что жертва для многих напрасна.\n\nВзор любовью горел, озаряя врагов,\nСердце нежно обнять всех стремилось,\nНо немногим понятна Христова любовь,\nИ толпа над Ним злобно глумилась.\n\n«Дайте скипетр Ему! На колени, скорей! \nЗдравствуй, Царь Иудейский!» - кричали \nИ в затёкшие руки Царя всех царей \nТростниковую палку давали.\n\nБили ею Его по колючкам венка \nИ по впалым ланитам хлестали,\nИ плевали в лицо, кровь стекала с чела,\nА они все сильней насмехались.\n\nТак страдал и томился Спаситель людей,\nМир порочный над Богом глумился;\nЗа тебя, о мой друг, твой Спаситель страдал.\nЗа тебя Он так тяжко томился."}, {"id": 781, "title": "Расскажу я всем живущим, как Христос мой пострадал,", "text": "Расскажу я всем живущим, как Христос мой пострадал, \nКак под бременем гнетущим на кресте Он умирал.\n\nРасскажу я всем живущим, как Христос мой пострадал, \nКак Он всем, к Нему идущим, мир и радость обещал.\n\nЧасто я не слышу зова и блуждаю, как овца,\nНо меня находит снова Он с любовию Отца.\n\nЯ в борьбе с грехом был ранен, я устал и изнемог,\nВзор был скорбью затуманен - Он же мне во всём помог.\n\nМимо смерти прохожу я, много зол в пути моём,\nНо пред ними не паду я, их сражу святым мечом.\n\nОн берёт меня за руки и опять вперёд ведёт;\nЯ не знаю с Ним разлуки, я не знаю с Ним забот."}, {"id": 782, "title": "Начальник жизни, Пастырь мой, хвала Твоей любви!", "text": "Начальник жизни, Пастырь мой, хвала Твоей любви!\nЧтоб не забыл я подвиг Твой, Голгофу мне яви!\n\n    Чтоб не забыл Твоей мольбы, чтоб не забыл Твоей борьбы, \n    Чтоб не забыл Твоей любви, - Голгофу мне яви!\n\nПуста гробница та, где Ты, Спаситель мой, лежал,\nГде ангел светлый с высоты явился сторожам.\n\nХочу, как жёны на заре, принесть дары мои...\nЧтоб веры луч во мне горел, Голгофу мне яви!\n\nТебе хочу я подражать, покорно крест нести\nИ чашу скорби принимать, что дашь мне на пути."}, {"id": 783, "title": "Мне видны пятна на тропе кровавые,", "text": "Мне видны пятна на тропе кровавые,\nКогда-то шёл Христос ко мне израненный. \nОн шёл, искал меня, а я утерянный,\nА я лежал во рву, грехом истерзанный.\n\nЗаботясь нежно обо мне, ночной порой\nОн шёл, искал меня среди вражды людской. \nА я беспечен был, не знал Его забот,\nНе знал Его любви, тонул в пучине злой.\n\nГлаза лучистые меня увидели:\nСтонал от боли я, не зная радости.\nНо Он пришёл ко мне, склонился надо мной, \nЯ лик Его узнал, смотрел с любовью Он.\n\nПодал Он руки мне Свои пронзённые, \nСказал, что я теперь навек прощённый Им.\nИ было столько сил в Его святых руках,\nОн взял меня к Себе, исчезли боль и страх.\n\nМне видны пятна на тропе кровавые:\nСпаситель шёл, искал меня, израненный.\nИ свет Его очей мне будет освещать,\nТе пятна мир людской не сможет затоптать."}, {"id": 784, "title": "Вот Божий Сын льёт кровь Свою на Голгофе, на Голгофе!", "text": "Вот Божий Сын льёт кровь Свою на Голгофе, на Голгофе! \nТам душу искупил мою, на Голгофе, на Голгофе!\nХоть я противился ещё, Иисус сказал: «Свершилось всё!» \n И жизни утро началось на Голгофе, на Голгофе!\n\nО, если б каждый поспешил на Голгофу, на Голгофу \nИ бремя тяжкое сложил на Голгофе, на Голгофе!\nРазбойник ко Христу пришёл, спасение себе нашёл, -\nИ так со всяким, кто взошёл на Голгофу, на Голгофу!\n\nХотел бы я всем рассказать о Голгофе, о Голгофе,\nЧтоб каждый мог всю правду знать о Голгофе, о Голгофе! \nО Церковь Божия, вставай и в мире всем провозглашай,\nИ никогда не умолкай о Голгофе, о Голгофе! (о Голгофе!)"}, {"id": 785, "title": "Голгофа, Голгофа, Голгофа...", "text": "Голгофа, Голгофа, Голгофа...\nСквозь слёзы смотрю на Тебя, распятый Иисус мой Господь.\nТы снял мою боль, изгнал сердца страх, хотя Сам повис на гвоздях.\n\n    То не гвозди ведь держали на кресте,\n    И не люди причинили боль Тебе.\n    То не гвозди и не люди, но мой грех,\n    Хоть минуло с этой казни так много лет.\n\nЯ вижу Тебя на кресте избитым, в терновом венце.\nПронзить дал Ты руки и ноги Свои, меня чтоб спасти от вины.\n\nКак часто я вижу тот день, Голгофы кровавую тень.\nСклонясь у креста, я милость нашёл, свободу мне дал Божий Сын!"}, {"id": 786, "title": "Не в силах я. Господь, понять Твою любовь и благодать;", "text": "Не в силах я. Господь, понять Твою любовь и благодать; \nТы нежно милостью Своей желаешь всех объять. И...\n\n    Ты искупил вину мою жертвою Своей сполна;\n    Тебе я сердце отдаю: прими меня.\n    На кресте Ты кровью истекал и умер, чтоб меня простить. \n    Свободу от греха мне дал, чтоб я мог вечно жить.\n\nКак много раз я избирал тот путь, что не ведёт к Тебе;\nЯ Слову жизни не внимал и был врагом Тебе. Но...\n\nО Боже мой, я пред Тобой в благоговении стою,\nОмыл мой грех, пролив за всех святую Кровь Свою. Ведь..."}, {"id": 787, "title": "У креста хочу стоять, созерцать душою,", "text": "У креста хочу стоять, созерцать душою,\nКак с Голгофы благодать в мир течёт рекою.\n\n    У креста, у креста честь моя и слава,\n    Там спасенья полнота, па блаженство право\n\nУ креста меня нашли благодать и сила,\nИ звезда святой любви путь мой озарила.\n\nУ креста открылся мне кроткий Агнец Божий.\nОн привлёк меня к Себе, стал всего дороже.\n\nУ креста я буду ждать с верой и надеждой,\nПока Бог велит принять в Царство безмятежных."}, {"id": 788, "title": "Есть для плачущих земли место у креста;", "text": "Есть для плачущих земли место у креста;\nБрат мой страждущий, займи место у креста.\nСердце всё Христу открой, отгони прочь страх людской, \nДал тебе Спаситель твой место у креста.\n\nНе опаздывай в пути: отдых у креста.\nПоспеши скорей найти место у креста;\nЕсли скорбь в твоей груди, то к Спасителю приди \nИ покой душе найди у Его креста.\n\nБеззаботные! Скорей, станьте у креста.\nБог вам дал в любви Своей место у креста.\nИ взгляните, как струёй льётся там поток живой \nКрови чистой и святой, Крови со креста.\n\nВечная любовь зовёт всех под сень креста \nИ для каждого найдёт место у креста.\nТам свершились чудеса, нам открылись небеса,\nИ умолкнула гроза. Тихо у креста."}, {"id": 789, "title": "На далёком холме, средь деревьев и скал,", "text": "На далёком холме, средь деревьев и скал,\nСквозь седые века старый крест простоял,\nМиллионы людей у подножья креста \nСвоё счастье нашли; там однажды был я.\n\n    Старый крест, старый крест, неброский, но лишь в нём \n    Сила есть, сила есть, сегодня может он \n    Исцелять разбитые, больные сердца,\n    Каждому пришедшему открыть небеса.\n\nМежду небом святым и греховной землёй \nПропасть злая лежит, разделяя собой.\nХочешь - верь, хочешь - нет, слушай слово Творца:\n«Крест - единственный мост от земли в небеса!»\n\nИисус дорогой, у подножья креста \nНа далёком холме я увидел Тебя:\nНа пронзённых руках - незастывшая кровь,\nА в прекрасных глазах - Божья к людям любовь."}, {"id": 790, "title": "Полный скорби и томленья, и святых обильных слёз,", "text": "Полный скорби и томленья, и святых обильных слёз,\nВот Иисус в уединенье руки чистые вознёс.\nСмерти близится мгновенье, пот с лица Его бежит,\nИ молитвы вдохновенье в страшный час Его крепит.\n\nНо в мольбе за мир порочный, в час страданья \nСвоего Он один во тьме полночной, - где же спутники Его?\nСпят они, а Он с любовью тихо молится за них,\nОбливаясь потом, кровью, и зовёт друзей Своих:\n\n«Вы не спите до рассвета: близок, близок смертный час!\nИ прольётся Кровь завета, Кровь Моя, друзья, за вас».\nВот неверною походкой уж предатель сам идёт;\nЖдёт его Спаситель кротко, на шаги его встаёт.\n\n«Друг ты Мой! - сказал Спаситель, - что тебя ко Мне влечёт?» \nС словом «радуйся, Учитель!» он лобзаньем предаёт.\nВопли гнева раздаются, смерти требуют они;\nКрики грозные несутся: «Не хотим Его, распни!»\n\nНа кресте почил казнённый наш Господь и наш Творец; \nПрогремели бури стоны из конца земли в конец;\nИ открылись вдруг могилы, и Голгофа потряслась,\nИ завеса Божьей силой в храме вся разодралась."}, {"id": 791, "title": "Крест - орудье казни (2 раза) на Голгофу нёс", "text": "Крест - орудье казни (2 раза) на Голгофу нёс\nКротко, без боязни (2 раза) мой Господь Христос.\n\nИ Его хотенье (2 раза), чтоб в пути земном \nШёл и я в терпенье (2 раза) под Его крестом.\n\nНо, идя смиренно (2 раза), под крестом скорбей \nПадал Царь вселенной (II раза) на глазах людей.\n\nМой же крест суровый (2 раза) Сам Он облегчил, \nСнял греха оковы (2 раза), бремя усладил.\n\nЕго иго благо (2 раза), и в душе моей\nРадость и отвага (2 раза) пред крестом скорбей.\n\nЕго бремя, знаю (2 раза), будет мне легко;\nНа Него взираю (2 раза), Он не далеко."}, {"id": 792, "title": "Там, на кресте, стекала Кровь, и, в муках умиравший,", "text": "Там, на кресте, стекала Кровь, и, в муках умиравший, \nХристос явил Свою любовь к толпе, Его предавшей:\nЗа всех врагов, за палачей Он возносил моленье,\nКрестом любви, крестом скорбей Он совершил спасенье.\n\nИдите, грешники, к Христу и пред крестом склонитесь, \nТам, исповедав нищету, в Христе обогатитесь.\nСловами, сердцем и умом к Спасителю взывайте\nИ в уповании живом ответа ожидайте.\n\nНе сомневайтесь в доброте Отца всего творенья,\nНи в истине, ни в полноте Иисусова служенья;\nХристова Кровь омыть сильна нечистоту порока,\nИ отойдёт от вас вина, как запад от востока."}, {"id": 793, "title": "Много в мире горя и слёз, страх, унынье в сердцах.", "text": "Много в мире горя и слёз, страх, унынье в сердцах.\nМир в тревоге что-то ждёт, видно в деле, в словах.\n\n    Бремя снимается у креста, у креста, у креста! \n    Бремя снимается у креста! Близок Господь всегда!\n\nВсе заботы Он понесёт, верь всем сердцем в Христа. \nРуку дай - и Он поведёт, сняв всю тяжесть с тебя.\n\nЖизнь Свою святую Он отдал, нас возлюбя.\nМилый друг, к Иисусу приди, примет Он и тебя."}, {"id": 794, "title": "Когда Иисус на Голгофу шёл, взять на Себя людей грехи,", "text": "Когда Иисус на Голгофу шёл, взять на Себя людей грехи, \nЗатем, чтоб грешников спасти, умереть за них.\nЧеловеком стал Божий Сын - исполнить вечный Божий план \nПришёл в сей мир за грешных нас, Он умер за нас!\n\n    Он вёл бой с силой злобной, победил па кресте;\n    Бог дал людям планеты утешенье в Христе.\n    И надежда святая проникает к нам в сердце,\n    Он весь мир съединяет, Христос спасает!\n\nОн к людям в сердце заходил, чтоб даровать им Божий мир, \nИ потому Голгофской смертью Он умер за тебя!\nЧеловеком стал Божий Сын - исполнить вечный Божий план \nПришёл в сей мир за грешных нас, Он умер за нас!"}, {"id": 795, "title": "Руки, Твои пригвождённые руки,", "text": "Руки, Твои пригвождённые руки,\nОчи глубокие, полные слёз,\nВыжженный солнцем Голгофский утёс,\nБрань и зловещие молота звуки.\n\nБудто хотели они, обнимая,\nМиру тот гибельный путь преградить,\nДушу прощённую благословить,\nНебо блаженное ей открывая.\n\nВзглянь же, прохожий, застынь в изумленье, \nРазве ты в мире имеешь друзей,\nКто бы мучительной смертью своей \nМог даровать тебе жизнь и прощенье?\n\nВ наш уходящий, стремительный век,\nПосле скитаний и долгой разлуки \nРуки, пронзённые Господа руки,\nСнова простёрты к Тебе, человек."}, {"id": 796, "title": "Ах, если б вид Его мучений я в сердце мог всегда хранить!", "text": "Ах, если б вид Его мучений я в сердце мог всегда хранить!\nАх, если б цель всех помышлений была: любить и в Нём лишь жить! \nЯ всем Тебе, Господь, обязан, Тобой навек я исцелён,\nЯ болен был и адом связан, Твоею смертью я спасён.\n\nНа смерть Спасителя взгляд веры вселяет в сердце радость вновь. \nКакое счастие без меры, когда Спасителя любовь\nПроникнет в душу, примиряя! Какой живительный покой \nДаёт мне Кровь Христа святая, смывая грех великий мой!\n\nЗа грех мой принял Он мученье, за грех отдал Он жизнь Свою,\nВ Его скорбях моё спасенье, Он смертью снял вину мою. \nИсточник светлый и свободный спеши в меня, Господь, излить,\nИ, мёртвый духом и холодный, я буду новой жизнью жить.\n\nКакой восторг неизречённый: на смерть Спасителя взирать, \nПрипасть к Нему в любви смиренной и раны рук и ног лобзать!\nЯ, принимая дар бесценный, записан к вечной жизни с Ним,\nТуда мой дух в красе нетленной войдёт прославленным, святым"}, {"id": 797, "title": "Спаситель наш сошёл на землю к нам,", "text": "Спаситель наш сошёл на землю к нам,\nПринёс Он всем спасения бальзам.\nОн пострадал и, всех нас возлюбя,\nВ подарок сделал жертвою Себя.\n\n    Творец Он солнца, неба и луны,\n    Творец Он человека и земли.\n    Он, сотворивший мириады звёзд,\n    В награду получил лишь ржавый гвоздь.\n\nЯ возношу хвалу Ему в тиши:\nПринёс Он всем спасение души.\nОн грешника зовёт: «Ко Мне приди,\nПокой найдёшь ты у Моей груди».\n\nКак часто забываем мы о том,\nЧто Иисус зовёт нас в Отчий Дом,\nЧто жизнь отдал Христос лишь ради нас. \nПриди, Он ждёт тебя и в этот час!"}, {"id": 798, "title": "В стране Палестине Голгофа стоит, - о ней вся вселенная знает.", "text": "В стране Палестине Голгофа стоит, - о ней вся вселенная знает.\nО битве Иисуса она говорит и взоры людей привлекает.\n\nНа этой горе распинали Христа, невинную Кровь проливали.\nТо Божий Сын жертвой Голгофскою стал, но люди об этом не знали.\n\nЕго положили на древо креста и вдруг в тело гвозди вонзили.\nЗа грешников мира час казни настал, из ран Его кровь заструилась.\n\nБагряное древо с распятым Христом подняли и в яму вкопали. \n«Се, Царь иудейский!» - кричали о Нём и в ярости негодовали.\n\nВсей тяжестью тела висел на гвоздях Господь, истекающий кровью. \nНо ласковый взор в Его светлых очах горел к людям прежней любовью.\n\nК устам Его уксус был преподнесён; отведав, Он молвил: «Свершилось!» \nИ предал Свой дух, наклонивши главу, и сердце в Нём больше не билось.\n\nДля Господа кончились тяжкие дни, не знает история равных.\nНо лобное место - Голгофа - стоит, как памятник вечный и славный."}, {"id": 799, "title": "Горько слёзы лились под шатром Гефсиманского сада,", "text": "Горько слёзы лились под шатром Гефсиманского сада,\nСколько тягостных мук было в этих горячих слезах.\nЭто слёзы Христа, Небожителя вечного града,\nЭто слёзы мольбы, что застыли в печальных глазах.\nЧто слышишь ты в Его мольбе? (2 раза)\n\nБоже мой, Боже мой! Для чего Ты Меня здесь оставил?\nКак горька и ужасна Мне скорбная чаша сия!\nНо коль хочешь, чтоб имя Твоё на земле Я прославил, -\nЯ иду, надо Мною пусть воля пребудет Твоя.\nЗа нас Христос ту чашу пил. (2 раза)\n\nГорьким был для Христа крестный путь на вершину распятья: \nБичеванье и смех, поруганье и злоба врагов.\nИзнемогший Иисус, весь избитый под крики, проклятья, \nКрест вознёс на Голгофу, чтоб мир искупить от грехов.\nМои грехи с меня Он снял. (2 раза)\n\nГорько плакал Христос, кровь и пот орошали подножье.\nЗа меня Кровь лилась и омыла меня от грехов.\nТам, где слёзы любви и прощения пролил Сын Божий, -\nТам спасенье в пречистой, невинной Крови я нашёл.\nВ глазах Христа блестит любовь. (2 раза)"}, {"id": 800, "title": "Руки опущены, слёзы в очах.", "text": "Руки опущены, слёзы в очах.\nЛюди, прислушайтесь к свисту бича.\nСбылось пророчество: лик Твой святой в крови, \nСмех и пощёчины, крики «распни!»\n\n    Это моя вина, это мои слова,\n    Это мои дела ранят Христа.\n\nВетер бушует, луч солнца угас,\nВеет соблазном дьявола глас:\n«Что же на помощь Ты Бога не позовёшь?\nИли пощады и милости ждёшь?»\n\nКрест поношения, слёзы и боль.\nЩедрой жестокостью платим порой:\nВместо награды - зло, вместо хвалы - хула \nБожьему Сыну на плечи легла."}, {"id": 801, "title": "На далёком холме старый крест виден мне, -", "text": "На далёком холме старый крест виден мне, -\nЗнак позора, страданий и мук.\nО кресте мы поём потому, что на нём \nБыл распят лучший грешников Друг.\n\n    Старый крест осудил суету,\n    Дал покой для усталых сердец.\n    Я душою прильнул ко кресту,\n    Чрез пего обрету я венец.\n\nСтарый крест позабыт. Мир в погибель спешит. \nКрест Христов - наша сила и честь.\nВечный с неба сходил, на земле в теле жил, -\nЧтоб Его на Голгофу отнесть.\n\nСтарый крест обагрён, но не страшен мне он,\nВ нём открылась нам Божья любовь:\nКровь Иисуса Христа пролилась со креста, \nЧтоб меня искупить от грехов.\n\nСтарый крест возвещать и к Христу призывать, \nВот на что я себя отдаю.\nПосле жизни земной я войду в Твой покой,\nТы меня примешь в славу Свою."}, {"id": 802, "title": "Славу оставив неба, к нам Иисус пришёл,", "text": "Славу оставив неба, к нам Иисус пришёл,\nСмертью Своей спасенье нам приобрёл.\n\n    За грешных (за нас) нас (страдал)\n    Страдал (Иисус) Христос (Христос),\n    Нас любя, Он в жертву Сам Себя принёс.\n    Мы (Христом) спасены (веемы)\n    От (от зла) власти тьмы (и тьмы),\n    Небо нам открыл страданьями Христос.\n\nСчастливы и свободны мы чрез Него теперь.\nВ Царство Отца на небо открыта дверь.\n\nСледуя за Иисусом, неба достигнем мы.\nСпасшему нас там славу мы воздадим.\n\nВ небо дверь всем открыта. Друг мой, вошёл ли ты\nГрешник, пока не поздно, скорей войди!"}, {"id": 803, "title": "Только вера во Христа, в Кровь, пролитую с креста,", "text": "Только вера во Христа, в Кровь, пролитую с креста, \nМожет грешным душам дать радость, счастье, благодать.\n\n    Ты грешил и зло творил, смерть навеки заслужил; \n    Но невинный (но невинный) умер Он (умер Он),\n    И от смерти (и от смерти) ты спасён.\n\nВерь же в мощь Его заслуг, и твоих пороков круг \nНавсегда Он удалит, и ты будешь Им омыт.\n\nОн не требует теперь дел твоих, тому поверь.\nЖизнь приняв, как дар, потом прославляй Его трудом."}, {"id": 804, "title": "Как цветок в степи безлесной, так Христос среди людей", "text": "Как цветок в степи безлесной, так Христос среди людей \nСветит святостью небесной, красотой души Своей.\n\nСловно путник утомлённый видит радостно цветок -\nВижу я Христа в мученьях, вижу я Его венок.\n\nОблик кротости, смиренья, нет прекрасней ничего!\nКак могу без восхищенья посмотреть я на Него?\n\nКак волну благоуханья, разливает Он любовь,\nЦвет святого одеянья - принесённой жертвы Кровь.\n\nВидишь ли цветок чудесный? Если нет, то посмотри,\nИ в сердечной клети тесной станет всё светлей зари."}, {"id": 805, "title": "За меня Христос страдал, за меня Он жизнь отдал.", "text": "За меня Христос страдал, за меня Он жизнь отдал.\nИ за это жизнь свою всю Ему я отдаю.\nНаучи, Спаситель чудный, как мне жизнь прожить свою, \nЧтоб я чтил Твой подвиг трудный, помня всю любовь Твою.\n\nНам любовь Христос явил, нас далёких Он сроднил.\nХочет Он, чтоб ты и я жили как одна семья.\nНаучи нас, Добрый Пастырь, как нам жить в любви Твоей, \nЧтобы смысл Твоих страданий возвестить среди людей.\n\nСкоро снова Он придёт, и к Себе Он нас возьмёт,\nВечно будем жить мы с Ним, с Искупителем своим.\nО, скорей гряди, Спаситель, все мы ждём давно Тебя,\nНас возьми в Свою Обитель, где царит любовь Твоя."}, {"id": 806, "title": "Вот полночь... Над горой маслин звезда померкла в небесах.", "text": "Вот полночь... Над горой маслин звезда померкла в небесах. \nВот полночь... И в саду один Спаситель молится в слезах.\n\nВот полночь... Он уединён, Он борется со тьмой врагов;\nИ не тревожит тяжкий стон любимых Им учеников.\n\nВот полночь... За вину других рыдает горько Муж скорбей, \nНо, преклонён средь мук людских, Он не забыт Отцом людей.\n\nВ ту полночь в небе гимн звучал, что знают ангелы одни,\nНо мир тех звуков не слыхал; Его утешили они..."}, {"id": 807, "title": "Знают ли сегодня люди, что Иисус Христос", "text": "Знают ли сегодня люди, что Иисус Христос\nМолча принял поцелуй Иуды, тот, что смерть принёс, \nМолча принял Ирода угрозы, пытки и допрос,\nА потом, израненный, на гору крест тяжёлый нёс.\n\nУмирал без слёз и стона, всё в любви стерпел.\nИ за жизнь короткую такую - всё свершить успел. \nКровь святая со креста струилась, покрывая грех;\nБог любовь великую и милость подарил для всех!\n\nТы покорно принял муки, ради нас страдал;\nНа кресте растянутые руки - будто мир обнял.\nРади Магдалины, Вартимея столько перенёс.\nМы ж любить друг друга не умеем, научи, Христос."}, {"id": 808, "title": "У креста Христова мир течёт рекой,", "text": "У креста Христова мир течёт рекой, \nБлагодати Слово всем даёт покой.\nТам душа больная горьких слёз не льёт, \nКровь Христа смывает всякий грех и гнёт.\n\nСо креста струилась примиренья Кровь,\nВ ней дана нам сила побеждать врагов. \nСмерть не испугает, не прельщусь грехом: \nБожий Сын спасает на пути земном.\n\nЗемлю оставляя, поспешу к Тому,\nЧья рука святая разгоняла тьму.\nВ небесах сложу я всё к Его ногам;\nВечно торжествуя, я пребуду там."}, {"id": 809, "title": "Видна из города та тёмная гора,", "text": "Видна из города та тёмная гора,\nУж много лет назад распяли там Христа.\nНа крест ведён Он был и кровь за нас пролил, \nХоть недостоин я и взгляда Его был.\n\nО, сколько жизни смерть Иисуса принесла, \nГрехи простила, радость и любовь дала!\nИ для тебя, мой друг, и для тебя, мой брат,\nОн победил на той горе и смерть, и ад.\n\nПриходят все к концу спасительные дни,\nКто не принял Христа, спеши, душа, спеши. \nОн за тебя страдал, за грех твой умирал, \nСвоей любовью всё и всех вокруг прощал.\n\nДрузья, как хочется всегда Иисусу петь \nЗа то, что Он не дал навеки умереть.\nВелик и силен Бог, Он любит Свой народ.\nКак благодарны мы Ему за подвиг тот!"}, {"id": 810, "title": "Приходи почаще на Голгофу - здесь берёт начало жизнь твоя,", "text": "Приходи почаще на Голгофу - здесь берёт начало жизнь твоя, \nЗдесь за мировую катастрофу жертвой стала алая струя.\nКровь с безгрешных рук Христа струилась,\nБожий Сын, страдая, умирал.\nНа Голгофе в небо дверь открылась -\nБог спасенье грешным людям дал.\n\nПусть твоя житейская тропинка не обходит старого креста, \nЧтоб душа, как детская слезинка, от пороков всех была чиста. \nСчастье вдалеке искать не надо -\nПриходи к Нему, и ты поймёшь:\nЗдесь оно, совсем с тобою рядом -\nВо Христе покой душе найдёшь.\n\nЗдесь мечты и чаянья людские, здесь надежда светлая веков -\nВо Христе, Чьи руки дорогие мир спасли от пагубных оков! \nПусть пройдут века, стирая даты,\nНо одно лишь может жизнь сказать:\n«Подвиг, совершённый Им когда-то,\nЦенность не сумеет потерять!»"}, {"id": 811, "title": "Вдали, вдали я вижу крест, и лик Страдальца виден мне.", "text": "Вдали, вдали я вижу крест, и лик Страдальца виден мне.\nТам умирает Царь небес среди проклятий на земле.\n\n    О мой Спаситель, о мой Бог, Твою любовь постигну ль я?\n    Ты райский мне открыл чертог, Ты мне сказал: «Люблю тебя!»\n\nС холма, с холма спешит толпа, боясь на дело рук взглянуть. \n«Ведь это Бог!» - слышны слова, рыдает потрясённый люд.\n\n«Прости, прости им, Отче мой, они не знают, что творят», -\nСлова несутся над землёй из уст распятого Царя."}, {"id": 812, "title": "К Голгофе, к Голгофе Христовых страданий", "text": "К Голгофе, к Голгофе Христовых страданий \nЯ тяжкое бремя своё принёс!\nИ слёзы, и плач моего раскаянья \nОмыли подножье креста, Христос.\n\n    В сердце моём одна тоска, что долго к Голгофе я шёл. \n    Боже, прости, прости меня, что долго к Тебе я шёл.\n\nИ путь мой совсем не украшен цветами.\nРастут на нём только одни шипы.\nО Боже, Ты знаешь моё желанье:\nК Голгофе хотя б одного привести.\n\nЯ знаю, Ты в жизни моей стал опорой,\nЯ чувствую силу Твоей любви.\nВсе тайны, все тайны мои на ладонях \nРаскрыты пред взором Твоим святым.\n\n    В сердце моём одна мечта, что скоро я встречу Христа, \n    И в небесах ждут меня, Ему буду петь без конца."}, {"id": 813, "title": "Предвечный Бог Творец, Создатель! Подножье ног Твоих - Земля!", "text": "Предвечный Бог Творец, Создатель! Подножье ног Твоих - Земля! \nТы на кресте открыл объятья для распинающих Тебя!\n\nТвою любовь, Твои страданья вместить не может разум мой. \nЗемля качнулась под ногами, и солнце смерклось пред Тобой!\n\nДушою немощной, бессильной я у креста, Господь, стою.\nМолю Тебя, Источник силы, возгрей во мне любовь Твою!"}, {"id": 814, "title": "О мой друг, посмотри: видишь там, вдалеке,", "text": "О мой друг, посмотри: видишь там, вдалеке, \nАгнец Божий висит на Голгофском кресте.\nОн гвоздями прибит по рукам и ногам,\nКровь стекает с ланит, Он же молится Сам:\n\n«О, Небесный Отец! Я взываю к Тебе!\nСколько в мире сердец погибает во тьме...\nИ смеются над Тем, Кто дарует им жизнь,\nНо не знают они, от Кого отреклись.\n\nЯ но воле Твоей к ним на землю пришёл,\nЧтобы Кровью Своей их омыть от грехов,\nЧтобы ад победить, дать свободу и жизнь,\nДверь спасенья открыть для людей всей земли.\n\nКак жестоки они... Сколько раз Я хотел\nИх собрать, как птенцов, дать им лучший удел, \nНо их злые сердца не хотели принять\n С неба вечный Твой мир и Твою благодать.\n\nТы им грех сей прости, ведь не знают они,\nЧто худое творят в эти страшные дни.\nНыне в руки Твои Я Свой дух предаю,\nУмираю за них, потому что люблю!»\n\nДа, мой друг! За тебя Он пролил Свою Кровь. \nПоспеши же принять Иисуса любовь;\nДвери сердца открой - Дух Святой в них войдёт, \nТы получишь покой, отдохнёшь от забот."}, {"id": 815, "title": "Снова вижу путь к Голгофе и Христа среди толпы,", "text": "Снова вижу путь к Голгофе и Христа среди толпы,\nИ глаза Твои, мой Боже, снова слёз любви полны.\n\n    Смотрю в глаза Твои, Христос, и грех свой тяжкий сознаю, \n    Омой меня потоком слёз, сними с души вину мою.\n\nИ спасение от ада, и великий дар любви,\nИ моей души отрада, - всё в Твоей святой Крови!\n\nПодарил Ты счастье людям, вечный мир излил с креста,\nПусть Тебе хвалою будет благодарность без конца!"}, {"id": 816, "title": "Всегда удивляться я должен: Христос всех нас возлюбил!", "text": "Всегда удивляться я должен: Христос всех нас возлюбил!\nВесь мир был неправдой исполнен, а Он Кровь за нас пролил.\n\n    Повесть (весть) чудная, вечно (и) новая, слушать я её готов. \n    Повесть (весть) чудная, вечно (и) новая про Спасителя любовь.\n\nОтца в Гефсимании просит: «Пусть воля будет Твоя...»\nСтраданья за нас переносит; в Его ранах жизнь моя.\n\nВот ангел от Бога нисходит, Христа чтобы подкреплять\nВ борьбе Гефсиманской суровой, где должен Он так страдать.\n\nКогда я на небо прибуду и славу Христа узрю,\nО том, как Он грешников любит, на небе я гимн спою."}, {"id": 817, "title": "На Голгофу, на распятье Сына Божьего ведут,", "text": "На Голгофу, на распятье Сына Божьего ведут,\nСквозь побои и проклятья Он свершает неба труд.\n\n    Люди, взгляните, люди, на тот холм, где в муках умирает Он. \n    Там слышен смех, глумится люд, а Он свершает неба труд.\n\nНа Голгофе три распятья: два разбойника и Он \nРаспростёр Свои объятья, будто всех обнять готов.\n\nНа Голгофе шум смолкает, тьма объемлет всё кругом.\nСлышно там, как люд стенает: «Нами Бог ведь был казнён!»"}, {"id": 818, "title": "Там, у креста Иисуса, я приобрёл покой;", "text": "Там, у креста Иисуса, я приобрёл покой;\nВ тени могучей той скалы - свободу от оков, \nПриятный дом для странника и отдых на пути \nОт изнуряющей жары и тяжести трудов.\n\nТам, у креста Иисуса, я верой увидал \nТого, Кто умер за меня и жизнь Свою отдал.\nВ сердечном сокрушении два дивных чуда зрю: \nЕго предвечную любовь, моих грехов вину.\n\nВ тени креста я скроюсь от всех земных скорбей. \nДругой защиты не ищу, как сень Его очей.\nСебя на жертву приношу к подножию креста, \nЕму навеки отдаюсь, хвалюсь крестом Христа."}, {"id": 819, "title": "Путь к Голгофе далёк. Кровь стекает с чела,", "text": "Путь к Голгофе далёк. Кровь стекает с чела,\nСколько мук и страданий во взоре.\nИисус дорогой умирал за тебя.\nПринял всё: и мученья, и горе.\n\n    Никогда не смогу я забыть этот крест,\n    Он стоит между небом, землёю.\n    Своей смертью Христос примирил нас с Отцом, \n    Искупил драгоценною Кровыо.\n\nО, услышь, человек, голос песни моей,\nЧто ты медлишь, мой друг, что ты ждёшь?\nЧем ты платишь Ему за божественный крест,\nЗа пролитую Кровь что даёшь?\n\n    Даль земли, свет зари, радость дней, грусть ночей,\n    Для тебя это создал Господь.\n    Он зовёт, ты приди, мимо, друг, не пройди,\n    В Нём ты счастье, покой обретёшь.\n\nДай, Господь, мне познать тайну дивной любви,\nТой, что Ты к нам на землю принёс;\nИ смогу я спокойно и твёрдо идти \nПо земле среди бурь, среди слёз.\n\n    Никогда не смогу я забыть этот крест,\n    Он стоит между небом, землёю.\n    Своей смертью Христос примирил нас с Отцом, \n    Искупил драгоценною Кровыо.\n\n    Даль земли, свет зари, радость дней, грусть ночей, \n    Для тебя это создал Господь.\n    Он зовёт, ты приди, мимо, друг, не пройди,\n    В Нём ты счастье, покой обретёшь."}, {"id": 820, "title": "Когда я в духе созерцаю Мессии образ неземной,", "text": "Когда я в духе созерцаю Мессии образ неземной,\nТогда я горе забываю, благодарю за жребий свой.\n\nОн в муках за мой грех взывает: «Отец, оставил Ты Меня...» \nНадежды радуга сияет, что не покинут Богом я.\n\nИ слышу голос: «Совершилось!» - главу Спаситель преклонил. \nИ вера в сердце поселилась: не даст Он мне страдать сверх сил!"}, {"id": 821, "title": "На Голгофу веди меня снова в час, когда я начну забывать", "text": "На Голгофу веди меня снова в час, когда я начну забывать\nЗвуки дивного вечного Слова, чтобы я возгорелся опять (2 раза).\n\nЯ бессилен, а битва сурова. Если я ослабею в борьбе,\nНа Голгофу веди меня снова, чтобы силу нашёл я в Тебе (2 раза).\n\nКогда сердце сжимают оковы, Когда гаснет в нём пламя огня,\nНа Голгофу веди меня снова, у креста есть огонь для меня (2 раза).\n\nИ порой, когда жертва Христова для меня потеряет цену,\nНа Голгофу веди меня снова, и я снова бороться начну (2 раза)."}, {"id": 822, "title": "Позволь мне головой склонённой припасть к Твоим святым ногам,", "text": "Позволь мне головой склонённой припасть к Твоим святым ногам,\nПозволь душой освобождённой смягчить слезами тяжесть ран.\n\n    Я знаю, если Кровь святая мне в сердце семенем падёт,\n    Во мне, как искорка живая, Твоя любовь произрастёт.(2 раза)\n\nЯ не молю о высшем счастье: зреть лучезарное Лицо,\nНо дай мне хоть слезой участья смягчить страдание Твоё.\n\nИ, может, я сумею тоже идти по сёлам, городам,\nВести борьбу с грехом и ложью, нести покой и мир сердцам."}, {"id": 823, "title": "Осень, осень... Листья пожелтели, и летят они, кружась, к земле.", "text": "Осень, осень... Листья пожелтели, и летят они, кружась, к земле. \nОсень, осень... Грустные напевы зазвучали нежно в тишине.\nТы уходишь, лето, безвозвратно, унося с собой тепло весны,\nИ с приходом осени и жатвы Ты приносишь чудные плоды.\n\nОсень жизни наступает всюду, дни бегут, секунды торопя,\nИ пред взором в возбуждённом мире возгорается утра заря.\nС чем предстанешь ты пред Иисусом, перед грозным праведным Судьёй?\n Хочет видеть Он тебя с плодами, хочет Он ввести тебя в покой.\n\nОсень, осень... Холод наступает, леденит усталые сердца;\nТьма неверья землю покрывает, беззаконьям не видать конца. \nНаступает день великой Жатвы, день, когда за всё ты дашь отчёт. \nЭтот день для многих будет страшным, этот день всю землю потрясёт.\n\nОсень, осень... Листья пожелтели и летят они, кружась, к земле.\n Осень, осень... Грустные напевы зазвучали нежно в тишине..."}, {"id": 824, "title": "Что сеял ты, друг мой, весною? Не злаков ли хлебных зерно?", "text": "Что сеял ты, друг мой, весною? Не злаков ли хлебных зерно? \nКолосьев волной золотою покрыто всё поле твоё!\n\n    Сей доброе семя всегда (во имя Христа),\n    Пожнёшь, что посеял тогда (посеял тогда).\n    День жатвы придёт, не замедлит,\n    Пожнёшь, что посеял, тогда!\n\nА рядом - о, страшное поле! Не враг ли посеял там зло? \nКолючей, опасной травою так густо оно заросло.\n\nЧто сеял на поле ты жизни, - любовь или злую вражду? \nВзойдёт твой посев и созреет, и в вечности примешь ты мзду.\n\nПосеем Учителя Слово, великое Слово любви,\nО жертве Его всем расскажем, о пролитой Агнцем Крови.\n\nПридёт день, увидим мы в небе спасённых счастливых людей \nВеликую жатву спасенья! О, сей, неустанно, друг, сей!"}, {"id": 825, "title": "Осень золотая снова к нам пришла,", "text": "Осень золотая снова к нам пришла,\nМного урожая людям принесла.\nВсех плодов так много, всё для жизни есть, \nМилостей от Бога всех не перечесть.\n\nТруженик обильно сеял, поливал,\nИ Господней силой плод тот возрастал.\nТак в духовной жизни жатвы день грядёт. \nКто без укоризны к Господу придёт?\n\nеять Божье Слово будем мы везде,\nК трудностям готовы на святом труде.\nК дивному чертогу нас Христос возьмёт, \nКоль угоден Богу наш сердечный плод.\n\nДруг ты мой усталый, сердцем не грусти, \nХоть скорбей немало на твоём пути. \nТесными стезями к Господу идёшь,\nСеешь со слезами - с радостью пожнёшь!"}, {"id": 826, "title": "Косари на лугу размахалися острыми косами,", "text": "Косари на лугу размахалися острыми косами,\nЧто им Божий цветок? Им бы кончить работу свою.\nЯ на милость Твою уповаю, Спаситель мой, Господи,\nНа милость, на милость, лишь только на милость Твою.\n\nТолько вера в Тебя - вот моя неизменная спутница.\nВера в то, что Ты всем управляешь Своею рукой.\nИ я знаю, Господь, что всегда за меня Ты заступишься,\nИ спасительным камнем Ты станешь пред острой косой.\n\nА иначе, зачем Ты поил меня дивными росами?\nДля чего показал мне любовь и Свою доброту?\nДля чего Ты наполнил меня чудо-песнями, Господи? \nНеужель для того, чтобы бросить под ноги скоту?\n\nКосари на лугу отмахались уж острыми косами. \nЗавершён сенокос, только я невредимый стою,\nИ, как в прежние дни, упиваясь небесными росами, \nПрославляю Тебя за любовь и за милость Твою!"}, {"id": 827, "title": "Мне снилось: окончилась жатва, свезли и убрали снопы,", "text": "Мне снилось: окончилась жатва, свезли и убрали снопы,\nВ полях закипела работа, с деревьев снимают плоды. \nДругие по полной корзине, как им заповедал Христос, \nПриносят плоды Властелину, а я только листья принёс...\n\n    Я только листья принёс. Я только листья принёс. \n    Другие плоды с ликованьем несли,\n    Я только листья, листья, листья принёс.\n\nСвою ублажал только душу, для Бога не тратил я сил; \nДругие спасали заблудших, а я в удовольствие жил. \nПроходит туманная осень, настанет зима и мороз...\nПлоды мои братья приносят, а я только листья принёс.\n\nПроснулся я, страхом объятый, и больно мне стало до слёз: \nДень жизни клонился к закату, а я только листья принёс. \nРешился, пока ещё время, оставить мирские пути,\nУсердно трудиться с другими, чтоб Господу плод принести.\n\n    Господу плод принести, Господу плод принести,\n    Чтоб вся жизнь моя не напрасно прошла,\n    Хочется тоже, тоже плод принести."}, {"id": 828, "title": "Что посеял? Что посеял? При дороге что посеял?", "text": "Что посеял? Что посеял? При дороге что посеял?\nВот летят орлы и птицы, унесут зерно пшеницы,\nИ лишишься ты его, и лишишься ты его.\n\nЧто посеял? Что посеял? Средь камней ты что посеял? \nКамни только, почвы мало, вышло скоро, но завяло,\nТы остался без плода, ты остался без плода.\n\nЧто посеял? Что посеял? Между терний что посеял?\nЗнай, богатство иль невзгоды заглушат пшеницы всходы, \nНе дадут они плода, не дадут они плода.\n\nЧто посеял? Что посеял? В доброй почве что посеял?\nТо зерно уж не завянет, ожиданье не обманет,\nНо сторичный плод нам даст, но сторичный плод нам даст.\n\nЧто посеял? Что посеял? В этой жизни что посеял?\nВсё, что сеял в смертном теле словом уст твоих иль в деле, \nВсё пожнёшь за гробом ты, всё пожнёшь за гробом ты!"}, {"id": 829, "title": "Здесь и там поля белеют, глаз не видит им конца;", "text": "Здесь и там поля белеют, глаз не видит им конца;\nЖдут колосья золотые рук усердного жнеца.\n\n    Вышли делателей, Боже, на созревшие поля,\n    Чтоб собрали всё, что можно, пока жатва не прошла.\n\nВышли с раннею зарёю, в знойный полдень вышли их; \nВышли к вечеру на ниву поддержать жнецов Твоих.\n\nВерный труженик Господень, жни ячмень, пшеницу, рожь; \nЖатва кончится, на отдых в радость вечную войдёшь."}, {"id": 830, "title": "Господь, Ты так много для каждого сделал,", "text": "Господь, Ты так много для каждого сделал,\nТобою живёт, существует земля,\nОбильно столы наполняешь Ты хлебом, нам жизнь и дыханье даря.\n\n    Господь, благодарность поют Тебе люди \n    За данную милость и в этом году.\n    Спасибо, Отец! Тебя славить мы будем,\n    Прими за любовь и за милость хвалу.\n\nТы дал нам спасенье и счастье поверить,\nИ в жизни земной Ты немало добра\nДаёшь даже тем, кто сердечные двери закрыл и не принял Тебя.\n\nСтолы наши полны даров благодатных,\nБогатую жатву родили поля;\nМы милостью, Боже, Твоею объяты. «Спасибо!» - склонилась Земля!"}, {"id": 831, "title": "Не хотел бы я бесплодным к трону Господа прийти,", "text": "Не хотел бы я бесплодным к трону Господа прийти,\nХоть одну хотел бы душу, сноп один в руках нести.\n\n    Не хотел бы я бесплодным к трону Господа прийти, \n    Хоть одну хотел бы душу к Иисусу привести.\n\nИисус - мой Искупитель, смерти ночь мне не страшна,\nНо пустым пред Ним явиться, - вот, что так страшит меня.\n\nЕсли б мне года былые можно было возвратить,\nМне и радостью, и счастьем было б Господу служить.\n\nО, трудитесь, дети Божьи, день проходит, ночь близка;\nИ, пока не поздно, души вы спасайте для Христа."}, {"id": 832, "title": "Осенние листья на землю спадают,", "text": "Осенние листья на землю спадают,\nСнова покрыта листвою земля.\nПрирода вся блекнет и увядает,\nИ предвещает, что скоро зима.\n\nТак жизнь скоротечна и быстро проходит, \nСловно челнок, что скользит по волнам,\nИ с каждой минутой дальше уносит \nЧёлн мой в просторы, в большой океан.\n\nНа небе я буду со всеми святыми\nВ вечных просторах во славе Отца.\nМы станем навеки там молодыми,\nЖить будем вечно с Христом, без конца.\n\nОсенние листья всю землю укрыли,\nВеет прохладой на наши поля...\nНо жизнь нам дана, чтоб свято мы жили, \nДаром не тратя ни часа, ни дня."}, {"id": 833, "title": "Вдали склонялись нивы под солнечным лучом,", "text": "Вдали склонялись нивы под солнечным лучом,\nЖнецы, народ счастливый, шли каждый со снопом.\n\nБольной глядел уныло из дома своего:\n«Я слаб, к труду нет силы для дела Твоего».\n\nНо к ночи путник дальний пришёл к дверям его; \nСтакан с водой кристальной он вынес для него;\n\nКогда же, освежённый, тот путник вдаль ушёл,\nОн сноп позолочённый в своих дверях нашёл.\n\nИ Богу со слезами сказал он: «Сноп один \nПринёс я, но не мною он связан, Властелин.\n\nВоды во имя Бога прохожему я дал;\nНаутро у порога сноп этот увидал».\n\nИ слово в утешенье услышал он: «За твой\n Поступок в награжденье оставлен сноп живой;\n\nИ если кто, страдая, не в силах жать в полях,\nТот, скорбным помогая, найдёт свой сноп в дверях»."}, {"id": 834, "title": "Сей благое семя на зарнице жизни,", "text": "Сей благое семя на зарнице жизни,\nДля спасенья падших жертвуй и гори!\nСкоро будет осень, скоро все мы вместе \nВ радости великой соберём снопы.\n\n    Соберём снопы (снопы), соберём снопы (снопы), \n    В радости великой соберём снопы.\n\nСей, коль солнце светит, сей и в день ненастья,\nТьма и холод жизни дух да не смутит.\nТвой посев созреет, кончатся страданья,\nК жатве верной, чудной пусть душа спешит.\n\nСей, коль слёзы льются, Бог воздаст обильно,\nВесь отдайся сердцем гибнущих спасать.\nСлёзы Сам отрёт Он в день, когда пойдём мы \nВ радости великой жатву собирать."}, {"id": 835, "title": "Неужели без плодов я явлюсь на Божий зов", "text": "Неужели без плодов я явлюсь на Божий зов\nВ день, когда велит Он мне пред Ним предстать?\nНе останусь ли в стыде, коль Он спросит: «Сноп твой где?» \nЧтоб с пустыми мне руками не предстать!\n\n    О, как сильно б я желал, чтобы мой Господь вписал \n    В книгу жизни, что белее снега я;\n    Чтоб в пути я не ослаб и услышал: «Верный раб!\n    За труды венец и слава ждут тебя!»\n\nКак жалеть там буду я, встретив своего Царя,\nЧто таланты не умножил я свои.\nИ никто не скажет мне: «Ты был вождь моей душе \nИ помог мне ко Спасителю прийти».\n\nБлагодарностью горя к Возлюбившему меня,\nЯ хочу трудиться до поры ночной,\nЧтобы сноп, хотя б один, чрез меня мой Господин\nПолучил, когда приду к Нему домой.\n\nТруд окончу я когда, то услышу ль от Христа:\n«Верный раб! Войди, тебя здесь место ждёт?»\nМного ль я снопов златых понесу в руках своих \nВ день, когда меня домой Он позовёт?"}, {"id": 836, "title": "Как, роняя листву поздней осенью,", "text": "Как, роняя листву поздней осенью,\nНам деревья приносят плоды,\nТак, роняя слезу, Боже, просим мы:\nДай принесть в жизни нашей плоды.\n\n    Плоды, плоды, плоды святой любви \n    Приносить дай Тебе каждый час. \n    Боже, Ты всегда во мне живи,\n    Чтоб мой дух без Тебя не угас.\n\nКак склоняется колос к земле порой,\nНе гордится, как колос пустой,\nДай склониться у ног Твоих, Боже мой, \nЧтобы мы принесли плод святой.\n\nНаучи нас, Спаситель, как жизнь прожить, \nЧтобы ближним своим послужить,\nИ не словом, а делом их всех любить,\nО Господь, помоги, помоги.\n\nТа любовь, что Христос подарил всем нам, \nПусть горит в каждом сердце огнём, \nЗажигает других и к Нему ведёт,\nБлагодать всем и радость несёт."}, {"id": 837, "title": "Под горой смоковница растёт, - сколько к ней приложено труда!", "text": "Под горой смоковница растёт, - сколько к ней приложено труда! \nВот садовник снова к ней идёт, а она стоит всё без плода.\n\nВ одеянье, пышная, стоит, ветви распростёрла над землёй,\nА садовник грустно говорит: «Что, скажи, случилось вдруг с тобой?\n\nПомнишь, ты былинкою была? Я тебя прилежно поливал,\nТы под солнцем быстро возросла, и твой плод мне радость доставлял.\n\nГордою окуталась листвой, ты себя ведь можешь погубить, \nПовелел вчера хозяин твой мне тебя, бесплодную, срубить!\n\nНо Его в слезах я умолял, дал тебе Он срок ещё на год». \n«Срубишь ты её, - Он так сказал, - если Мне не даст она свой плод!»\n\nО мой друг, не так ли мы с тобой без труда, без святости живём? \nНас покинул сладостный покой, исполненья приговора ждём.\n\nНо Господь не хочет нас губить, Он продлил ещё нам жизни срок; \nБудем мы Его благодарить, помня той смоковницы урок."}, {"id": 838, "title": "Нива вся белёшенька стоит, золотые зёрна осыпаются.", "text": "Нива вся белёшенька стоит, золотые зёрна осыпаются.\nТолько ветер ниву шевелит, но ничьи здесь спины не склоняются.\n\nСолнце ещё яркое горит, обогреет, ободрит работников,\nНо никто на жатву не спешит, мало любящих её охотников.\n\nГде жнецы, где труженики дня? На работу долго собираются, \nХолодом уж веет на полях, лучших дней уж пусть не дожидаются.\n\nИли мы способны пожинать лишь плоды мирского утешения? \nКто же будет Божью ниву жать, собирать плоды её спасения?\n\nПоспешим, о милые друзья, собирать плоды Христова дела. \nНаступает уж кончина дня - нива долгожданная созрела."}, {"id": 839, "title": "«Хлеб насущный нам дай на сей день»,— слышен стон городов, деревень.", "text": "«Хлеб насущный нам дай на сей день»,— слышен стон городов, деревень. \nИ Господь всемогущей рукой землю делает щедрой такой.\nНа земле каждый час, каждый миг светит солнце для добрых и злых, \nИ нисходят дожди в облаках - Бог для всех одинаково благ.\n\nС неба пало святое зерно, на земле умирало оно,\nПроросло в многоцветье веков, принесло миллионы плодов.\nЭто подвиг Страдальца Христа, хлебом жизни для многих Он стал.\nИ тот день, когда смерть Его чтут, преломлением хлеба зовут.\n\nБлагодарными стоит нам быть, Иисуса взаимно любить.\nЛучше нет на земле никого Иисуса Христа моего!\nНа земле каждый час, каждый миг светит солнце для добрых и злых, \nИ нисходят дожди в облаках - Бог для всех одинаково благ!"}, {"id": 840, "title": "Неужели, мой Бог, я останусь, когда Ты за Своими придёшь?", "text": "Неужели, мой Бог, я останусь, когда Ты за Своими придёшь? \nНеужели, неужели же день тот настанет,\nА меня Ты с Собой не возьмёшь?\n\nНеужели в момент вознесенья не поднимешь меня в небеса?\nНе услышу, не услышу небесное пенье,\nНе увижу Твои чудеса?\n\nНеужели, мой Бог, я останусь, в Твою славу ужель не войду? \nКогда день тот, когда день тот желанный настанет,\nНеужели подвергнусь суду?\n\nНеужели друзья и подруги в облаках воспоют новый гимн - \nЯ останусь, я останусь на горе и муки.\nБез надежды и цели, один?\n\nНо не только с друзьями, я знаю, мне придётся расстаться тогда,\nТолько больше, только больше я потеряю,\nПотеряю Христа навсегда.\n\nБезутешные будут рыданья, в страшной боли застынет душа.\nИ одно лишь, и одно лишь стучится в сознанье:\nЯ остался, друзья, навсегда.\n\nО мой Бог, для того Ты сегодня моё сердце тревожишь опять. \nЧтобы в день тот, чтобы в день тот великий Господний\nТы меня мог на небо принять.\n\nБудет день, может, даже сегодня: на земле сей окончится жизнь. \nТолько Церковь, только Церковь легко и свободно\nОт земли сей поднимется ввысь.\n\nНебеса чудным пеньем объяты - то ликует Невеста Христа. \nТолько поздно, только поздно тогда будет плакать.\nПоздно будет стучаться тогда."}, {"id": 841, "title": "Скоро день тот придёт, где не будет ни забот,", "text": "Скоро день тот придёт, где не будет ни забот,\nНи печали, ни невзгод, ни нужды и ни тревог.\nМир царит в стране святой, тьмы не будет никакой,\nЧто за день, радостный день будет там!\n\n    Что за день будет там, когда встречу я Христа!\n    Он возьмёт меня с Собой в край небесный, неземной. \n    Руку даст Он мне Свою, и я с Ним туда войду,\n    Что за день, радостный день будет там!\n\nТам не будет забот, мир и радость не пройдёт,\nНет болезни там следа - радость будет без конца.\nБуду вечно я тогда прославлять Царя Христа,\nЧто за день, радостный день будет там!\n\nСкоро день тот придёт, когда Царь царей грядёт,\nОн придёт и за тобой, чтобы взять тебя с Собой.\nБудешь ли готов тогда встретить своего Творца?\nЧто за день, радостный день будет там!"}, {"id": 842, "title": "Сторож, скажи: сколько - ночи? В час поздний иду я домой,", "text": "Сторож, скажи: сколько - ночи? В час поздний иду я домой,\nИ тьма застилает мне очи, тяжёл путь лежит предо мной!\nНо сторож отвечает мне: «Близится утро, но ещё ночь.\nНеси свой крест, борись с грехом. Близок уж день Христов».\n\nСторож, скажи: сколько - ночи? Пришелец в стране я земной. \nОтчизна моя на Сионе, туда я спешу всей душой.\nНо сторож отвечает мне: «Близится утро, но ещё ночь. \nСтремись скорей идти вперёд. Близок уж день Христов».\n\nСторож, скажи: сколько - ночи? Когда же наступит рассвет? \nМой путь каменистый, колючий, устал я, и сил больше нет. \nНо сторож отвечает мне: «Близится утро, но ещё ночь.\nПроси у Бога силы вновь. Близок уж день Христов».\n\nСторож, скажи: сколько - ночи? И долго ль во мраке идти? \nКогда же узрят мои очи день славы, день вечной любви?\nНо сторож отвечает мне: «Близится утро, но ещё ночь.\nТвой скорбный путь к концу идёт. Близок уж день Христов»."}, {"id": 843, "title": "Долго, за годом год, я на земле живу,", "text": "Долго, за годом год, я на земле живу,\nЖду я, когда придёт встреча с Тобой, Иисус.\nГолос я слышу Твой, нежно меня зовёт.\nВстречи я жду с Тобой, знаю, меня Ты ждёшь.\n\n    Я встречи жду с Тобой, Спаситель мой дорогой, \n    И в Обители святой пребуду я с Тобой!\n    Я встречи жду с Тобой, Спаситель мой дорогой, \n    И в Обители святой вечно буду я с Тобой.\n\nВ дивный Твой дом войду, облик увижу Твой;\nТам я приют найду, там я найду покой,\nТам я тепло найду, там я найду любовь.\nВстречи желанной жду, встречи я жду с Тобой."}, {"id": 844, "title": "Христос придёт опять, о, верьте, не с тем венцом, что был в крови.", "text": "Христос придёт опять, о, верьте, не с тем венцом, что был в крови. \nПридёт Он как Владыка жизни, чтоб суд свершить Свой над людьми.\n\nПред Ним предстанут все народы и все распявшие Его\nИ горько, горько плакать будут, но уж напрасно будет всё.\n\nПред Ним увидим мы Пилата и всех насмешников Его,\nИ тех, кто шёл с мечом на брата и делал ближнему лишь зло.\n\nПредстанут те, кто в этой жизни Христа заветы отвергал,\nИ те, кто шёл к святой Отчизне, и кто святыню попирал.\n\nПридёт опять! - я повторяю, я говорю вам не мечту,\nНо правду Божью возвещаю, как Он сказал: «Опять приду!»\n\nО вы, народы, пробудитесь, довольно спать во тьме греха,\nВражду забудьте, обнимитесь и будем ждать с небес Христа!"}, {"id": 845, "title": "Господь, когда придёшь Ты Сам, недугам, скорби и слезам", "text": "Господь, когда придёшь Ты Сам, недугам, скорби и слезам \nС любовью положить конец и дать нам вечный Твой венец?\n\nСпасённые рукой Твоей в долине бедствий и скорбей,\nТам в мире будем жить с Тобой и славить вечно подвиг Твой.\n\nХристос, Спаситель мой и Свет, и верный Вождь в долине бед; \nДуша с Тобой и в смертный час не примет смерти: Ты за нас!\n\nСтраданья, казнь и смерть вкусил и Кровью все грехи омыл, \nХристос Господь, Спаситель мой! Ты дашь и мне вкусить покой."}, {"id": 846, "title": "В час, когда труба Господня над землёю прозвучит,", "text": "В час, когда труба Господня над землёю прозвучит,\nИ настанет вечно светлая заря,\nИмена Он всех спасённых в перекличке повторит, - \nТам по милости Господней буду я.\n\n    На небесной перекличке (на небесной перекличке буду я), \n    На небесной перекличке (на небесной перекличке буду я), \n    На небесной (на небесной) перекличке, -\n    Там по милости Господней буду я!\n\nВ день блаженный воскресенья всех умерших во Христе, \nВодворенья их в обители Царя,\nВсех святых, омытых Кровию, пролитой на кресте,\nСозовёт Он, и на зов отвечу я.\n\nДай трудиться для Тебя, Господь, любовью всем служить \nС утра раннего и до заката дня,\nА когда велишь работу мне земную Ты сложить,\nНа небесный клич тогда предстану я."}, {"id": 847, "title": "Друг, тебе без Христа одиноко, ты стоишь на опасном пути,", "text": "Друг, тебе без Христа одиноко, ты стоишь на опасном пути,\nНо любовь милосердного Бога тебя может от ада спасти.\nОн придёт во мгновение ока и воздаст по заслугам тебе,\nНо людей, прославляющих Бога, соберёт в дом на небо к Себе.\n\nЗнаю я, что исчезла б усталость, если б ангел пред нами предстал \nИ сказал бы: «Неделя осталась до прихода на землю Христа».\nПредставляю себе ту тревогу: позабыв о земной суете,\nМы взывали б усерднее к Богу, проповедуя всем о Христе.\n\nПрекратились бы войны и ссоры, люди с Богом вступили б в союз, \nЗная то, что придёт очень скоро за народом Своим Иисус. \nОсознав, что такое Голгофа, поднимали бы к небу глаза...\nО друзья, а вы встретить готовы, Иисуса Христа-Жениха?\n\nНо такого вовеки не будет, никогда. Почему? Слушай, друг:\nКак, мигая, смыкаются веки, Он придёт неожиданно, вдруг.\nО, покайся в грехах перед Богом и тогда избежишь новых бед.\nОн придёт во мгновение ока, Он придёт при последней трубе."}, {"id": 848, "title": "Быть может, зарёй, когда утро начнётся,", "text": "Быть может, зарёй, когда утро начнётся,\nИ солнечный луч сквозь туманы пробьётся,\nПридёт Иисус в полноте Своей славы \nСобрать от земли Своих.\n\n    О Спаситель, мы ждём, когда пред Тобой воспоём:\n    Он грядёт к нам! Аллилуйя! Аллилуйя! Аминь! (2 раза)\n\nБыть может, и в полдень иль в час полуночи \nВнезапно увидят Его наши очи:\nОн будет идти к нам в сиянии света,\nЧтоб взять от земли Своих.\n\nИ воинства Божии, с неба спускаясь,\nИ души спасённых, с Грядущим сливаясь, - \nВсе вместе Ему воспоют песнь хваленья,\nЧто взял от земли Своих.\n\nО, радость - туда перейти без страданий,\nБез боли, недуга, без мук умиранья,\nБыть Господом в славу Его восхищённым,\nКуда Он возьмёт Своих."}, {"id": 849, "title": "Тихое небо, пурпурный закат... Хочется словом ударить в набат:", "text": "Тихое небо, пурпурный закат... Хочется словом ударить в набат:\nМир заторможен, и люди как лёд; слушайте, слушайте: Царь ваш идёт! \nСквозь завывания снежной пурги вот раздаются Господни шаги. \nВстаньте сегодня, кто ждать не устал, в славе небесной встречайте Христа.\n\n    Встань, кто поверил, прислушайся, жди;\n    Вскоре заплачут пароды земли.\n    Сердцем доверься Христу поскорей - \n    Вот Он на облаке, наш Назорей!\n\nНет, не младенцем Он явится вновь, чтобы пролить непорочную Кровь; \nВсё это было и было давно, в Сыне распятом спасенье дано. \nЦерковь-Невеста, уйди от греха, встретить готовься Христа-Жениха, \nСердцем доверься Христу поскорей - вот Он на облаке, наш Назорей!\n\nТихое небо, багровый закат, медленно тает последний набат;\nНет, не уйдёт этот мир от судьбы, слышатся звуки последней трубы."}, {"id": 850, "title": "Звёзды на небе сияли; ночь была светла, тиха.", "text": "Звёзды на небе сияли; ночь была светла, тиха.\nДесять дев в чертоге спали, ожидая жениха.\nВсе они в руках имели каждая светильник свой;\nМасла взять не захотели неразумные с собой. (2 раза)\n\nПять разумных масла взяли и спокойно, без забот \nВ доме мирно почивали, веря в радостный приход.\nВдруг раздался в час полночный громкий клич: «Жених идёт!»- \nТо глашатай полномочный к пробужденью всех зовёт. (2 раза)\n\nПять разумных пробудились, стали пламя поправлять;\nИ, как прежде, засветились их светильники опять.\nНеразумные несчастны; масло покупать пошли,\nНо пришёл Жених прекрасный, мудрые на пир вошли. (2 раза)\n\nНеразумные приходят и не видят дев других,\nИ приёма не находят, он закрыт навек для них.\nДети Божии, похожи будьте вы на мудрых дев,\nЧтоб, услышав голос Божий, не навлечь Господень гнев. (2 раза)\n\nМасла чистого от Бога - Духа Божья, сил святых - \nЗапасите много-много для светильников своих.\nЧтоб, когда Жених прекрасный к нам придёт в лучах порфир,\nВы могли с отрадой ясной с Ним войти на вечный пир. (2 раза)\n\nНе дремлите, бодры будьте, от очей гоните сон!\nА уснёте - не забудьте, что придёт нежданно Он.\nВо Христе всегда трезвитесь, укрепляйтесь верой в Нём,\nС дремотой сердец боритесь, ночью бодрствуйте и днём! (2 раза)"}, {"id": 851, "title": "Творец вселенной, души нетленной, Господь Спаситель наш вездесущ;", "text": "Творец вселенной, души нетленной, Господь Спаситель наш вездесущ; \nВесь мир огромный, Им сотворённый, нам говорит: Бог всемогущ.\n\n    О, да, всемогущий Он, всесилен Его закон!\n    И что Бог когда-то мог творить, в силах теперь свершить!\n\nВ одно мгновенье, в виссон одетый, на небо поднят был Илия.\nБог хочет ныне, чтоб были в силе, всегда готовы ты и я.\n\nСедрах, Мисах и Авденаго решили верными Богу быть,\nИх вражья сила не победила, их Бог в печи смог сохранить.\n\nИ если будем мы верны Богу, Он будет в мире нас охранять;\nОн за святыми в великой силе придёт, чтоб в небо их принять."}, {"id": 852, "title": "Господь мой, Тебя люблю я, ожидаю каждый миг,", "text": "Господь мой, Тебя люблю я, ожидаю каждый миг,\nКогда же исполнишь Слово и придёшь, чтоб взять Своих? \nСейчас же, пока Ты медлишь, я очи возвожу к горам, \nДержусь за все слова Твои, что возвещал Ты нам.\n\n    Может, день один, может, ночь одна,\n    Лишь одна слеза иль капля пота,\n    И в нежданный миг явит Он Свой лик -\n    И увижу я во славе Христа!\n\nЯ слышу, что мир страдает, но страх душу не объял:\nЯ вижу, как исполняет Господь наш то, что обещал. \nНадежда моя на Бога! Я верю: Он поможет мне,\nИ хоть скитаюсь по земле, я счастлив с Ним вполне!"}, {"id": 853, "title": "Вот идёт Господь с сияньем и с победным торжеством,", "text": "Вот идёт Господь с сияньем и с победным торжеством,\nО, придите с ликованьем и пред Ним с хвалой падём!\n\nБратья, славу воспевайте: воцарился Муж скорбей!\nИ на Господа взирайте взором радостных очей.\n\nСлавный день настал венчанья, на престол Господь вступил, \nИ основы мирозданья свет спасенья озарил.\n\nНа кресте в венце терновом голова была Христа,\nА теперь в сиянье новом блещет лика красота.\n\nВ небесах в согласье стройном все хвалу Христу поют, \nВдохновением спокойным реки радости текут.\n\nБратья, славу воспевайте: воцарился Муж скорбей!\nИ на Господа взирайте взором радостных очей."}, {"id": 854, "title": "Христос! Ты в Кане Галилейской на брачный праздник приходил,", "text": "Христос! Ты в Кане Галилейской на брачный праздник приходил, \nИ в первый раз средь тьмы житейской Ты славу там Свою явил.\n\n    О Господи (Господи)! Ты к нам (к нам) приди и славу Свою яви. \n    О Господи (Господи)! Ты к нам (к нам) приди и нас благослови!\n\nПриди и к нам, как Гость чудесный, и радостью благослови,\nИ укрепи Ты связью тесной союз по вере и любви.\n\nТы радость брака освящаешь, Ты в Церкви вечной как Жених \nНа брачном пире восседаешь среди искупленных Своих.\n\nТы всех зовёшь на праздник славы, и дай, чтоб новая чета,\nХраня всегда Твои уставы, могла войти на брак Христа."}, {"id": 855, "title": "В этот радостный день, в этот праздничный час", "text": "В этот радостный день, в этот праздничный час \nДве судьбы съединились в одну,\nЧтоб по тихим и грозным житейским волнам \nВместе плыть в ту родную страну.\n\n    В океане бушующем жизни земной \n    Поплывёт ваш челнок по волнам.\n    Пусть Христос управляет вашей ладьёй, \n    Чтоб счастливо доплыть в Ханаан.\n\nВетры злые не раз встретят вас на пути \nИ челнок ваш накроет волной;\nТолько там, где Христос, только там есть покой, \nТолько там мир царит и любовь.\n\nИскупитель Христос - дивный ваш капитан; \nПусть направит Он ваши пути,\nК тихой гавани вас доведёт по волнам,\nБудет солнце сиять впереди.\n\n    В океане бушующем жизни земной \n    Будет плыть ваш челнок по волнам.\n    К тихой гавани вас доведёт Иисус \n    По житейским и грозным волнам."}, {"id": 856, "title": "Две руки пред Богом ныне съединились навсегда", "text": "Две руки пред Богом ныне съединились навсегда \nДля пути в земной долине, для совместного труда.\nДля поддержки обоюдной в начинаниях благих.\nРуку милостей, о Чудный, возложи теперь на них.\n\n    О Господь, любовь пошли, любовью той их озари,\n    Два сердца съедини в одно! Благослови!\n\nДве души теперь желали по любви в союз вступить,\nЧтобы радости, печали здесь безропотно делить.\nЧтобы две души отныне были в мире как одна,\nДуха мира и святыни им пошли, Господь, сполна.\n\nДвое уст теперь сказали пред Отцом святое «да!»,\nОбещанье Богу дали на всю жизнь и навсегда.\nЧтобы с каждым днём дороже и светлее был обет,\nПусть Твои уста, о Боже, съединят на много лет.\n\nВот два имени различных - одно целое теперь;\nОт невзгод, нам столь привычных, от житейских бурь, потерь, \nО, избавь их, Боже правый, и в одно соедини.\nИ Твоё пусть имя славы озаряет все их дни."}, {"id": 857, "title": "Любите друг друга, любите от чистого сердца,", "text": "Любите друг друга, любите от чистого сердца,\nЧтоб ваши сердца разгорались светлой мечтой,\nЧтоб были сияющим, неугасающим светом,\nЧтоб видели в вас эту Божью святую любовь.\n\n    Нам любовь не объять, не описать, не объяснить, \n    Как она велика, глубока.\n    Пусть у вас каждый час пламенеет в сердцах \n    Мир святой, что превыше ума.\n\nХраните вы мир и отныне живите в согласье,\nИ будьте всегда как святые в поступках своих,\nЧтоб были для всех людей вы образцом настоящим,\nИ прежде всего вы стремились Христу угодить.\n\nПусть будет всегда лишь святая любовь в вашем сердце, \nНе дети вы тьмы, чтобы слушаться голоса зла.\nВнемлите сердцами вы Божьим словам наставленья: \n«Всем сердцем любите друг друга, а также Христа!»"}, {"id": 858, "title": "Дайте руки друг другу. Отныне вдвоём,", "text": "Дайте руки друг другу. Отныне вдвоём, \nОзарённые счастьем, пойдёте вы вместе. \nПуть далёк перед вами, и будут на нём \nИ шипы, и цветы, и разлуки, и встречи.\n\nНе теряйте тепло нежных любящих рук.\nТо, что Бог сочетал, пусть никто не разлучит. \nБерегите любовь от страданий и мук,\nЕсли небо закроют коварные тучи.\n\nГоворите друг другу такие слова,\nОт которых на сердце тревога растает.\nВ мире зла и греха не хватает тепла, \nИсцелительных слов и любви не хватает."}, {"id": 859, "title": "Юность ваша улетела, навсегда ушла.", "text": "Юность ваша улетела, навсегда ушла.\nЗвонкой песней отзвенела, розой отцвела.\n\n    Поздравляем, поздравляем, счастья, радости желаем, \n    Пусть Господь благословит вас навсегда! (навсегда!)\n\nВас любовь соединила нежною рукой,\nСохранить её старайтесь навсегда такой.\n\nСам Господь пусть будет вашим жизненным Вождём,\nИ ведёт рукой премудрой истинным путём."}, {"id": 860, "title": "Дай, Боже, им счастье на многие дни,", "text": "Дай, Боже, им счастье на многие дни,\nОт бурь и ненастья их в мире храни.\n\nПусть жизнь их приятно и мирно течёт \nИ свет благодатный кругом да прольёт!\n\nДай мудрость им, Боже, здесь в жизни земной \nБогатств всех дороже ценить Твой покой!\n\nПошли освященье взаимной любви\nИ к небу стремленье в сердцах обнови.\n\nВ надежде священной Ты их утверди!\nДар веры бесценной Ты в них соблюди!\n\nДай видеть им ясно, что с ними Твой Дух,\nЧто хочешь Ты властно водить их, как Друг."}, {"id": 861, "title": "Вот и вы уж вдвоем свою тропку нашли,", "text": "Вот и вы уж вдвоем свою тропку нашли,\nЧтобы вместе по ней было легче идти.\nВот уже и для вас эти гимны поют \nИ приветствуют ваш любви добрый союз.\n\n    А мы желаем счастья, счастья молодым \n    И лебединой верности желаем им.\n    Пусть жизнь благословится ваша во все дни,\n    А мы желаем счастья, счастья, счастья молодым.\n\nА совсем ведь недавно вы были детьми.\nПомнят мамы и папы счастливые дни.\nБеззаботная радость сияла в глазах,\nИ, казалось, что детству не будет конца.\n\n«Здравствуй, юность крылатая, чудо-пора!» - \nКак недавно сказали вы эти слова.\nВашу жизнь вы свяжите навек со Христом,\nИ Он будет всегда вашим добрым вождём."}, {"id": 862, "title": "Вы постройте счастье семейное, как возводят добротный дом,", "text": "Вы постройте счастье семейное, как возводят добротный дом,\nЧтоб под натиском бурь и времени был уютным вам очагом.\n\n    И тогда не придёт сожаление: как тяжёл этот брачный груз! \n    Будет вера и будет терпение, а ценнее всего - Иисус!\n\nЧтоб фундамент ваш не был расколотым и не тронули трещины стен, \nЕсть совет, он ценнее золота - строить счастье на камне-Христе.\n\nДаже в трудностях будет торжественность: рядом Тот, Кто всему Творец! \nИ такое земное шествие будет счастьем для двух сердец."}, {"id": 863, "title": "Пусть не золота изделье и не камень дорогой,", "text": "Пусть не золота изделье и не камень дорогой,\nПусть не жемчуг, ожерелье украшают, украшают образ твой.\n\nКамнем верности заветной, пышным цветом доброты,\nСветом радости, привета украшайся, украшайся в жизни ты.\n\nС торжествующим смиреньем, в кроткой нежности, любви, \nБудь сама ты украшеньем, на восторг, на восторг других живи.\n\nБудь счастливой, разливая счастье мирное вокруг,\nВот что хочет, дорогая, от тебя, от тебя твой лучший друг"}, {"id": 864, "title": "Авраам при смерти был, и слуге он поручил", "text": "Авраам при смерти был, и слуге он поручил\nЕхать в дальнюю страну, сыну там искать жену.\n\nНе боясь ни бед, ни зол, в даль степей слуга пошёл;\nВскоре пышный караван прибыл в край, где жил Лаван.\n\nЗдесь он к Господу воззвал: «Старцу раб Твой слово дал \nСыну подыскать жену и пришёл в сию страну.\n\nБоже Вышний, помоги делу Твоего слуги!\nВот колодезь, слышу дев, говорящих нараспев.\n\nДевы воду в нём берут, в кувшинах домой несут.\nПросьбе Ты внемли моей: если из руки своей\n\nЖажду утолив мою, дева молвит: «Напою\nИ твоих верблюдов я», - значит дева та - Твоя.\n\nЗначит, той судил Святой Исааку быть женой».\nВскоре дева подошла и кувшин свой налила.\n\nОн напиться попросил, из руки её испил,\nИ прибавила она, светлой радостью полна:\n\n«Я хочу из рук моих и верблюдов всех твоих Напоить». \nИ вот - бежит и охотно всех поит.\n\nИ тогда сказал он ей: «Бог в ответ мольбе моей \nНа тебя мне указал, чтобы я тебя избрал.\n\nТы должна идти со мной, Исааку быть женой».\nСердцем кротка и тиха, и не видя жениха,\n\nВерой приняла она, что Творцом ей суждено \nЖить вдали, в краю чужом с неизвестным женихом.\n\nИ Ревекка с тем слугой в край поехала чужой.\nЕдет, ясна и чиста на верблюде дева та.\n\nСтепь великая тиха - дева видит жениха!\nРадостно забилась грудь: кончен дальний, трудный путь.\n\nДевы юные! Во всём вы советуйтесь с Творцом:\nТяжек жизненный вопрос, вы немало льёте слёз.\n\nТрудно на земле тому, кто не вверится Ему.\nВы желаете найти друга жизни на пути?\n\nСтаньте Бога умолять, указанья свыше ждать,\nОн пошлёт вам жениха, будет ваша жизнь тиха,\n\nБез смертельных ран и битв. Верьте в мощь святых молитв! \nС каждою нуждой к Творцу обращайтесь как к Отцу."}, {"id": 865, "title": "Пути ваши вместе сошлись, сказали вы общее «да!»", "text": "Пути ваши вместе сошлись, сказали вы общее «да!»\nИ жизнью своею слились в едину семью навсегда.\nПусть этот союз дорогой скреплен будет Богом навек,\nЧтоб вам помогал Всеблагой, и чтоб не мешал человек.\n\nОтныне пойдёте вдвоём, и путь станет уже для вас,\nИ жизнь будет общим ручьём в ненастный иль радостный час. \nНо пусть не страшит вас ничто, делите вы всё пополам,\nТогда будет в жизни легко вам плыть по житейским волнам.\n\nЗаботьтесь теперь вы о том, чтоб мира тепло сохранить, \nПускай он согреет ваш дом, чтоб вечно могли вы любить. \nСтремления ваши одни: в небесный приют дорогой,\nГде сбросите бремя земли и где обретёте покой."}, {"id": 866, "title": "Бог того сочетал по любви, чьи сердца Его верой полны,", "text": "Бог того сочетал по любви, чьи сердца Его верой полны, \nСогласились идти по пути, все невзгоды, встречая, нести.\nМного разных сердец, но одно, лишь одно к тебе лаской полно. \nВсех дороже оно и родней - это сердце любимой твоей.\n\nЗагрустишь - и оно загрустит, недоспишь - и оно недоспит.\nЕсли ты улыбнёшься порой, и оно улыбнётся с тобой.\nБереги ты его и ласкай, стереги ты его, не бросай,\nВсё прости, всё отдай, всё отдай, не разбей ты его невзначай.\n\nМного разных сердец, но в одном, лишь в одном твой приют и твой дом. \nВсех дороже оно и родней - это сердце любимой твоей.\nНе изменит оно, не солжёт, всё оценит в тебе, всё поймёт,\nА постигнет ли в жизни беда, не оставит тебя никогда."}, {"id": 867, "title": "Где Божий Дух в сердцах живёт, там счастье, там любовь", "text": "Где Божий Дух в сердцах живёт, там счастье, там любовь \nНе только милых обоймёт, но также и врагов.\n\n    Твою любовь, Господь пошли; любовью той их озари \n    Соделай так из двух одно, чтоб имя славилось Твоё.\n\nГде Божия любовь царит, там мир, там нет вражды;\nВ опасностях Господь хранит, и нет ни в чём нужды.\n\nГде Божия любовь царит, в народе иль в семье,\nГде жизнью Бог руководит, там счастливы вполне."}, {"id": 868, "title": "Вы сегодня в счастливом волнении", "text": "Вы сегодня в счастливом волнении \nПрошептали своё слово «да!»\nРаздаются кругом поздравления:\n«Будьте счастливы, наши друзья!»\n\n    Сохраните любовь до конца своих дней,\n    Как чудесный подарок от Бога;\n    Пусть с годами не меркнет она, по сильней \n    Засияет на вашей дороге.\n\nСчастье в ваших глазах пусть засветится,\nИ в одно пусть сольются сердца,\nА чтоб в жизни вам горе не встретилось - \nНикогда не забудьте Творца.\n\nЭтот день вам, конечно, запомнится \nИз тех дней, что придётся прожить.\nКаждый миг добротой пусть наполнится,\nЧтоб могли вы друг друга любить."}, {"id": 869, "title": "Два сердца забились в груди. Две жизни слились на пути.", "text": "Два сердца забились в груди. Две жизни слились на пути.\nКак крылья у птицы одной, собрались в полёт свой большой.\n\n    И чтоб не ослабнуть в далёком пути,\n    И солнечный край там себе обрести,\n    На помощь скорее к семейному кругу \n    Спешите, спешите, спешите друг к другу.\n\nО, ясное небо, простор! К нему вы направьте свой взор, \nСтремитесь к Отчизне святой, к желанной стране неземной.\n\n    И солнышка свет пусть вам светит в окно,\n    И вашу семью пусть согреет оно,\n    А если ненастье - к семейному кругу,\n    Спешите, спешите, спешите друг к другу.\n\nВсегда пусть горит та звезда в счастливой семье молодой,\nДа светит она сквозь года, весь мир освещая собой.\n\n    Пусть ярче горит это пламя любви \n    И нежные чувства его полноты,\n    А если ненастье - к семейному кругу,\n    Спешите, спешите, спешите друг к другу."}, {"id": 870, "title": "Если двое друг друга находят средь других в океане людском.", "text": "Если двое друг друга находят средь других в океане людском. \nЕсли вместе пути свои сводят, чтобы дальше идти им вдвоём, \nЗначит, счастье пришло к ним большое, значит, верность любви сберегли, \nВсё же так хорошо, если двое в целом мире друг друга нашли. (2 раза)\n\nХорошо, когда рядом с тобою сердце верное бьётся всегда,\nЕсли встретишься в жизни с бедою, с другом верным беда не беда. \nДорожите любовью своею, не теряйте от счастья ключи,\nВсё же так хорошо, когда рядом друга верного сердце стучит. (2 раза)\n\nЕсли будете верны друг другу, исполняя священный обет,\nТо Спаситель протянет вам руку и поддержит средь горя и бед.\nБог направит вас к вечной Отчизне, где не будет ни горя, ни слёз. \nВсё же так хорошо, когда рядом, всегда рядом Спаситель Христос. (2 раза)"}, {"id": 871, "title": "Боже, предстали по воле Твоей ныне с невестой жених пред Тобой:", "text": "Боже, предстали по воле Твоей ныне с невестой жених пред Тобой: \nВместе решают пройти путь земной, благослови Ты союз их святой.\n\n    О, возложи, Боже, руку на них,\n    В жизни держаться путей дай Твоих;\n    О Боже, мы их приносим в мольбе,\n    Сам Ты пребудь с ними в жизни везде.\n\nЖизни совместной для них будет путь. Ближе, о Боже, всегда к ним пребудь \nВ радости, скорби, печали, груде и сохрани их во всякой беде.\n\nО Боже, дай, чтобы в жизни сердца были друг другу верны до конца; \nЧтоб не прервался союз их святой, Сам Ты веди их до цели благой."}, {"id": 872, "title": "Христос, приди, как в дни былые, детей Своих благослови;", "text": "Христос, приди, как в дни былые, детей Своих благослови; \nСоедини их дни земные союзом мира и любви.\n\n    Желаем счастья! Лишь только счастья!\n    Пусть вас Господь благословит.\n\nПребудь в союзе и общенье Ты с ними, наш Отец благой,\nИ ниспошли им подкрепленье, излей на них Твой Дух Святой!\n\nДай, чтоб, живя в земной отчизне, они могли Тебя хвалить,\nИ наставляй их Словом жизни, как нужно верить и любить.\n\nПриди и щедрою рукою излей дары Свои на них!\nВенцом и славой неземною венчай, Господь, детей Своих."}, {"id": 873, "title": "Свадьбы день и памятен, и дорог,", "text": "Свадьбы день и памятен, и дорог,\nОн - как миг промчавшейся весны.\nИ хотя уйдет тропинка в горы - \nЛюбящим преграды не страшны.\n\n    Даже в скорби счастье не прервётся,\n    Если брак Господь благословит.\n    Пусть всегда гореть над вами будет солнце, солнце \n    Безграничной Божией любви. (2 раза)\n\nБез Христа непрочны узы брака,\nВ мире часто рвётся дружбы нить,\nГаснут радость и любовь во мраке,\nИ нельзя былого возвратить.\n\nСчастлива чета, когда Сын Божий \nСтал соединившим их звеном.\nБольшего богатства быть не может \nПилигримам в странствии земном."}, {"id": 874, "title": "Брачный час! Брачный час - это счастье для вас.", "text": "Брачный час! Брачный час - это счастье для вас. \nБрачный пир! Пусть дарует Бог вам мир,\nМир Христа, и любовь Бога Отца \nНе угаснет пусть в вас никогда.\n\n    Не угасает, не угасает любовь Христа,\n    Она дарует, дарует мир сердцам.\n    А мы желаем, желаем большой любви, \n    Чтобы любили друг друга вы.\n\nПоздравляем, поздравляем сердечно мы вас,\nИ желаем, желаем в этот час:\nСтройте вы дом хвалы, только в любви,\nИ Господь вас от зла сохранит.\n\nБерегите, берегите любовь вы свою \nИ храните, храните верною \nНавсегда сквозь года в жизни земной, - \nМы желаем любви вам святой."}, {"id": 875, "title": "Сегодня сердечно мы вас поздравляем", "text": "Сегодня сердечно мы вас поздравляем \nИ радости много, и мира, любви,\nИ дружбы сердечной, и счастья желаем \nНа вашем совместном житейском пути.\n\n    Пускай в ваше сердце беда не стучится,\n    Пусть радость продлится и счастье, и свет, \n    Но если нежданно беда постучится,\n    Христос вам поможет, подаст свой совет.\n\nА время всё мчится и не возвратится,\nИ жизнь улетает, как будто спешит.\nЧто было - не будет и не повторится.\nКак дорого время, хоть быстро летит.\n\n    Пускай в вашем сердце не будет несчастья,\n    С Иисусом живите, любите Его.\n    Пусть Он даст вам радость, любовь и согласье, \n    Ведь это на свете дороже всего.\n\nВсё в жизни мгновенно: и радость, и горе,\nА вечность всё ближе, спешит с каждым днём. \nУвидим Иисуса во славе мы скоро,\nВ Отчизну родную мы скоро придём.\n\n    Пускай в ваше сердце беда не стучится,\n    Пусть радость продлится и счастье, и свет. \n    Пускай в вашей жизни беда не случится,\n    А милость от Бога пребудет вовек.\n\n    Пускай в вашей жизни беда не случится,\n    Пусть горе промчится, в ваш дом не войдёт.\n    И пусть ваше счастье навеки продлится,\n    До встречи с Иисусом, Он скоро придёт!"}, {"id": 876, "title": "Мой дом и я служить хотим Тебе, Христос, лишь одному;", "text": "Мой дом и я служить хотим Тебе, Христос, лишь одному;\nНо дай мне силы самому послушным быть рабом Твоим.\n\nО, помоги в поступках всех быть самому в пример для тех,\nС которыми я должен жить, которых должен я любить!\n\nВсегда лишь мыслью занят я, чтоб я и вся моя семья \nВоздвигли в сердце нашем храм Твоим спасительным словам.\n\nТебе, как жертву, отдаю себя и всю мою семью.\nУслышь, Господь, мольбу мою и благодать излей Твою!"}, {"id": 877, "title": "Слово «мама» дорогое, ею надо дорожить:", "text": "Слово «мама» дорогое, ею надо дорожить:\nС её лаской и заботой легче нам на свете жить.\n\n    Если мать ещё живая, счастлив ты, что на земле \n    Есть кому, переживая, помолиться о тебе.\n\nКогда был ещё младенцем, и она в тиши ночной,\nСловно ангел, у постели охраняла мой покой.\n\nВ раннем детстве беззаботном я не знал, как трудно жить. \nМать трудилась, чтобы было чем кормить и напоить.\n\nПомню тихие беседы. Мать внушала мне о том,\nЧтоб был умным и примерным, жизнь свою сверял с Христом.\n\nПомню радостные встречи. Как с дороги приезжал,\nМатери родные плечи, как ребёнок, обнимал.\n\nПережил часы разлуки: мама обо мне в слезах\nК небу поднимала руки с пламенной мольбой в устах.\n\nА оставшись одинокой, сердцем к Господу горя,\nИ в любви своей глубокой, всё молилась за меня."}, {"id": 878, "title": "Много слов есть на свете, только самое нежное «мама».", "text": "Много слов есть на свете, только самое нежное «мама».\nНаша мама, что детям столько сил и любви отдала!\nТы теплом своих рук в самый лютый мороз согревала,\nСловно птица птенцов, укрывая от всякого зла.\nКак мы часто шалили, как мы часто тебя огорчали,\nМы не видели, сколько из-за нас проливала ты слез.\nВ суете наших дней мы совсем ещё не замечали \nНа твоей голове серебристого цвета волос.\n\n    Наша милая мама, ты совсем ещё не постарела,\n    Также нежен твой взгляд, как в далёкие детства года.\n    Всё почти, как тогда, только ростом поменьше ты стала, \n    Но для взрослых твоих сыновей молодою ты будешь всегда.\n\nНикогда мы не знали, когда по утрам ты вставала,\nНе считали ночей, когда не смыкала ты глаз.\nЗнали только, что ты всё умела и всё успевала,\nТы во всём нам старалась помочь, о себе забывая подчас.\nТы простыми словами в испытаниях нас утешала,\nТы учила любить, ты умела так тихо прощать!\nИ всю мудрость свою по крупицам ты нам отдавала,\nЧтоб потом мы смогли своим детям её передать."}, {"id": 879, "title": "Имя родное с детства мы слышим все.", "text": "Имя родное с детства мы слышим все.\nИмя родное несёт покой душе.\nС именем этим трудности не страшны,\nС ним и по жизни легко нам идти.\n\n    Ты подарила нам свою любовь и ласку, \n    Отдала улыбки свет и рук тепло.\n    За нас готова ты отдать и жизнь, родная, \n    Лишь бы детям было хорошо.\n\nТы говорила нам о любви Христа,\nКак Он, страдая, лил Свою кровь с креста,\nЧто ради нас Он сошёл на землю к нам,\nОткрыв дорогу к светлым небесам.\n\nИ незаметно мы повзрослели вдруг,\nНо, как и прежде, мама наш лучший друг!\nСнова, как в детстве, прижмёт к груди своей.\nВы берегите своих матерей."}, {"id": 880, "title": "Вспоминаю я ту золотую весну,", "text": "Вспоминаю я ту золотую весну,\nЮность, светлые дни незабвенные.\nВспоминаю я маму родную свою,\nЕё руки и волосы белые.\n\n    Знаю, мама моя, что тебе нелегко.\n    Ты растишь сыновей, ты растишь дочерей. \n    Отдаёшь им любовь, и всё в жизни своей \n    Бережёшь ты для нас, непослушных детей.\n\nТвои руки уже от работы дрожат,\nИ походка уж стала нетвёрдою;\nКак и прежде твой нежный и любящий взгляд \nВ жизни снова мне служит опорою.\n\nТы ведь тоже когда-то была молодой.\nПомнишь, мама, сама всё, наверное.\nПуть нелёгкий был пройден, родная, тобой,\nНо Иисусу осталась ты верною."}, {"id": 881, "title": "Отцы и матери, отцы и матери,", "text": "Отцы и матери, отцы и матери,\nМы благодарны вам за всё, за всё,\nЗа то, что с детства нас к Христу направили,\nИ с Ним мы радостно теперь живём.\n\n    О, дай, Господь, чтоб вместе с вами мы \n    На небесах Христа прославили. (2 раза)\n\nА сколько слёз пришлось пролить за деток вам, \nМолить Отца о том, чтоб нас Он спас.\nИ Бог услышал все молитвы слёзные,\nИ каждый день от зла хранит Он нас.\n\nНе знаем, сколько нам подарит жизни Бог,\nБыть может много лет иль год один,\nНо быть душою мы всегда похожими,\nОтцы и матери, на вас хотим.\n\nОтцы и матери, отцы и матери\nДетей, не знающих ещё Христа,\nМолитесь всё сильней, чтоб не утратили \nСвоё наследие вы навсегда."}, {"id": 882, "title": "Ночь глубокая, тихо стоят сады, только ты не спишь, мама моя.", "text": "Ночь глубокая, тихо стоят сады, только ты не спишь, мама моя.\nСл
