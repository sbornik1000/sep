ы седые несли.\n\nДонесли, но служителей многих потеряли за годы борьбы;\nНас зовут они юных и сильных в поредевшие стать их ряды.\nЗа великое дело служснья, если жизнь мы готовы отдать,\nВ армию добровольцев спасенья Бог зовёт нас немедля вступать.\n\nМы знамёна Христова ученья из слабеющих рук их возьмём\nИ навстречу векам, поколеньям светоч правды во мрак понесём. \nПусть в пути нашем только невзгоды, там, за гранью земных непогод, \nСчастье правды желанной свободы, для нас вечное солнце взойдёт."}, {"id": 557, "title": "Было время: я, ликуя, шёл на Божии дела,", "text": "Было время: я, ликуя, шёл на Божии дела,\nГоворил я: «Всё могу я, предо мной падёт скала!»\n\nЯ грудился, рвенья полный, строил дом, пахал поля.\nНо мой дом размыли волны, не дала плодов земля.\n\nИ тогда душой смущённой я людей на помощь звал,\nНо в работе обновлённой их совет не помогал.\n\nБезутешный и унылый я упал на берегу...\nБеден я, во мне нет силы, ничего я не могу!\n\nНо меня достигло слово: «Я к тебе так близок был \nС силой, к помощи ютовой, но о Мне ты позабыл.\n\nВстань, возьми Меня за руку: много, много силы в ней; \nИ твой труд, рассеяв муку, Я свершу рукой Своей».\n\nИ я принял зов и смело взялся за руку Христа.\nС Ним пошёл на то же дело, на бесплодные места.\n\nИ - о, чудо! Зреет колос, вырос дом на берегу...\nИ воспел мой громкий голос: «Всё я с Господом могу!»"}, {"id": 558, "title": "Дружно, дружно будем мы трудиться,", "text": "Дружно, дружно будем мы трудиться,\nДело Божье мы найдём везде;\nВоля Божья в нас да совершится,\nБудем верны в слове и труде.\n\n    Будем (будем мы) трудиться \n    С радостью живой, (да) с радостью живой. \n    Будем (будем мы) трудиться в винограднике Его.\n\nПросто, просто людям мы расскажем,\nКак Сын Божий грешных возлюбил;\nОн поддержит начинанья наши,\nДля служенья даст потребных сил.\n\nВместе, дружно, ободряя слабых,\nМы пойдём послушно за Христом;\nБедных, нищих, немощных, усталых \nК Агнцу Божью, к свету приведём."}, {"id": 559, "title": "Что хочет Бог, если стану Его? Что мне отдать, чтобы жить для Него?", "text": "Что хочет Бог, если стану Его? Что мне отдать, чтобы жить для Него? \nЕсли пойду, куда Он поведёт, что мне Иисусу отдать?\n\n    Всё Тебе, мой Господь, я отдаю:\n    Силу всю у дух и плоть, всю жизнь мою.\n    Посвящаю себя в службу Тебе! Так Иисус дорог мне (2 раза).\n\nКогда я вспомню Господню любовь, смерть на кресте и пролитую кровь,- \nВсё это сделал, меня Он любя. Дорог так Господу я!\n\nБуду служить я Ему до конца, чтоб кто другой не восхитил венца. \nВсё я Христу на служенье отдам, Он вознесёт меня Сам."}, {"id": 560, "title": "Будите, зовите, ищите - последнее время летит.", "text": "Будите, зовите, ищите - последнее время летит.\nВ сердца ледяные стучите, разбейте, расплавьте гранит.\n\nМы сил вам духовных желаем, как небо, без края и дна, \nЧтоб, пламенной речи внимая, душа к раскаянью пришла.\n\nВ садах распускаются почки, крик горлицы слышен везде, \nРазносится в сумраке ночи, а многие - в сумрачном сне.\n\nА сколько у нас недоверья, сомненье нам душу теснит! \nБудите, зовите, ищите! Последнее время летит!"}, {"id": 561, "title": "Трудись, о друг, на ниве Божьей, сей вечной жизни семена;", "text": "Трудись, о друг, на ниве Божьей, сей вечной жизни семена;\nС терпеньем жди желанных всходов любви и правды, и добра.\n\n    Придёт пора, твои посевы дадут обильный урожай.\n    Пока день светел (пока день светел), делай дело,\n    Других трудиться вдохновляй.\n\nНедолог день, что нам отпущен, к закату солнце подойдёт;\nСмотри в день новый, день грядущий, и труд твой в вечность перейдёт.\n\nТрудись, о друг, будь верен в малом, и Бог тебя благословит,\nНад многим Он тебя поставит, богатством неба наделит."}, {"id": 562, "title": "В винограднике Христа есть работы много.", "text": "В винограднике Христа есть работы много.\nО, иди, мой друг, туда, потрудись для Бога!\n\n    О, иди! О, иди! Бог зовёт всех па труд.\n    О, иди! О, иди! И тебя там ждут.\n\nСвой талант не зарывай, но используй смело.\nТы не спи, на труд вставай, делай Божье дело.\n\nБог ленивого раба бросит в мрак тьмы вечной.\nНе останься без плода и не будь беспечным.\n\nБудет вечно жить с Христом в светлой той Отчизне, \nКто ведёт борьбу со злом, не жалея жизни."}, {"id": 563, "title": "Тот, кто спасён, призван спасать - этот закон нам дала благодать.", "text": "Тот, кто спасён, призван спасать - этот закон нам дала благодать. \nОстановись, самарянин, снова беда с ближним твоим!\n\nВот он лежит, миром забыт, силой греха страшно избит.\nО, не пройди, о, подними, силой любви к Богу веди.\n\nСердце и дом ближним открой. Божий талант в прах не зарой, \nСлёз и молитв чудный елей для этих ран, друг, не жалей!\n\nСлышишь, мой друг, призыв Христа: «Где вы, жнецы, нива бела? \nГрешникам путь в небо открой, Я их ищу, следуй за Мной!»\n\nДай мне, Господь, чувства Твои и для других жить научи.\nРадость небес, слёзы земли, - Боже, открой очи мои."}, {"id": 564, "title": "Нам жизнь дана не для пустых мечтаний,", "text": "Нам жизнь дана не для пустых мечтаний, \nНе для служенья царству суеты,\nНо чтобы в ней среди земных скитаний \nНайти следы небесной красоты.\n\nНам жизнь дана, чтоб обрести спасенье \nИ всю её Иисусу посвятить,\nСлужить Ему и в жизненном хожденье \nВ себе самом Христа отобразить.\n\nНам жизнь дана нести Святое Слово \nСреди людей, томящихся в грехах.\nТак будем же, друзья, всегда готовы \nСлужить Христу и в горе, и в скорбях.\n\nСомненьям, проникающим порою.\nКак христиане, смело скажем: «Прочь!» \nНаш друг Христос божественной рукою \nПоможет все преграды превозмочь.\n\nЗемная жизнь сурово нас встречает,\nНо мы пришли сюда не пировать.\nВокруг нас мир в неверье погибает,\nА мы желаем грешников спасать."}, {"id": 565, "title": "Румяной зарёй полыхнул восток, и сумрак упал с ветвей.", "text": "Румяной зарёй полыхнул восток, и сумрак упал с ветвей. \n«Вставайте, вставайте, день настаёт!» - пел звонко соловей.\nИ песнь (и песнь) его (его) летела, как птица, в лесную даль, \nПеснь про (песнь про) Того (Того), Кто небо и землю создал.\n\nВот сеятель вышел и в глубь земли зерно своё положил,\nИ дружные всходы в степи взошли, их Бог благословил.\nИ песнь (и песнь) его (его) летела, как птица, в степную даль, \nПеснь про (песнь про) Того (Того), Кто небо и землю создал.\n\nВставай на заре твоих юных лет - день жатвы уж настаёт!\nМир гибнет во зле, а работников нет. Господь тебя зовёт,\nЧтоб песнь (чтоб песнь) твоя (твоя) летела, как птица, в земную даль, \nПеснь про (песнь про) Того (Того), Кто небо и землю создал."}, {"id": 566, "title": "Если нет драгоценного дара любви, если сердце холодно, как лёд,", "text": "Если нет драгоценного дара любви, если сердце холодно, как лёд, \nИ живёшь для себя, и лишь занят собой, и на подвиг душа не влечёт, -\n\nТо напрасно живёшь на земле, человек, бесполезно проходят года, \nИ молитвы твои неугодны Христу, неугодны Ему и дела.\n\nЛишь зажжённое пламенем вечной любви сердце тех, кто на жертву готов, \nКто готов возвещать о Христовой Крови, что смывает проказу грехов,-\n\nТолько в этих сердцах пребывает Христос, и они пребывают лишь в Нём. \nЭто Божии вестники вечной любви, они в славе пребудут с Христом."}, {"id": 567, "title": "Жизнь лишь одна дана нам в этом мире,", "text": "Жизнь лишь одна дана нам в этом мире,\nИ быстро эта жизнь течёт к концу;\nЖизнь лишь одна, чтоб славить ею Бога \nИ на служенье всю отдать Творцу!\nВсё, что Он дал, Ему пусть возвратится:\nСилы и время, сердце, всё вполне.\nО мой Господь, жизнь за меня отдавший,\nКак не отдать мне жизнь мою Тебе!\n\n    Жизнь лишь одна - так быстро пролетит \n    Лишь то, что Божье, вечно устоит.\n\nЖизнь лишь одна! Зачем стоите праздно? \nСлышите глас? Зовёт Учитель вас.\nТысячи благости Его не знают,\nТысячи молят: «Пожалейте нас».\nВставайте все, вставайте на работу,\nСкоро минует краткий день труда;\nВставай и ты, проживший жизнь напрасно, - \nКак устоишь пред Богом в день суда?\n\nЖизнь лишь одна, Тебе её вручаю.\n«Пошли меня», - Тебе, Господь, скажу.\nВесть о спасенье братьям понесу я,\nНа Кровь Твою святую укажу.\nВсё, всё возьми, Господь мой, на служенье, \nЛишь бы других от гибели спасти.\nОдобришь Ты - в том вся моя награда;\nВ радость Твою на небе дашь войти."}, {"id": 568, "title": "Делай, хоть и труден, труд твой для Христа,", "text": "Делай, хоть и труден, труд твой для Христа,\nХоть запас твой скуден, ветхие лета.\n\n    Ведь из памяти Господней дело то не ускользнёт. \n    Больше делай и угодней будет крест твоих забот.\n\nТруд любви малейший, сердца тихий стон \nИ порыв слабейший не забудет Он.\n\nРобкое усилье, что несёт покой \nЖертвам бед, насилья, видит Пастырь твой.\n\nКрохи милостыни и молитвы вздох \nВечно, как и ныне, будет помнить Бог.\n\nМалый иль великий труд слуга несёт\nС верностью Владыке - всё Господь зачтёт!"}, {"id": 569, "title": "«Вперед, вперёд! - Господь зовёт, - иди за Мной на труд святой!", "text": "«Вперед, вперёд! - Господь зовёт, - иди за Мной на труд святой! \nВсегда молись, всегда трудись, всегда борись, всегда учись!»\n\n    Опасно спать или дремать, опасно жить и мёртвым быть. \n    Коль в сердце Бог огонь зажёг, - не прячь огня, себя храня!\n\nИ если дан тебе талант, - не зарывай, употребляй!\nСвятой виссон, что дарит Он, не оскверни, не запятнай.\n\nИ будь во всём ты образцом среди своих, среди чужих.\nХоть мало нас, но Бог за нас, не унывай, не отступай.\n\nПусть даже брат пойдёт назад, Христа забыв, мир возлюбив,\nНо ты иди и не гляди назад в Содом, твой в небе дом.\n\n«Вперёд, вперёд! - Господь зовёт, - иди за Мной на труд святой! \nБорись смелей, трудись дружней, молись сильней и пой стройней!»"}, {"id": 570, "title": "Весть об Иисусе скажи мне, вес расскажи про Пего;", "text": "Весть об Иисусе скажи мне, вес расскажи про Пего; \nЧудная повесть благая сердцу дороже всего.\nАнгелов песнь повтори мне, песнь о Его Рождестве:\n«Богу хваленье на небе, мир и любовь на земле».\n\n    Весть об Иисусе скажи мне, всё расскажи про Него; \n    Чудная повесть благая сердцу дороже всего.\n\nКак Он в пустыне постился, как искушаем там был,\nКак претерпел, расскажи мне, и как за нас победил.\nКак Он без крова скитался, всем помогал в их нужде;\nКак Он людьми был отвержен, в бедности жил и в труде.\n\nКак ко кресту пригвоздили, как на кресте умирал,\nВ гроб как Его положили и как из гроба восстал.\nЧудную повесть скажи мне, как Он людей возлюбил; \nСлава вовеки Иисусу, Он и мой грех искупил."}, {"id": 571, "title": "Наш Спаситель в каждом веке к сокрушенным близок был,", "text": "Наш Спаситель в каждом веке к сокрушенным близок был, \nРазве Он о человеке в наше время позабыл?\n\n    Бог в Галилее, Бог в Иудее людям помочь спешил.\n    Тот же Мессия также Россию милости не лишил. \n    Будет то время - каждое племя примет любовь Христа. \n    За пробужденье, за исцеленье молятся здесь сердца.\n\nМилосердием Господним был очищен Нееман,\nРазве нет у нас сегодня исцелённых христиан?\n\nЕлисей, слуга Господний, чудотворный дар носил.\nРазве нет у нас сегодня тех, кто просит свыше сил?\n\nИисус Христос, Сын Божий, шёл больным здоровье дать.\nРазве Дух Святой не может это дело продолжать?"}, {"id": 572, "title": "На высокой горе был устроен дворец, весь во свете блеска был,", "text": "На высокой горе был устроен дворец, весь во свете блеска был, \nДобрый пастырь в нём жил. Он имел сто овец.\n\nВ бесконечной дали вот овечка одна где-то с пажити сошла \nИ от стада отошла - заблудилась она.\n\nИ заметил пастух, что овцы нет одной. Девяносто девять есть,\nА одной ему не счесть - нет овечки одной.\n\nНаступила уж ночь. Пастырь добрый не спал. Светит месяц высоко \nЗа горами далеко он овечку искал.\n\nОн овечку искал и по имени звал. Ведь её он так любил,\nДорогой ценой купил, а теперь потерял.\n\nВ эту тёмную ночь, пастырь добрый не спал: шёл со склона он на склон \nНе оставил её он, пока не отыскал.\n\nНад обрывом крутым и по скользкой тропе хищный зверь за нею шёл \nНо пастух её нашёл там, над бездной глухой.\n\nИз пустыни чужой, из погибели злой жертву у зверей отнял \nИ на плечи её взял, и принёс он домой."}, {"id": 573, "title": "Во все концы земли несчастной, везде, где только люди есть,", "text": "Во все концы земли несчастной, везде, где только люди есть, \nПотоком чистым силы властной звучит Евангельская Весть.\n\n    Приди ко мне, о люд несчастный,\n    Оставь греховный мир страстей,\n    Оставь широкий путь опасный,\n    К Моей воде приди скорей.\n\nОна течёт во все народы, людским сердцам несёт покой,\nВезде её святые воды даруют людям мир святой.\n\nВесть эта чудная, святая струится правдой неземной,\nОт власти зла освобождая людей, страдающих душой.\n\nИ те, которые внимали той Вести с кроткою душой,\nСвятую радость получали и находили в ней покой.\n\nЛишь в ней, душою утомлённый, найдёшь ты радость и покой, \nПолучишь сердцу утешенье и дар небесный дорогой!"}, {"id": 574, "title": "Народы Севера, Сибири, всей Руси!", "text": "Народы Севера, Сибири, всей Руси!\nВозвейте знамя Победителя Христа,\nЧтоб в дремлющих сердцах огонь любви \nХвалой наполнил все уста.\n\n    Библия! Зажги Сибирский край огнём любви Христа! \n    Господи! Ты пробуди Собой уснувшие сердца!\n    К свободе, правде человечество веди.\n    Родимый край! В любви Христа живи!\n\nСоединяйтесь все в одни Христа полки,\nНеверье, зло идёт стальной стеной на брань.\nПоследний бой, тесней ряды свои,\nНикто в сраженье не отстань.\n\nИ сквозь морозы и сибирскую пургу \nПойдём о правде Иисуса говорить,\nПусть прошагаем вместе всю тайгу,\nСвой край нам надо пробудить!"}, {"id": 575, "title": "Он шёл в жару и зной, в пыли больших дорог,", "text": "Он шёл в жару и зной, в пыли больших дорог,\nУчил любить всех и прощать обиды,\nОн с мытарями жил, не знал ни в ком врага,\nСклонялся к тем, кто был в слезах и в горе.\n\n    Учитель, свой путь пройти \n    Я должен так, как сделал это Ты.\n    Учитель, вокруг есть люди,\n    И я должен их любить, как Ты.\n    Учитель, ведь нелегко нести чужое бремя так, как Ты. \n    Учитель, я всё смогу, но только будь всегда со мною.\n\nОн принял грош вдовы и Магдалины плач,\nОн знал, что ждут они любви, прощенья.\nИ Никодиму путь во тьме Он указал,\nИ в Иордане принял Сам крещенье.\n\nИ мы пойдём в жару, в пыли больших дорог,\nА Он научит нас любви, прощенью,\nИ грешника принять, и злобу позабыть,\nИ людям дать добро и утешенье."}, {"id": 576, "title": "В последнее время живём, последнюю весть всем несём!", "text": "В последнее время живём, последнюю весть всем несём! \nПокайтесь, признайте Творца всей вселенной,\nВедь время суда над миром грядёт!\n\n    Господь наш с небес грядёт, спасенье Он тем несёт, \n    Кто грех свой оставил, но вере живёт,\n    Кто знамя Христа несёт, кто мир людям всем даёт, \n    Кто с радостью сердца Спасителя ждёт!\n\nНад миром сгущается ночь, но свет должен тьму превозмочь. \nПоследний луч солнца на землю падёт,\nА мир этот в страшной злобе живёт...\n\nВозьмём же знамёна Христа и смело пойдём в те места,\nГде Бога не знают, в грехе утопают,\nГде в страхе смертельном гибели ждут!"}, {"id": 577, "title": "Славь Творца, безбожная страна, коль возможность вновь тебе дана.", "text": "Славь Творца, безбожная страна, коль возможность вновь тебе дана. \nВ годы отступленья твоего время благодатное пришло.\nТы давала Господу обет и с тех пор прошло немало лет.\nИ теперь не тут ты и не там, стала ты служить иным богам.\n\n    Россия! Россия! Склонись перед Богом,\n    Склонись перед Богом твоим,\n    Кого ты забыла, Кого не почтила, Кого перестала любить!\n\nКто создал планеты и луну, Кто создал небесную страну,\nКто законы дал вселенной всей, Землю держит Кто в руке Своей, - \nСколько раз тебя Он посещал, сколько нежных слов Он говорил,\nВ трудную минуту помогал, дверь спасенья для тебя открыл.\n\nЗа тебя Сын Божий пострадал, кровь пролил и жизнь Свою отдал. \nНад судьбой задумайся своей и к врагам не относи друзей.\nДля Христа границы ты открой, пусть к тебе придёт Спаситель твой. \nНежно посмотри Ему в глаза и пойди по праведным стезям.\n\nТы открой и церкви, и дома. Пусть в них зазвучит Христу хвала. \nТо, что ты когда-то отняла, всё отдай и возврати сполна.\nТы народу Праздники верни и отбрось окольные пути,\nДвери сердца шире распахни и к Творцу навстречу поспеши."}, {"id": 578, "title": "Сидел слепец с протянутой рукою,", "text": "Сидел слепец с протянутой рукою,\nНи друг, ни брат не мог ему помочь.\nСтрадал без света телом и душою.\nПришёл Иисус - и тьма бежала прочь.\n\n    Где Иисус Христос, там радостью всё дышит, \n    Смолкает плач, слабеет гнёт забот,\n    Уходит тьма, приходит сила свыше.\n    Там жизнь, там мир, куда Иисус войдёт.\n\nБессильной злобой день и ночь гонимый \nИскал в гробах убежища себе.\nО камни бился - все бежали мимо.\nПришёл Иисус - принёс конец борьбе.\n\n«Нечист, нечист!» - давал знать прокажённый. \nГлухой, немой безмолвно слёзы лил.\nБольных, калек Господь услышал стоны.\nПришёл Иисус - все язвы исцелил.\n\nВ сердцах печаль о будущем страданье - \nПрибит на крест, Кто был их душ Царём.\nСгустилась тьма, стеснили грудь рыданья...\nПришёл Иисус - и ночь сменилась днём.\n\nИ в наши дни так многие познали,\nКак страшен грех, как мучит он своих.\nКогда ж в бессилье к Господу воззвали,\nПришёл Иисус и поселился в них."}, {"id": 579, "title": "Счастье сердце мне переполнило, и бежит оно через край.", "text": "Счастье сердце мне переполнило, и бежит оно через край.\nНа всю жизнь мою мне запомнилось, что услышал я невзначай.\n\nТо, что слышал я, сердце приняло, самый лучший путь я нашёл; \nСтарый грешный путь я покинул, и по новому я пошёл.\n\nПо пути любви чистой, искренней, по пути, что Бог указал,\nТо единый путь, верный, истинный, кто пошёл им - счастье узнал.\n\nВ этом мире мы, как прохожие, глубоко корней не пускай.\nЗлые есть пути, есть хорошие - ты хорошие избирай!"}, {"id": 580, "title": "Вот время свободы настало - услышать весть людям благую:", "text": "Вот время свободы настало - услышать весть людям благую:\nБог вырвал греховное жало, любовь явив миру большую.\nЛети эта песня к народу, о Божьей любви возвещая.\nДуше Кто дарует свободу, пусть знают от края до края.\n\n    Голгофская Жертва святая! Кто верой её принимает,\n    Те души она, освящая, от власти греха исцеляет!\n\nПокайтесь в грехах, все народы, дар Божий, прощенье, примите; \nВ Иисусе найдёте свободу, пред Ним на Голгофе склонитесь! \nИисус и сегодня пред вами, Он милость Свою простирает. \nПридите к Нему вы с грехами - свободу Он вам предлагает.\n\nО, если б все люди узнали о Божьей любви совершенной \nИ вести её если б вняли о жизни небесной, нетленной.\nГде душам свободным есть счастье, жизнь вечная в мире, любви, \nВам можно иметь там участье, омывшись в пролитой Крови."}, {"id": 581, "title": "Покрытый ранами, поверженный во прах,", "text": "Покрытый ранами, поверженный во прах,\nЛежал я при пути в томленье и слезах.\nИ думал про себя в тоске невыразимой:\n«О, где моя родня? Где близкий, где любимый?»\n\nИ много мимо шло, но что ж никто из них \nНе думал облегчить тяжёлых ран моих?\nИной бы и желал, да вдаль его манила \nЖитейской суеты губительная сила.\n\nИных пугал вид ран и мой тяжёлый стон.\nУж мной овладевал холодной смерти сон;\nУж на устах моих стенанья замирали,\nВ тускнеющих глазах уж слёзы застывали...\n\nНо вот пришёл Один, склонился надо мной \nИ слёзы мне отёр спасительной рукой.\nОн был неведом мне, но полн святой любовью, \nТекущею из ран не погнушался кровью.\n\nОн взял меня с Собой и помогал мне Сам,\nИ лил на раны мне целительный бальзам.\nИ голос мне сказал, в душе неотразимый:\n«Вот Кто родня тебе, Кто близкий, Кто любимый!»"}, {"id": 582, "title": "На твоём и моём столе золотится горбушка хлеба,", "text": "На твоём и моём столе золотится горбушка хлеба,\nА в далёкой чужой земле косит голод людей свирепо;\nВ нашей памяти злой провал - о войне вспоминать нелепо,\nМы лишь помним свои права: за гроши наедаться хлебом.\n\n    Иисус говорит: «Я-хлеб!» Значит, жизни без Бога нету, \n    Без Него душа как склеп, и мертва без Него планета.\n\nДля голодного есть резон за горбушку отдать именье,\nА у нас иногда, как сор, выметает горбушку веник;\nА у нас впереди итог, так помыслим хотя б немножко,\nКогда в доме хозяин Бог, мы не бросим на пол ни крошки.\n\nЕсли жизнь для тебя Иисус, если Им ты дорогу меришь,\nЕсли горя познаешь вкус, - ты откроешь голодному двери.\nПоле спелой отборной ржи в лето позднее колосится.\nДобрым делом, брат, докажи, что для Господа стал ты пшеницей."}, {"id": 583, "title": "Оставив дом, забыв Отца, ушёл далёко,", "text": "Оставив дом, забыв Отца, ушёл далёко,\nУшёл в края, где счастья нет, где одиноко.\nЗа каплю счастья променял свою свободу,\nЗаблудшим сыном стал влачить ты годы.\n\n    Вернись домой, вернись домой уж близко к ночи. \n    Вернись домой, вернись домой, вернись в дом Отчий. \n    Вернись домой, тебя там ждут и не забыли. \n    Вернись, вернись, вернись домой, сын Мой.\n\nТы в жалких рубищах своих, обременённый,\nПасёшь стада и ешь рожки, ведь ты наёмный.\nА помнишь годы, те, что жил в Отцовском доме? - \nНевольно катится слеза, как вспомнишь.\n\nПойду домой, вернусь к Отцу, а может вспомнит?\nПаду к ногам, буду просить, а может примет?\nХотя бы быть в числе прислуг, но рядом с домом.\nПойду домой, вернусь к Отцу родному.\n\nМой сын пришёл, пусть знают все, он не заблудший. \nПропавший был, нашёлся он, он самый лучший.\nМой дом - его, и всё моё его пусть будет,\nИ горе жизни пусть он всё забудет."}, {"id": 584, "title": "Оставив небес красоту и ангельских хоров хвалу.", "text": "Оставив небес красоту и ангельских хоров хвалу.\nСын Божий на землю сошёл, покинув небесный престол.\nЕму не дарили цветы - Ему принесли лишь шипы,\nНадели терновый венец, гвоздями прибили на крест.\n\n    Боже мой! (4 раза)\n\nТакую любовь не пойму, её я воспеть не могу!\nКто движет мирами планет, стал жертвой за каждый мой грех, \nЗа все преступленья мои оплёван, избитый, в крови...\nЯ сердцем понять не могу: за что я так дорог Христу?\n\nЦарила мертвящая тьма, стонала от скорби земля.\nС рассветом лишь третьего дня взошла воскресенья заря.\nИ наш Искупитель воскрес! В эфире звучит до небес:\nПусть славит Его вся земля, воскрес Он, чтоб жил вечно я!"}, {"id": 585, "title": "Средь ночного мрака в мире слышен крик:", "text": "Средь ночного мрака в мире слышен крик:\n«Дайте свет (дайте свет)! Дайте свет (дайте свет)!»\nЛюди гибнут, и настал последний миг - \nДайте свет (дайте свет)! Дайте свет (дайте свет)!\n\n    Свет спасенья всюду понесём, всюду, где греховный мрак царит \n    (Свет спасенья всюду понесём, где греховный мрак царит). \n    Свет спасенья всюду понесём, пусть он в темноте горит \n    (Свет спасенья всюду понесём, в темноте пусть он горит), \n    Освещая путь в небесный дом, где любовь и мир царит \n    (Освещая путь в небесный дом, где любовь и мир царит).\n\nЭтот мир, отвергнув правду, зло творит.\nДайте свет (дайте свет)! Дайте свет (дайте свет)!\nКто вкусил от Божьих благ, пусть поспешит.\nДайте свет (дайте свет)! Дайте свет (дайте свет)!\n\nЖизнь без Бога лишь сплошная темнота.\nДайте свет (дайте свет)! Дайте свет (дайте свет)!\nМиллионы грешных гибнут без Христа.\nДайте свет (дайте свет)! Дайте свет (дайте свет)!\n\n«Вы свет миру!» - так Спаситель Сам сказал.\nДайте свет (дайте свет)! Дайте свет (дайте свет)!\nСреди мрака Он светить нам приказал:\n«Дайте свет (дайте свет)! Дайте свет (дайте свет)!»"}, {"id": 586, "title": "Лети, наша песня, как вестник крылатый,", "text": "Лети, наша песня, как вестник крылатый,\nИ пусть не страшит тебя тьма.\nИ всем расскажи, что тот самый богатый,\nКто принял дары от Христа.\n\nЛети, наша песня, сквозь тьму и туманы, \nПусть слышит весь мир, вся земля,\nЧто тот лишь не знает ни зла, ни обмана,\nКто помнит о ранах Христа.\n\nЛети через горы, моря и долины,\nБуди ты людские сердца.\nДа так, чтоб поверил, что самый счастливый, \nКто отдал себя за Христа.\n\nЛети, наша песня, везде и повсюду,\nО радости всем расскажи.\nПусть тот, кто услышит тебя, не забудет \nМолитву Христу вознести.\n\nЛети непрестанно над грешной землёю \nК сердцам одиноким в глуши,\nКто плачет, томится в глубокой печали,\nО дивном Христе расскажи.\n\nЛети, наша песня, вдогонку планете \nИ спутники все обгони.\nПусть всякий, живущий на нашей планете, \nУслышит о Божьей любви!"}, {"id": 587, "title": "Полночь в полдень плыла над землёй,", "text": "Полночь в полдень плыла над землёй,\nПрогремел с неба ясного гром.\nКрест был поднят над злобной толпой,\nИ распятый Господь был на нём.\n\n    Если ты не узнал до сих пор, что та жертва была за тебя, \n    Подними на Голгофу свой взор и поверь в Иисуса Христа.\n\nК пригвождённым ногам прикоснись \nИ подножье креста обними.\nПусть прощенье Своё Иисус \nСердцу даст твоему из любви.\n\nНеужели смотреть будешь ты \nРавнодушно с жестокой толпой,\nКак страдал твой Господь за тебя, - \nНет! к Нему припади ты с мольбой."}, {"id": 588, "title": "Хочет всех людей Господь благословить,", "text": "Хочет всех людей Господь благословить,\nВесть благую в сердце каждому вложить.\nДверь открой широко, сердце распахни, Иисуса Ты впусти!\n\n    Иисуса Ты впусти (впусти), Иисуса Ты впусти (впусти), \n    Дверь открой широко-сердце распахни, Иисуса Ты впусти!\n\nОн пришёл за грех наш на кресте страдать,\nВоскресением Своим победу дать.\nДверь открой широко, сердце распахни, Иисуса Ты впусти!\n\nБродишь ли в пустыне, хочешь путь найти,\nЗнай, таких Иисус пришёл взыскать, спасти;\nДверь открой широко, сердце распахни, Иисуса Ты впусти!\n\nСчастлив, кто Спасителю себя отдаст,\nКто Его возлюбит и хвалу воздаст.\nДверь открой широко, сердце распахни, Иисуса Ты впусти!"}, {"id": 589, "title": "Бродил я в далёкой чужой стороне, и страсть во мне сильно кипела.", "text": "Бродил я в далёкой чужой стороне, и страсть во мне сильно кипела. \nНебесный Отец не забыл обо мне, следил Он за мной с колыбели.\n\nКогда возмужал я, раздела просил. Отец на раздел согласился, \nИмения часть мне мою уделил, и я с родным кровом простился.\n\nМне стало свободно, я бросился в мир, бежал из отцовского дома, \nКак будто свобода, мой детский кумир, теперь только стала знакома.\n\nС друзьями здоровье своё я сгубил, наследство растратил беспечно, \nЯ время бездумно своё проводил, но было веселье не вечно...\n\nИ вспомнилось мне, как спокойно живут наёмники в доме отцовском: \nИм лучшая пища и тёплый приют, и верная плата готовы.\n\nА я на чужбине не вижу конца мучительной, тягостной муке. \nУжели в отце не найду я отца? Ужель всё убила разлука?\n\nИ встал, и пошёл я в родную страну... Вот видится кровля родная. \nВоскресли вдруг в памяти детские дни и юность моя золотая.\n\nИ издали видит отец: это сын. Ему это сердце сказало.\nИдёт он в лохмотьях, босой и один, и жаль ему бедного стало.\n\nЯ небо прогневал, тебя оскорбил и сыном не смею назваться. \nПрости же меня и слугою прими, чтоб в доме родном мне остаться.\n\nО слуги, сын блудный вернулся домой, порадуйтесь всею душою. \nВедь он пропадал, сын мой милый, родной, но найден, теперь он со мною.\n\nКак много скитается бедных людей! Куда приведёт их дорога?\nО, если б они возвратились скорей в дом вечного доброго Бога!"}, {"id": 590, "title": "Как часто мы блуждали и просто забывали, что миром правит суета;", "text": "Как часто мы блуждали и просто забывали, что миром правит суета; \nМы истины не знали, грехов не замечали, а в сердце боль и пустота.\n\n    Приди к Иисусу и скажи: «Я не могу так дальше жить.\n    Я больше не хочу грешить! Прости меня, прости меня!» \n    Приди к Иисусу и поверь, что жизнь изменится теперь,\n    И что святая Кровь Христа спасёт тебя!\n\nГосподь простит любого и исцелит больного, наполнит сердце добротой; \nЕго любовь святая живёт и побеждает, приносит радость и покой."}, {"id": 591, "title": "К водам живым поспешите с ношей греха и забот,", "text": "К водам живым поспешите с ношей греха и забот,\nК Господу с верой придите - сердце отраду найдёт.\n\n    Поторопись! Можно ли ждать?\n    Можно ль спасеньем души рисковать?\n    Руки Господь простирает, всякого хочет принять.\n\nК водам живым поспешите, хоть вы покрыты виной, \nТам вас омоет Спаситель, там облечёт белизной.\n\nГолос любви призывает: слушай, покайся и верь!\nКто Его Слову внимает - входит в открытую дверь.\n\nВоды живые чудесно всё оживляют кругом.\nЕсли раскается грешник, небо ликует о том."}, {"id": 592, "title": "Когда ты для Господа сердце откроешь,", "text": "Когда ты для Господа сердце откроешь,\nКогда ты в молитве падёшь перед Ним,\nОставишь неверье, наклонности злые \nИ мир этот грешный не будешь любить?\n\nСегодня есть время - об этом подумай - \nА завтра не знаешь, день будет ли твой.\nСегодня открой своё сердце Иисусу.\nНе медли, скорее, сегодня решай.\n\nВедь жизнь без Христа есть не жизнь,а страданье. \nВ борьбе непосильной ты весь изнемог.\nПокайся в неверье, пока есть сознанье,\nИ все согрешенья простит тебе Бог."}, {"id": 593, "title": "Благодать и любовь от Отца, от Отца бесконечной вселенной,", "text": "Благодать и любовь от Отца, от Отца бесконечной вселенной,\nНикогда, никогда, никогда, никогда не получишь за злато и деньги.\n\nТы привык всё оплачивать точно, даром только лишь нищим даёшь. \nНикогда (2 раза) не получишь прощенья, если нищим к Нему не придёшь.\n\nСвоей славы не даст Бог иному. Крест Иисуса-единственный путь. \nНикогда человека, пришедшего к Богу, Иисус не желает забыть.\n\nБлагодать и любовь от Отца, от Отца бесконечной вселенной, \nНикогда, никогда, никогда, никогда не получишь за злато и деньги."}, {"id": 594, "title": "Всем известно людям, как прекрасна жизнь,", "text": "Всем известно людям, как прекрасна жизнь, \nНо ещё прекрасней, как познаешь смысл, \nКак Творца вселенной сердцем обретёшь, - \nЖизнью полноценной лишь тогда живёшь.\n\nТогда жизнь понятна, ясно цель видна, \nСлышу голос внятно: «Ты моё дитя,\nЯ Отец твой вечный, Я люблю тебя!\nНа пути к Отчизне сохраню от зла».\n\nО, какое счастье - мы нашли Христа! \nРадость в нашем сердце льётся, как река. \nНам и в этой жизни хорошо с Христом;\nУ Отца в Отчизне мы приют найдём.\n\nПоспеши к Иисусу ты прийти, друг мой,\nОн с любовью примет, даст тебе покой.\nИ вот в этой жизни будешь Им храним,\nА потом в Отчизне вечно будешь с Ним."}, {"id": 595, "title": "В этот вечер Спаситель в твоё сердце стучался.", "text": "В этот вечер Спаситель в твоё сердце стучался.\nЯ в глазах Его вижу печаль и тревогу:\nЗа твоими дверями Он сегодня остался,\nТы широкую выбрал в погибель дорогу.\n\n    Ты уходишь беспечно, ты Христа отвергаешь \n    И прекрасную вечность на земное меняешь. \n    Изливает Он в душу мир целебным елеем, \n    Чтоб любовь неземную принял ты, не жалея.\n\nМир холодный и гордый ты избрал вместо счастья, \nДни суровые, скорби - не встретишь участья. \nОглянись и подумай, ещё можно вернуться!\nБольше слёзы Христа пусть за грех твой не льются.\n\nВ этот вечер Спаситель в твоё сердце стучался...\nВ Его очи взгляни и открой все печали.\nБога в сердце впусти ты, чтобы в нём Он остался,\nИ душа вознесётся в небесные дали."}, {"id": 596, "title": "Говорят: на свете очень трудно жить,", "text": "Говорят: на свете очень трудно жить, \nСчастья на планете может и не быть.\nИ куда б ни ехал, встретишь ты помехи \nНа пути, проложенном тобой.\n\n    Вблизи Христа на сердце радость. \n    Как хорошо, когда Христос с тобой. \n    И как приятна вот эта радость, \n    Когда в душе царит покой.\n\nДруг, остановись и выслушай Христа, \nГолос Его чудный говорит всегда, \nПризывает малых, молодых и старых, \nСлабых, искалеченных судьбой.\n\nЕсли вы придёте, люди, ко Христу, \nСчастье в Нём найдёте, жизни полноту,\nИ хвала польётся, счастье к вам вернётся, \nО котором люди говорят."}, {"id": 597, "title": "Я оставил в небе всё Царство Своё", "text": "Я оставил в небе всё Царство Своё \nИ пришёл на землю взять сердце твоё.\nОно Мне родное, о нём Я скорблю,\nПотому что очень сильно Я его люблю.(2 раза)\n\n    Я всё жду тебя, любя, и зову тебя, любя:\n   «О, приди, Мой сын, зачем блуждаешь?\n    Ты признай свою вину, хорошо обдумав жизнь. \n    Я тебя за всё, за всё прощаю».\n\nЛюблю твоё сердце, сын Мой дорогой,\nЯ в него желаю излить Свой покой.\nЕго Я очищу, как снег убелю,\nПотому что очень сильно Я его люблю.(2 раза)\n\nЛюблю твоё сердце, сын Мой дорогой.\nЯ на крест Голгофский пошёл за него,\nТам горькую чашу страданий испил,\nПотому что очень сильно тебя возлюбил.(2 раза)"}, {"id": 598, "title": "Се, стою у двери и стучу, от тебя я малого хочу,", "text": "Се, стою у двери и стучу, от тебя я малого хочу,\nРазве трудно дверь открыть свою, чтоб в грядущем быть со Мной в раю?\n\nНе желаешь счастья ты себе. Знаешь ли ты, Кто стучит к тебе? \nПодойди, не мешкая, к дверям, отворишь - тебе богатство дам!\n\nО тебе я плачу потому, что ты больше света любишь тьму;\nЕсли бы, о, если бы ты знал, как Я тяжко за тебя страдал.\n\nЕсли ты Мне дверь не отопрёшь, в вечность ты со Мною не войдёшь. \nЕсли перестану Я стучать, ты навек утратишь благодать.\n\nЧтоб не плакать, не жалеть потом, ты сейчас впусти Меня в свой дом. \nГибели твоей Я не хочу, потому с терпением стучу."}, {"id": 599, "title": "Создана земля по Божьей воле силой всемогущего Творца,", "text": "Создана земля по Божьей воле силой всемогущего Творца,\nВсё ликует: и земля, и море, прославляя вечного Отца.\n\n    Покорись Отца единой воле, Он Создатель и твоей души! \n    Обретёшь ты мир небесный вскоре, только к Иисусу поспеши!\n\nНебо о делах Его вещает, всё желает Бога прославлять,\nЧеловек всё это замечает, но Творца не хочет замечать.\n\nДля тебя Христос пришёл на землю, для тебя Он небо оставлял, \nЧтобы принял ты Его спасенье, и, спасённый, в Боге ликовал."}, {"id": 600, "title": "Посмотри, как чудно Бог всё сотворил:", "text": "Посмотри, как чудно Бог всё сотворил: \nСделал землю круглой, небо голубым, \nЧтобы жили люди, славя и хваля \nИмя то святое Господа Христа.\n\nЧтобы знали люди, что Он был и есть, \nЧто Ему вовеки воздаётся честь!\nНа горе Голгофе Он распятым был, \nЧтобы своё сердце ты Ему открыл.\n\nТак подумай лучше о своей судьбе, \nВедь живёшь ты ныне во грехе и зле. \nНо Иисус могучий любит и тебя.\nТак отдай всё лучшее ты Ему, любя."}, {"id": 601, "title": "Разве рано отдать тебе сердце Христу,", "text": "Разве рано отдать тебе сердце Христу, \nВозлюбил Он ведь юным тебя?\nРазве рано заветы Его исполнять,\nМиру весть о спасенье неся?\n\n    Разве (разве) рано, разве (разве) рано? \n    Нет! Приди к Христу теперь (сегодня)! \n    Разве (разве) рано, разве (разве) рано? \n    Будешь счастлив, о, поверь!\n\nБез Христа нет блаженства и счастья тебе,\nОн Друг верный и истинный твой.\nЖажду, скрытую часто тебе самому,\nУтолит Он водою живой.\n\nКак бедна твоя жизнь, как она холодна,\nЕсли мира не дал Он тебе.\nНо Спаситель с тобой - и беда не страшна, \nТы спокоен в изменчивой мгле.\n\nЖизни разве весну не отдашь всю Христу, \nЛикованья хвалебную песнь?\nНеужели тебе лучше осени ждать,\nЦвет увядший Иисусу принесть?"}, {"id": 602, "title": "Вы не думайте, люди, что Христос высоко, в доме Отца.", "text": "Вы не думайте, люди, что Христос высоко, в доме Отца.\nВы не думайте, люди, что Христос далеко, где нет конца.\nВы не думайте, люди, что Христос не придёт больше никогда. (2 раза)\n\n    Стучится Он в сердце твоё и моё.\n    Он знает как трудно нам жить без Него.\n    Открой сердца двери, чтоб Он мог войти \n    И к вечному счастью тебя привести.\n\nПосмотрите на небо, загляните вы в душу, в сердце своё.\nНеужели не виден, неужели не слышен голос Его?\nОн сегодня ещё раз прозвучал в вашем сердце - голос с небес. (2 раза)\n\nТак давайте не будем мы от Господа прятать душу свою, \nРаспахнём двери сердца - Он вольёт в него жизни вечной струю. \nБудем Богу молиться, чтобы с Ним водвориться в вечном раю. (2 раза)"}, {"id": 603, "title": "Есть место, есть! Господь в чертог зовёт.", "text": "Есть место, есть! Господь в чертог зовёт.\nВ чертог святой Он Сам тебя введёт;\nТебя зовут, ты зов не отклони,\nТебя там ждут, туда, туда входи!\n\n    Есть место, есть! Есть место, есть! \n    О,поспеши войти!\n\nПрекрасен пир в чертоге золотом,\nТебя Господь зовёт быть гостем в нём;\nЕсть место там, и дверь не заперта,\nЕё открыл Спаситель для тебя.\n\nОн принял многих грешников туда,\nИ там есть место для тебя,\nОни омыты Кровию Христа,\nХристос зовёт - омоет и тебя.\n\nВходи, входи! Пир этот для тебя,\nИ чаша там веселием полна;\nВсё счастье там, вся радость, о, входи! \nГосподь зовёт, ты голосу внемли!\n\nСветилу дня недолго уж сиять,\nНочная тьма готова всё объять;\nНастанет ночь, закроются врата,\nУжасный вопль услышишь ты тогда:\n\n    «Нет места, нет! Нет места, нет! \n    Затворены врата!»"}, {"id": 604, "title": "Спасенье вечное Христос на землю к нам принёс.", "text": "Спасенье вечное Христос на землю к нам принёс.\nОн отразил греха напасть и дал с Собой нам часть.\n\n    О,сердце! Не смущайся, верь! Прими Христа теперь! \n    О,сердце! Не смущайся, верь! Прими Христа теперь!\n\nГосподь нас грешных возлюбил, Себя не пощадил!\nОн на кресте в предсмертный час Отца молил о нас.\n\nОн жизнь нам мертвым подарил, рассеял мрак и тьму \nИ Слово нам Свое вручил, чтоб звать других к Нему."}, {"id": 605, "title": "Хочет Иисус, чтоб любовь твоя", "text": "Хочет Иисус, чтоб любовь твоя \nНе имела границ в этом мире зла.\nПочему, человек, ты не хочешь принять \nДар бесценный - Его благодать?\n\n    Он омыл тебя Кровью Своей,\n    Посмотри ты на свет Его очей. \n    Неужели так черства твоя душа,\n    Что не видишь всех страданий Христа?\n\nТы ушёл в этот мир и тогда \nПозабыл, Кто страдал за тебя.\nО мой друг, оглянись и навсегда\nТы узнаешь, как любовь Его сильна.\n\nЧеловек, твоя гордость сильна,\nНикогда с ней не встретишь ты Христа. \nОбратись ты с мольбой всей душой,\nИ тогда Он услышит зов твой.\n\nПосмотри ты на раны Христа -\nИ увидишь, как душа твоя черства.\nУдали от себя своё гордое «я»,\nИ тогда Он услышит тебя.\n\nО, приди в этот день ко Христу - \nИ увидишь ты любви полноту.\nЕго зов приглашает, любя.\nО, приди! Он давно ждёт тебя!"}, {"id": 606, "title": "Есть ли место Иисусу, чьею Кровью мир омыт?", "text": "Есть ли место Иисусу, чьею Кровью мир омыт?\nСердца дверь открой скорее, Сам Господь к тебе стучит.\n\n    Для Царя небесной славы место в сердце приготовь.\n    О,внемли Его призыву и прими Его любовь!\n\nИ заботам, и веселью место в сердце ты даёшь,\nА Умершего за грех твой неужели оттолкнёшь?\n\nДни отдашь ли Иисусу? Призывает Он опять.\nМожет быть, тот день последний, дольше Он не будет ждать.\n\nПоспеши же Иисусу жизнь и сердце всё отдать.\nГлас замолкнет благодатный, скоро уж не будет звать."}, {"id": 607, "title": "Сын мой! Зачем ушёл вдаль? Вернись, Христос зовёт!", "text": "Сын мой! Зачем ушёл вдаль? Вернись, Христос зовёт!\nИль ты не слышишь зова? Вернись, тебя Он ждёт!\n\n    Вспомни ту встречу с Христом Иисусом,обеты твои и мольбу. \n    Вспомни ту встречу и тот дивный вечер,обеты твои и мольбу, \n    И мольбу (вспомни встречу ту),и мольбу (вспомни ту мольбу), \n    Все обеты твои и мольбу.\n\nГде ты, заблудший, где ты, блуждающий душой?!\nПогибнешь ты навеки, вернись скорей домой!\n\nЗвучит любовь завета уж много, много дней.\nВсё ждёт Христос ответа на зов любви Своей."}, {"id": 608, "title": "Кротко и нежно Иисус призывает, всех приглашает, любя.", "text": "Кротко и нежно Иисус призывает, всех приглашает, любя.\nСтал у порога, стучит, ожидает, ждёт Он меня и тебя.\n\n    Приди, приди! Всякий, кто жаждет, приди!\n    Нежно, с любовью Иисус призывает, грешник, не медли, приди!\n\nМожно ли медлить, когда Искупитель просит, о каждом скорбя? \nДар благодати принять не хотите ль, дар для меня и тебя?\n\nТени сгущаются, смерть торжествует, всех беспощадно губя. \nВремя проходит, в обитель иную кличут меня и тебя.\n\nМир и любовь нам Господь обещает, в жертву отдал Он Себя.\nМы согрешили, но Он нам прощает, примет меня и тебя!"}, {"id": 609, "title": "«Кто мне радость даст?» - я в скорбях взывал.", "text": "«Кто мне радость даст?» - я в скорбях взывал.\nРадость сердца у Христа лишь я узнал.\nВ Нём одном нашёл я отрады свет,\nИм дышу я, без Него счастья в мире нет (в мире нет).\n\nБуду вечно с Ним, как с Вождём моим;\nОн страданьем искупил меня Своим.\nИ тебя, мой друг, Он теперь зовёт,\nПоспеши к Нему скорей, ведь тебя Он ждёт (Он ждёт).\n\nЕсли ж ныне ты не придёшь к Нему,\nТо услышишь: «Отойди навек во тьму!»\nЕсли ж ты к Нему в простоте придёшь,\nТо навеки в Нём одном свет душе найдёшь (в Нём найдёшь)."}, {"id": 610, "title": "В дикой пустыне, где солнца нет, жизнь безотрадную столько лет", "text": "В дикой пустыне, где солнца нет, жизнь безотрадную столько лет \nВ голоде, страхе влачу один. Встану, пойду к Отцу!\nСтыдно идти мне к Отцу домой, в дом, что когда-то был мне родной. \nРад бы остаться я там слугой... Встану, пойду к Отцу!\n\n    Сердце влечёт в край родной, встану, пойду я домой!\n    Там мой Отец. Пойду, пойду к светлой Отчизне домой.\n\nО, для чего же я гибну здесь? Помощи нет и защиты мне.\nТам же под кровом родным есть всё! Встану, пойду к Отцу!\nТяжко виновен я пред Отцом, низко упал я в грехе своём.\nЖажду я сердце открыть пред Ним. Встану, пойду к Отцу!\n\nБоже, зачем я ушёл, зачем? Светлой надеждой был полон день. \nСам своё счастье попрал, разбил! Встану, пойду к Отцу!\nВ мыслях своих вижу дом родной, лица любимых опять со мной, \nСчастлив я был там в кругу друзей... Встану, пойду к Отцу!\n\nГрешников много таких, как я, встали, пошли, и Он принял их,\nОн их простил. Что же медлю я? Встану, пойду к Отцу!\nЧто-то всё шепчет: «Он не забыл, хоть ты так худо с Ним поступил. \nОн тебя любит! Скорей, скорей встань и иди к Отцу!»"}, {"id": 611, "title": "Во Христе мир души обрести поспеши,", "text": "Во Христе мир души обрести поспеши,\nКто грехом утруждён; даст покой только Он.\n\n    Друг, утомлённый в пути, мира душе не найти.\n    Если Христа ты замедлишь принять, можешь навек опоздать.\n\nТы немало блуждал и всё счастье искал.\nВсюду тьма, а не свет; твоего счастья нет.\n\nНо души чистота для тебя у Христа;\nЧтоб ты счастье познал, Он жестоко страдал.\n\nНе страшись ты суда и не бойся стыда,\nЧтоб за правду страдать и Христа прославлять.\n\n    Друг, утомлённый в пути, мир во Христе обрети,\n    Верой Христа постарайся принять, вечное счастье познать."}, {"id": 612, "title": "Не уходи, постой, не уходи,", "text": "Не уходи, постой, не уходи,\nВ который раз прислушайся к тем звукам, \nВедь у тебя не камень же в груди,\nА гвозди бьют не в дерево, а в руки.\n\n    Они опять готовы мир обнять,\n    Роняя жизнь в багровых каплях крови.\n    Не уходи, твоё спасенье здесь \n    И та любовь, что грех простить готова.\n\nКуда пойдёшь ты от любви такой \nИ неужели сердцем не ответишь \nНа зов Того, Кто, жертвуя Собой,\nТебя любя, терпел страданья эти?\n\nОн предлагает людям благодать \nИ хочет дать душе твоей отраду.\nНе уходи, спеши Христа принять,\nЧтоб не пришла за грех тебе расплата."}, {"id": 613, "title": "Неужели уйдёшь ты, не приняв Христа,", "text": "Неужели уйдёшь ты, не приняв Христа,\nЧтобы дальше во мраке блуждать?\nПрощеньем божественным пренебрежёшь,\nНе приняв Его благодать?\n\n    Неужели уйдёшь, неужели уйдёшь, неужели уйдёшь \n    Ты,не приняв Христа? Неужели уйдёшь?\n\nНеужели уйдёшь ты? Ведь другом своим \nТы мог бы Христа приобресть?\nОн был бы хранителем верным твоим.\nОценишь ли ты эту честь?\n\nИисус из любви Свою жизнь положил,\nЧтоб грешников освободить,\nИ чудный источник спасенья открыл,\nГде можно грехи все омыть.\n\nО друг, в этой жизни Христа не отринь,\nПокой даст тебе только Он.\nВнемли же спасенью, сомненья откинь,\nПокайся - и будешь спасён!"}, {"id": 614, "title": "Христа благодать изберёшь ли? Ныне решай! (Ныне решай!)", "text": "Христа благодать изберёшь ли? Ныне решай! (Ныне решай!)\nОт сердца слова вознесёшь ли? Ныне решай, друг, решай!\nВерой Спасителя примешь иль нет? Вечную тьму изберёшь или свет? \nА Бог призывает. О, дай же ответ! Ныне решай!\nНыне решай! Ныне, друг, решай!\n\nТебе вечный суд угрожает; ныне решай! (Ныне решай!)\nТебя Иисус призывает; ныне решай, друг, решай!\nУзок путь жизни и тесны врата, ими войдёшь ты в обитель Христа, \nА мир Он обрёл тебе Кровыо креста. Ныне решай!\nНыне решай! Ныне, друг, решай!\n\nТы Господа крест понесёшь ли? Ныне решай! (Ныне решай!)\nВ Нём вечная жизнь: оживёшь ли? Ныне решай, друг, решай! \nВремя скитаний твоих пролетит, Дух увещанья Свои прекратит,\nА в дверь Иисус к нам не вечно стучит. Ныне решай!\nНыне решай! Ныне, друг, решай!\n\nГреховную цепь ты порвёшь ли? Ныне решай! (Ныне решай!)\nК источнику жизни придёшь ли? Ныне решай, друг, решай!\nВ двери войдёшь ли оверзтые нам? В сердце твоём Ему будет ли храм? \nА смерть за тобою спешит по следам. Ныне решай!\nНыне решай! Ныне, друг, решай!"}, {"id": 615, "title": "Мир в неправде, во зле утопает, погибая в трясине страстей.", "text": "Мир в неправде, во зле утопает, погибая в трясине страстей.\nЗдесь жестокость, здесь ложь процветают, расхищая любовь у людей.\n\n    Среди мрака греха свет сияет вдали,\n    На Голгофской горе свет спасенья.\n    Иисус со Креста озаряет весь мир,\n    Тьму пронзая лучом искупленья.\n\nЭтот мир от грехов истомился, пролил столько невинной крови, \nНад святыней, над правдой глумился, заглушая порывы любви.\n\nКаждый житель земли ищет счастья, ищет радости в жизни земной, \nХочет верности, хочет участья и любви бескорыстной, большой.\n\n    Не ищи, человеку счастья нет в мире зла.\n    Не теряй своё время напрасно.\n    Поскорее впусти в своё сердце Христа,\n    Он источник любви, Он источник добра.\n    Только в Нём обретёшь ты покой (для души)."}, {"id": 616, "title": "Руки Христа - это руки любви, чистые, нежные руки.", "text": "Руки Христа - это руки любви, чистые, нежные руки.\nТы посмотри, эти руки в крови - знак истязанья и муки.\n\nМожет быть, ты изнемог, удручён, совесть тебя обличает? \nВстань, дорогая душа, это Он руки к тебе простирает.\n\nРуки Христа извлекают из рва, ставят на камень спасенья.\nО, это жизнь, а не только слова, это любовь и прощенье!\n\nРуки простёрты к тебе и ко мне, полные ласки, привета. \nМожно ли долго стоять в стороне и не ответить на это?\n\nТы посмотри, хорошо посмотри, не отвернись равнодушно. \nРуки Христа - это руки любви. Друг мой, вставать тебе нужно"}, {"id": 617, "title": "Как трудно сделать первый к Тебе навстречу шаг:", "text": "Как трудно сделать первый к Тебе навстречу шаг: \nСомненья окружают, и вырастает страх.\nЯ Книгу открываю и в ней читаю вновь,\nКак велика к заблудшим Отцовская любовь.\n\n    Прими меня к Себе, прими, мой вечный Бог! \n    Прими в Свой чудный край, в сияющий чертог!\n\nИ вот я сделал первый к Тебе навстречу шаг, \nСомненья все отбросив и победив свой страх. \nПрости меня, о Боже, к Тебе я прихожу:\nУ ног Твоих склоняясь, мир сердцу нахожу.\n\nИ Бог в любви обильной грехи мои простил,\nВсе беды и ненастья навеки удалил.\nЯ с трепетом коснулся источника оград\nИ, с небом примирившись, иду в небесный Град."}, {"id": 618, "title": "Голос Духа Святого зовёт, грешных Он к Иисусу влечёт.", "text": "Голос Духа Святого зовёт, грешных Он к Иисусу влечёт.\nО друг, Он зовёт и тебя.\n\n    Приди (Он зовёт), приди (Он зовёт),\n    Приди к Нему - в Нём счастье найдёшь.\n\nПохоть мира жалеешь ли ты, что к Иисусу ты медлишь прийти \nЗачем от любви ты бежишь?\n\nЗа тебя умер Он и страдал, дар спасенья тебе обещал,\nПрими ж дар Иисуса теперь."}, {"id": 619, "title": "Последний призыв раздаётся ещё,", "text": "Последний призыв раздаётся ещё,\nО грешник беспечный, что медлишь ты всё? \nСпеши к Иисусу спасенье принять,\nПока ожидает тебя благодать.\n\n    Последний призыв прозвучал для тебя. \n    Спеши же сегодня принять зов Христа.\n\nТебя на собранье Дух Божий привёл,\nЧтоб ты для души исцеленье нашёл;\nЧрез проповедь, пенье зовёт Он: «Приди!» \nВсё ждёт Он тебя, но ты медлишь идти.\n\nСобранье окончено, стало темно,\nИ замерли звуки призыва давно,\nА в сердце Спаситель стучится и ждёт. \nОткрой же Ему или скоро уйдёт.\n\nКоль любишь ты жизнь, удаляйся от зла, \nСоюз со Христом заключи навсегда,\nИисуса сегодня принять поспеши,\nПризыву последнему чутко внемли."}, {"id": 620, "title": "В Боге одном лишь душа найдёт счастье, мир,", "text": "В Боге одном лишь душа найдёт счастье, мир,\nЕсли за Господом ты пойдешь, лишь за Ним.\nОн приглашает давно тебя,\nХочет спасенье и радость дать. О, приди! О, приди!\n\nБрось этот грешный, порочный мир, полный зла.\nГде нет любви и везде царит суета.\nО, поспеши ко Христу прийти,\nСчастье и мир для души найти у креста, у креста.\n\nСлышишь, теперь Он зовёт тебя, поспеши!\nВзглянь, как с Голгофы текла струя за грехи.\nТак почему же ты медлишь, друг,\nБыть не желаешь средь Божьих слуг? Поспеши! Поспеши!\n\nОн тебя будет от зла хранить и от бед,\nРадость и горе с тобой делить, как Отец.\nБудет в скорбях тебя подкреплять,\nЕсли к Нему будешь ты взывать каждый день, каждый день"}, {"id": 621, "title": "Житейское море играет волнами.", "text": "Житейское море играет волнами.\nВ нём радость и горе всегда перед нами.\n\nНикто не ручайся, никто ведь не знает,\nЧто может случиться, что завтра с ним станет.\n\nА может быть, завтра сроднишься с нуждою, \nПойдёшь ты скитаться с горячей слезою.\n\nСегодня ты весел и жизнью доволен,\nКругом звуки песен, а завтра ты болен.\n\nА может быть, завтра - сырая могила, \nВозьмёт безвозвратно могучая сила.\n\nНа море житейском волна за волною \nМеняется часто под нашей ладьёю."}, {"id": 622, "title": "Сам Спаситель приглашает нас: «О, приди! (О, приди!)» (2 раза)", "text": "Сам Спаситель приглашает нас: «О, приди! (О, приди!)» (2 раза) \nСлушай, друг, призывный, нежный глас,\nО заблудший грешник, к Богу приди!\n\n    Нежный голос (нежный голос мне) мне звучит (голос мне звучит), \n    Мир душе (мир душе моей) моей дарит (мир душе дарит).\n    В Нём нашёл (в Нём нашёл я свой)\n    Я свой покой (в Нём нашёл покой). Иисус - Спаситель мой!\n\nЗов любви Твоей услышал я: «О, приди! (О, приди!)» (2 раза)\nОн к вратам небес привлёк меня; я в слезах взываю: «Друг, о, приди!»\n\nГолос милости Твоей звучал: «О, приди! (О, приди!)» (2 раза)\nИ Ему я трепетно внимал! Я нашёл спасенье, друг, о, приди!"}, {"id": 623, "title": "Ты сказал мне, что душа измучена, очень трудно стало жить тебе,", "text": "Ты сказал мне, что душа измучена, очень трудно стало жить тебе, \nЧто от жизни всё уже получено и надежды нет в твоей судьбе.\n\n    Но взгляни хоть раз ты на Голгофу:\n    Там невинная струится кровь,\n    В муках за тебя там льются слёзы,\n    В них горит Отцовская любовь.\n\nОтвернулись все родные и друзья, не с кем разделить печаль тебе; \nОтвернулись, отказались от тебя, одного оставили в беде.\n\nНету силы, чтоб оставить тяжкий грех, а душа томится и болит. \nТы к Иисусу поспеши, Он примет всех, снимет боль и раны исцелит."}, {"id": 624, "title": "Душа, как птица, ищет хлеба, а этот хлеб - всесильный Бог!", "text": "Душа, как птица, ищет хлеба, а этот хлеб - всесильный Бог!\nОдна дорога есть на небо, в погибель - тысячи дорог.\nЗачем откладывать на завтра? Мой друг, сегодня избирай.\nТекут живительные реки в благословенный Богом край.\n\nИ хоть об этом мало знаем, но кто поверил, тот пошёл.\nВ стране, что называем раем, спасённым будет хорошо!\nИ если ты устал от жажды, взывай к Христу, не промолчи.\nОн отдал жизнь, чтоб верой каждый спасенье даром получил.\n\nЕму поверишь - всё возможно, с Христом легко подняться ввысь. \nО милый друг, пока не поздно, подумай и остановись!\nХристос - единый верный Жребий! Его любовь - всему итог! \nОдна дорога есть на небо, в погибель - тысячи дорог..."}, {"id": 625, "title": "Взирайте, люди, на Слово Божье, пока ещё ныне звучит.", "text": "Взирайте, люди, на Слово Божье, пока ещё ныне звучит.\nВедь дверь спасенья закрыться может - Дух Божий об этом твердит.\n\n    Будет время голос Божий больше не будет звать!\n    Но сегодня, друг, ты можешь верой прощенье принять (2 раза).\n\nСлова спасенья звучат так ясно, и Церковь Христова растёт;\nВ грехах томится народ напрасно, ведь Бог избавленье даёт.\n\nЛюбовь Господня для всех открыта! Войди же в спасения дверь! \nВедь Кровь Христова была пролита, чтоб ты стал прощённым теперь!\n\nНе стоит, друг мой, от моря до моря ходить, чтобы счастье найти, \nЛишь только в Боге покой от горя ты сможешь навек обрести!"}, {"id": 626, "title": "Слышишь ли ты голос Божий - нежно для тебя звучит.", "text": "Слышишь ли ты голос Божий - нежно для тебя звучит.\nУ дверей стоит Прохожий, слушай, что Он говорит.\n\n    Нежно так тебя Христос зовёт,\n    Поспеши к Нему, тебя Он ждёт.\n    О, приди к Нему скорее, сердца дверь открой сильнее-\n    Мир найдёшь ты для души, лишь к Иисусу поспеши!\n\nЗов любви Его ты слышишь, вновь зовёт тебя, мой брат, \nТолько Им одним ты дышишь, только Им одним богат.\n\nДаже если ты споткнулся, поспеши к Нему опять.\nЕсли ты и пошатнулся, может Он тебя поднять."}, {"id": 627, "title": "Не опоздай, сын блудный, в дом твой родной приди,", "text": "Не опоздай, сын блудный, в дом твой родной приди, \nТам тебя ожидает сердце Отца в любви,\nТам твой Отец тоскует, часто Он слёзы льёт,\nВдаль Он глядит с надеждой: скоро ли сын придёт?\n\nГоре тебя постигло, счастье твоё ушло,\nИ все друзья забыли, в сердце темно-темно.\nВ доме Отца есть счастье, в доме Отца - покой,\nВ доме Отца - отрада, это твой дом родной.\n\nМожет тебе и стыдно, совесть твоя твердит,\nЧто поступил ты плохо. Можно ли всё простить? \nХоть глубоко паденье, хоть велика вина.\nВсем даровать прощенье милость Его сильна."}, {"id": 628, "title": "О, Божьих слов не пропускай, не закрывай от света глаз", "text": "О, Божьих слов не пропускай, не закрывай от света глаз \nИ сердца не ожесточай, о, будь спасён - приди сейчас!\n\n    День завтра может не блеснуть\n    (День завтра может не блеснуть, и солнце не осветит нас), \n    Теперь пора! (Теперь пора! О, мудрым будь!)\n    О друг (о, будь спасён), приди (приди сейчас)!\n\nНе может мир нас наградить, в нём нет отрад, он - яд для нас. \nНачни по-христиански жить. О, будь спасён - приди сейчас!\n\nГосподь не хочет тех изгнать, кто с Ним вступил в общенье раз, \nОн хочет в них Свой труд начать. О, будь спасён - приди сейчас!"}, {"id": 629, "title": "Где ты бродишь, бродишь, сын несчастный, вдалеке оставив дом родной?", "text": "Где ты бродишь, бродишь, сын несчастный, вдалеке оставив дом родной? \nО, вернись, то Божий голос властный, Он зовёт, зовёт тебя домой.\n\n    О,вернись, нежно обниму! О, вернись, грех с тебя сниму,\n    В белые одежды вновь одену и на пир введу!\n\nГде ты бродишь, бродишь, тратя время в беспокойной, тщетной суете? \nО, вернись, сниму с тебя Я бремя, - за тебя Я умер на кресте.\n\nГде ты бродишь, сын Мой, без приюта, одинок, без близких и друзей? \nО, вернись, скорей с чужбины лютой, дам тебе покой Я от скорбей."}, {"id": 630, "title": "В двери закрытые поздней порой кто-то стучит, кто-то стучит.", "text": "В двери закрытые поздней порой кто-то стучит, кто-то стучит. \nОтзыва нет и усталой рукой кто-то стучит, стучит.\n\n    Это Спаситель у двери стоит, кротко (стучит), нежно (стучит). \n    Сердце открой, Он недуг исцелит. Снова Христос стучит.\n\nВ сердце уныние, радости нет; кто-то стучит, кто-то стучит!\nВ доме погас утешения свет; кто-то стучит, стучит!\n\nСовесть томит обличения глас - кто-то стучит, кто-то стучит!\nЗов не смолкает в душе ни на час; кто-то стучит, стучит!\n\nСтук всё сильнее звучит за стеной, кто-то стучит, кто-то стучит! \nГрешник, покайся и сердце открой! Кто-то стучит, стучит!"}, {"id": 631, "title": "Под палящим солнцем на горе Голгофе три креста стоят,", "text": "Под палящим солнцем на горе Голгофе три креста стоят,\nИ толпа ликует, что за них в мученьях там Христос распят.\n\n    Вот на Голгофе на кресте висит измученный Христос, \n    Сквозь слёзы зовёт тебя, проходишь мимо ты опять,\n    Не хочешь ты Его принять, Его любви понять.\n    Но только зов Христа звучит: «Куда же ты идёшь, мой друг? \n    Ведь здесь Я за тебя. Приди ко Мне, и Я прощу,\n    Омою Кровию Своей и обновлю тебя».\n\nОн оставил славу и сошёл на землю, чтоб тебя спасти.\nОн даёт прощенье, мир, покой и радость людям всей земли."}, {"id": 632, "title": "Сколько путей, сколько дорог, юность моя, ты прошла!", "text": "Сколько путей, сколько дорог, юность моя, ты прошла!\nСловно заря, жизни весна вдруг незаметно ушла.\nКак бы хотел дни возвратить, те, что бесцельно прожил.\nБогу служить, Бога хвалить, дни все Ему посвятить! (2 раза)\n\nДруг мой, поверь, и у тебя молодость быстро пройдёт,\nСтайкою туч, стайкою птиц юность твою унесёт.\nТак поскорей Богу сейчас дни все свои посвяти,\nВедь Сам Господь умер за нас, взял на Себя все грехи. (2 раза)\n\nБыстро, как сон, годы пройдут, старость к тебе подойдёт,\nИнеем вдруг скроет виски, радости все унесёт.\nО друг, не спорь, лучше сейчас жизнь всю Христу посвяти! \nТолько тогда и только с Ним счастье ты сможешь найти. (2 раза)"}, {"id": 633, "title": "Ты пришёл в этот мир, и ты скоро уйдёшь,", "text": "Ты пришёл в этот мир, и ты скоро уйдёшь, \nБудешь счастлив тогда, когда Бога найдёшь.\n\n    Ветер, дождь и туман застилают глаза, \n    Но ты всё же ищи своим сердцем Христа.\n\nОн один лишь, поверь, может свет тебе дать.\nТы открой сердца дверь, чтобы Бога познать.\n\nБез Него жизни нет, лишь одна суета;\nОн даёт мне ответ, Он свершает дела.\n\nКто не знает Христа - муки терпят они;\nСчастья нет без любви, что живёт без конца."}, {"id": 634, "title": "Сколько б не было в мире дорог, сколько б не было в мире путей,", "text": "Сколько б не было в мире дорог, сколько б не было в мире путей, \nНет дороги прекрасней, чем Бог приготовил в заботе Своей.\n\n    Слышишь ли, плачет твоя душа,\n    Жизнь не такая ей здесь на земле нужна.\n    Лишь с Христом можешь ты счастлив быть,\n    И только Он один тебя научит жить.\n\nСколько б не было здесь у тебя дорогих и любимых друзей,\nНо случится с тобою беда, не поможет никто тебе в ней.\n\nТак подумай же, друг, ты теперь: по какой же дороге пойти,\nНе закрылась пока ещё дверь, дверь спасенья на Божьем пути."}, {"id": 635, "title": "Душа без Бога счастья не имеет, тоскует, плачет, мечется, болит.", "text": "Душа без Бога счастья не имеет, тоскует, плачет, мечется, болит.\nИ в мире нет целебного елея, который эту душу исцелит.\n\nК кому пойти и кто её утешит, кто успокоит, снимет с неё боль? \nКто даст ей радость и вселит надежду, и обогреет ласково собой?\n\nЕй нужен Бог, лишь Он её отрада, ничто другое и никто другой. \nБольной душе молиться Богу надо, в Котором мир и радость, и покой.\n\nДа, Бог велик, и всё пред Ним смолкает, вселенная трепещет пред Творцом, \nНо то, что душу с Богом разделяет, уже давно искуплено Христом.\n\nОткрывши дверь всем людям без изъятья к истоку вечной милости Своей, \nВ небесные, Отцовские объятья Бог ждёт Своих заблудших сыновей."}, {"id": 636, "title": "Зачем, зачем, о друг несчастный, вдали Христа смущённо ты стоишь?", "text": "Зачем, зачем, о друг несчастный, вдали Христа смущённо ты стоишь? \nВ беспечности своей опасной душою в мрачный мир глядишь? \nСпеши сейчас без промедленья, скорей иди к источнику добра,\nИз чаши благ своё спасенье возьми без серебра.\n\n    О мой друг, спеши, чтоб не опоздать,\n    Ведь любовь Христа не вечно будет звать.\n    Может быть, сейчас смолкнет благодать,\n    Грех тогда никто не сможет снять.\n\nСпеши, спеши! Как солнце в небе, Бог твоё сердце дивно озарит. \nСпеши, спеши! Счастливый жребий тебе Господь твой подарил. \nСпеши сейчас и сбрось всё бремя у ног Христа пронзённых и святых; \nНе упусти ты это время в стремленьях суетных.\n\nТебя Спаситель призывает, Его ты зов теперь не отклони;\nОн в жизнь твою войти желает, лишь двери сердца распахни! \nСвой путь направь к святой Отчизне и верным будь Иисусу до конца; \nЗаписан будешь в книгу жизни в обителях Отца!"}, {"id": 637, "title": "Иль тебе всё равно, что Спаситель страдал,", "text": "Иль тебе всё равно, что Спаситель страдал,\nВсё равно, всё равно, тебе всё равно?\nРавнодушно стоишь, а Он кровь проливал,\nИ тебе всё равно, тебе всё равно?\n\nСмотришь ты на Страдальца в смертельной тоске, \nНа чело Иисуса в терновом венце,\nНа пронзённые руки и скорбь на лице - \nИ тебе всё равно, тебе всё равно?\n\nЗа тебя на кресте Сам Господь умирал,\nА тебе всё равно, тебе всё равно?\nИ твой грех на Себя добровольно Он взял,\nА тебе всё равно, тебе всё равно?\n\nОсознал ли вину, что легла на Него,\nО прощенье молил ли у ног ты Его?\nОн в обитель зовёт у Отца Своего,\nНеужели тебе, тебе всё равно?"}, {"id": 638, "title": "Если ты устал в пути и не знаешь, как идти,", "text": "Если ты устал в пути и не знаешь, как идти,\nИ сомнения в груди изнурили,\nНа коленях боль души Иисусу расскажи,\nНе скрывай своей беды и нужды.\n\n    Иди к Христу! Своей милости \n    Он не жалел никогда никому.\n    Иди к Христу! Всё равно\n    Все дороги земные приводят к Нему.\n\nЕсли жизнь прожить ты смог без обид и без тревог, \nЕсли беды твой порог обходили,\nНа коленях счастья миг ты с Иисусом раздели, \nСлышишь голос у двери: «Отвори!»\n\nИ когда к Нему придёшь и любовь Его поймёшь,\nИ в Спасителе найдёшь радость жизни,\nНа коленях ты тогда прославляй любовь Христа, \nПусть поют Ему вовеки уста."}, {"id": 639, "title": "«Приди ко Мне!» - звучит Иисуса речь;", "text": "«Приди ко Мне!» - звучит Иисуса речь; \nОн хочет сердце радостью зажечь.\nО сердце, ты подавлено тоской?\nПриди ко Мне! Я дам тебе покой!\n\n    Приди ко Мне! Я дам покой.\n    Приди ко Мне! Я дам тебе покой!\n\nИ ты, душа, уставшая в борьбе,\nОн призывает и тебя к Себе:\n«Приди ко Мне! Я мир тебе дам в дар! \nПройдут сомненья и печаль, как пар».\n\nИ ты, бедняк, терзаемый грехом, \nСтрадаешь в тяжком бремени своём;\nТам в небесах придёт конец скорбям - \nПриди ко Мне, и жизнь тебе Я дам!\n\nЖизнь, мир, покой - бессмертия цветы - \nДаются нам из Божьей полноты;\nТеперь и здесь дана нам часть тех благ, \nЧто ждут нас там в прекрасных небесах."}, {"id": 640, "title": "Жизнь даётся человеку, чтоб на этой земле", "text": "Жизнь даётся человеку, чтоб на этой земле \nОн прожил, свершая добрые дела.\nНо порою так беспечен он бывает на пути,\nЗа собою увлекает суета.\n\n    Подожди, подожди! Иисус зовёт, не уходи! \n    Подожди, подожди! На Его зов ты поспеши.\n    О,подумай, человек, ну кто ты есть на земле?\n    А Иисус тебя так любит, лишь один Божий Сын.\n\nМира прелести и страсти всё кипят, бурлят вокруг,\nИ стремишься ты достичь земных высот.\nНо проходит день за днём, и суетой ты окружён,\nА Иисус тебя к спасению зовёт.\n\nДень за днём и год за годом улетают навсегда,\nНе нашёл нигде ты счастья своего.\nПосле тщетного исканья - в сердце боль и пустота,\nА Иисус стоит у сердца твоего."}, {"id": 641, "title": "Любовь сошла с небес на Крест кровавый.", "text": "Любовь сошла с небес на Крест кровавый.\nТак возлюбил Бог мир, что Сына Он оставил,\nЧтоб нас спасти. Ты слышал ли о том,\nЧто грешник может быть прощён, Христом прощён?\n\nТы всё от жизни взял, но как ты беден;\nМир накормил тебя полынью, а не хлебом.\nНо есть Один, Кто плакал о тебе,\nОн говорит: «Приди ко мне, приди ко Мне!»\n\nОн не пришёл к «святому» фарисею,\nПришёл Он к грешнице, к слепому Вартимею,\nОн раны их с любовью исцелял\nИ от грехов освобождал, освобождал.\n\nОн шёл с крестом на смерть, на осужденье,\nОн шёл за нас с тобой и был отвергнут всеми.\nОн знал, что ты к Нему ещё придёшь,\nС глазами, мокрыми от слёз, к Нему придёшь."}, {"id": 642, "title": "Взгляни вокруг: какая красота! Что видишь ты - то дело рук Творца!", "text": "Взгляни вокруг: какая красота! Что видишь ты - то дело рук Творца! \nОставь свой грех, приди к Христу скорей, чтоб не остаться вне дверей.\n\n    Он для тебя творил (и солнце, и) луну.\n    Он для тебя творил (леса, поля) моря,\n    Он для тебя послал (Спасителя) Христа,\n    Тебе открыл Он небеса!\n\nО человек, о друг мой или враг, жизнь пролетит как час или как шаг, \nНастанет день - расстанемся мы с ней. О, не останься вне дверей!\n\nУ тех дверей, где счастье и добро, и где в помине не бывает зло, \nТам нет вражды, там нет нужды и нет земной там суеты.\n\nА чтобы двери те открыть ты смог, искорени и грех свой и порок, \nОстанься сердцем чистым и душой, Спаситель хочет быть с тобой."}, {"id": 643, "title": "Люди! Слушайте, люди, наша земля устала.", "text": "Люди! Слушайте, люди, наша земля устала.\nЛюди, гробовая бездна навсегда укроет, и возврата нет.\nРазве наш Господь Создатель даровал напрасно нам и жизнь, и свет?\n\n    С вашим сознанием ждёт Он свидания, ваш разрешить вопрос. \n    Он сострадающий и всепрощающий, имя Ему - Христос! \n    Имя Ему - Христос!\n\nЛюди! Думайте, люди, к Богу скорей идите.\nЛюди, посмотрите, люди: жизнь идёт бесцельно, улетают дни.\nОн ведь здесь и там, повсюду, только б вы желали повстречаться с Ним.\n\nЛюди! Думайте, люди, чтобы не стало поздно.\nЛюди, у дверей сердечных Он стучится нежно вот уж много лет. \nЛюди, о, ответьте, люди, на любовь Иисуса, ведь Он ждёт ответ!"}, {"id": 644, "title": "Путь ко спасенью новый, живой Словом Христа открыт пред тобой.", "text": "Путь ко спасенью новый, живой Словом Христа открыт пред тобой. \nСам Он тебе дарует покой, Сам говорит: «Приди!»\n\n    Радость, радость будет в небесах,\n    Где мы в райских встретимся вратах;\n    Нас там Спаситель скроет в лучах вечной Своей любви.\n\n«Будьте как дети!» - Он говорит. Голос Христа нам радость дарит; \nСлышащий всякий пусть повторит нежный тот зов: «Приди!»\n\nЗнай, что тебя зовёт Он теперь. Брось все сомненья, искренно верь, \nВойди в Его отверстую дверь. Сам Он зовёт: «Приди!»"}, {"id": 645, "title": "Мой милый друг, ты на земле живёшь,", "text": "Мой милый друг, ты на земле живёшь,\nОт сна духовного не можешь ты очнуться, \nБез надежды по жизни ты идёшь,\nРукой до счастья хочешь дотянуться.\n\n    Как сухая пожелтевшая листва,\n    Что с деревьев ветер обрывает, \n    Словно грустная, осенняя пора, - \n    Так без Бога жизнь Твоя земная.\n\nНе знаешь ты, идя здесь по пути,\nЧто ждёт тебя за жизненным порогом.\nГде же вечность ты будешь проводить, \nВедь ты ещё не примирился с Богом?!\n\nА твой Господь всё смотрит на тебя,\nК тебе с любовью Он протягивает руки. \nОн сегодня ещё зовёт, любя,\nЖизнь без Него душе приносит муки."}, {"id": 646, "title": "Ты оставил Отца, далеко ушёл,", "text": "Ты оставил Отца, далеко ушёл,\nВ мире счастья ты всё ж не нашёл.\nСлушай, любящий голос тебя зовёт:\n«О, вернись, сын ушедший, домой!»\n\n    О,вернись (о,вернись),сын, домой (сын,домой)! \n    Гибнешь (гибнешь) ты в стране чужой.\n    Слушай (слушай) нежный зов Отца:\n    «О,вернись, сын, домой (о, вернись домой, домой)!»\n\nВолны жизни бросают твою ладью,\nСтрах наполнил уж душу твою.\nВ доме Отчем найдёшь полный ты покой.\nО, вернись, сын ушедший, домой!\n\nО, подумай, как чудно и хорошо \nДома жить у Отца своего.\nЧто же медлишь ещё ты в стране чужой?\nО, вернись, сын ушедший, домой!"}, {"id": 647, "title": "Есть у птиц небесных гнёзда, лисы в норах могут жить,", "text": "Есть у птиц небесных гнёзда, лисы в норах могут жить,\nА Христу, Кем ярки звезды, негде голову склонить.\nУ Него дворцы - светила, Он на небе мог бы жить,\nНо Мессии негде было в мире голову склонить.\n\nЛучезарные чертоги Он сменил на путь скорбей,\nДля борьбы и для тревоги поселился средь людей,\nКак пришлец в стране унылой, с жаждой миру послужить... \nИисусу ж негде было в мире голову склонить.\n\nРади гибнущих Спаситель принял тернии венца,\nЧтоб тебя ввести в Обитель, в сень небесного дворца.\nТот дворец Он вечной силой хочет грешникам открыть; \nСамому же негде было в мире голову склонить.\n\nХодит Он теперь, как нищий, от одних дверей к другим...\nОн стучится, но в жилище дверь закрыта перед Ним.\nИ никто не хочет шире сердце Господу открыть;\nИ теперь Иисусу в мире негде голову склонить.\n\nСколько раз в твой дом сердечный Он с любовию стучал;\nНо, порока раб беспечный, ты Его не принимал.\nДля тебя Он был бездомным; ты ж не хочешь дверь открыть, \nЧтоб в твоём жилище скромном мог Он голову склонить?!"}, {"id": 648, "title": "Жизнь задаёт задачи сложные, попробуй, каждую реши!", "text": "Жизнь задаёт задачи сложные, попробуй, каждую реши! \nСоделать явью невозможное Бог может для твоей души.\nНам остаётся лишь довериться, сказать: «Я - Твой, меня веди!» \nИ Он в морозы и метелицу пойдёт с тобою впереди.\n\nУже немалое утрачено. Чего ж ещё осталось ждать?\nНо на Голгофе всё оплачено, и это всё Бог хочет дать.\n«Иди, бери живою верою», - Спаситель людям говорит.\nОн жизнь тоскливую и серую небесным светом озарит.\n\nБогатство, слава - счастье ложное, - подумай, милый друг, в тиши, \nСоделать явью невозможное Бог может для твоей души.\nНам остаётся лишь довериться, сказать: «Я - Твой, меня веди!» \nИ Он в морозы и метелицу пойдёт с тобою впереди.\n«Иди, бери живою верою», - Спаситель людям говорит.\nОн жизнь тоскливую и серую небесным светом озарит."}, {"id": 649, "title": "Если устал ты в земном пути, в сердце обиду носишь,", "text": "Если устал ты в земном пути, в сердце обиду носишь,\nПодумай, что ждёт тебя впереди, чем оправдаться хочешь?\n\n    Остановись, оглянись назад: мы словно листья, нас кружит, \n    Кружит, кружит земной суетой, вдаль нас уносит с собой. \n    Думай, думай, что делал ты и куда направлял шаги?!\n    Знай, что за каждый поступок твой Бог на суд приведёт.\n\nВспомни, как ты ходил по земле: о, как мы все блуждали!\nТолько Христос дарует тебе вечность блаженного рая.\n\nРазная людям дана судьба, и, сверкнув на мгновенье \nСловно сгоревшая звезда, вспыхнул и пал ты в забвенье."}, {"id": 650, "title": "Вдоль по миру счастье проходит, а в мире так скучно, темно.", "text": "Вдоль по миру счастье проходит, а в мире так скучно, темно.\nИ в каждую дверь мимоходом хоть слабо, да стукнет оно.\n\nИ к тем, кто живёт беззаботно, и к тем, кто печалью убит,\nВ блестящие замка ворота и к нищему в двери стучит.\n\nНо люди не ищут спасенья, увлекшись мирской суетой,\nВ них к истине мало стремленья, наполнено сердце враждой.\n\nИх манят далёкие грёзы, терзает вседневное зло,\nВ тоске и печали льют слёзы: «О, где же ты, счастье моё?»\n\nНе может быть счастья без Бога, ты в мире его не найдёшь. \nЗдесь скорби, тоска и тревога, а счастье даёт лишь Христос.\n\nПроверь же себя, друг, сегодня, нашёл ли ты счастье? И где? \nЛюбовь всем даётся Господня, блаженство - в Иисусе Христе!"}, {"id": 651, "title": "Что ты медлишь на грешном пути, слыша зов Иисуса: «Приди!»", "text": "Что ты медлишь на грешном пути, слыша зов Иисуса: «Приди!» \nПочему ты не хочешь принять дар бесценный - Его благодать?\n\n    Спеши теперь (спеши теперь),(2 раза)\n    Поспеши в объятья Христа!\n    Спеши теперь (спеши теперь),(2 раза)\n    Или полночь настигнет тебя.\n\nТы на Агнца святого взгляни: за тебя Он страдал без вины,\nЧашу скорби до дна Он испил и тебя от суда искупил.\n\nПосвяти же Ему жизни дни, будешь счастлив с Христом вечно ты. \nКровь святая омоет весь грех, и белее ты станешь, чем снег."}, {"id": 652, "title": "Факел веры угасает, песни мира замирают,", "text": "Факел веры угасает, песни мира замирают,\nНет надежды, нет любви... О мой друг, о мой брат, о, где же ты?\n\nВсё забыл ты и забросил, колос веры грубо скошен,\nТы оставил всех друзей. О мой друг, о мой брат, вернись скорей.\n\nСумрак ночи опустился, ты сегодня не молился,\nО, склони пред Ним главу и скажи: «Я у ног Твоих стою».\n\nДруг мой бедный, ты блуждаешь, и напрасно ты страдаешь,\nМрак в душе твоей сильней. О мой друг, о мой брат, вернись скорей!\n\nВ синем небе песня льётся, что рыданьем вдруг прервётся - \nЭто слёзы, друг, Творца за тебя, за тебя и за меня.\n\nТы покинул, друг, собранье, видит Бог твои страданья,\nОн зовёт тебя: «Приди!» Ты на зов, ты на зов Его спеши."}, {"id": 653, "title": "Сколько раз Ты, Господь, с любовью нежно в сердце моё стучал,", "text": "Сколько раз Ты, Господь, с любовью нежно в сердце моё стучал, \nНо, гонимый недоброй волей, я в упрямстве своём молчал.\nПо пустыне суровой, дикой шёл, не ведая сам куда;\nМиражей бесконечных блики постоянно манили вдаль.\n\nЯ отраву греха беспечно, как холодную воду, пил,\nНо в Своём милосердье вечном Ты, как прежде, меня любил.\nВ мире трудных земных скитаний, изнуряющей суеты,\nСреди горьких души терзаний мне внезапно явился Ты.\n\nИ тогда, как бы в знак прощенья, Ты в ладонях воды мне дал. \nНаклонившись к ним, в изумленье я увидел рубцы от ран.\nС той поры мне всего дороже эти раны и Кровь Христа.\nЯ спасён - это милость Божья! Я на дланях записан там!"}, {"id": 654, "title": "Всякий жаждущий, иди и пей с источника воды живой,", "text": "Всякий жаждущий, иди и пей с источника воды живой,\nЕсли веришь в Сына, если любишь Сына, всю жизнь твою Он обновит.\n\n    Аллилуйя! Тебе хвала! (3 раза)\n    Аллилуйя! Тебе, Иисус, хвала!\n\nЕсли ты устал, изнемог идти, Он рад тебе помочь в пути;\nНошу всю снимает, силы обновляет, во всех скорбях помощник Он.\n\nТы проси огня, и Он даст тебе, и радостно вперёд пойдешь,\nЛишь Ему доверься, на Него надейся, всю твою жизнь Он обновит."}, {"id": 655, "title": "Грешники, к Христу придите, час спасенья возвещён;", "text": "Грешники, к Христу придите, час спасенья возвещён;\nИисус спасти вас хочет, полн любви и силы Он,\nВедь Он может (ведь Он может) (2 раза),\nИ Он хочет (и Он хочет), чтобы мир весь был спасён! (2 раза)\n\nУгнетённые, придите! Если медлит кто и ждёт \nЛучшим стать, то никогда он к Богу жизни не придёт.\nВедь Он грешных (ведь Он грешных) (2 раза),\nВедь Он грешных (ведь Он грешных), а не праведных зовёт.(2 раза)\n\nВ Гефсимании, смотрите, на земле простёрся Он;\nОн на древе умирает - слышат люди Божий стон.\nГрешник бедный (грешник бедный) (2 раза),\nГрешник бедный (грешник бедный), ты ль ещё не убеждён? (2 раза)\n\nВоплощённый Бог вознёсся; Он дарует жизнь тому,\nКто к Нему всегда взывает и вверяется Ему.\nНет другого (нет другого) (2 раза),\nНет другого (нет другого), кто в сердцах развеет тьму.(2 раза)\n\nАнгелы святые вместе Богу славу воздают,\nИ, их песням громко вторя, небеса Христу поют:\n«Аллилуйя! (Аллилуйя!) (2 раза)\nАллилуйя! (Аллилуйя!)» - все уста Иисуса чтут!(2 раза)"}, {"id": 656, "title": "Если пришла беда, кто нам, скажите, поможет?", "text": "Если пришла беда, кто нам, скажите, поможет?\nНо через все года видим мы руку Божью.\nВстань на колени, друг, если скорбей так много,\nИ ты познаешь вдруг счастье в общенье с Богом.\n\n    Мир не поймёт тебя, сердце больнее ранит, \n    Только Господь, любя, руки к тебе протянет.\n\nВылей всю душу Ему в горести и страданье,\nДаже кромешную тьму Он превратит в сиянье.\nВстань на колени, друг, если скорбей так много,\nИ ты познаешь вдруг счастье в общенье с Богом.\n\nВдумайся в эти слова, сколько в них радости, счастья: \n«Любит Иисус тебя и помогает в ненастье!»\nТолько поверь Ему, и Он тебе поможет,\nОн ведь Творец всему - наш Иисус, Сын Божий!"}, {"id": 657, "title": "Озари моё сердце, Христос, я устал от блужданий во тьме.", "text": "Озари моё сердце, Христос, я устал от блужданий во тьме. \nПосмотри, я к распятью принёс сокрушённое сердце своё. \nПодари мне звезду Рождества, я её до конца сберегу.\nО, внемли! Моя просьба чиста, я солгать у креста не могу.\n\nНазови меня сыном своим, хочешь блудным, - согласен на всё, \nНо прими меня, Отче, прими в непорочное лоно Своё.\nИ пустыня страданий и слёз под покровом Всевышней руки \nСтанет радужной россыпыо звёзд, и в лазурь превратятся пески.\n\nТерны станут букетами роз, слёзы станут источником счастья. \nПосмотри, я сегодня принёс сокрушённое сердце к распятью. \nПодари мне звезду Рождества, я её до конца сберегу.\nО, внемли! Моя просьба чиста я солгать у креста не могу.\nИ пустыня страданий и слёз под покровом Всевышней руки \nСтанет радужной россыпью звёзд, и в лазурь превратятся пески."}, {"id": 658, "title": "Ты блуждал во тьме своих грехов, потерял надежду и любовь;", "text": "Ты блуждал во тьме своих грехов, потерял надежду и любовь;\nТы томился здесь своей душой и хотел найти себе покой.\n\n    Но никто помочь тебе не мог, только любящий Спаситель Бог \n    На тебя с любовию взглянул, в сердце силу Божию вдохнул.\n\nТы искал здесь в мире чистоту - повстречал обман и пустоту.\nТвоя жизнь, как ночь, была темна, душу тяжко мучила она.\n\nИ когда от мрака ты прозрел, Бог тебя любовию согрел.\nИ теперь ты в радости живёшь, людям ты другим о том поёшь,\n\n    Что никто спасти тебя не мог, только любящий Спаситель Бог \n    На тебя с любовию взглянул, в сердце силу Божию вдохнул."}, {"id": 659, "title": "Бог зовёт тебя голосом истины, ты призыв этот в детстве слыхал.", "text": "Бог зовёт тебя голосом истины, ты призыв этот в детстве слыхал. \nХочет Он, чтобы ярко и искренне твой алтарь для Него полыхал.\n\n    На пути будут ветры гонений и затишье, как мель, и обман; \n    За Христом ты иди без сомнений чрез неверья гнетущий туман.\n\nБез Христа мир пронзающе холоден, и его обещанья пусты.\nАх, как важно бесценную молодость по святому направить пути.\n\nВ состоянии сына заблудшего отыщи Вифлеема звезду\nИ промолви, любовью разбуженный: «Я иду, к Иисусу иду!»"}, {"id": 660, "title": "Последний псалом для тебя прозвучал,", "text": "Последний псалом для тебя прозвучал,\nИ Слово Господне умолкло в тиши;\nБыть может, последний раз Бог постучал \nВ закрытые наглухо двери души.\nНа сердце твоё Он с любовью взирал,\nГотов был святой благодатью объять;\nОн руки незримо к Тебе простирал,\nЧтоб тяжкое бремя греховное снять.\n\n    Как сын бесконечно ты дорог Ему,\n    Тебя возлюбил и от смерти Он спас.\n    И был ли ещё ты так близок к Нему, \n    Как близок теперь в этом доме сейчас.\n\nОн рядом с тобой! Неужели, мой друг,\nТы сердцем не чувствуешь близость Его, \nКак всё напоняет божественный Дух,\nИ милость лучится вокруг от Него?\nСегодня пред Ним ты смиренно склонись, \nВсю выплесни разом греховную муть.\nИ чистых небес необъятная высь \nВольётся в твою обновлённую грудь.\n\nВновь в жизни твоей самый важный вопрос \nГотов ты на завтра уже отложить.\nТебя не отвергнет и завтра Христос,\nНо сможешь ли, друг, до него ты дожить? \nДо этого «завтра» зовёт тебя Бог!\nСегодня не медли Его зов принять.\nЗа этим порогом есть вечный порог \nИ там будет поздно принять благодать."}, {"id": 661, "title": "Птицы улетают вдаль, с ними расставаться жаль,", "text": "Птицы улетают вдаль, с ними расставаться жаль,\nДолго я смотрю им вслед, - мглою горизонт одет.\nНо для перелётных птиц нет преград и нет границ.\nГладью неба в южный теплый край мчатся вереницы стай.\n\nМимо убранных полей, мимо суеты людей,\nМимо их вражды и слёз, мимо бедствий и угроз \nМчатся вдаль; и крики их вновь зовут от бурь земных.\nК тишине небес страны родной мчится дух усталый мой.\n\nГоды улетают вдаль, с ними расставаться жаль,\nДолго я смотрю им вслед, - мглою горизонт одет.\nНо в душе печали нет: вечной жизни вижу свет.\nПусть летят в надзвёздный светлый край годы вереницей стай.\n\nГоды улетают вдаль... Если ты без Бога - жаль:\nСтрашный ждёт тебя конец, суд готов свершить Творец!\nДруг мой, время не теряй, с Господом в завет вступай,\nИ душа, как птица, полетит в край, где вечный свет царит."}, {"id": 662, "title": "Летит безжалостное время, промчались тысячи годов.", "text": "Летит безжалостное время, промчались тысячи годов.\nПройдёт и нынешнее племя вослед исчезнувших родов.\n\nТак в вечность день за днём стремится, не оставляя нам следа;\nИ жизнь на крыльях ветра мчится, придёт и наша череда.\n\nИ наши громкие деянья, труды, заботы, суета \nСкользнут в пучину мирозданья как неприметная мечта.\n\nТак вот зачем ты в свет родился, болезни, скорби претерпел?\nК тому ль твой жадный ум стремился, чтоб стал могилой твой удел?\n\nТо жизни счастья призрак ложный всегда кружил тебя во мгле;\nИ забываешь, прах ничтожный, что ты прохожий на земле.\n\nНо есть за гробом жизнь иная, жизнь вечная без счёта лет.\nТебя там участь ждёт какая? Об этом думал ты иль нет?"}, {"id": 663, "title": "Куда спешишь ты, окружённый суетой,", "text": "Куда спешишь ты, окружённый суетой,\nНе замечая даже ближнего порой?\nОстановись и рассмотри, зачем спешить,\nВедь на земле тебе не так уж долго жить?\n\nКуда спешишь ты, окружённый суетой?\nВокруг земля благоухает красотой.\nТебя царём поставил Бог над всей землёй,\nА ты не можешь обладать самим собой.\n\nКуда
